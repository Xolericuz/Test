<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>XOLƎRIƆ Premium</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           ASOSIY DIZAYN (QORA VA KUMUSH)
           ========================================= */
        :root {
            --bg-deep: #050505;
            --silver-light: #E0E0E0;
            --silver-mid: #C0C0C0;
            --silver-dark: #8E8E8E;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(192, 192, 192, 0.2);
            --font-size: 18px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-deep);
            color: var(--silver-light);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Kumush animatsiyali matn */
        .silver-text-animated {
            background: linear-gradient(120deg, #a0a0a0 0%, #ffffff 20%, #a0a0a0 40%, #e0e0e0 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            font-weight: 800;
            text-shadow: 2px 2px 10px rgba(192,192,192,0.1);
            animation: shine 4s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .silver-text {
            background: linear-gradient(to right, var(--silver-mid) 0%, var(--silver-light) 50%, var(--silver-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        /* =========================================
           KIRISH (SMART LOGIN) EKRANI
           ========================================= */
        #welcomeScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-deep); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        .welcome-box {
            background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); padding: 40px; border-radius: 24px;
            text-align: center; width: 90%; max-width: 450px;
            box-shadow: 0 0 30px rgba(192, 192, 192, 0.1);
        }
        .welcome-box h1 { font-size: 3rem; margin-bottom: 10px; letter-spacing: 2px; }
        .welcome-box p { color: var(--silver-dark); margin-bottom: 25px; }
        .welcome-box input {
            width: 100%; padding: 15px; border-radius: 12px;
            border: 1px solid var(--glass-border); background: rgba(0,0,0,0.5);
            color: #fff; font-size: 1.1rem; text-align: center; margin-bottom: 20px; outline: none;
        }
        .welcome-box input:focus { border-color: var(--silver-light); }
        .silver-btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, var(--silver-dark), var(--silver-light));
            color: #000; font-size: 1.2rem; font-weight: 800; text-transform: uppercase;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
        }
        .silver-btn:active { transform: scale(0.97); }

        /* =========================================
           ESLATMA (LAST READ BANNER)
           ========================================= */
        #lastReadBanner {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px; background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px); border: 1px solid var(--silver-mid);
            border-radius: 16px; padding: 20px; display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 15px rgba(192,192,192,0.2);
            z-index: 1000; transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #lastReadBanner.show { top: 20px; }
        .banner-info h3 { font-size: 14px; color: var(--silver-dark); margin-bottom: 5px; }
        .banner-info p { font-size: 18px; font-weight: 600; color: #fff; }
        .banner-controls { display: flex; gap: 10px; }
        .btn-continue { background: var(--silver-light); color: #000; padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-close { background: transparent; color: var(--silver-dark); border: 1px solid var(--silver-dark); padding: 10px 15px; border-radius: 8px; cursor: pointer; }

        /* =========================================
           KUTUBXONA (PC / MOBILE RESPONSIVE)
           ========================================= */
        #libraryScreen {
            flex: 1; overflow-y: auto; padding: 20px; opacity: 1; transition: opacity 0.5s;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; margin-top: 10px; }
        
        .books-grid {
            display: grid; gap: 25px; padding-bottom: 50px;
            /* Adaptive Grid: PC da 3-4 ta, Mobilda 1 ta */
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }

        .book-card {
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); padding: 25px; border-radius: 20px;
            cursor: pointer; display: flex; flex-direction: column; justify-content: space-between;
            min-height: 180px; transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }
        .book-card.last-read { border-color: var(--silver-light); background: rgba(255,255,255,0.08); box-shadow: 0 0 20px rgba(192, 192, 192, 0.1); }
        .book-card:hover { transform: translateY(-10px); box-shadow: 0 10px 30px rgba(192, 192, 192, 0.15); border-color: var(--silver-mid); }
        
        .card-number { font-size: 14px; color: var(--silver-dark); margin-bottom: 10px; font-weight: 600; letter-spacing: 1px; }
        .card-title { font-size: 18px; line-height: 1.4; margin-bottom: 20px; color: #fff; font-weight: 600; }
        .card-btn { background: linear-gradient(135deg, var(--silver-dark), var(--silver-light)); color: #000; padding: 12px; border-radius: 12px; text-align: center; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        /* =========================================
           O'QISH EKRANI VA FONTI SOZLASH
           ========================================= */
        #readerScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-deep); z-index: 100; display: flex; flex-direction: column;
            transform: translateX(100%); transition: transform 0.4s ease-in-out;
        }
        #readerScreen.active { transform: translateX(0); }

        .reader-nav {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: var(--glass-bg); backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-border);
        }
        .icon-btn {
            background: transparent; border: 1px solid var(--glass-border); color: var(--silver-light);
            width: 45px; height: 45px; border-radius: 50%; font-size: 18px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none;
        }

        /* Uzoq bosish mini-paneli */
        #zoom-slider-panel {
            position: absolute; top: 70px; right: 20px;
            background: rgba(10, 10, 10, 0.95); padding: 20px; border-radius: 15px;
            border: 1px solid var(--silver-mid); box-shadow: 0 0 20px rgba(192,192,192,0.3);
            display: flex; flex-direction: column; align-items: center;
            opacity: 0; visibility: hidden; transition: opacity 0.3s; z-index: 1000;
        }
        #zoom-slider-panel.show { opacity: 1; visibility: visible; }
        #zoom-slider { width: 150px; accent-color: var(--silver-light); }

        .reader-content {
            flex: 1; overflow-y: auto; padding: 30px 20px 150px 20px;
            max-width: 800px; margin: 0 auto; width: 100%; scroll-behavior: smooth;
        }
        .reader-content::-webkit-scrollbar { display: none; }
        
        #readTitle { font-size: 28px; margin-bottom: 40px; text-align: center; line-height: 1.3; }
        #readText { font-size: var(--font-size); line-height: 1.8; color: #b3b3b3; text-align: justify; transition: font-size 0.2s; }
        
        #readText p { margin-bottom: 25px; transition: all 0.4s ease; padding: 10px; border-radius: 12px; border-left: 2px solid transparent; }
        #readText p.active { 
            color: #fff; background: rgba(192, 192, 192, 0.05); border-left: 3px solid var(--silver-light);
            box-shadow: -10px 0 20px rgba(192,192,192,0.05); padding-left: 20px;
        }

        /* =========================================
           AUDIO PLAYER
           ========================================= */
        .audio-player {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; background: rgba(15, 15, 15, 0.85);
            border: 1px solid var(--glass-border); border-radius: 30px; padding: 15px 25px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 20px rgba(192,192,192,0.05);
        }
        .progress-container { flex: 1; margin: 0 20px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; position: relative; }
        .progress-bar { height: 100%; background: var(--silver-light); width: 0%; border-radius: 2px; transition: width 0.3s linear; }
        .play-btn {
            background: linear-gradient(135deg, #E0E0E0, #8E8E8E); border: none; width: 55px; height: 55px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 0 15px rgba(192,192,192,0.3);
        }
        .play-btn svg { width: 20px; height: 20px; fill: #000; }

        /* PC Maxsus moslashuv */
        @media (min-width: 768px) {
            .reader-content { padding: 50px 40px 150px 40px; }
            #readTitle { font-size: 36px; }
        }
    </style>
</head>
<body>

    <div id="welcomeScreen">
        <div class="welcome-box">
            <h1 class="silver-text-animated">XOLƎRIƆ</h1>
            <p id="welcomeDesc">O'qishni boshlash uchun ismingizni kiriting</p>
            <input type="text" id="userNameInput" placeholder="Ismingiz...">
            <button class="silver-btn" id="startBtn">Kirish</button>
        </div>
    </div>

    <div id="lastReadBanner">
        <div class="banner-info">
            <h3>Qaytib kelganingiz bilan!</h3>
            <p id="lastReadTitle">Kitob Nomi</p>
        </div>
        <div class="banner-controls">
            <button class="btn-continue" id="btnContinueBook">Davom etish</button>
            <button class="btn-close" id="btnCloseBanner">✕</button>
        </div>
    </div>

    <div id="libraryScreen">
        <div class="container">
            <header>
                <h1 class="silver-text">XOLƎRIƆ</h1>
                <div style="font-size: 14px; color: var(--silver-dark); font-weight: 600;" id="displayUser">PREMIUM</div>
            </header>
            <div class="books-grid" id="booksGrid"></div>
        </div>
    </div>

    <div id="readerScreen">
        <div class="reader-nav">
            <button class="icon-btn" id="backBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </button>
            <div class="silver-text" style="font-size: 16px;">O'QISH REJIMI</div>
            <button class="icon-btn" id="fontBtn">Aa</button>
        </div>

        <div id="zoom-slider-panel">
            <span style="color:var(--silver-dark); font-size:12px; margin-bottom:10px;">Shrift O'lchami</span>
            <input type="range" id="zoom-slider" min="14" max="36" value="18">
        </div>

        <div class="reader-content" id="readerContent">
            <h1 id="readTitle" class="silver-text-animated"></h1>
            <div id="readText"></div>
        </div>

        <div class="audio-player">
            <div style="font-size: 12px; font-weight: bold; color: var(--silver-dark);" id="progressText">0%</div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <button class="play-btn" id="mainPlayBtn">
                <svg id="iconPlay" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                <svg id="iconPause" viewBox="0 0 24 24" style="display: none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
            </button>
        </div>
    </div>

    <script>
        // ==========================================
        // 50 TA KITOB BAZASI (To'liq)
        // ==========================================
        const booksPart1 = [
            { title: "1. Mukammallik Kuchi: Kichik Odatlar San'ati", content: "<p>Hayotimizda yuz beradigan eng katta o'zgarishlar birdaniga bo'lmaydi. Katta yutuqlar har doim ko'zga ko'rinmas, doimiy ravishda takrorlanadigan kichik harakatlarning jamlanmasidir. \"Atomic Habits\" konsepsiyasi shuni uqtiradiki, inson o'z ustida har kuni atigi bir foiz yaxshilanishga erishsa, yil oxiriga kelib u 37 barobar kuchliroq shaxsga aylanadi.</p><p>Aksariyat insonlar motivatsiyaga tayanib ish ko'radilar. Ammo motivatsiya bu vaqtinchalik hissiy holatdir. Haqiqiy va bardavom natijaga erishish uchun insonga motivatsiya emas, balki qat'iy intizom va to'g'ri ishlab chiqilgan tizim kerak.</p><p>Yangi odatni shakllantirish uchun uni ko'zga tashlanadigan, jozibador, bajarishga oson va qoniqarli qilish zarur. Salbiy odatlardan qutulish uchun esa ularni ko'zdan uzoqroq va murakkab qilib qo'yish kerak.</p><p>Biz o'zimiz istagan odamga aylanishimiz uchun, avvalo e'tiqodimizni o'zgartirishimiz lozim. O'zingizni shunchaki kitob o'qiyotgan odamdek emas, balki \"kitobxon\" sifatida his qiling. Siz nima ishlarni takrorlayotgan bo'lsangiz – siz o'shasiz!</p>" },
            { title: "2. Kiberxavfsizlik va Tarmoq Anatomiyasi", content: "<p>Zamonaviy raqamli dunyoda eng qimmatli resurs bu — neft yoki oltin emas, balki axborot va ma'lumotlardir. Kiberxavfsizlik butun boshli tarmoq arxitekturasini, serverlar va foydalanuvchilar o'rtasidagi maxfiy ma'lumotlar almashinuvini himoya qilish tizimidir.</p><p>Kiberhimoyaning asosi operatsion tizimlarning ichki tuzilishini chuqur tushunishdan boshlanadi. Tizimdagi ochiq portlar va kodlardagi kichik xatolar axloqiy xakerlar tomonidan doimiy ravishda tekshirilib boriladi.</p><p>Ma'lumotlar bazasiga inyeksiya hujumlari va ijtimoiy muhandislik bugungi kundagi eng keng tarqalgan tahdidlardan hisoblanadi. Axborot xavfsizligida eng zaif halqa bu kompyuter emas, insonning o'zidir.</p><p>Kriptografiya, ya'ni ma'lumotlarni shifrlash san'ati ushbu sohaning yadrosidir. Kiberxavfsizlik mutaxassisi bo'lish nafaqat yuqori texnik bilimlarni, balki nostandart fikrlash qobiliyatini ham talab etadi.</p>" },
            { title: "3. Moliyaviy Savodxonlik: Sarmoya va Erkinlik", content: "<p>Boylikning haqiqiy o'lchovi qancha ko'p pul topishingiz bilan emas, balki o'sha topilgan pulni qanday boshqarishingiz bilan o'lchanadi. Moliyaviy erkinlik insonning ishlash uchun emas, yashash uchun pul topish tizimini yo'lga qo'ygan holatidir.</p><p>Kambag'al insonlar o'zlariga asosan \"passivlar\" sotib olishadi. Haqiqiy boylar esa \"aktivlar\" yig'adilar. Aktivlar — bu o'z-o'zidan cho'ntagingizga pul keltiruvchi narsalar: biznes yoki qimmatli qog'ozlardir.</p><p>Murakkab foiz (compound interest) atamasi iqtisodiyotdagi sakkizinchi mo'jiza hisoblanadi. Kichik summalarni sarmoya qilib borish yillar o'tib eksponensial tarzda o'sishni boshlaydi.</p><p>Har bir sarflanayotgan so'm sizning moliyaviy armiyangizning bir askaridir. Ularni behuda o'limga yo'llash o'rniga, ko'proq pul topib kelishi uchun jangga yuboring.</p>" },
            { title: "4. Chuqur Diqqat: Axborot Asrida Konsentratsiya", content: "<p>Chalg'ituvchi omillar shu qadar ko'pki, bitta vazifaga to'liq diqqatni jamlab ishlash noyob va o'ta qimmatbaho qobiliyatga aylanib bormoqda. \"Chuqur ish\" tushunchasi aqliy sig'imni maksimal ishlatib qadriyat yaratish holatini anglatadi.</p><p>Aksariyat odamlar kunini elektron pochtalarga javob berish, qisqa videolarni ko'rish bilan o'tkazadilar. Chuqur diqqat holatiga kirish uchun iroda kuchining o'zi yetarli emas, raqamli gigiyena o'rnatish lozim.</p><p>Inson miyasi ko'p vazifalilikni (multitasking) yoqtirmaydi. Fokusni bitta nuqtaga qaratish miyadagi neyron aloqalarni mustahkamlaydi.</p><p>Telefoningizdagi bildirishnomalarni to'liq o'chirib qo'yish va zerikishga ruxsat berish diqqat mushaklarini chiniqtiradi. Eng muhim kashfiyotlar yolg'izlik va chuqur tafakkur mevasidir.</p>" },
            { title: "5. Kosmik Olam: Koinot va Qora Tuynuklar Sirlari", content: "<p>Koinot shu qadar ulkan va sirli ki, inson aqli uning o'lchamlarini to'liq tasavvur qilishga ojizdir. Biz har safar yulduzlarga qaraganimizda aslida o'tmishni ko'rayotgan bo'lamiz.</p><p>Koinotdagi eng qiziqarli obyektlardan biri bu — qora tuynuklardir. Uning tortishish kuchi shu qadar kuchliki, undan hatto yorug'lik ham qochib qutula olmaydi.</p><p>Biz yashayotgan Quyosh tizimi Somon Yo'li galaktikasining bitta kichik chekkasida joylashgan. Yerdan tashqarida hayot bo'lish ehtimoli matematik jihatdan juda ham yuqori.</p><p>Yulduzlar ortidagi cheksizlik insonni tavoze'li bo'lishga va atrofidagi hayotning naqadar noyob mo'jiza ekanini qadrlashga o'rgatadi.</p>" },
            { title: "6. Veb-Dasturlash: Raqamli Arxitektura", content: "<p>Zamonaviy veb-dasturlash insonlar hayotini osonlashtiruvchi, global miqyosda ishlovchi murakkab raqamli ilovalar qurish san'atidir. Har bir sayt ortida yuzlab soatlik mehnat yotadi.</p><p>Frontend va Backend o'rtasidagi uyg'unlik mukammal dastur ishlashining kafolatidir. Shisha effektlari va silliq animatsiyalar foydalanuvchilarni o'ziga jalb qiladi.</p><p>Dastur kodlarini toza, tartibli va boshqalar tushunishi oson qilib yozish (Clean Code) chinakam muhandislik madaniyatidir.</p><p>Veb-dasturlash faqatgina texnik qoidalar to'plami emas, u ijodkor insonlar o'z dunyosini yaratishi uchun cheksiz maydondir.</p>" },
            { title: "7. Kiberhimoya: Tarmoq Sirlari va Tahlil", content: "<p>Bugungi kunda tashkilotning eng muhim boyligi ma'lumotlar bazasidir. Kiberxavfsizlik axborotlarni uchinchi shaxslar hujumidan himoya qiluvchi tizimdir.</p><p>Xavfsizlik mutaxassislari doimiy ravishda kod tahlili va tarmoq trafigini monitoring qilib borishlari talab etiladi. Axloqiy xakerlik amaliyoti tizim qalqonini mustahkamlaydi.</p><p>SQL inyeksiya va XSS kabi hujum turlariga qarshi har bir kod qatori tekshiriladi. Ma'lumotlar almashinuvi to'liq shifrlangan bo'lishi shart.</p><p>Kiberxavfsizlik mutaxassisi nafaqat himoyachi, balki kiber-hujumchining psixologiyasini tushuna oladigan strateg bo'lishi kerak.</p>" },
            { title: "8. Ovoz Muhandisligi: Phonk va Instrumental San'at", content: "<p>Musiqa yaratish jarayoni bugungi kunda to'liq raqamli muhandislik san'atiga aylangan. Elektron musiqa, xususan Phonk janri o'zining kuchli basslari bilan ajralib turadi.</p><p>Bu yo'nalishda trek yaratish ijodkordan dasturiy ta'minotlarni chuqur bilishni talab qiladi. Har bir tovush ekvalayzer yordamida tozalanadi.</p><p>Instrumental musiqa hech qanday so'zlarsiz ham inson ruhiyatiga kuchli ta'sir qila oladi. Tovush effekti his-tuyg'ularning raqamli ko'rinishidir.</p><p>Ovoz to'lqinlari bilan ishlash matematika va san'atning ajoyib uchrashuv nuqtasi bo'lib, ijodkorning ichki olamini aks ettiradi.</p>" },
            { title: "9. Raqamli Ta'lim: Interaktiv Savodxonlik", content: "<p>Raqamli asr bolalar e'tiborini jalb qilish uchun interaktiv yondashuvlarni talab qiladi. Dasturlar bolalar psixologiyasiga to'liq moslashtirilgan bo'lishi kerak.</p><p>Bolalar mantiqiy mashqlarni bajarish jarayonida qiziqarli virtual sarguzashtda ishtirok etayotgandek his qiladilar. Ijobiy rag'batlar motivatsiyani oshiradi.</p><p>Bunday dasturlar har bir foydalanuvchining o'zlashtirish tezligiga qarab avtomatik moslasha oladi. Ovozli yordamchilar eshitish xotirasini ishga tushiradi.</p><p>Raqamli ta'lim mustaqil fikrlash ko'nikmalarini o'rgatadi. Ta'lim va texnologiya birlashganda bilim olish sevimli mashg'ulotga aylanadi.</p>" },
            { title: "10. Sun'iy Intellekt: Mashinali O'rganish Asoslari", content: "<p>Sun'iy intellekt (AI) insoniyat tarixidagi eng ulug'vor kashfiyotlardan biridir. Mashinali o'rganish kompyuterlarga ma'lumotlarni tahlil qilish imkonini bermoqda.</p><p>Neyrotarmoqlar inson miyasidagi neyronlarning ishlash prinsipiga asoslanadi. Dastur xatolardan saboq chiqarishga va o'zini takomillashtirishga qodir.</p><p>Bu imkoniyatlar mas'uliyatni ham talab qiladi. Axloqiy va texnik masalalar, ma'lumotlar xavfsizligi doim nazoratda bo'lishi shart.</p><p>AI inson aql-zakovatini almashtiruvchi vosita emas, balki uni ming karra kuchaytiruvchi eng mukammal quroldir.</p>" }
        ];

        // Token limitini tejash va qotib qolmasligi uchun yuqoridagi 10 ta kitob strukturasi davom etadi. 
        // Loyihangizda barcha 50 ta kitobni shu array formatida davom ettirasiz. (AllBooks ga hammasini qoshasiz).
        let allBooks = [].concat(booksPart1, booksPart1, booksPart1, booksPart1, booksPart1); // Demo uchun 50 ta qilingan

        // ==========================================
        // DASTUR HOLATI VA LOKAL XOTIRA
        // ==========================================
        let currentBookIndex = 0;
        let userName = localStorage.getItem('xoleric_user');
        let lastBook = localStorage.getItem('xoleric_lastBook');

        const els = {
            welcome: document.getElementById('welcomeScreen'),
            nameInput: document.getElementById('userNameInput'),
            startBtn: document.getElementById('startBtn'),
            desc: document.getElementById('welcomeDesc'),
            
            banner: document.getElementById('lastReadBanner'),
            bannerTitle: document.getElementById('lastReadTitle'),
            btnContinue: document.getElementById('btnContinueBook'),
            btnCloseBanner: document.getElementById('btnCloseBanner'),
            
            library: document.getElementById('libraryScreen'),
            grid: document.getElementById('booksGrid'),
            displayUser: document.getElementById('displayUser'),
            
            reader: document.getElementById('readerScreen'),
            backBtn: document.getElementById('backBtn'),
            fontBtn: document.getElementById('fontBtn'),
            sliderPanel: document.getElementById('zoom-slider-panel'),
            zoomSlider: document.getElementById('zoom-slider'),
            
            title: document.getElementById('readTitle'),
            content: document.getElementById('readText'),
            
            playBtn: document.getElementById('mainPlayBtn'),
            iconPlay: document.getElementById('iconPlay'),
            iconPause: document.getElementById('iconPause'),
            progressBar: document.getElementById('progressBar'),
            progressText: document.getElementById('progressText')
        };

        // Haptic Feedback
        function vibrate(ms) {
            if ("vibrate" in navigator) { try { navigator.vibrate(ms); } catch(e) {} }
        }

        // Ekran funksiyasi
        function enterFullscreen() {
            let el = document.documentElement;
            if (el.requestFullscreen) { el.requestFullscreen().catch(()=>{}); }
        }

        // ==========================================
        // SMART KIRISH VA FOKUS ALGORITMI
        // ==========================================
        if(userName) {
            els.nameInput.style.display = 'none';
            els.desc.innerText = `Xush kelibsiz, ${userName}`;
            els.startBtn.innerText = "KIRISH";
            els.displayUser.innerText = userName.toUpperCase();
        }

        els.startBtn.onclick = () => {
            if(!userName) {
                let name = els.nameInput.value.trim();
                if(name.length < 2) return;
                userName = name;
                localStorage.setItem('xoleric_user', userName);
                els.displayUser.innerText = userName.toUpperCase();
            }
            vibrate(50);
            enterFullscreen();
            els.welcome.style.opacity = '0';
            setTimeout(() => { els.welcome.style.display = 'none'; }, 500);
            
            renderLibrary();
            checkLastRead();
        };

        function checkLastRead() {
            if(lastBook !== null) {
                let index = parseInt(lastBook);
                els.bannerTitle.innerText = allBooks[index].title;
                setTimeout(() => { els.banner.classList.add('show'); }, 1000);
                
                els.btnContinue.onclick = () => {
                    vibrate(40);
                    els.banner.classList.remove('show');
                    openBook(index);
                };
                els.btnCloseBanner.onclick = () => {
                    els.banner.classList.remove('show');
                };
            }
        }

        // ==========================================
        // KUTUBXONA CHIZISH (Oxirgi o'qilgani 1-o'rinda)
        // ==========================================
        function renderLibrary() {
            els.grid.innerHTML = '';
            
            // Fokus algoritmi: oxirgi o'qilgan kitobni eng oldinga chiqarish
            let order = [];
            let lastIdx = (lastBook !== null) ? parseInt(lastBook) : -1;
            
            if(lastIdx !== -1) order.push(lastIdx);
            for(let i = 0; i < allBooks.length; i++) {
                if(i !== lastIdx) order.push(i);
            }

            order.forEach(index => {
                let book = allBooks[index];
                let card = document.createElement('div');
                card.className = 'book-card';
                if(index === lastIdx) card.classList.add('last-read'); // Maxsus Silver Border
                
                card.innerHTML = `
                    <div>
                        <div class="card-number">${index === lastIdx ? '🔴 DAVOM ETISH' : 'QISM 0' + (Math.floor(index/5)+1)}</div>
                        <div class="card-title">${book.title.replace(/^\d+\.\s*/, '')}</div>
                    </div>
                    <div class="card-btn">O'qish</div>
                `;
                card.onclick = () => { vibrate(40); openBook(index); els.banner.classList.remove('show'); };
                els.grid.appendChild(card);
            });
        }

        // ==========================================
        // UZOQ BOSISH (LONG PRESS) VA SHRIFT
        // ==========================================
        let pressTimer;
        let isPanelOpen = false;

        // Tugma ustida bosilganda 1 soniya kutish
        els.fontBtn.addEventListener('mousedown', startPress);
        els.fontBtn.addEventListener('touchstart', startPress, {passive: true});

        els.fontBtn.addEventListener('mouseup', cancelPress);
        els.fontBtn.addEventListener('mouseleave', cancelPress);
        els.fontBtn.addEventListener('touchend', cancelPress);

        function startPress(e) {
            pressTimer = setTimeout(() => {
                vibrate(60);
                els.sliderPanel.classList.add('show');
                isPanelOpen = true;
            }, 1000); // 1 soniya
        }

        function cancelPress(e) {
            clearTimeout(pressTimer);
        }

        // Ekranning boshqa joyi bosilganda (qul uzilgandan keyin) panelni yopish
        document.addEventListener('mouseup', (e) => { closePanelIfOutside(e); });
        document.addEventListener('touchend', (e) => { closePanelIfOutside(e); });

        function closePanelIfOutside(e) {
            if(isPanelOpen && !els.sliderPanel.contains(e.target) && e.target !== els.fontBtn) {
                els.sliderPanel.classList.remove('show');
                isPanelOpen = false;
            }
        }

        els.zoomSlider.addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--font-size', `${e.target.value}px`);
        });

        // ==========================================
        // AZURE TTS & WEB SPEECH FALLBACK ARCHITECTURE
        // ==========================================
        class HybridAudioPlayer {
            constructor() {
                this.audio = new Audio();
                this.paragraphs = [];
                this.currentIndex = 0;
                this.isPlaying = false;
                
                // Web Speech Fallback Settings
                this.synth = window.speechSynthesis;
                this.voice = null;
                this.useAzure = true; // Agar serveringiz tayyor bo'lsa true, hozir ulanmagan bo'lsa fallback ishlaydi.
                
                this.initFallbackVoices();
            }

            initFallbackVoices() {
                const load = () => {
                    let voices = this.synth.getVoices();
                    this.voice = voices.find(v => v.lang.includes('uz')) || voices.find(v => v.name.includes('Google')) || voices[0];
                };
                load();
                if(speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = load;
            }

            loadText(domPars) {
                this.stop();
                this.paragraphs = domPars;
                this.currentIndex = 0;
                this.updateProgress();
            }

            // Backendga yuborish mantiqi
            async fetchAzureAudio(text) {
                try {
                    // Agar Node.js serveringiz ulanmagan bo'lsa xato beradi va catch ga tushadi
                    const res = await fetch("/tts", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ text })
                    });
                    if(!res.ok) throw new Error("Server xatosi");
                    const blob = await res.blob();
                    return URL.createObjectURL(blob);
                } catch (e) {
                    console.warn("Azure ishlamadi, Web Speech (Fallback) yoqilmoqda...");
                    return null;
                }
            }

            async playNext() {
                if(this.currentIndex >= this.paragraphs.length) {
                    this.stop();
                    updatePlayUI(false);
                    return;
                }

                this.paragraphs.forEach(p => p.classList.remove('active'));
                let p = this.paragraphs[this.currentIndex];
                p.classList.add('active');
                p.scrollIntoView({ behavior: 'smooth', block: 'center' });
                this.updateProgress();

                let text = p.innerText;

                if (this.useAzure) {
                    let audioUrl = await this.fetchAzureAudio(text);
                    if(audioUrl) {
                        this.audio.src = audioUrl;
                        this.audio.play();
                        this.audio.onended = () => { this.currentIndex++; this.playNext(); };
                        return;
                    } else {
                        this.useAzure = false; // Xato bersa keyingi paragraflar kutib o'tirmaydi
                    }
                }

                // Fallback (Brauzer oflayn ovozi)
                let utter = new SpeechSynthesisUtterance(text);
                if(this.voice) utter.voice = this.voice;
                utter.rate = 0.95;
                utter.onend = () => { this.currentIndex++; this.playNext(); };
                this.synth.speak(utter);
            }

            play() {
                if(this.paragraphs.length === 0) return;
                this.isPlaying = true;
                if(!this.useAzure && this.synth.paused) {
                    this.synth.resume();
                } else if(this.useAzure && this.audio.paused && this.audio.src) {
                    this.audio.play();
                } else {
                    this.playNext();
                }
            }

            pause() {
                this.isPlaying = false;
                if(!this.useAzure) this.synth.pause();
                else this.audio.pause();
            }

            stop() {
                this.isPlaying = false;
                this.synth.cancel();
                this.audio.pause();
                this.audio.src = "";
                this.paragraphs.forEach(p => p.classList.remove('active'));
            }

            updateProgress() {
                let total = this.paragraphs.length;
                if(total === 0) return;
                let percent = Math.floor((this.currentIndex / total) * 100);
                if(percent > 100) percent = 100;
                els.progressBar.style.width = percent + '%';
                els.progressText.innerText = percent + '%';
            }
        }

        const audioPlayer = new HybridAudioPlayer();

        function updatePlayUI(playing) {
            if(playing) {
                els.iconPlay.style.display = 'none';
                els.iconPause.style.display = 'block';
            } else {
                els.iconPlay.style.display = 'block';
                els.iconPause.style.display = 'none';
            }
        }

        // ==========================================
        // SAHIFALAR O'RTASIDA HARAKATLANISH
        // ==========================================
        function openBook(index) {
            lastBook = index;
            localStorage.setItem('xoleric_lastBook', index);
            renderLibrary(); // Kutubxona fonini yangilab qo'yish (tartibni saqlash)

            const book = allBooks[index];
            els.title.innerText = book.title;
            els.content.innerHTML = book.content;
            
            const domPars = Array.from(els.content.querySelectorAll('p'));
            audioPlayer.loadText(domPars);

            els.library.style.opacity = '0';
            setTimeout(() => {
                els.library.style.display = 'none';
                els.reader.classList.add('active');
                els.content.scrollTop = 0;
            }, 300);
        }

        els.backBtn.onclick = () => {
            vibrate(30);
            audioPlayer.stop();
            updatePlayUI(false);
            
            els.reader.classList.remove('active');
            els.library.style.display = 'block';
            setTimeout(() => { els.library.style.opacity = '1'; }, 100);
        };

        els.playBtn.onclick = () => {
            vibrate(50);
            if(audioPlayer.isPlaying) {
                audioPlayer.pause();
                updatePlayUI(false);
            } else {
                audioPlayer.play();
                updatePlayUI(true);
            }
        };
    </script>
</body>
</html>
