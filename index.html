<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XOLERIC - Bolalar uchun o‘yinli o‘quv dasturi</title>
    <meta name="theme-color" content="#FFD966">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #FFF9F0;
            --card-bg: #FFFFFF;
            --primary: #FF8A5C;
            --primary-dark: #E96E3E;
            --secondary: #4CAF50;
            --accent: #2196F3;
            --gold: #FFC107;
            --text: #2D3E50;
            --text-light: #6C7A89;
            --border: #FFE0B5;
            --shadow: 0 12px 24px rgba(0,0,0,0.08);
            --shadow-hover: 0 18px 32px rgba(0,0,0,0.12);
            --radius: 28px;
            --radius-sm: 20px;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* SCREENS */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            transition: opacity 0.4s ease;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #welcomeScreen {
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        #welcomeScreen.hide {
            opacity: 0;
            pointer-events: none;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 40px 30px;
            text-align: center;
            box-shadow: var(--shadow);
            animation: bounceIn 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
        }
        @keyframes bounceIn {
            0% { transform: scale(0.8); opacity: 0; }
            80% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        .logo-big {
            font-size: 3.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .logo-small {
            font-size: 1rem;
            color: var(--text-light);
            margin-bottom: 32px;
        }
        .input-glass {
            width: 100%;
            background: #F7F2E5;
            border: 2px solid var(--border);
            border-radius: 60px;
            padding: 16px 24px;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 24px;
            font-weight: 600;
            outline: none;
            transition: 0.2s;
        }
        .input-glass:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255,138,92,0.2);
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn-primary {
            background: var(--primary);
            border: none;
            border-radius: 60px;
            padding: 16px;
            font-weight: 800;
            font-size: 1.1rem;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--primary-dark);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-primary:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 var(--primary-dark);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            border-radius: 60px;
            padding: 16px;
            font-weight: 700;
            color: var(--text-light);
            cursor: pointer;
            transition: 0.1s;
        }
        .btn-outline:active {
            background: rgba(0,0,0,0.05);
        }

        /* MAIN APP */
        #mainScreen {
            opacity: 0;
            display: none;
            background: var(--bg);
        }
        #mainScreen.visible {
            display: flex;
            opacity: 1;
        }

        /* HEADER */
        .app-header {
            padding: env(safe-area-inset-top, 16px) 20px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border-bottom: 3px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .user-badge {
            background: #F7F2E5;
            border-radius: 60px;
            padding: 8px 20px;
            font-weight: 700;
            color: var(--primary);
        }
        .xp-chip, .streak-chip {
            background: var(--gold);
            color: #2D3E50;
            padding: 8px 16px;
            border-radius: 60px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }
        .streak-chip {
            background: #FFB74D;
        }

        /* BOTTOM NAV */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 20px;
            background: var(--card-bg);
            border-top: 3px solid var(--border);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            transition: 0.2s;
            padding: 6px 12px;
            border-radius: 40px;
        }
        .nav-item.active {
            color: var(--primary);
            background: rgba(255,138,92,0.1);
        }
        .nav-icon {
            font-size: 1.6rem;
        }

        /* HUB */
        #hubView, #achievementsView, #statsView {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .section-title {
            font-size: 1.3rem;
            font-weight: 800;
            margin: 24px 0 16px;
            color: var(--text);
        }
        .hub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 16px;
        }
        .hub-tile {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 16px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.4rem;
            box-shadow: var(--shadow);
            transition: 0.1s;
            cursor: pointer;
            position: relative;
            border: 2px solid var(--border);
        }
        .hub-tile:active {
            transform: scale(0.96);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }
        .tile-progress {
            position: absolute;
            bottom: 12px;
            width: 60px;
            height: 6px;
            background: #E0D6C8;
            border-radius: 6px;
            overflow: hidden;
        }
        .tile-progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            border-radius: 6px;
        }
        .daily-tile {
            background: linear-gradient(135deg, #FFE5B4, #FFD966);
            border: none;
        }
        .daily-tile .tile-progress {
            display: none;
        }

        /* ACHIEVEMENTS */
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
        }
        .achievement-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px 12px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 2px solid var(--border);
        }
        .achievement-icon {
            font-size: 2.8rem;
            margin-bottom: 12px;
        }
        .achievement-title {
            font-weight: 800;
            margin-bottom: 4px;
        }
        .achievement-progress {
            margin-top: 12px;
            height: 8px;
            background: #E0D6C8;
            border-radius: 8px;
            overflow: hidden;
        }
        .achievement-progress-fill {
            background: var(--gold);
            width: 0%;
            height: 100%;
        }

        /* STATS */
        .stats-card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 2px solid var(--border);
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            font-weight: 600;
        }

        /* FOCUS VIEW */
        #focusView {
            display: none;
            flex: 1;
            flex-direction: column;
            background: var(--bg);
        }
        .focus-nav {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border-bottom: 2px solid var(--border);
            flex-wrap: wrap;
            gap: 12px;
        }
        .nav-back {
            background: #F7F2E5;
            border: none;
            border-radius: 60px;
            padding: 8px 18px;
            font-weight: 700;
            cursor: pointer;
        }
        .mode-tabs {
            display: flex;
            gap: 8px;
            background: #F7F2E5;
            border-radius: 60px;
            padding: 4px;
        }
        .mode-tab {
            padding: 6px 18px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
        }
        .mode-tab.active {
            background: var(--primary);
            color: white;
        }

        /* PRACTICE CONTENT */
        .practice-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .word-display {
            font-size: clamp(3rem, 12vw, 5rem);
            font-weight: 800;
            text-align: center;
            margin-bottom: 40px;
            background: var(--card-bg);
            padding: 20px 30px;
            border-radius: 60px;
            box-shadow: var(--shadow);
            border: 3px solid var(--border);
        }
        .mirror-field {
            background: var(--card-bg);
            border-radius: 60px;
            padding: 20px 28px;
            font-size: 2.2rem;
            font-weight: 700;
            text-align: center;
            letter-spacing: 4px;
            border: 3px solid var(--border);
            min-width: 200px;
            transition: 0.2s;
            margin-bottom: 20px;
        }
        .mirror-field.match {
            border-color: var(--secondary);
            background: #E8F5E9;
            color: var(--secondary);
        }
        .status-message {
            font-weight: 800;
            color: var(--secondary);
            opacity: 0;
            transition: 0.2s;
            margin-bottom: 20px;
        }
        .next-btn {
            background: var(--primary);
            border: none;
            border-radius: 60px;
            padding: 16px 32px;
            font-weight: 800;
            font-size: 1.2rem;
            color: white;
            opacity: 0.4;
            pointer-events: none;
            transition: 0.2s;
            margin: 16px;
        }
        .next-btn.active {
            opacity: 1;
            pointer-events: auto;
            cursor: pointer;
            transform: scale(1.02);
            box-shadow: 0 6px 0 var(--primary-dark);
        }

        /* VIRTUAL KEYBOARD */
        .keyboard {
            background: var(--card-bg);
            border-top: 3px solid var(--border);
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: auto;
        }
        .key-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .key {
            background: #F7F2E5;
            border: none;
            border-radius: 20px;
            padding: 12px 16px;
            font-size: 1.3rem;
            font-weight: 800;
            min-width: 52px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 3px 0 #D0C4B0;
            transition: 0.05s linear;
        }
        .key:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #D0C4B0;
        }
        .key.wide {
            min-width: 80px;
            background: var(--primary);
            color: white;
            box-shadow: 0 3px 0 var(--primary-dark);
        }

        /* MASCOT */
        .mascot-area {
            display: flex;
            justify-content: center;
            margin-top: 16px;
        }
        .mascot {
            font-size: 4rem;
            transition: transform 0.2s;
            cursor: pointer;
        }
        .mascot.happy {
            transform: scale(1.1);
        }
        .mascot.sad {
            filter: grayscale(0.2);
        }

        /* ONBOARDING */
        .onboarding-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .onboarding-card {
            background: var(--card-bg);
            border-radius: 48px;
            max-width: 320px;
            padding: 32px;
            text-align: center;
            animation: bounceIn 0.4s;
        }
        .hide {
            display: none;
        }

        /* CANVAS CONFETTI */
        #confettiCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3000;
        }
    </style>
</head>
<body>
    <canvas id="confettiCanvas"></canvas>

    <div id="welcomeScreen" class="screen">
        <div class="login-card">
            <div class="logo-big">XOLERIC</div>
            <div class="logo-small">⭐ Bolalar uchun qiziqarli o‘yin</div>
            <input type="text" id="userNameInput" class="input-glass" placeholder="Ismingizni yozing" autocomplete="off">
            <div class="btn-group">
                <button class="btn-primary" id="startBtn">🎉 BOSHLASH</button>
                <button class="btn-outline" id="continueLastBtn">📂 Davom etish</button>
            </div>
        </div>
    </div>

    <div id="mainScreen" class="screen">
        <header class="app-header">
            <div class="user-badge" id="userNameDisplay">Mehman</div>
            <div style="display: flex; gap: 12px;">
                <div class="streak-chip">🔥 <span id="streakCount">0</span></div>
                <div class="xp-chip">⭐ <span id="xpDisplay">0</span></div>
            </div>
        </header>

        <div id="hubView">
            <div class="daily-tile hub-tile" id="dailyChallengeTile" style="display: flex; flex-direction: row; justify-content: space-between; align-items: center;">
                <div><span style="font-size: 1.8rem;">🌟</span> Kunlik challenge</div>
                <div id="dailyWordPreview" style="font-weight: 800;">-</div>
                <div style="font-size: 0.9rem;">+50 XP</div>
            </div>
            <div class="section-title">🔤 Harflar</div>
            <div class="hub-grid" id="letterGrid"></div>
            <div class="section-title">📚 Kategoriyalar</div>
            <div class="hub-grid" id="categoryGrid"></div>
            <div class="section-title">🌍 Global bosqichlar</div>
            <div class="hub-grid" id="globalGrid"></div>
        </div>

        <div id="achievementsView" style="display: none;">
            <div class="achievements-grid" id="achievementsGrid"></div>
        </div>

        <div id="statsView" style="display: none;">
            <div class="stats-card">
                <div class="stats-row"><span>🏆 Umumiy XP</span><span id="statTotalXP">0</span></div>
                <div class="stats-row"><span>🔥 Kunlik streak</span><span id="statStreak">0</span></div>
                <div class="stats-row"><span>📖 O‘tilgan so‘zlar</span><span id="statWordsLearned">0</span></div>
                <div class="stats-row"><span>✅ Tugallangan harflar</span><span id="statLettersDone">0</span></div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" data-nav="hub"><span class="nav-icon">🏠</span><span>Bosh</span></div>
            <div class="nav-item" data-nav="achievements"><span class="nav-icon">🏆</span><span>Yutuqlar</span></div>
            <div class="nav-item" data-nav="stats"><span class="nav-icon">📊</span><span>Statistika</span></div>
        </div>
    </div>

    <div id="focusView">
        <div class="focus-nav">
            <button class="nav-back" id="backBtn">← Chiqish</button>
            <div class="step-badge" id="stepLabel">1-bosqich</div>
            <div style="display: flex; gap: 8px;">
                <button class="nav-back" id="speakBtn">🔊</button>
                <div class="mode-tabs">
                    <div class="mode-tab active" data-focusmode="practice">Amaliy</div>
                    <div class="mode-tab" data-focusmode="catalog">Ro‘yxat</div>
                </div>
            </div>
        </div>

        <div id="practiceMode" style="display: flex; flex:1; flex-direction: column;">
            <div class="practice-content">
                <div class="word-display" id="wordBox"></div>
                <div class="mirror-field" id="mirrorField">
                    <span id="textMirror"></span>
                </div>
                <div class="status-message" id="statusMsg">✅ To‘g‘ri! +10 XP</div>
                <div class="mascot-area">
                    <div class="mascot" id="mascot">🦉</div>
                </div>
            </div>
            <div class="keyboard" id="virtualKeyboard"></div>
            <button class="next-btn" id="nextBtn">Keyingi so‘z →</button>
        </div>

        <div id="catalogMode" style="display: none; flex:1; flex-direction: column;">
            <div class="catalog-content">
                <div style="padding: 16px; display: flex; justify-content: space-between;">
                    <button class="nav-back" id="prevStepBtn">← Oldingi</button>
                    <span id="catalogStepLabel">1-bosqich</span>
                    <button class="nav-back" id="nextStepBtn">Keyingi →</button>
                </div>
                <div class="catalog-grid" id="catalogGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(110px,1fr)); gap: 12px; padding: 20px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script>

        function playSound(type) { try { let audioCtx = new (window.AudioContext || window.webkitAudioContext)(); let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain(); osc.type = 'sine'; gain.gain.value = 0.1; osc.connect(gain); gain.connect(audioCtx.destination); if(type==='correct') { osc.frequency.setValueAtTime(523, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime+0.2); } else { osc.frequency.setValueAtTime(440, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime+0.15); } } catch(e){} }

        function confetti() { let canvas = document.getElementById('confettiCanvas'); let ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; let particles = []; for(let i=0;i<100;i++) particles.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height-100, vx:(Math.random()-0.5)*8, vy:Math.random()*8+2, color:`hsl(${Math.random()*360},70%,60%)`, size:Math.random()*6+2}); let frame; function draw(){ ctx.clearRect(0,0,canvas.width,canvas.height); let any=false; for(let p of particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.3; if(p.y<canvas.height+50){ any=true; ctx.fillStyle=p.color; ctx.fillRect(p.x,p.y,p.size,p.size); } } if(any) requestAnimationFrame(draw); else ctx.clearRect(0,0,canvas.width,canvas.height); } draw(); setTimeout(()=>{ cancelAnimationFrame(draw); ctx.clearRect(0,0,canvas.width,canvas.height); },2000); }

        function startDaily(){ if(!dailyWord) generateDaily(); currentMode='daily'; currentWordList=[dailyWord]; currentStep=1; currentWordIdx=0; dom.hubView.classList.add('hide'); dom.focusView.style.display='flex'; setFocusMode('practice'); loadWord(); }
        function generateDaily(){ let letters=Object.keys(DB); let randL=letters[Math.floor(Math.random()*letters.length)]; let step=Math.floor(Math.random()*6)+1; let words=DB[randL][`step${step}`]; let w=words[Math.floor(Math.random()*words.length)]; dailyWord={word:w, clean:w.replace(/[-']/g,'').toLowerCase()}; dom.dailyWordPreview.textContent=w; }
        function renderHub(){ let letters=Object.keys(DB); dom.letterGrid.innerHTML=''; letters.forEach(l=>{ let tile=document.createElement('div'); tile.className='hub-tile'; tile.textContent=l; let prog=state.letterProgress[l]||0; let bar=document.createElement('div'); bar.className='tile-progress'; let fill=document.createElement('div'); fill.className='tile-progress-fill'; fill.style.width=`${prog}%`; bar.appendChild(fill); tile.appendChild(bar); tile.onclick=()=>startLetterMode(l); dom.letterGrid.appendChild(tile); }); let cats=Object.keys(CATEGORIES); dom.categoryGrid.innerHTML=''; cats.forEach(c=>{ let tile=document.createElement('div'); tile.className='hub-tile'; tile.textContent=c; let prog=state.categoryProgress[c]||0; let bar=document.createElement('div'); bar.className='tile-progress'; let fill=document.createElement('div'); fill.className='tile-progress-fill'; fill.style.width=`${prog}%`; bar.appendChild(fill); tile.appendChild(bar); tile.onclick=()=>startCategoryMode(c); dom.categoryGrid.appendChild(tile); }); dom.globalGrid.innerHTML='<div class="hub-tile" onclick="startGlobalMode()">🌍 Global</div>'; }
        function renderAchievements(){ let ach=state.achievements; let wordsLearned=0; Object.values(state.letterProgress).forEach(p=>wordsLearned+=Math.floor(p/100*36)); ach.tenWords=wordsLearned; if(!ach.hundredXP && state.xp>=100) ach.hundredXP=true; if(!ach.streak3 && state.streak>=3) ach.streak3=true; let allDone=true; Object.keys(DB).forEach(l=>{ if((state.letterProgress[l]||0)<100) allDone=false; }); if(allDone) ach.allLetters=true; saveProgress(); dom.achievementsGrid.innerHTML=`<div class="achievement-card"><div class="achievement-icon">🔰</div><div>Birinchi so‘z</div><div class="achievement-progress"><div class="achievement-progress-fill" style="width:${ach.firstWord?100:0}%"></div></div></div><div class="achievement-card"><div class="achievement-icon">📚</div><div>10 ta so‘z</div><div>${wordsLearned}/10</div><div class="achievement-progress"><div class="achievement-progress-fill" style="width:${Math.min(wordsLearned/10*100,100)}%"></div></div></div><div class="achievement-card"><div class="achievement-icon">⭐</div><div>100 XP</div><div class="achievement-progress"><div class="achievement-progress-fill" style="width:${Math.min(state.xp/100*100,100)}%"></div></div></div><div class="achievement-card"><div class="achievement-icon">🔥</div><div>3 kun streak</div><div>${state.streak}/3</div><div class="achievement-progress"><div class="achievement-progress-fill" style="width:${Math.min(state.streak/3*100,100)}%"></div></div></div><div class="achievement-card"><div class="achievement-icon">🏁</div><div>Barcha harflar</div><div class="achievement-progress"><div class="achievement-progress-fill" style="width:${ach.allLetters?100:0}%"></div></div></div>`; }
        function renderStats(){ let wordsLearned=0; Object.values(state.letterProgress).forEach(p=>wordsLearned+=Math.floor(p/100*36)); let lettersDone=Object.keys(DB).filter(l=>(state.letterProgress[l]||0)>=100).length; dom.statTotalXP.textContent=state.xp; dom.statStreak.textContent=state.streak; dom.statWordsLearned.textContent=wordsLearned; dom.statLettersDone.textContent=`${lettersDone}/${Object.keys(DB).length}`; }
        function setFocusMode(mode){ focusMode=mode; document.querySelectorAll('.mode-tab').forEach(t=>{ if(t.dataset.focusmode===mode) t.classList.add('active'); else t.classList.remove('active'); }); if(mode==='practice'){ dom.practiceMode.style.display='flex'; dom.catalogMode.style.display='none'; } else { dom.practiceMode.style.display='none'; dom.catalogMode.style.display='flex'; renderCatalog(); } }
        function renderCatalog(){ let step=currentStep; let words=[]; if(currentMode==='global'){ Object.keys(DB).forEach(l=>{ DB[l][`step${step}`].forEach(w=>words.push({word:w})); }); } else if(currentMode==='letter') words=DB[currentLetter][`step${step}`].map(w=>({word:w})); else if(currentMode==='category') words=CATEGORIES[currentCategory][`step${step}`].map(w=>({word:w})); dom.catalogStepLabel.textContent=`${step}-bosqich (${words.length} so‘z)`; dom.catalogGrid.innerHTML=''; words.forEach((item,idx)=>{ let tile=document.createElement('div'); tile.className='word-tile'; tile.textContent=item.word; tile.onclick=()=>{ let found=currentWordList.findIndex(w=>w.word===item.word); if(found!==-1){ currentWordIdx=found; setFocusMode('practice'); loadWord(); } }; dom.catalogGrid.appendChild(tile); }); }
        function updateAchievements(){ if(state.xp>0 && !state.achievements.firstWord){ state.achievements.firstWord=true; saveProgress(); renderAchievements(); } }
        function checkStreak(){ let today=new Date().toDateString(); if(state.lastPlayDate===today) return; if(state.lastPlayDate===new Date(Date.now()-86400000).toDateString()) state.streak++; else state.streak=1; state.lastPlayDate=today; localStorage.setItem('xoleric_streak',state.streak); localStorage.setItem('xoleric_lastDate',today); dom.streakDisplay.textContent=state.streak; }
        function initOnboarding(){ if(!state.user || state.xp===0){ let overlay=document.createElement('div'); overlay.className='onboarding-overlay'; overlay.innerHTML=`<div class="onboarding-card"><div>🦉 Salom! Men sizga yordam beraman.<br>Harflarni bosing va so‘zlarni yozishni o‘rganing.</div><button class="btn-primary" style="margin-top:20px" id="closeOnboard">Boshlaymiz!</button></div>`; document.body.appendChild(overlay); document.getElementById('closeOnboard').onclick=()=>overlay.remove(); } }
        // Event listeners
        dom.startBtn.onclick=()=>{ let name=dom.userNameInput.value.trim(); if(!name) return alert('Ismingizni yozing'); state.user=name; localStorage.setItem('xoleric_user',name); dom.userNameDisplay.textContent=name.toUpperCase(); dom.welcome.classList.add('hide'); dom.main.classList.add('visible'); renderHub(); updateUI(); checkStreak(); generateDaily(); initOnboarding(); };
        dom.continueLastBtn.onclick=()=>{ if(!state.user){ alert('Ism kiriting'); return; } dom.userNameDisplay.textContent=state.user.toUpperCase(); dom.welcome.classList.add('hide'); dom.main.classList.add('visible'); renderHub(); updateUI(); checkStreak(); generateDaily(); if(state.lastMode==='letter') startLetterMode(state.lastLetter); else if(state.lastMode==='category') startCategoryMode(state.lastCategory); else startGlobalMode(); };
        dom.backBtn.onclick=closeFocus;
        dom.speakBtn.onclick=()=>{ if(currentWordList[currentWordIdx]){ let utterance=new SpeechSynthesisUtterance(currentWordList[currentWordIdx].word.replace(/-/g,'')); utterance.lang='uz-UZ'; speechSynthesis.speak(utterance); } };
        dom.nextBtn.onclick=handleNext;
        dom.dailyChallengeTile.onclick=startDaily;
        document.querySelectorAll('.mode-tab').forEach(t=>t.addEventListener('click',()=>setFocusMode(t.dataset.focusmode)));
        dom.prevStepBtn.onclick=()=>{ if(currentStep>1){ currentStep--; updateWordList(); renderCatalog(); } };
        dom.nextStepBtn.onclick=()=>{ if(currentStep<6){ currentStep++; updateWordList(); renderCatalog(); } };
        dom.navItems.forEach(item=>{ item.onclick=()=>{ dom.navItems.forEach(n=>n.classList.remove('active')); item.classList.add('active'); let nav=item.dataset.nav; dom.hubView.style.display=nav==='hub'?'block':'none'; dom.achievementsView.style.display=nav==='achievements'?'block':'none'; dom.statsView.style.display=nav==='stats'?'block':'none'; if(nav==='achievements') renderAchievements(); if(nav==='stats') renderStats(); }; });
        buildKeyboard();
    </script>
</body>
</html>
