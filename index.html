<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0d0d12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>XOLƎRIƆ Premium Library</title>
    <style>
        :root {
            --bg-dark: #08080c;
            --surface: #12121a;
            --accent: #6c8aff;
            --accent-glow: rgba(108, 138, 255, 0.3);
            --text-main: #e2e2e9;
            --text-muted: #888896;
            --glass: rgba(20, 20, 30, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --safe-top: env(safe-area-inset-top);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
            background-image: 
                radial-gradient(circle at 50% -20%, #1c1c3d 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, #0d0d1a 0%, transparent 40%);
        }

        /* UI Components */
        .glass-effect {
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
        }

        /* Welcome Screen */
        #welcomeScreen {
            position: fixed;
            inset: 0;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-dark);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .welcome-card {
            width: 85%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 32px;
            text-align: center;
            animation: slideUp 1s ease;
        }

        .welcome-card h1 {
            font-size: 2.5rem;
            letter-spacing: -1px;
            margin-bottom: 8px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-card p {
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 0.9rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 24px;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            padding: 18px;
            border-radius: 16px;
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
            text-align: center;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-primary {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            background: var(--accent);
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary:active {
            transform: scale(0.96);
        }

        /* Header */
        header {
            padding: calc(15px + var(--safe-top)) 20px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .brand {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
        }

        .nav-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            color: white;
            font-size: 1.1rem;
            transition: 0.2s;
        }

        .icon-btn:active {
            background: var(--accent);
            transform: scale(0.9);
        }

        /* Reader Main */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px 120px;
            scrollbar-width: none;
        }

        main::-webkit-scrollbar { display: none; }

        .content-wrapper {
            max-width: 700px;
            margin: 0 auto;
        }

        #bookTitle {
            font-size: 2.2rem;
            line-height: 1.2;
            margin-bottom: 32px;
            font-weight: 800;
            text-align: left;
            background: linear-gradient(45deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #bookContent {
            font-size: var(--fs, 19px);
            line-height: 1.7;
            color: var(--text-main);
            text-align: left;
        }

        #bookContent p { margin-bottom: 24px; opacity: 0; transform: translateY(10px); animation: fadeIn 0.6s forwards; }

        /* Floating Controls */
        .floating-tools {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            padding: 8px;
            border-radius: 20px;
            z-index: 500;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .tool-btn {
            padding: 12px 20px;
            border-radius: 14px;
            border: none;
            background: transparent;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .tool-btn.active {
            background: var(--accent);
        }

        /* Zoom Slider Panel */
        #zoomPanel {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            width: 280px;
            padding: 20px;
            border-radius: 24px;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        #zoomPanel.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
            pointer-events: all;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            height: 6px;
            border-radius: 3px;
        }

        /* Modal / Menu */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            display: flex;
            align-items: flex-end;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-sheet {
            width: 100%;
            max-height: 85vh;
            border-radius: 32px 32px 0 0;
            padding: 30px 20px;
            transform: translateY(100%);
            transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
            overflow-y: auto;
        }

        .modal.active .modal-sheet { transform: translateY(0); }

        .book-link {
            padding: 18px 20px;
            margin-bottom: 8px;
            border-radius: 16px;
            background: rgba(255,255,255,0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        .book-link.active {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        /* Progress Bar */
        .progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: transparent;
            z-index: 1001;
        }

        #progressBar {
            width: 0%;
            height: 100%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        /* Audio Visualizer UI */
        .audio-status {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            font-size: 0.8rem;
            margin-bottom: 15px;
            display: none;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 var(--accent-glow); }
            70% { transform: scale(1.2); box-shadow: 0 0 0 10px rgba(108, 138, 255, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(108, 138, 255, 0); }
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div id="welcomeScreen">
        <div class="welcome-card glass-effect">
            <h1>XOLƎRIƆ</h1>
            <p>Premium O'quv Tajribasi</p>
            <div class="input-group">
                <input type="text" id="nameInp" placeholder="Ismingizni yozing..." autocomplete="off">
            </div>
            <button class="btn-primary" id="entryBtn">Mutolaani boshlash</button>
        </div>
    </div>

    <div class="progress-container">
        <div id="progressBar"></div>
    </div>

    <header>
        <div class="brand">XOLƎRIƆ</div>
        <div class="nav-actions">
            <div class="icon-btn" id="ttsToggle">🔊</div>
            <div class="icon-btn" id="menuBtn">☰</div>
        </div>
    </header>

    <main id="scrollArea">
        <div class="content-wrapper">
            <div class="audio-status" id="audioAnim">
                <div class="pulse"></div>
                <span>AI Madina o'qimoqda...</span>
            </div>
            <h1 id="bookTitle">Yuklanmoqda...</h1>
            <article id="bookContent"></article>
        </div>
    </main>

    <div class="floating-tools glass-effect">
        <button class="tool-btn" id="zoomTrigger">A<span style="font-size:0.7em">A</span></button>
        <button class="tool-btn" id="prevBook">◀</button>
        <button class="tool-btn active" id="currInfo">1 / 50</button>
        <button class="tool-btn" id="nextBook">▶</button>
    </div>

    <div id="zoomPanel" class="glass-effect">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-size:0.8rem; color:var(--text-muted)">
            <span>Matn o'lchami</span>
            <span id="fsVal">19px</span>
        </div>
        <input type="range" id="fsSlider" min="14" max="32" value="19">
    </div>

    <div class="modal" id="menuModal">
        <div class="modal-sheet glass-effect">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px">
                <h2 style="font-weight:800">Mundarija</h2>
                <div class="icon-btn" id="closeMenu">✕</div>
            </div>
            <div id="directory"></div>
        </div>
    </div>

    <script>
        /**
         * XOLERIC CORE ARCHITECTURE
         * Developer: AI Architect (Elite Full-Stack)
         */

        const BOOKS_DATA = [
            { title: "1. Mukammallik Kuchi", text: "Hayotimizda yuz beradigan eng katta o'zgarishlar birdaniga bo'lmaydi. Katta yutuqlar har doim ko'zga ko'rinmas, doimiy ravishda takrorlanadigan kichik harakatlarning jamlanmasidir. Har kuni bir foiz yaxshilanish yil oxirida ulkan natija beradi." },
            { title: "2. Kiberxavfsizlik Anatomiyasi", text: "Zamonaviy raqamli dunyoda eng qimmatli resurs bu — ma'lumotlardir. Kiberxavfsizlik butun boshli tarmoq arxitekturasini, serverlar va foydalanuvchilar o'rtasidagi ma'lumotlar almashinuvini himoya qilish tizimidir." },
            { title: "3. Moliyaviy Erkinlik", text: "Boylikning haqiqiy o'lchovi bu sizning qancha ko'p pul topishingiz bilan emas, balki o'sha topilgan pulni qanday boshqarishingiz bilan o'lchanadi. Aktivlar va passivlar farqini bilish muhim." },
            { title: "4. Chuqur Diqqat", text: "Hozirgi axborot texnologiyalari asrida bitta vazifaga to'liq diqqatni jamlab ishlash noyob qobiliyatdir. Deep Work — bu chalg'imasdan murakkab qadriyat yaratish holati." },
            { title: "5. Kosmik Olam Sirlari", text: "Koinot tinimsiz kengaymoqda. Qora tuynuklar yulduzlar o'z hayotini yakunlaganda hosil bo'ladi. Ularning tortishish kuchi yorug'likni ham o'tkazmaydi." },
            { title: "6. Veb-Dasturlash San'ati", text: "Frontend va Backend o'rtasidagi uyg'unlik mukammal dastur kafolatidir. UX dizayn foydalanuvchi tuyg'ularini boshqaradi." },
            { title: "42. Agile va Scrum", text: "Loyiha boshqaruvida Agile egiluvchanlikni anglatadi. Scrum esa ishlarni Sprintlarga bo'lib bajarish metodologiyasidir." },
            { title: "50. Insoniyat Taqdiri", text: "Biz 0-tur sivilizatsiyadan 1-turga o'tyapmiz. Kelajakda inson va texnologiya birlashishi muqarrar. Bilim — bu chegara bilmas kuchdir." }
            // Note: 50 kitob massivga to'liq qo'shilishi mumkin.
        ];

        const state = {
            currentIndex: 0,
            fontSize: 19,
            isTTS: false,
            userName: "O'quvchi"
        };

        const dom = {
            welcome: document.getElementById('welcomeScreen'),
            nameInp: document.getElementById('nameInp'),
            entryBtn: document.getElementById('entryBtn'),
            title: document.getElementById('bookTitle'),
            content: document.getElementById('bookContent'),
            scrollArea: document.getElementById('scrollArea'),
            progressBar: document.getElementById('progressBar'),
            fsSlider: document.getElementById('fsSlider'),
            fsVal: document.getElementById('fsVal'),
            zoomPanel: document.getElementById('zoomPanel'),
            directory: document.getElementById('directory'),
            menuModal: document.getElementById('menuModal'),
            currInfo: document.getElementById('currInfo'),
            audioAnim: document.getElementById('audioAnim')
        };

        // Initialize
        dom.entryBtn.onclick = () => {
            if(dom.nameInp.value.length < 2) return;
            state.userName = dom.nameInp.value;
            dom.welcome.style.opacity = '0';
            setTimeout(() => dom.welcome.remove(), 800);
            renderDirectory();
            loadBook(0);
        };

        function loadBook(index) {
            state.currentIndex = index;
            const book = BOOKS_DATA[index] || BOOKS_DATA[0];
            
            // UI Update
            dom.title.innerText = book.title;
            dom.content.innerHTML = book.text.split('. ').map(p => `<p>${p}.</p>`).join('');
            dom.currInfo.innerText = `${index + 1} / ${BOOKS_DATA.length}`;
            dom.scrollArea.scrollTop = 0;
            updateProgress();
            
            // Active state in directory
            document.querySelectorAll('.book-link').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });

            if(state.isTTS) speakText(book.text);
        }

        function renderDirectory() {
            dom.directory.innerHTML = BOOKS_DATA.map((b, i) => `
                <div class="book-link" onclick="loadBook(${i}); closeMenu();">
                    <span>${b.title}</span>
                    <span style="font-size:0.8rem; color:var(--accent)">O'qish →</span>
                </div>
            `).join('');
        }

        // Font Control
        dom.fsSlider.oninput = (e) => {
            state.fontSize = e.target.value;
            dom.fsVal.innerText = state.fontSize + 'px';
            document.documentElement.style.setProperty('--fs', state.fontSize + 'px');
        };

        document.getElementById('zoomTrigger').onclick = (e) => {
            e.stopPropagation();
            dom.zoomPanel.classList.toggle('show');
        };

        // Scroll Progress
        dom.scrollArea.onscroll = () => updateProgress();
        
        function updateProgress() {
            const winScroll = dom.scrollArea.scrollTop;
            const height = dom.scrollArea.scrollHeight - dom.scrollArea.clientHeight;
            const scrolled = (winScroll / height) * 100;
            dom.progressBar.style.width = scrolled + "%";
        }

        // Navigation
        document.getElementById('nextBook').onclick = () => {
            if(state.currentIndex < BOOKS_DATA.length - 1) loadBook(state.currentIndex + 1);
        };
        document.getElementById('prevBook').onclick = () => {
            if(state.currentIndex > 0) loadBook(state.currentIndex - 1);
        };

        // TTS (Web Speech Fallback - Integration for Azure can be swapped here)
        document.getElementById('ttsToggle').onclick = function() {
            state.isTTS = !state.isTTS;
            this.style.background = state.isTTS ? 'var(--accent)' : 'transparent';
            dom.audioAnim.style.display = state.isTTS ? 'flex' : 'none';
            if(state.isTTS) speakText(BOOKS_DATA[state.currentIndex].text);
            else window.speechSynthesis.cancel();
        };

        function speakText(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'tr-TR'; // O'zbek tiliga yaqin fallback yoki uz-UZ
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        // Menu Toggle
        document.getElementById('menuBtn').onclick = () => dom.menuModal.classList.add('active');
        document.getElementById('closeMenu').onclick = () => closeMenu();
        function closeMenu() { dom.menuModal.classList.remove('active'); }

        // Global clicks
        window.onclick = (e) => {
            if(!dom.zoomPanel.contains(e.target) && e.target.id !== 'zoomTrigger') {
                dom.zoomPanel.classList.remove('show');
            }
        };

        // Double Tap Logic for Navigation
        let lastTap = 0;
        dom.scrollArea.addEventListener('touchend', (e) => {
            const now = Date.now();
            if(now - lastTap < 300) {
                // Double tap action
                dom.zoomPanel.classList.add('show');
            }
            lastTap = now;
        });

    </script>
</body>
</html>
