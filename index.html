<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#0d0d12">
    <title>XOLƎRIƆ Kutubxonasi - Ovozli Kitoblar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0f;
            --glass-bg: rgba(20, 20, 30, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #8a6cff;
            --text: #eaeaf5;
            --text-muted: #9a9ab0;
            --font-size: 18px;
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }

        /* Header */
        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            z-index: 10;
        }

        .user-name {
            color: var(--accent);
            font-weight: 600;
            font-size: 1.1rem;
        }

        .controls {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text);
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .icon-btn:active {
            transform: scale(0.9);
            background: var(--accent);
            color: white;
        }

        /* Main Content */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        .book-container {
            max-width: 800px;
            margin: 0 auto;
        }

        #bookTitle {
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 30px;
            line-height: 1.3;
        }

        #bookContent {
            font-size: var(--font-size);
            line-height: 1.8;
            text-align: justify;
            color: var(--text);
        }

        #bookContent p {
            margin-bottom: 20px;
        }

        /* Welcome Screen */
        #welcomeScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }

        .welcome-box {
            width: 90%;
            max-width: 400px;
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
        }

        .welcome-box h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .welcome-box input {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.3);
            color: var(--text);
            font-size: 1.1rem;
            text-align: center;
            outline: none;
        }

        .welcome-box input:focus {
            border-color: var(--accent);
        }

        .welcome-box button {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: var(--accent);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* Next Overlay */
        .next-overlay {
            position: fixed;
            bottom: -120px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 350px;
            padding: 15px;
            border-radius: 30px;
            text-align: center;
            z-index: 50;
            transition: bottom 0.3s ease;
            cursor: pointer;
        }

        .next-overlay.show {
            bottom: 20px;
        }

        .next-btn-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
        }

        /* Menu Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80vh;
            background: var(--bg-dark);
            border-radius: 30px 30px 0 0;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 2rem;
            cursor: pointer;
        }

        .book-list {
            height: calc(100% - 60px);
            overflow-y: auto;
        }

        .book-item {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 5px;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .book-item.active {
            background: rgba(138, 108, 255, 0.1);
            border-color: var(--accent);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 100, 100, 0.2);
            border: 1px solid #ff6464;
            color: #ff6464;
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .toast.show {
            opacity: 1;
        }

        /* TTS Status */
        .speaking-indicator {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: var(--accent);
            color: white;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            display: none;
            z-index: 40;
        }

        .speaking-indicator.show {
            display: block;
        }
    </style>
</head>
<body>
    <div id="welcomeScreen">
        <div class="welcome-box glass">
            <h1>📚 XOLƎRIƆ</h1>
            <p>Ovozli kutubxonaga xush kelibsiz</p>
            <input type="text" id="userNameInput" placeholder="Ismingizni kiriting" value="Mehmon">
            <button id="startBtn">Kirish</button>

    <header class="glass">

            <button class="icon-btn" id="fontPlus">A+</button>
            <button class="icon-btn" id="openMenu">📋</button>
        </div>
    </header>

    <main id="mainContent">
        <div class="book-container">
            <h1 id="bookTitle">Yuklanmoqda...</h1>
            <div id="bookContent"></div>
        </div>
    </main>

    <div class="next-overlay glass" id="nextOverlay">
        <div class="next-btn-circle">→</div>
        <p>Keyingi: <span id="nextBookName"></span></p>
    </div>

    <div class="speaking-indicator" id="speakingIndicator">🔊 O'qilyapti...</div>

    <div class="modal" id="menuModal">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2>📋 Mundarija</h2>
                <button class="close-btn" id="closeMenu">✕</button>
            </div>
            <div class="book-list" id="bookList"></div>
        </div>
    </div>

    <div class="toast" id="exitToast"></div>

        // ==========================================
        // OVOZLI O'QISH TIZIMI - GOOGLE TTS API
        // ==========================================
        
        // Audio element
        let audioPlayer = null;
        let isPlaying = false;
        let currentText = '';
        
        // DOM elementlar
        const els = {
            welcome: document.getElementById('welcomeScreen'),
            input: document.getElementById('userNameInput'),
            startBtn: document.getElementById('startBtn'),
            userName: document.getElementById('displayUserName'),
            title: document.getElementById('bookTitle'),
            content: document.getElementById('bookContent'),
            main: document.getElementById('mainContent'),
            nextOverlay: document.getElementById('nextOverlay'),
            nextName: document.getElementById('nextBookName'),
            menu: document.getElementById('menuModal'),
            bookList: document.getElementById('bookList'),
            toast: document.getElementById('exitToast'),
            ttsBtn: document.getElementById('ttsBtn'),
            speakingIndicator: document.getElementById('speakingIndicator')
        };

        let currentBookIndex = 0;
        let currentFontSize = 18;
        let exitClicks = 0;
        let exitTimer;
        let lastTapTime = 0;

        // ==========================================
        // OVOZLI O'QISH FUNKSIYALARI
        // ==========================================
        
        function stopSpeaking() {
            if (audioPlayer) {
                audioPlayer.pause();
                audioPlayer.currentTime = 0;
                audioPlayer = null;
            }
            isPlaying = false;
            if (els.ttsBtn) els.ttsBtn.innerText = '🔊';
            if (els.speakingIndicator) els.speakingIndicator.classList.remove('show');
        }

        async function speakText(text) {
            if (!text || text.trim() === '') return;
            
            try {
                // Avval to'xtatamiz
                stopSpeaking();
                
                // Matnni tayyorlash
                const cleanText = text.substring(0, 500); // API limiti uchun
                
                // Google TTS API orqali ovoz olish
                const apiUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(cleanText)}&tl=uz&client=tw-ob`;
                
                // Audio player yaratish
                audioPlayer = new Audio(apiUrl);
                
                audioPlayer.onplay = () => {
                    isPlaying = true;
                    if (els.ttsBtn) els.ttsBtn.innerText = '⏹';
                    if (els.speakingIndicator) els.speakingIndicator.classList.add('show');
                };
                
                audioPlayer.onended = () => {
                    isPlaying = false;
                    if (els.ttsBtn) els.ttsBtn.innerText = '🔊';
                    if (els.speakingIndicator) els.speakingIndicator.classList.remove('show');
                };
                
                audioPlayer.onerror = () => {
                    console.log('Google TTS ishlamadi, offline rejimga o\'tilmoqda...');
                    // Offline rejim - oddiy speechSynthesis
                    if (window.speechSynthesis) {
                        window.speechSynthesis.cancel();
                        const utterance = new SpeechSynthesisUtterance(cleanText);
                        utterance.lang = 'uz-UZ';
                        utterance.rate = 0.9;
                        utterance.onstart = () => {
                            isPlaying = true;
                            if (els.ttsBtn) els.ttsBtn.innerText = '⏹';
                            if (els.speakingIndicator) els.speakingIndicator.classList.add('show');
                        };
                        utterance.onend = () => {
                            isPlaying = false;
                            if (els.ttsBtn) els.ttsBtn.innerText = '🔊';
                            if (els.speakingIndicator) els.speakingIndicator.classList.remove('show');
                        };
                        window.speechSynthesis.speak(utterance);
                    } else {
                        alert('Brauzeringiz ovozli o\'qishni qo\'llab-quvvatlamaydi');
                    }
                };
                
                await audioPlayer.play();
                
            } catch (error) {
                console.error('TTS xatosi:', error);
                // Fallback: speechSynthesis
                if (window.speechSynthesis) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text.substring(0, 500));
                    utterance.lang = 'uz-UZ';
                    utterance.rate = 0.9;
                    utterance.onstart = () => {
                        isPlaying = true;
                        if (els.ttsBtn) els.ttsBtn.innerText = '⏹';
                        if (els.speakingIndicator) els.speakingIndicator.classList.add('show');
                    };
                    utterance.onend = () => {
                        isPlaying = false;
                        if (els.ttsBtn) els.ttsBtn.innerText = '🔊';
                        if (els.speakingIndicator) els.speakingIndicator.classList.remove('show');
                    };
                    window.speechSynthesis.speak(utterance);
                }
            }
        }

        // TTS tugmasi event
        if (els.ttsBtn) {
            els.ttsBtn.addEventListener('click', () => {
                if (isPlaying) {
                    stopSpeaking();
                } else {
                    const text = els.title.innerText + '. ' + els.content.innerText;
                    speakText(text);
                }
            });
        }

        // ==========================================
        // KUTUBXONA FUNKSIYALARI
        // ==========================================
        
        els.startBtn.addEventListener('click', () => {
            const name = els.input.value.trim() || 'Mehmon';
            els.userName.innerHTML = `👤 ${name}`;
            
            els.welcome.style.opacity = '0';
            setTimeout(() => {
                els.welcome.style.visibility = 'hidden';
            }, 300);
            
            initLibrary();
        });

        function initLibrary() {
            // Mundarijani yaratish
            els.bookList.innerHTML = '';
            allBooks.forEach((book, index) => {
                const div = document.createElement('div');
                div.className = 'book-item';
                div.innerText = book.title;
                div.onclick = () => {
                    loadBook(index);
                    els.menu.classList.remove('active');
                };
                els.bookList.appendChild(div);
            });
            
            // Birinchi kitobni yuklash
            loadBook(0);
        }

        function loadBook(index) {
            if (!allBooks[index]) return;
            
            currentBookIndex = index;
            els.title.innerText = allBooks[index].title;
            els.content.innerHTML = `<p>${allBooks[index].content}</p>`;
            
            // Aktiv kitobni belgilash
            document.querySelectorAll('.book-item').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });
            
            // Ovozni to'xtatish
            stopSpeaking();
        }

        // Shrift o'lchami
        document.getElementById('fontPlus').onclick = () => {
            if (currentFontSize < 30) {
                currentFontSize += 2;
                document.documentElement.style.setProperty('--font-size', `${currentFontSize}px`);
            }
        };
        
        document.getElementById('fontMinus').onclick = () => {
            if (currentFontSize > 14) {
                currentFontSize -= 2;
                document.documentElement.style.setProperty('--font-size', `${currentFontSize}px`);
            }
        };

        // Menyu
        document.getElementById('openMenu').onclick = () => {
            els.menu.classList.add('active');
        };
        
        document.getElementById('closeMenu').onclick = () => {
            els.menu.classList.remove('active');
        };

        // Keyingi kitob
        function showNextOverlay() {
            if (currentBookIndex < allBooks.length - 1) {
                els.nextName.innerText = allBooks[currentBookIndex + 1].title;
                els.nextOverlay.classList.add('show');
                setTimeout(() => {
                    els.nextOverlay.classList.remove('show');
                }, 3000);
            }
        }

        els.main.addEventListener('click', (e) => {
            const now = Date.now();
            if (now - lastTapTime < 300) {
                showNextOverlay();
            }
            lastTapTime = now;
        });

        els.nextOverlay.onclick = () => {
            if (currentBookIndex < allBooks.length - 1) {
                loadBook(currentBookIndex + 1);
                els.nextOverlay.classList.remove('show');
            }
        };

        // Chiqish
        document.body.addEventListener('click', (e) => {
            if (e.target.closest('header') || e.target.closest('.modal-content') || e.target.closest('#welcomeScreen')) {
                exitClicks = 0;
                return;
            }

            exitClicks++;
            clearTimeout(exitTimer);

            if (exitClicks >= 2 && exitClicks < 6) {
                els.toast.innerText = `Chiqish uchun yana ${6 - exitClicks} marta bosing`;
                els.toast.classList.add('show');
            }

            if (exitClicks === 6) {
                els.toast.classList.remove('show');
                exitClicks = 0;
                
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                }
                
                // Ortga welcome screen
                els.welcome.style.visibility = 'visible';
                els.welcome.style.opacity = '1';
                stopSpeaking();
            }

            exitTimer = setTimeout(() => {
                exitClicks = 0;
                els.toast.classList.remove('show');
            }, 500);
        });

        // Kontekst menyuni bloklash
        document.addEventListener('contextmenu', e => e.preventDefault());

        // Chiqishda ovozni to'xtatish
        window.addEventListener('beforeunload', stopSpeaking);
    </script>
