<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#08080c">
    <title>XOLƎRIƆ | Premium Intelligence Library</title>
    <style>
        :root {
            --bg: #08080c;
            --surface: #11111a;
            --accent: #6c8aff;
            --accent-glow: rgba(108, 138, 255, 0.4);
            --text: #e2e2e9;
            --muted: #888896;
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --panel-bg: rgba(10, 10, 18, 0.98);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            user-select: none;
            background-image: radial-gradient(circle at 50% -20%, #1c1c3d 0%, var(--bg) 70%);
        }

        /* Initial Auth Layer */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.8s cubic-bezier(0.8, 0, 0.2, 1);
        }

        .auth-card {
            width: 85%;
            max-width: 400px;
            text-align: center;
            padding: 50px 30px;
            border-radius: 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .auth-card h1 { 
            font-size: 3rem; 
            letter-spacing: -2px; 
            margin-bottom: 40px; 
            background: linear-gradient(to bottom, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-box {
            width: 100%;
            padding: 20px;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: #000;
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 25px;
            outline: none;
            text-align: center;
            transition: 0.3s;
        }

        .input-box:focus { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }

        .btn-glow {
            width: 100%;
            padding: 20px;
            border-radius: 18px;
            background: var(--accent);
            color: #fff;
            border: none;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 25px var(--accent-glow);
        }

        .btn-glow:active { transform: scale(0.96); }

        /* Algorithm: Resume Notification */
        #resume-notification {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-200%);
            width: 90%;
            max-width: 450px;
            padding: 20px 25px;
            background: var(--panel-bg);
            border: 1px solid var(--accent);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 9999;
            transition: transform 0.6s cubic-bezier(0.2, 1, 0.2, 1);
            backdrop-filter: blur(20px);
        }

        #resume-notification.active { transform: translateX(-50%) translateY(0); }

        .resume-text b { display: block; color: var(--accent); font-size: 0.7rem; text-transform: uppercase; margin-bottom: 4px; }
        .resume-text span { font-weight: 600; font-size: 1rem; color: #fff; }

        /* Main Application Structure */
        #app-shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
            opacity: 0;
            transition: opacity 0.5s;
        }

        header {
            padding: calc(20px + env(safe-area-inset-top)) 30px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .user-tag { color: var(--accent); font-weight: 800; font-size: 0.9rem; letter-spacing: 1px; }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 40px 25px 120px;
            scrollbar-width: none;
        }
        main::-webkit-scrollbar { display: none; }

        #reader-frame { max-width: 750px; margin: 0 auto; }
        #book-h { font-size: 2.8rem; font-weight: 900; line-height: 1.1; margin-bottom: 40px; color: #fff; }
        #book-p { font-size: var(--dynamic-fs, 20px); line-height: 1.7; text-align: justify; transition: font-size 0.1s; }
        #book-p p { margin-bottom: 30px; }

        /* Intelligent Zoom Panel (Long Press) */
        #smart-zoom {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(15px);
            z-index: 9500;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: 0.3s;
        }

        #smart-zoom.visible { display: flex; opacity: 1; }

        .zoom-ui {
            width: 80%;
            max-width: 320px;
            background: var(--surface);
            padding: 40px 30px;
            border-radius: 40px;
            border: 1px solid var(--accent);
            text-align: center;
            box-shadow: 0 0 50px var(--accent-glow);
        }

        .fs-indicator { font-size: 3.5rem; font-weight: 900; color: var(--accent); margin-bottom: 20px; }

        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            height: 10px;
            background: #222;
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 35px;
            height: 35px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent);
            cursor: pointer;
        }

        /* Library Modal */
        #lib-modal {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 90vh;
            background: var(--panel-bg);
            border-radius: 40px 40px 0 0;
            z-index: 9000;
            transform: translateY(100%);
            transition: 0.5s cubic-bezier(0.1, 0.8, 0.2, 1);
            padding: 40px 30px;
            overflow-y: auto;
        }
        #lib-modal.open { transform: translateY(0); }

        .lib-item {
            padding: 25px;
            background: var(--glass);
            border-radius: 20px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: 0.3s;
        }
        .lib-item:active { border-color: var(--accent); background: var(--accent-glow); }

        /* Floating Controls */
        .dock {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            padding: 12px 25px;
            background: var(--panel-bg);
            border-radius: 30px;
            border: 1px solid var(--border);
            z-index: 8000;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .btn-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--glass);
            border: 1px solid var(--border);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* Responsive Logic */
        @media (min-width: 1024px) {
            #book-p { line-height: 2.0; font-size: var(--dynamic-fs, 22px); }
            header { padding: 30px 10%; }
            #reader-frame { max-width: 850px; }
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h1>XOLƎRIƆ</h1>
            <div id="new-user-ui">
                <input type="text" id="name-input" class="input-box" placeholder="Ismingiz...">
                <button class="btn-glow" id="join-btn">KIRISH</button>
            </div>
            <div id="returning-user-ui" style="display:none;">
                <p id="welcome-msg" style="margin-bottom:30px; font-weight:600;"></p>
                <button class="btn-glow" id="reopen-btn">DAVOM ETISH</button>
            </div>
        </div>
    </div>

    <div id="resume-notification">
        <div class="resume-text">
            <b>Oxirgi o'qilgan kitob</b>
            <span id="last-title">Mavzu...</span>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-circle" id="confirm-resume" style="background:var(--accent); border:none;">▶</button>
            <button class="btn-circle" id="dismiss-resume">✕</button>
        </div>
    </div>

    <div id="app-shell">
        <header>
            <span class="user-tag" id="tag-name">XOLƎRIƆ</span>
            <div style="display:flex; gap:15px;">
                <button class="btn-circle" id="tts-btn">🔊</button>
                <button class="btn-circle" id="lib-btn">📚</button>
            </div>
        </header>

        <main id="scroller">
            <div id="reader-frame">
                <h1 id="book-h">Salom</h1>
                <div id="book-p"></div>
            </div>
        </main>

        <div class="dock">
            <button class="btn-circle" id="prev-btn">◀</button>
            <button class="btn-circle" id="long-press-trigger" style="width:120px; border-radius:25px; font-weight:800;">SIZE</button>
            <button class="btn-circle" id="next-btn">▶</button>
        </div>
    </div>

    <div id="smart-zoom">
        <div class="zoom-ui">
            <div class="fs-indicator" id="fs-num">20</div>
            <input type="range" id="fs-slider" min="14" max="50" value="20">
        </div>
    </div>

    <div id="lib-modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <h2 style="font-size:2rem; font-weight:900;">Kutubxona</h2>
            <button class="btn-circle" id="close-lib">✕</button>
        </div>
        <div id="lib-list"></div>
    </div>

    <script>
        /**
         * XOLƎRIƆ CORE ENGINE
         * Elite Full-Stack Logic
         */
        
        const BOOKS = [
            { id: 1, title: "1. Mukammallik Kuchi", content: "Hayotimizda yuz beradigan eng katta o'zgarishlar birdaniga bo'lmaydi. Katta yutuqlar har doim ko'zga ko'rinmas, doimiy ravishda takrorlanadigan kichik harakatlarning jamlanmasidir. Atomic Habits konsepsiyasi shuni uqtiradiki, inson o'z ustida har kuni atigi bir foiz yaxshilanishga erishsa, yil oxiriga kelib u 37 barobar kuchliroq bo'ladi." },
            { id: 2, title: "2. Kiberxavfsizlik Anatomiyasi", content: "Zamonaviy raqamli dunyoda eng qimmatli resurs bu — ma'lumotlardir. Kiberxavfsizlik butun boshli tarmoq arxitekturasini, serverlar va foydalanuvchilar o'rtasidagi maxfiy ma'lumotlar almashinuvini himoya qilishdir. Tizimdagi ochiq portlar va zaif protokollar doimiy tahlilni talab qiladi." },
            { id: 3, title: "3. Moliyaviy Savodxonlik", content: "Boylikning haqiqiy o'lchovi bu sizning qancha ko'p pul topishingiz bilan emas, balki o'sha topilgan pulni qanday boshqarishingiz va uni kelajak uchun saqlab qola olishingiz bilan o'lchanadi. Haqiqiy boylar aktivlar yig'adilar." }
        ];

        const AppState = {
            currentUser: localStorage.getItem('xoleric_user') || null,
            lastReadId: parseInt(localStorage.getItem('xoleric_last_id')) || 1,
            currentFs: parseInt(localStorage.getItem('xoleric_fs')) || 20,
            fullScreenActive: false
        };

        const View = {
            auth: document.getElementById('auth-overlay'),
            shell: document.getElementById('app-shell'),
            nameInput: document.getElementById('name-input'),
            tagName: document.getElementById('tag-name'),
            bookH: document.getElementById('book-h'),
            bookP: document.getElementById('book-p'),
            fsNum: document.getElementById('fs-num'),
            fsSlider: document.getElementById('fs-slider'),
            zoomOverlay: document.getElementById('smart-zoom'),
            libModal: document.getElementById('lib-modal'),
            resumeNote: document.getElementById('resume-notification'),
            scroller: document.getElementById('scroller')
        };

        // 1. Initial Logic
        function bootstrap() {
            if (AppState.currentUser) {
                document.getElementById('new-user-ui').style.display = 'none';
                document.getElementById('returning-user-ui').style.display = 'block';
                document.getElementById('welcome-msg').innerText = `Salom, ${AppState.currentUser}`;
            }
            applyFontSize(AppState.currentFs);
            renderLibrary();
        }

        // 2. Auth Actions
        document.getElementById('join-btn').onclick = () => {
            const name = View.nameInput.value.trim();
            if (name.length < 2) return;
            AppState.currentUser = name;
            localStorage.setItem('xoleric_user', name);
            launchApp();
        };

        document.getElementById('reopen-btn').onclick = launchApp;

        function launchApp() {
            View.auth.style.transform = 'translateY(-100%)';
            View.shell.style.opacity = '1';
            View.tagName.innerText = AppState.currentUser.toUpperCase();
            
            enableFullscreen();

            // Intelligent Algorithm: Resume Last Session
            const lastBook = BOOKS.find(b => b.id === AppState.lastReadId);
            document.getElementById('last-title').innerText = lastBook.title;
            setTimeout(() => View.resumeNote.classList.add('active'), 1200);
        }

        function enableFullscreen() {
            const doc = document.documentElement;
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
        }

        // 3. Algorithm: Resume Actions
        document.getElementById('confirm-resume').onclick = () => {
            renderBook(AppState.lastReadId);
            View.resumeNote.classList.remove('active');
        };

        document.getElementById('dismiss-resume').onclick = () => {
            renderBook(1);
            View.resumeNote.classList.remove('active');
        };

        // 4. Content Engine
        function renderBook(id) {
            const book = BOOKS.find(b => b.id === id);
            View.bookH.innerText = book.title;
            View.bookP.innerHTML = book.content.split('. ').map(p => `<p>${p}.</p>`).join('');
            AppState.lastReadId = id;
            localStorage.setItem('xoleric_last_id', id);
            View.scroller.scrollTop = 0;
        }

        function renderLibrary() {
            const container = document.getElementById('lib-list');
            container.innerHTML = BOOKS.map(b => `
                <div class="lib-item" onclick="renderBook(${b.id}); closeLib();">
                    <h3 style="margin-bottom:5px;">${b.title}</h3>
                    <p style="font-size:0.8rem; color:var(--muted);">${b.content.substring(0, 60)}...</p>
                </div>
            `).join('');
        }

        // 5. Intelligent UI: Long Press Zoom
        let pressTimer;
        const trigger = document.getElementById('long-press-trigger');

        function startPress() {
            pressTimer = setTimeout(() => {
                View.zoomOverlay.classList.add('visible');
            }, 700);
        }

        function endPress() {
            clearTimeout(pressTimer);
            View.zoomOverlay.classList.remove('visible');
        }

        trigger.addEventListener('mousedown', startPress);
        trigger.addEventListener('touchstart', startPress);
        window.addEventListener('mouseup', endPress);
        window.addEventListener('touchend', endPress);

        View.fsSlider.oninput = (e) => {
            const val = e.target.value;
            View.fsNum.innerText = val;
            applyFontSize(val);
        };

        function applyFontSize(size) {
            document.documentElement.style.setProperty('--dynamic-fs', `${size}px`);
            localStorage.setItem('xoleric_fs', size);
            View.fsSlider.value = size;
            View.fsNum.innerText = size;
        }

        // 6. Navigation
        document.getElementById('lib-btn').onclick = () => View.libModal.classList.add('open');
        document.getElementById('close-lib').onclick = closeLib;
        function closeLib() { View.libModal.classList.remove('open'); }

        document.getElementById('next-btn').onclick = () => {
            if (AppState.lastReadId < BOOKS.length) renderBook(AppState.lastReadId + 1);
        };
        document.getElementById('prev-btn').onclick = () => {
            if (AppState.lastReadId > 1) renderBook(AppState.lastReadId - 1);
        };

        // Start Boot
        bootstrap();
    </script>
</body>
</html>
