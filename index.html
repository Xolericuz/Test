<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d0d12">
    <title>XOLƎRIƆ Kutubxonasi</title>
    <style>
        :root {
            --bg-dark: #0d0d12;
            --text-main: #e2e2e9;
            --text-muted: #9494a0;
            --accent: #6c8aff;
            --glass-bg: rgba(25, 25, 35, 0.4);
            --glass-border: rgba(255, 255, 255, 0.05);
            --font-size: 18px;
            --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top, #1a1a2e 0%, var(--bg-dark) 80%);
            color: var(--text-main);
            font-family: var(--font-family);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* --- Welcome Screen --- */
        #welcomeScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        .welcome-box {
            padding: 40px; border-radius: 24px;
            text-align: center; width: 90%; max-width: 400px;
        }
        .welcome-box h1 { font-size: 2rem; margin-bottom: 10px; color: #fff; }
        .welcome-box p { color: var(--text-muted); margin-bottom: 25px; font-size: 0.95rem; }
        .welcome-box input {
            width: 100%; padding: 15px; border-radius: 12px;
            border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3);
            color: #fff; font-size: 1.1rem; outline: none; text-align: center;
            margin-bottom: 20px; transition: border 0.3s;
        }
        .welcome-box input:focus { border-color: var(--accent); }
        .welcome-box button {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: var(--accent); color: #fff; font-size: 1.1rem; font-weight: 600;
            cursor: pointer; transition: transform 0.2s, background 0.2s;
        }
        .welcome-box button:active { transform: scale(0.97); }

        /* --- Header --- */
        header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border); z-index: 10;
        }
        .logo { font-weight: bold; color: #fff; font-size: 1.2rem; letter-spacing: 1px;}
        .user-name { font-weight: 600; color: var(--accent); font-size: 1.1rem; display: flex; align-items: center; gap: 8px;}
        .controls { display: flex; gap: 10px; }
        .icon-btn {
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            color: var(--text-main); width: 40px; height: 40px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.2rem; cursor: pointer; transition: all 0.2s;
        }
        .icon-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.1); }

        /* --- Main Content --- */
        main {
            flex: 1; overflow-y: auto; padding: 30px 20px 140px 20px;
            scroll-behavior: smooth;
        }
        main::-webkit-scrollbar { width: 5px; }
        main::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 5px; }
        
        .book-container { max-width: 800px; margin: 0 auto; }
        #bookTitle { font-size: 2.2rem; margin-bottom: 30px; color: #fff; text-align: center; }
        #bookContent { font-size: var(--font-size); line-height: 1.8; text-align: justify; transition: font-size 0.3s ease; }
        
        /* TTS Highlight sytles */
        #bookContent p { margin-bottom: 20px; transition: 0.3s all ease-in-out; border-radius: 8px; padding: 5px; }
        #bookContent p.active { background: rgba(108, 138, 255, 0.15); border-left: 3px solid var(--accent); padding-left: 15px; color: #fff;}

        /* --- Next Book Overlay --- */
        .next-overlay {
            position: fixed; bottom: -120px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 350px; padding: 20px; border-radius: 20px;
            text-align: center; z-index: 50;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .next-overlay.show { bottom: 90px; }
        .next-btn-circle {
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--accent); color: #fff; font-size: 1.2rem; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            margin: 0 auto 10px auto; box-shadow: 0 4px 15px rgba(108, 138, 255, 0.4);
        }
        .next-overlay p { font-size: 0.95rem; font-weight: 500; color: var(--text-main); }

        /* --- TTS Controls --- */
        .tts-controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; padding: 12px 25px; border-radius: 30px;
            z-index: 60; transition: all 0.3s;
        }
        .tts-btn {
            background: none; border: none; color: #fff; font-size: 1.5rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        .tts-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.15); }
        .tts-btn.play-btn { background: var(--accent); box-shadow: 0 4px 15px rgba(108, 138, 255, 0.3); }

        /* --- Menu Modal --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: flex-end;
            z-index: 100; opacity: 0; visibility: hidden; transition: all 0.3s;
        }
        .modal.active { opacity: 1; visibility: visible; }
        .modal-content {
            width: 100%; max-width: 600px; height: 75vh;
            border-radius: 24px 24px 0 0; padding: 25px;
            display: flex; flex-direction: column;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal.active .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { background: none; border: none; color: var(--text-muted); font-size: 1.8rem; cursor: pointer; }
        
        .book-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 5px; }
        .book-list::-webkit-scrollbar { width: 4px; }
        .book-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }
        .book-item {
            padding: 15px; border-radius: 12px; border: 1px solid transparent;
            cursor: pointer; transition: 0.2s; color: var(--text-main);
        }
        .book-item:active, .book-item.active { background: rgba(255,255,255,0.05); border-color: var(--accent); }

        /* --- Toast --- */
        .toast {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 100, 100, 0.15); border: 1px solid #ff6464; color: #ff6464;
            padding: 10px 20px; border-radius: 20px; font-size: 0.9rem;
            opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 1000;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div id="welcomeScreen">
        <div class="welcome-box glass">
            <h1>XOLƎRIƆ</h1>
            <p>O'qishni boshlash uchun ismingizni kiriting</p>
            <input type="text" id="userNameInput" placeholder="Ismingiz...">
            <button id="startBtn">Kirish va O'qish</button>
        </div>
    </div>

    <div class="toast glass" id="exitToast"></div>

    <header class="glass">
        <div class="user-name" id="displayUserName">O'quvchi</div>
        <div class="logo">XOLƎRIƆ</div>
        <div class="controls">
            <button class="icon-btn" id="fontMinus">-</button>
            <button class="icon-btn" id="fontPlus">+</button>
            <button class="icon-btn" id="openMenu">⚙️</button>
        </div>
    </header>

    <main id="mainContent">
        <div class="book-container">
            <h1 id="bookTitle">Kutubxona yuklanmoqda...</h1>
            <div id="bookContent"></div>
        </div>
    </main>

    <div class="next-overlay glass" id="nextOverlay">
        <div class="next-btn-circle">&gt;</div>
        <p>Keyingi: <span id="nextBookName"></span></p>
    </div>

    <div class="tts-controls glass" id="ttsControls">
        <button class="tts-btn" id="ttsStop">⏹</button>
        <button class="tts-btn play-btn" id="ttsPlayPause">▶</button>
    </div>

    <div class="modal" id="menuModal">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2>📚 Mundarija</h2>
                <button class="close-btn" id="closeMenu">&times;</button>
            </div>
            <div class="book-list" id="bookList"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // KITOBLAR BAZASINI SHU YERGA QO'YASIZ
        const booksPart1 = [
            {
                title: "1. Mukammallik Kuchi: Kichik Odatlar San'ati",
                content: `
                    <p>Hayotimizda yuz beradigan eng katta o'zgarishlar birdaniga bo'lmaydi. Katta yutuqlar har doim ko'zga ko'rinmas, doimiy ravishda takrorlanadigan kichik harakatlarning jamlanmasidir.</p>
                    <p>Aksariyat insonlar motivatsiyaga tayanib ish ko'radilar. Ammo motivatsiya bu vaqtinchalik hissiy holatdir. Haqiqiy va bardavom natijaga erishish uchun insonga motivatsiya emas, balki qat'iy intizom va to'g'ri ishlab chiqilgan tizim kerak.</p>
                `
            },
             {
                title: "2. Kiberxavfsizlik va Tarmoq Anatomiyasi",
                content: `
                    <p>Zamonaviy raqamli dunyoda eng qimmatli resurs bu — neft yoki oltin emas, balki axborot va ma'lumotlardir.</p>
                    <p>Kiberhimoyaning asosi operatsion tizimlarning ichki tuzilishini chuqur tushunishdan boshlanadi.</p>
                `
            }
            // ... BOSHQA KITOBLARINGIZNI SHU YERGA DAVOM ETTIRASIZ ...
        ];

        let allBooks = [].concat(booksPart1); 
        // Agar boshqa massivlar bo'lsa ularni ham qo'shib olasiz: allBooks.concat(booksPart2, booksPart3...)
        
        // ==========================================
        // TTS ENGINE (Professional Modul)
        // ==========================================
        class IdealTTS {
            constructor(options = {}){
                this.synth = window.speechSynthesis;
                this.voice = null;
                this.queue = [];
                this.index = 0;
                
                this.rate = options.rate || 0.95;
                this.pitch = options.pitch || 1;
                this.lang = options.lang || "uz-UZ"; // Asosiy til O'zbek tili
                
                this.isPlaying = false;
                this.isPaused = false;
                
                this.onParagraph = options.onParagraph || (()=>{});
                this.onEnd = options.onEnd || (()=>{});
                
                this.loadVoices();
            }

            loadVoices(){
                const load = () => {
                    const voices = this.synth.getVoices();
                    // O'zbek tilini qidirish, topilmasa standart ovozni olish
                    this.voice = voices.find(v => v.lang.includes("uz")) || voices.find(v => v.lang.includes("tr")) || voices.find(v => v.lang.includes("ru")) || voices[0];
                };
                load();
                speechSynthesis.onvoiceschanged = load;
            }

            speak(paragraphsArray){
                this.stop();
                this.queue = paragraphsArray;
                this.index = 0;
                this.isPlaying = true;
                this.next();
            }

            next(){
                if(this.index >= this.queue.length){
                    this.isPlaying = false;
                    this.onEnd();
                    return;
                }
                
                const paragraphText = this.queue[this.index];
                this.onParagraph(this.index);
                
                const utter = new SpeechSynthesisUtterance(paragraphText);
                utter.voice = this.voice;
                utter.rate = this.rate;
                utter.pitch = this.pitch;
                utter.lang = this.lang;
                
                utter.onend = () => {
                    this.index++;
                    this.next();
                };
                
                this.synth.speak(utter);
            }

            pause(){
                if(!this.isPlaying) return;
                this.synth.pause();
                this.isPaused = true;
            }

            resume(){
                if(!this.isPaused) return;
                this.synth.resume();
                this.isPaused = false;
            }

            stop(){
                this.synth.cancel();
                this.queue = [];
                this.index = 0;
                this.isPlaying = false;
                this.isPaused = false;
            }
        }

        // ==========================================
        // DASTUR MANTIQI
        // ==========================================
        let currentBookIndex  = 0;
        let currentFontSize = 18;
        let exitClicks = 0;
        let exitTimer;
        let lastTapTime = 0;
        let domParagraphs = []; // P taglarni saqlash uchun

        const els = {
            welcome: document.getElementById('welcomeScreen'),
            input: document.getElementById('userNameInput'),
            startBtn: document.getElementById('startBtn'),
            userName: document.getElementById('displayUserName'),
            title: document.getElementById('bookTitle'),
            content: document.getElementById('bookContent'),
            main: document.getElementById('mainContent'),
            nextOverlay: document.getElementById('nextOverlay'),
            nextName: document.getElementById('nextBookName'),
            menu: document.getElementById('menuModal'),
            bookList: document.getElementById('bookList'),
            toast: document.getElementById('exitToast'),
            ttsPlayPause: document.getElementById('ttsPlayPause'),
            ttsStop: document.getElementById('ttsStop')
        };

        // TTS Initsializatsiya
        const tts = new IdealTTS({
            rate: 0.95,
            onParagraph: (i) => {
                domParagraphs.forEach(p => p.classList.remove("active"));
                if(domParagraphs[i]) {
                    domParagraphs[i].classList.add("active");
                    // O'qilayotgan joyga scroll qilish
                    domParagraphs[i].scrollIntoView({
                        behavior: "smooth",
                        block: "center"
                    });
                }
            },
            onEnd: () => {
                els.ttsPlayPause.innerText = "▶";
                domParagraphs.forEach(p => p.classList.remove("active"));
            }
        });

        // 1. Dasturga kirish
        els.startBtn.addEventListener('click', () => {
            const name = els.input.value.trim();
            if(name.length < 2) return alert('Ismingizni kiriting');
            els.userName.innerHTML = `👤 ${name}`;
            
            if(document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(e => console.log(e));
            }
            els.welcome.style.opacity = '0';
            els.welcome.style.visibility = 'hidden';
            
            initLibrary();
        });

        // 2. Kutubxonani yuklash
        function initLibrary() {
            if(allBooks.length === 0) return;
            
            els.bookList.innerHTML = '';
            allBooks.forEach((book, index) => {
                let div = document.createElement('div');
                div.className = 'book-item';
                div.innerText = book.title;
                div.onclick = () => { loadBook(index); els.menu.classList.remove('active'); };
                els.bookList.appendChild(div);
            });
            loadBook(0);
        }

        function loadBook(index) {
            // Yangi kitobga o'tganda ovozni to'xtatish
            tts.stop();
            els.ttsPlayPause.innerText = "▶";

            currentBookIndex = index;
            els.title.innerText = allBooks[index].title;
            els.content.innerHTML = allBooks[index].content;
            els.main.scrollTop = 0;
            
            document.querySelectorAll('.book-item').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });

            // Yangi kitobning P taglarini yangilash
            domParagraphs = [...document.querySelectorAll("#bookContent p")];
        }

        // 3. TTS Boshqaruvi
        els.ttsPlayPause.onclick = () => {
            if (tts.isPlaying && !tts.isPaused) {
                tts.pause();
                els.ttsPlayPause.innerText = "▶";
            } else if (tts.isPlaying && tts.isPaused) {
                tts.resume();
                els.ttsPlayPause.innerText = "⏸";
            } else {
                // Yangi o'qishni boshlash
                const texts = domParagraphs.map(p => p.innerText);
                tts.speak(texts);
                els.ttsPlayPause.innerText = "⏸";
            }
        };

        els.ttsStop.onclick = () => {
            tts.stop();
            els.ttsPlayPause.innerText = "▶";
            domParagraphs.forEach(p => p.classList.remove("active"));
        };

        // 4. Shrift o'lchami (+ va -)
        document.getElementById('fontPlus').onclick = () => {
            if(currentFontSize < 34) { currentFontSize += 2; document.documentElement.style.setProperty('--font-size', `${currentFontSize}px`); }
        };
        document.getElementById('fontMinus').onclick = () => {
            if(currentFontSize > 14) { currentFontSize -= 2; document.documentElement.style.setProperty('--font-size', `${currentFontSize}px`); }
        };

        // 5. Menyu
        document.getElementById('openMenu').onclick = () => els.menu.classList.add('active');
        document.getElementById('closeMenu').onclick = () => els.menu.classList.remove('active');

        // 6. Ikki marta bosish (Keyingi kitob)
        function handleDoubleTap() {
            if(els.menu.classList.contains('active')) return;
            if(currentBookIndex < allBooks.length - 1) {
                els.nextName.innerText = allBooks[currentBookIndex + 1].title;
                els.nextOverlay.classList.add('show');
                setTimeout(() => els.nextOverlay.classList.remove('show'), 4000);
            }
        }

        els.main.addEventListener('click', (e) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTapTime;
            if(tapLength < 300 && tapLength > 0) {
                handleDoubleTap();
                e.preventDefault();
            }
            lastTapTime = currentTime;
        });

        els.nextOverlay.onclick = () => {
            if(currentBookIndex < allBooks.length - 1) {
                loadBook(currentBookIndex + 1);
                els.nextOverlay.classList.remove('show');
            }
        };

        // 7. Chiqish paneli
        document.body.addEventListener('click', (e) => {
            if(e.target.closest('header') || e.target.closest('.modal-content') || e.target.closest('#welcomeScreen') || e.target.closest('.next-overlay') || e.target.closest('.tts-controls')) {
                exitClicks = 0; return;
            }

            exitClicks++;
            clearTimeout(exitTimer);

            if(exitClicks >= 2 && exitClicks < 6) {
                els.toast.innerText = `Chiqish uchun yana ${6 - exitClicks} marta bosing`;
                els.toast.classList.add('show');
            }

            if(exitClicks === 6) {
                els.toast.classList.remove('show');
                exitClicks = 0;
                if(document.fullscreenElement) { document.exitFullscreen().catch(err => console.log(err)); }
            }

            exitTimer = setTimeout(() => {
                exitClicks = 0;
                els.toast.classList.remove('show');
            }, 500);
        });

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
