<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XOLƎRIƆ | Metallic Series</title>
    <style>
        :root {
            --pure-black: #050505;
            --silver-gradient: linear-gradient(135deg, #8E8E8E 0%, #C0C0C0 45%, #FFFFFF 50%, #C0C0C0 55%, #8E8E8E 100%);
            --metallic-border: rgba(192, 192, 192, 0.3);
            --neon-silver: rgba(192, 192, 192, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--pure-black);
            color: #E0E0E0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Kumush rangli animatsiyalangan sarlavha */
        .silver-text-animated {
            background: linear-gradient(120deg, #a0a0a0 0%, #ffffff 20%, #a0a0a0 40%, #e0e0e0 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            font-weight: 900;
            animation: shine 4s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        /* Asosiy Frame */
        #app-frame {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        /* Kitob Kartochkalari (Mundarija) */
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        .book-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid var(--metallic-border);
            padding: 25px;
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
        }

        .book-card:hover {
            transform: translateY(-8px);
            border-color: #FFFFFF;
            box-shadow: 0 0 25px var(--neon-silver);
        }

        .book-card h3 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #C0C0C0;
        }

        /* Reader Mode (Manipulyativ focus) */
        #reader-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--pure-black);
            z-index: 1000;
            display: none;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .reader-container {
            max-width: 700px;
            margin: 0 auto;
        }

        #reader-text {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #B0B0B0;
            text-align: justify;
        }

        /* Control Panel (Metallic) */
        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(26, 26, 26, 0.9);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid var(--metallic-border);
            backdrop-filter: blur(20px);
            z-index: 1100;
        }

        .btn-silver {
            background: var(--silver-gradient);
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 900;
            color: black;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        /* Progress Bar */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: var(--silver-gradient);
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

<div id="app-frame">
    <h1 class="silver-text-animated" style="font-size: 2.5rem; margin-bottom: 30px; text-align: center;">XOLƎRIƆ</h1>
    <div class="library-grid" id="library">
        </div>
</div>

<div id="reader-view">
    <div class="progress-bar" id="progress"></div>
    <div class="reader-container">
        <h2 id="reader-title" class="silver-text" style="margin-bottom: 30px; font-size: 2rem;"></h2>
        <div id="reader-text"></div>
    </div>
    
    <div class="controls">
        <button class="btn-silver" onclick="closeReader()">✕ Yopish</button>
        <button class="btn-silver" id="tts-btn" onclick="toggleTTS()">🔊 Tinglash</button>
        <button class="btn-silver" onclick="nextPage()">Keyingi ▶</button>
    </div>
</div>

<script>
    // 50 ta kitob algoritmi (Simulyatsiya)
    const books = Array.from({ length: 50 }, (_, i) => ({
        id: i + 1,
        title: `${i + 1}. Mukammallik Kuchi: ${['Psixologiya', 'Kiberxavfsizlik', 'Fizika', 'Strategiya'][i % 4]}`,
        content: `Ushbu kitob inson ongini manipulyatsiya qilish va diqqatni boshqarish haqida... [Kitob mazmuni ${i + 1}] ...`
    }));

    const libContainer = document.getElementById('library');
    const readerView = document.getElementById('reader-view');

    // Kutubxonani chizish
    books.forEach(book => {
        const card = document.createElement('div');
        card.className = 'book-card';
        card.innerHTML = `<h3>${book.title}</h3><p style="color: #666; font-size: 0.8rem;">O'qish vaqti: 15 daqiqa</p>`;
        card.onclick = () => openReader(book);
        libContainer.appendChild(card);
    });

    let currentBook = null;
    let isSpeaking = false;

    function openReader(book) {
        currentBook = book;
        document.getElementById('reader-title').innerText = book.title;
        document.getElementById('reader-text').innerText = book.content;
        readerView.style.display = 'block';
        
        // Haptic feedback (if supported)
        if (window.navigator.vibrate) window.navigator.vibrate(50);
    }

    function closeReader() {
        readerView.style.display = 'none';
        stopTTS();
    }

    // TTS Funksiyasi (Frontend uchun Azure REST API ulanishi)
    async function toggleTTS() {
        const btn = document.getElementById('tts-btn');
        if (!isSpeaking) {
            btn.innerText = "⌛ Yuklanmoqda...";
            await speakAzure(currentBook.content);
            btn.innerText = "🛑 To'xtatish";
            isSpeaking = true;
        } else {
            stopTTS();
        }
    }

    function stopTTS() {
        window.speechSynthesis.cancel();
        document.getElementById('tts-btn').innerText = "🔊 Tinglash";
        isSpeaking = false;
    }

    // Azure TTS Simulation (Frontend versiya uchun)
    async function speakAzure(text) {
        // Bu yerda backend API'ga fetch so'rovi yuboriladi
        // Hozircha Brauzer TTS ishlatiladi, lekin Madina ovozi backendda tayyorlangan
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'uz-UZ';
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }
</script>
</body>
</html>
