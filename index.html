<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>XOLƎRIƆ | Neural TTS Library</title>
    <style>
        /* ===== MODERN RESET & VARIABLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #6C5CE7;
            --primary-glow: rgba(108, 92, 231, 0.4);
            --secondary: #00D2FF;
            --background: #0A0A0F;
            --surface: #14141F;
            --surface-light: #1E1E2A;
            --text: #FFFFFF;
            --text-secondary: #A0A0B0;
            --error: #FF4757;
            --success: #00D68F;
            --warning: #FFA502;
            --gradient: linear-gradient(135deg, var(--primary), var(--secondary));
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            --glow: 0 0 30px var(--primary-glow);
            --font-size: 18px;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* ===== BASE STYLES ===== */
        body {
            background: var(--background);
            color: var(--text);
            font-family: var(--font-family);
            font-size: var(--font-size);
            line-height: 1.7;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Neural Network Background Effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(108, 92, 231, 0.08) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(0, 210, 255, 0.08) 0%, transparent 30%);
            pointer-events: none;
            z-index: -1;
        }

        /* ===== WELCOME SCREEN ===== */
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--background);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s ease, visibility 0.5s;
            backdrop-filter: blur(10px);
        }

        .welcome-card {
            background: var(--surface);
            padding: 40px;
            border-radius: 32px;
            width: 90%;
            max-width: 440px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: var(--shadow);
            animation: floatIn 0.6s ease;
        }

        .welcome-logo {
            font-size: 48px;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            letter-spacing: 4px;
        }

        .welcome-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .welcome-subtitle {
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 16px;
        }

        .input-field {
            width: 100%;
            padding: 16px 20px;
            background: var(--surface-light);
            border: 2px solid transparent;
            border-radius: 16px;
            color: var(--text);
            font-size: 16px;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: var(--glow);
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--gradient);
            border: none;
            border-radius: 16px;
            color: var(--text);
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        /* ===== MAIN HEADER ===== */
        .app-header {
            background: rgba(20, 20, 31, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: var(--gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .user-name {
            font-weight: 500;
            color: var(--text-secondary);
        }

        .header-controls {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--surface-light);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 18px;
        }

        .icon-btn:active {
            transform: scale(0.9);
            background: var(--primary);
        }

        /* ===== BOOK CONTENT ===== */
        .main-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 24px 120px;
        }

        .book-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 40px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.3;
        }

        .book-content {
            font-size: var(--font-size);
        }

        .book-content p {
            margin-bottom: 28px;
            opacity: 0.9;
            transition: all 0.3s ease;
            padding: 16px 20px;
            border-radius: 16px;
            border-left: 3px solid transparent;
        }

        .book-content p.active-paragraph {
            background: rgba(108, 92, 231, 0.1);
            border-left: 3px solid var(--primary);
            transform: translateX(10px);
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.1);
            opacity: 1;
        }

        /* ===== NEURAL TTS CONTROLS ===== */
        .tts-dock {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 31, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            padding: 12px 24px;
            display: flex;
            gap: 16px;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 30px var(--primary-glow);
            animation: slideUp 0.5s ease;
        }

        .tts-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--surface-light);
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .tts-btn:hover {
            background: var(--primary);
            transform: scale(1.1);
        }

        .tts-btn:active {
            transform: scale(0.95);
        }

        .tts-btn.active {
            background: var(--primary);
            box-shadow: 0 0 20px var(--primary);
        }

        .tts-progress {
            width: 200px;
            height: 4px;
            background: var(--surface-light);
            border-radius: 2px;
            overflow: hidden;
        }

        .tts-progress-bar {
            height: 100%;
            background: var(--gradient);
            width: 0%;
            transition: width 0.3s;
        }

        .tts-select {
            background: var(--surface-light);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            max-width: 180px;
        }

        .tts-speed {
            background: var(--surface-light);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        .tts-time {
            color: var(--text-secondary);
            font-size: 14px;
            min-width: 60px;
            text-align: center;
        }

        /* ===== MENU MODAL ===== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--surface);
            width: 100%;
            max-width: 600px;
            height: 80vh;
            border-radius: 32px 32px 0 0;
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h2 {
            font-size: 24px;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 28px;
            cursor: pointer;
        }

        .book-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .book-item {
            padding: 16px 20px;
            background: var(--surface-light);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .book-item:hover {
            background: rgba(108, 92, 231, 0.1);
            border-color: var(--primary);
        }

        .book-item.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* ===== TOAST NOTIFICATION ===== */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 3000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            box-shadow: var(--shadow);
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
        }

        .toast.error {
            border-color: var(--error);
            color: var(--error);
        }

        .toast.success {
            border-color: var(--success);
            color: var(--success);
        }

        /* ===== NEXT BOOK OVERLAY ===== */
        .next-overlay {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 60px;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 900;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow);
        }

        .next-overlay.show {
            opacity: 1;
            visibility: visible;
            bottom: 120px;
        }

        .next-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes floatIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                transform: translate(-50%, 100%);
                opacity: 0;
            }
            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 20px var(--primary-glow);
            }
            50% {
                box-shadow: 0 0 40px var(--primary);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            :root {
                --font-size: 16px;
            }

            .tts-dock {
                width: 95%;
                border-radius: 40px;
                padding: 10px 16px;
                gap: 8px;
                bottom: 20px;
            }

            .tts-btn {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }

            .tts-progress {
                width: 100px;
            }

            .tts-select, .tts-speed {
                display: none;
            }

            .tts-time {
                font-size: 12px;
                min-width: 50px;
            }

            .book-title {
                font-size: 28px;
            }
        }

        @media (max-width: 480px) {
            .tts-dock {
                flex-wrap: wrap;
                border-radius: 30px;
                bottom: 15px;
            }
            
            .tts-progress {
                order: 1;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- WELCOME SCREEN -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-card">
            <div class="welcome-logo">XOLƎRIƆ</div>
            <h1 class="welcome-title">Neural Library</h1>
            <p class="welcome-subtitle">AI-Powered Text-to-Speech Reader</p>
            <input type="text" class="input-field" id="userNameInput" placeholder="Ismingizni kiriting..." autofocus>
            <button class="btn-primary" id="startBtn">Kirish</button>
        </div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div class="toast" id="toast"></div>

    <!-- MAIN HEADER -->
    <header class="app-header">
        <div class="user-info">

            <span class="user-name" id="displayUserName">Mehmon</span>
        </div>
        <div class="header-controls">
            <button class="icon-btn" id="fontMinus">−</button>
            <button class="icon-btn" id="fontPlus">+</button>
            <button class="icon-btn" id="openMenu">📚</button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="mainContent">
        <h1 class="book-title" id="bookTitle">Kutubxona yuklanmoqda...</h1>
        <div class="book-content" id="bookContent"></div>
    </main>

    <!-- NEURAL TTS DOCK -->
    <div class="tts-dock" id="ttsDock">
        <button class="tts-btn" id="ttsPlay" title="Play/Pause">▶</button>
        <button class="tts-btn" id="ttsStop" title="Stop">⏹</button>

            <div class="tts-progress-bar" id="ttsProgressBar"></div>

    <div class="next-overlay" id="nextOverlay">

    <!-- MENU MODAL -->
    <div class="modal" id="menuModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📚 Kitoblar ro'yxati</h2>
                <button class="close-btn" id="closeMenu">×</button>
            </div>
            <div class="book-list" id="bookList"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // PROFESSIONAL NEURAL TTS ENGINE v2.0
        // ==========================================
        class NeuralTTS {
            constructor(config = {}) {
                this.synth = window.speechSynthesis;
                this.voices = [];
                this.currentVoice = null;
                this.queue = [];
                this.currentIndex = 0;
                this.totalParagraphs = 0;
                
                // Settings
                this.rate = config.rate || 1.0;
                this.pitch = config.pitch || 1.0;
                this.volume = config.volume || 1.0;
                this.lang = config.lang || 'en-US';
                
                // State
                this.isPlaying = false;
                this.isPaused = false;
                this.isStopped = true;
                
                // Callbacks
                this.onStart = config.onStart || (() => {});
                this.onParagraph = config.onParagraph || (() => {});
                this.onEnd = config.onEnd || (() => {});
                this.onProgress = config.onProgress || (() => {});
                this.onError = config.onError || (() => {});
                
                // Initialize
                this.initVoices();
            }
            
            initVoices() {
                const loadVoices = () => {
                    this.voices = this.synth.getVoices();
                    
                    // Find best voice
                    this.currentVoice = this.voices.find(v => 
                        v.lang.includes('en') && v.name.includes('Neural')
                    ) || this.voices.find(v => 
                        v.lang.includes('en') && v.name.includes('Google')
                    ) || this.voices.find(v => 
                        v.lang.includes('en')
                    ) || this.voices[0];
                };
                
                loadVoices();
                if (speechSynthesis.onvoiceschanged !== undefined) {
                    speechSynthesis.onvoiceschanged = loadVoices;
                }
            }
            
            getVoices() {
                return this.voices;
            }
            
            setVoice(voiceURI) {
                this.currentVoice = this.voices.find(v => v.voiceURI === voiceURI) || this.currentVoice;
            }
            
            setRate(rate) {
                this.rate = rate;
            }
            
            // Extract paragraphs from DOM
            extractParagraphs(element) {
                const paragraphs = Array.from(element.querySelectorAll('p'));
                return paragraphs.map((p, index) => ({
                    id: index,
                    text: p.innerText.trim(),
                    element: p,
                    words: p.innerText.trim().split(/\s+/).length,
                    chars: p.innerText.trim().length
                })).filter(p => p.text.length > 0);
            }
            
            // Start speaking
            speak(paragraphs) {
                this.stop();
                
                if (!paragraphs || paragraphs.length === 0) {
                    this.onError('No paragraphs to speak');
                    return;
                }
                
                this.queue = paragraphs;
                this.totalParagraphs = paragraphs.length;
                this.currentIndex = 0;
                this.isPlaying = true;
                this.isStopped = false;
                this.isPaused = false;
                
                this.onStart();
                this.speakNext();
            }
            
            speakNext() {
                if (this.isStopped) return;
                
                if (this.currentIndex >= this.queue.length) {
                    this.isPlaying = false;
                    this.onEnd();
                    return;
                }
                
                const paragraph = this.queue[this.currentIndex];
                
                // Highlight paragraph
                this.onParagraph(this.currentIndex, paragraph);
                
                // Update progress
                const progress = ((this.currentIndex + 1) / this.totalParagraphs) * 100;
                this.onProgress(progress, this.currentIndex + 1, this.totalParagraphs);
                
                const utterance = new SpeechSynthesisUtterance(paragraph.text);
                utterance.voice = this.currentVoice;
                utterance.rate = this.rate;
                utterance.pitch = this.pitch;
                utterance.volume = this.volume;
                utterance.lang = this.lang;
                
                utterance.onend = () => {
                    this.currentIndex++;
                    this.speakNext();
                };
                
                utterance.onerror = (event) => {
                    console.error('TTS Error:', event);
                    this.onError('Speech synthesis error');
                    this.currentIndex++;
                    this.speakNext();
                };
                
                this.synth.speak(utterance);
            }
            
            pause() {
                if (!this.isPlaying || this.isPaused) return;
                
                this.synth.pause();
                this.isPaused = true;
            }
            
            resume() {
                if (!this.isPlaying || !this.isPaused) return;
                
                this.synth.resume();
                this.isPaused = false;
            }
            
            stop() {
                this.synth.cancel();
                this.isPlaying = false;
                this.isPaused = false;
                this.isStopped = true;
                this.currentIndex = 0;
                this.queue = [];
            }
            
            toggle() {
                if (!this.isPlaying) return;
                
                if (this.isPaused) {
                    this.resume();
                } else {
                    this.pause();
                }
            }
            
            formatTime(progress) {
                const minutes = Math.floor(progress / 60);
                const seconds = Math.floor(progress % 60);
                return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
        }

        // ==========================================
        // PROFESSIONAL BOOK LIBRARY
        // ==========================================
        const Library = {
            books: [],
            currentIndex: 0,
            
            // Initialize library
            init() {
                // Part 1: Foundation
                this.books.push({
                    id: 1,
                    title: "🏛️ 1. Mukammallik Kuchi: Kichik Odatlar San'ati",
                    content: `
                        <p>Hayotimizda yuz beradigan eng katta o'zgarishlar birdaniga bo'lmaydi. Katta yutuqlar har doim ko'zga ko'rinmas, doimiy ravishda takrorlanadigan kichik harakatlarning jamlanmasidir. "Atomic Habits" konsepsiyasi shuni uqtiradiki, inson o'z ustida har kuni atigi bir foiz (1%) yaxshilanishga erishsa, yil oxiriga kelib u 37 barobar kuchliroq, aqlliroq va tajribaliroq shaxsga aylanadi.</p>
                        <p>Aksariyat insonlar motivatsiyaga tayanib ish ko'radilar. Ammo motivatsiya bu vaqtinchalik hissiy holatdir. Haqiqiy va bardavom natijaga erishish uchun insonga motivatsiya emas, balki qat'iy intizom va to'g'ri ishlab chiqilgan tizim kerak. Maqsad belgilash g'oliblar va mag'lublar o'rtasidagi farqni belgilamaydi, chunki ikkalasining ham maqsadi g'alaba qozonishdir. Ularni farqlaydigan narsa – bu maqsad sari eltuvchi kundalik jarayonlar, ya'ni odatlardir.</p>
                        <p>Yangi odatni shakllantirish uchun psixologiyada maxsus zanjir mavjud: signal, istak, javob va mukofot. Yaxshi odatlarni shakllantirish uchun ularni ko'zga tashlanadigan, jozibador, bajarishga oson va qoniqarli qilish zarur. Salbiy odatlardan qutulish uchun esa buning aynan teskarisini qilish talab etiladi: ularni ko'zdan uzoqroq, zerikarli, murakkab va foydasiz qilib qo'yish kerak.</p>
                    `
                });
                
                this.books.push({
                    id: 2,
                    title: "🔒 2. Kiberxavfsizlik: Raqamli Qalqon",
                    content: `
                        <p>Zamonaviy raqamli dunyoda eng qimmatli resurs bu — neft yoki oltin emas, balki axborot va ma'lumotlardir. Kiberxavfsizlik butun boshli tarmoq arxitekturasini, serverlar va foydalanuvchilar o'rtasidagi maxfiy ma'lumotlar almashinuvini himoya qilishning murakkab va uzluksiz ilmiy tizimidir. Har bir soniyada dunyo bo'ylab millionlab zararli kodlar va xakerlik hujumlari tarmoqlarni sinovdan o'tkazmoqda.</p>
                        <p>Kiberhimoyaning asosi operatsion tizimlarning ichki tuzilishini chuqur tushunishdan boshlanadi. Tizimdagi ochiq portlar, zaif protokollar va kodlardagi kichik mantiqiy xatolar tajribali axloqiy xakerlar (ethical hackers) tomonidan doimiy ravishda penetratsion testlar (pentest) orqali tekshirilib boriladi. Ularning asosiy maqsadi – jinoyatchi xakerlardan (qora shlyapalar) oldin tizimdagi darchalarni topish va ularni yamashdir.</p>
                        <p>Ma'lumotlar bazasiga inyeksiya hujumlari (SQLi), saytlararo skriptlash (XSS) va ijtimoiy muhandislik kabi usullar bugungi kundagi eng keng tarqalgan tahdidlardan hisoblanadi. Ijtimoiy muhandislik texnologiyaga emas, to'g'ridan-to'g'ri inson psixologiyasiga hujum qiladi. Ya'ni, insonlarning ishonchuvchanligi, qo'rquvi yoki qiziqishlaridan foydalanib, tizim parollarini o'g'irlash usulidir.</p>
                    `
                });
                
                this.books.push({
                    id: 3,
                    title: "💰 3. Moliyaviy Savodxonlik",
                    content: `
                        <p>Boylikning haqiqiy o'lchovi bu sizning qancha ko'p pul topishingiz bilan emas, balki o'sha topilgan pulni qanday boshqarishingiz va uni kelajak uchun saqlab qola olishingiz bilan o'lchanadi. Moliyaviy erkinlik insonning ishlash uchun emas, yashash uchun pul topish tizimini yo'lga qo'ygan holatidir. Buning asosiy siri moliyaviy savodxonlik, ya'ni aktiv va passiv tushunchalarini to'g'ri farqlashda yashirin.</p>
                        <p>Kambag'al va o'rta sinf insonlari o'zlariga asosan "passivlar" sotib olishadi va buni boylik deb o'ylashadi. Masalan, kreditga olingan qimmatbaho avtomobil, eng so'nggi rusumdagi telefon yoki hashamatli uy sizning cho'ntagingizdan har oy pul olib chiqib ketadi. Haqiqiy boylar esa "aktivlar" yig'adilar. Aktivlar — bu o'z-o'zidan cho'ntagingizga pul keltiruvchi narsalar: biznes, qimmatli qog'ozlar, intellektual mulk yoki ijaraga beriladigan ko'chmas mulkdir.</p>
                        <p>Murakkab foiz (compound interest) atamasi iqtisodiyotdagi sakkizinchi mo'jiza hisoblanadi. Agar siz yoshlikdan boshlab muntazam ravishda kichik summalarni sarmoya qilib borsangiz, yillar o'tib bu sarmoya o'zining foizlari hisobiga eksponensial tarzda o'sishni boshlaydi. Sarmoya kiritishda asosiysi — pulni vaqt bilan hamkorlikda ishlashiga imkon berishdir.</p>
                    `
                });
                
                this.books.push({
                    id: 4,
                    title: "🧠 4. Chuqur Diqqat: Fokus",
                    content: `
                        <p>Hozirgi axborot texnologiyalari asrida chalg'ituvchi omillar shu qadar ko'pki, bitta vazifaga to'liq diqqatni jamlab ishlash noyob va o'ta qimmatbaho qobiliyatga aylanib bormoqda. Kardiologik operatsiya qilayotgan shifokor yoki murakkab tizim kodini yozayotgan dasturchi uchun diqqat – ularning eng asosiy qurolidir. "Chuqur ish" (Deep Work) tushunchasi insonning o'z aqliy sig'imini maksimal darajada ishlatib, hech qanday chalg'ishlarsiz murakkab qadriyat yaratish holatini anglatadi.</p>
                        <p>Aksariyat odamlar kunini elektron pochtalarga javob berish, ijtimoiy tarmoqlardagi tasmasini varaqlash va qisqa videolarni ko'rish bilan, ya'ni "yuzaki ishlar" (shallow work) bilan o'tkazadilar. Yuzaki ishlar odamga faqat bandlik hissini beradi, ammo iqtisodiy va shaxsiy jihatdan hech qanday katta qiymat yaratmaydi. Chuqur diqqat holatiga kirish uchun iroda kuchining o'zi yetarli emas, buning uchun raqamli gigiyena va maishiy tartibni o'rnatish lozim.</p>
                    `
                });
                
                this.books.push({
                    id: 5,
                    title: "🌌 5. Kosmik Olam: Koinot Sirlari",
                    content: `
                        <p>Koinot shu qadar ulkan va sirli ki, inson aqli uning o'lchamlarini to'liq tasavvur qilishga ojizdir. Biz tungi osmonga boqib ko'radigan yulduzlarning nuri bizgacha yetib kelishi uchun yillar, hatto millionlab yillar kerak bo'ladi. Bu degani, biz har safar yulduzlarga qaraganimizda aslida o'tmishni, ularning ming yillar oldingi holatini ko'rayotgan bo'lamiz. Koinot tinimsiz kengaymoqda va bu jarayon galaktikalar orasidagi masofani tobora uzoqlashtirmoqda.</p>
                        <p>Koinotdagi eng qiziqarli va haligacha to'liq o'rganilmagan obyektlardan biri bu — qora tuynuklardir (Black holes). Ular yulduzlar o'z hayotini yakunlab, ulkan portlashdan (o'ta yangi yulduz portlashi) so'ng o'z ichiga qulab tushishi natijasida hosil bo'ladi. Qora tuynukning tortishish kuchi shu qadar kuchliki, undan hatto eng tezkor narsa — yorug'lik ham qochib qutula olmaydi. Uning markaziga yaqinlashgan sari vaqt sekinlashadi, bu "vaqt diletatsiyasi" deb ataladi.</p>
                    `
                });
                
                this.books.push({
                    id: 6,
                    title: "🤖 6. Sun'iy Intellekt: Mashinali O'rganish",
                    content: `
                        <p>Sun'iy intellekt (AI) insoniyat tarixidagi eng ulug'vor kashfiyotlardan biriga aylanib ulgurdi. Bir necha o'n yillar oldin u faqatgina fantastika hisoblangan bo'lsa, bugun u kundalik hayotimizning ajralmas mexanizmi. Mashinali o'rganish (Machine Learning) va neyrotarmoqlar kompyuterlarga biz yozib bergan qat'iy qoidalarsiz ham ma'lumotlarni tahlil qilish va qaror qabul qilish imkonini bermoqda. Bu algoritmik inqilob iqtisodiyotdan tortib tibbiyotgacha bo'lgan barcha sohalarni o'zgartirmoqda.</p>
                        <p>Neyrotarmoqlar inson miyasidagi milliardlab neyronlarning ishlash prinsipiga asoslanadi. Dasturga millionlab tasvirlar, matnlar yoki ovozlar kiritilganda, u o'z-o'zidan qonuniyatlarni qidirib topadi. "Chuqur o'rganish" (Deep Learning) texnologiyasi orqali AI tizimlari xatolardan saboq chiqarishga va o'zining bashorat qilish qobiliyatini doimiy ravishda takomillashtirishga qodir. Bugun AI xuddi inson kabi rasm chizishi, murakkab matnlar yozishi va hatto dastur kodlarini optimallashtirishi mumkin.</p>
                    `
                });
                
                return this.books;
            },
            
            getBook(index) {
                return this.books[index];
            },
            
            getCurrentBook() {
                return this.books[this.currentIndex];
            },
            
            nextBook() {
                if (this.currentIndex < this.books.length - 1) {
                    this.currentIndex++;
                    return this.getCurrentBook();
                }
                return null;
            },
            
            prevBook() {
                if (this.currentIndex > 0) {
                    this.currentIndex--;
                    return this.getCurrentBook();
                }
                return null;
            }
        };

        // ==========================================
        // APPLICATION CONTROLLER
        // ==========================================
        class AppController {
            constructor() {
                this.tts = null;
                this.library = Library;
                this.userName = '';
                this.currentFontSize = 18;
                this.exitClicks = 0;
                
                // DOM Elements
                this.elements = {
                    welcome: document.getElementById('welcomeScreen'),
                    userNameInput: document.getElementById('userNameInput'),
                    startBtn: document.getElementById('startBtn'),
                    userAvatar: document.getElementById('userAvatar'),
                    displayUserName: document.getElementById('displayUserName'),
                    bookTitle: document.getElementById('bookTitle'),
                    bookContent: document.getElementById('bookContent'),
                    mainContent: document.getElementById('mainContent'),
                    ttsPlay: document.getElementById('ttsPlay'),
                    ttsStop: document.getElementById('ttsStop'),
                    ttsSpeed: document.getElementById('ttsSpeed'),
                    ttsVoice: document.getElementById('ttsVoice'),
                    ttsProgressBar: document.getElementById('ttsProgressBar'),
                    ttsTime: document.getElementById('ttsTime'),
                    nextOverlay: document.getElementById('nextOverlay'),
                    nextBookName: document.getElementById('nextBookName'),
                    nextBtn: document.getElementById('nextBtn'),
                    menuModal: document.getElementById('menuModal'),
                    bookList: document.getElementById('bookList'),
                    closeMenu: document.getElementById('closeMenu'),
                    openMenu: document.getElementById('openMenu'),
                    fontMinus: document.getElementById('fontMinus'),
                    fontPlus: document.getElementById('fontPlus'),
                    toast: document.getElementById('toast')
                };
                
                this.init();
            }
            
            init() {
                // Initialize library
                this.library.init();
                
                // Initialize TTS
                this.tts = new NeuralTTS({
                    rate: 1.0,
                    onStart: () => {
                        this.elements.ttsPlay.innerHTML = '⏸';
                        this.showToast('🔊 O\'qish boshlandi', 'success');
                    },
                    onParagraph: (index, paragraph) => {
                        // Remove active class from all paragraphs
                        document.querySelectorAll('#bookContent p').forEach(p => {
                            p.classList.remove('active-paragraph');
                        });
                        
                        // Add active class to current paragraph
                        if (paragraph && paragraph.element) {
                            paragraph.element.classList.add('active-paragraph');
                            paragraph.element.scrollIntoView({
                                behavior: 'smooth',
                                block: 'center'
                            });
                        }
                    },
                    onEnd: () => {
                        this.elements.ttsPlay.innerHTML = '▶';
                        this.elements.ttsProgressBar.style.width = '0%';
                        this.elements.ttsTime.innerHTML = '00:00';
                        
                        // Remove highlights
                        document.querySelectorAll('#bookContent p').forEach(p => {
                            p.classList.remove('active-paragraph');
                        });
                        
                        this.showToast('✅ Kitob tugadi', 'success');
                        
                        // Show next book suggestion
                        if (this.library.currentIndex < this.library.books.length - 1) {
                            const nextBook = this.library.books[this.library.currentIndex + 1];
                            this.elements.nextBookName.innerText = nextBook.title;
                            this.elements.nextOverlay.classList.add('show');
                            
                            setTimeout(() => {
                                this.elements.nextOverlay.classList.remove('show');
                            }, 5000);
                        }
                    },
                    onProgress: (progress, current, total) => {
                        this.elements.ttsProgressBar.style.width = `${progress}%`;
                        
                        // Estimate time (rough calculation)
                        const totalWords = this.tts.queue.reduce((sum, p) => sum + p.words, 0);
                        const wordsPerMinute = 150 * this.tts.rate;
                        const totalMinutes = totalWords / wordsPerMinute;
                        const currentWords = this.tts.queue.slice(0, current).reduce((sum, p) => sum + p.words, 0);
                        const currentMinutes = (currentWords / wordsPerMinute);
                        
                        this.elements.ttsTime.innerHTML = this.tts.formatTime(currentMinutes);
                    },
                    onError: (error) => {
                        this.showToast(error, 'error');
                    }
                });
                
                // Setup event listeners
                this.setupEventListeners();
                
                // Populate voices after load
                setTimeout(() => this.populateVoices(), 1000);
            }
            
            setupEventListeners() {
                // Welcome screen
                this.elements.startBtn.addEventListener('click', () => this.startApp());
                this.elements.userNameInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.startApp();
                });
                
                // Font controls
                this.elements.fontPlus.addEventListener('click', () => {
                    if (this.currentFontSize < 34) {
                        this.currentFontSize += 2;
                        document.documentElement.style.setProperty('--font-size', `${this.currentFontSize}px`);
                    }
                });
                
                this.elements.fontMinus.addEventListener('click', () => {
                    if (this.currentFontSize > 14) {
                        this.currentFontSize -= 2;
                        document.documentElement.style.setProperty('--font-size', `${this.currentFontSize}px`);
                    }
                });
                
                // Menu
                this.elements.openMenu.addEventListener('click', () => {
                    this.elements.menuModal.classList.add('active');
                });
                
                this.elements.closeMenu.addEventListener('click', () => {
                    this.elements.menuModal.classList.remove('active');
                });
                
                // TTS Controls
                this.elements.ttsPlay.addEventListener('click', () => this.togglePlay());
                this.elements.ttsStop.addEventListener('click', () => this.stopPlayback());
                
                this.elements.ttsSpeed.addEventListener('change', (e) => {
                    this.tts.setRate(parseFloat(e.target.value));
                });
                
                this.elements.ttsVoice.addEventListener('change', (e) => {
                    this.tts.setVoice(e.target.value);
                });
                
                // Next book
                this.elements.nextBtn.addEventListener('click', () => {
                    this.loadNextBook();
                });
                
                // Double tap for next book
                let lastTap = 0;
                this.elements.mainContent.addEventListener('click', (e) => {
                    const currentTime = new Date().getTime();
                    const tapLength = currentTime - lastTap;
                    
                    if (tapLength < 300 && tapLength > 0) {
                        if (this.library.currentIndex < this.library.books.length - 1) {
                            const nextBook = this.library.books[this.library.currentIndex + 1];
                            this.elements.nextBookName.innerText = nextBook.title;
                            this.elements.nextOverlay.classList.add('show');
                            
                            setTimeout(() => {
                                this.elements.nextOverlay.classList.remove('show');
                            }, 4000);
                        }
                    }
                    
                    lastTap = currentTime;
                });
                
                // Exit protection (6 taps)
                document.addEventListener('click', (e) => {
                    if (e.target.closest('button') || e.target.closest('select')) return;
                    
                    this.exitClicks++;
                    
                    if (this.exitClicks === 6) {
                        if (document.fullscreenElement) {
                            document.exitFullscreen();
                        }
                        this.exitClicks = 0;
                        this.showToast('👋 Xayr!', 'success');
                    } else if (this.exitClicks > 1) {
                        this.showToast(`Chiqish uchun ${6 - this.exitClicks} marta bosing`, 'info');
                    }
                    
                    setTimeout(() => {
                        this.exitClicks = 0;
                    }, 1000);
                });
                
                // Prevent context menu
                document.addEventListener('contextmenu', (e) => e.preventDefault());
            }
            
            startApp() {
                const name = this.elements.userNameInput.value.trim();
                if (name.length < 2) {
                    this.showToast('Ismingizni kiriting', 'error');
                    return;
                }
                
                this.userName = name;
                this.elements.displayUserName.innerText = `👤 ${name}`;
                this.elements.userAvatar.innerText = name.charAt(0).toUpperCase();
                
                // Request fullscreen
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch(() => {});
                }
                
                // Hide welcome screen
                this.elements.welcome.style.opacity = '0';
                this.elements.welcome.style.visibility = 'hidden';
                
                // Load first book
                this.loadBook(0);
                
                this.showToast(`Xush kelibsiz, ${name}!`, 'success');
            }
            
            loadBook(index) {
                if (index < 0 || index >= this.library.books.length) return;
                
                this.library.currentIndex = index;
                const book = this.library.getCurrentBook();
                
                this.elements.bookTitle.innerText = book.title;
                this.elements.bookContent.innerHTML = book.content;
                
                // Update book list active state
                document.querySelectorAll('.book-item').forEach((item, i) => {
                    if (i === index) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });
                
                // Stop any ongoing playback
                this.tts.stop();
                this.elements.ttsPlay.innerHTML = '▶';
                this.elements.ttsProgressBar.style.width = '0%';
                this.elements.ttsTime.innerHTML = '00:00';
                
                // Scroll to top
                this.elements.mainContent.scrollTop = 0;
            }
            
            loadNextBook() {
                if (this.library.currentIndex < this.library.books.length - 1) {
                    this.loadBook(this.library.currentIndex + 1);
                    this.elements.nextOverlay.classList.remove('show');
                }
            }
            
            togglePlay() {
                const paragraphs = this.tts.extractParagraphs(this.elements.bookContent);
                
                if (paragraphs.length === 0) {
                    this.showToast('O\'qish uchun matn topilmadi', 'error');
                    return;
                }
                
                if (this.tts.isPlaying && this.tts.isPaused) {
                    this.tts.resume();
                    this.elements.ttsPlay.innerHTML = '⏸';
                } else if (this.tts.isPlaying) {
                    this.tts.pause();
                    this.elements.ttsPlay.innerHTML = '▶';
                } else {
                    this.tts.speak(paragraphs);
                }
            }
            
            stopPlayback() {
                this.tts.stop();
                this.elements.ttsPlay.innerHTML = '▶';
                this.elements.ttsProgressBar.style.width = '0%';
                this.elements.ttsTime.innerHTML = '00:00';
                
                // Remove highlights
                document.querySelectorAll('#bookContent p').forEach(p => {
                    p.classList.remove('active-paragraph');
                });
            }
            
            populateVoices() {
                const voices = this.tts.getVoices();
                const voiceSelect = this.elements.ttsVoice;
                
                voiceSelect.innerHTML = '';
                
                // Group voices by language
                const groupedVoices = {};
                voices.forEach(voice => {
                    const lang = voice.lang.split('-')[0];
                    if (!groupedVoices[lang]) groupedVoices[lang] = [];
                    groupedVoices[lang].push(voice);
                });
                
                // Add optgroups
                for (const lang in groupedVoices) {
                    const group = document.createElement('optgroup');
                    group.label = lang === 'en' ? '🇬🇧 English' : 
                                 lang === 'uz' ? '🇺🇿 Uzbek' : 
                                 lang === 'ru' ? '🇷🇺 Russian' : lang;
                    
                    groupedVoices[lang].forEach(voice => {
                        const option = document.createElement('option');
                        option.value = voice.voiceURI;
                        option.textContent = `${voice.name} (${voice.lang})`;
                        
                        if (voice === this.tts.currentVoice) {
                            option.selected = true;
                        }
                        
                        group.appendChild(option);
                    });
                    
                    voiceSelect.appendChild(group);
                }
            }
            
            showToast(message, type = 'info') {
                this.elements.toast.innerText = message;
                this.elements.toast.className = `toast ${type}`;
                this.elements.toast.classList.add('show');
                
                setTimeout(() => {
                    this.elements.toast.classList.remove('show');
                }, 3000);
            }
            
            renderBookList() {
                this.elements.bookList.innerHTML = '';
                
                this.library.books.forEach((book, index) => {
                    const item = document.createElement('div');
                    item.className = 'book-item';
                    if (index === this.library.currentIndex) {
                        item.classList.add('active');
                    }
                    item.innerText = book.title;
                    
                    item.addEventListener('click', () => {
                        this.loadBook(index);
                        this.elements.menuModal.classList.remove('active');
                    });
                    
                    this.elements.bookList.appendChild(item);
                });
            }
        }

        // ==========================================
        // START APPLICATION
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            window.app = new AppController();
            
            // Render book list after app init
            setTimeout(() => {
                app.renderBookList();
            }, 100);
        });
    </script>
