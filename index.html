    <title>XOLERIC · SILVER PREMIUM</title>
    <style>
        /* ===== RESET & VARIABLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            /* Qora fon */
            --bg-deep: #050505;
            --bg-darker: #000000;
            --bg-card: #0a0a0a;
            
            /* Kumush ranglar */
            --silver-100: #ffffff;
            --silver-200: #e0e0e0;
            --silver-300: #c0c0c0;
            --silver-400: #a0a0a0;
            --silver-500: #808080;
            --silver-600: #606060;
            
            /* Kumush glow */
            --silver-glow: 0 0 30px rgba(192, 192, 192, 0.2);
            --silver-glow-hover: 0 0 40px rgba(192, 192, 192, 0.4);
            
            /* Qora glass */
            --glass-bg: rgba(10, 10, 10, 0.8);
            --glass-border: rgba(192, 192, 192, 0.15);
            --glass-border-hover: rgba(192, 192, 192, 0.4);
            
            /* Font */
            --font-size: 18px;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            
            /* Transitions */
            --transition-smooth: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --transition-hover: all 0.3s ease;
        }

        /* ===== GLOBAL STYLES ===== */
        body {
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 50% 50%, #0a0a0a 0%, #000000 100%);
            color: var(--silver-300);
            font-family: var(--font-family);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            width: 100%;
            user-select: none;
        }

        /* ===== SILVER ANIMATIONS ===== */
        .silver-text-animated {
            background: linear-gradient(120deg,
                #a0a0a0 0%,
                #ffffff 20%,
                #a0a0a0 40%,
                #e0e0e0 60%,
                #c0c0c0 80%,
                #ffffff 100%
            );
            background-size: 300% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(192, 192, 192, 0.2);
            animation: silverShine 4s linear infinite;
            letter-spacing: 2px;
        }

        @keyframes silverShine {
            0% { background-position: 0% center; }
            100% { background-position: 300% center; }
        }

        .silver-text {
            background: linear-gradient(135deg, 
                var(--silver-400) 0%,
                var(--silver-200) 50%,
                var(--silver-300) 100%
            );
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
        }

        /* ===== SILVER CARD ===== */
        .silver-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            transition: var(--transition-hover);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        .silver-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(192, 192, 192, 0.05), 
                transparent
            );
            transition: left 0.8s ease;
        }

        .silver-card:hover::before {
            left: 100%;
        }

        .silver-card:hover {
            border-color: var(--silver-300);
            box-shadow: var(--silver-glow-hover);
            transform: translateY(-4px);
        }

        .silver-card:active {
            transform: translateY(-2px) scale(0.98);
        }

        /* ===== SILVER BUTTON ===== */
        .silver-btn {
            background: linear-gradient(135deg, 
                var(--silver-500) 0%,
                var(--silver-300) 50%,
                var(--silver-200) 100%
            );
            border: none;
            border-radius: 60px;
            padding: 16px 24px;
            color: #000000;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(192, 192, 192, 0.1);
        }

        .silver-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent,
                rgba(255, 255, 255, 0.6),
                transparent
            );
            transition: left 0.5s ease;
        }

        .silver-btn:hover::before {
            left: 100%;
        }

        .silver-btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 30px var(--silver-glow);
        }

        /* ===== SCREENS ===== */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s;
            will-change: transform, opacity;
        }

        #splashScreen {
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000000;
            opacity: 1;
            transition: opacity 0.8s;
        }

        #splashScreen.hide {
            opacity: 0;
            pointer-events: none;
        }

        #welcomeScreen {
            z-index: 9000;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000000;
            transition: opacity 0.6s, visibility 0.6s;
        }

        #welcomeScreen.hide {
            opacity: 0;
            visibility: hidden;
        }

        #mainScreen {
            transform: translateX(0);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            background: var(--bg-deep);
        }

        #mainScreen.hide {
            transform: translateX(-100%);
        }

        #readerScreen {
            transform: translateX(100%);
            z-index: 2000;
            background: #000000;
        }

        #readerScreen.show {
            transform: translateX(0);
        }

        /* ===== SPLASH SCREEN ===== */
        .splash-content {
            text-align: center;
            animation: silverPulse 2s ease-in-out infinite;
        }

        @keyframes silverPulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .splash-title {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 10px;
            margin-bottom: 20px;
        }

        .splash-sub {
            color: var(--silver-600);
            font-size: 0.9rem;
            letter-spacing: 6px;
        }

        /* ===== WELCOME SCREEN ===== */
        .welcome-container {
            width: 90%;
            max-width: 440px;
            animation: silverFloat 1s;
        }

        @keyframes silverFloat {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .welcome-box {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 48px;
            padding: 48px 32px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9);
        }

        .welcome-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(192, 192, 192, 0.3));
        }

        .welcome-title {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .welcome-sub {
            color: var(--silver-600);
            font-size: 0.9rem;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .input-silver {
            width: 100%;
            padding: 18px 24px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            color: var(--silver-200);
            font-size: 1rem;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
            transition: var(--transition-hover);
        }

        .input-silver:focus {
            border-color: var(--silver-300);
            box-shadow: 0 0 0 4px rgba(192, 192, 192, 0.1);
        }

        /* ===== MAIN SCREEN ===== */
        .main-header {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 4px;
        }

        .user-badge {
            background: rgba(192, 192, 192, 0.03);
            border: 1px solid var(--glass-border);
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--silver-300);
            transition: var(--transition-hover);
        }

        .user-badge:active {
            border-color: var(--silver-300);
            background: rgba(192, 192, 192, 0.05);
        }

        /* ===== SEARCH ===== */
        .search-section {
            padding: 16px 24px 8px;
        }

        .search-container {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 16px 24px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            color: var(--silver-200);
            font-size: 1rem;
            outline: none;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: var(--transition-hover);
        }

        .search-input:focus {
            border-color: var(--silver-300);
            box-shadow: 0 0 0 4px rgba(192, 192, 192, 0.1);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--silver-600);
            font-size: 1.2rem;
        }

        /* ===== CATEGORIES ===== */
        .categories-section {
            padding: 16px 24px;
        }

        .categories-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 4px;
        }

        .categories-scroll::-webkit-scrollbar {
            display: none;
        }

        .category-chip {
            padding: 10px 24px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--silver-400);
            white-space: nowrap;
            cursor: pointer;
            transition: var(--transition-hover);
        }

        .category-chip.active {
            background: linear-gradient(135deg, var(--silver-500), var(--silver-300));
            border-color: var(--silver-200);
            color: #000000;
            font-weight: 800;
            box-shadow: 0 0 20px rgba(192, 192, 192, 0.3);
        }

        .category-chip:active {
            transform: scale(0.94);
        }

        /* ===== BOOKS GRID ===== */
        .books-section {
            flex: 1;
            overflow-y: auto;
            padding: 8px 24px 100px;
            scrollbar-width: none;
        }

        .books-section::-webkit-scrollbar {
            display: none;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .book-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 28px 24px;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
            overflow: hidden;
        }

        .book-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 0%, 
                rgba(192, 192, 192, 0.1), 
                transparent 70%
            );
            opacity: 0;
            transition: opacity 0.4s;
        }

        .book-card:hover::after {
            opacity: 1;
        }

        .book-card.last-read {
            border-color: var(--silver-300);
            box-shadow: var(--silver-glow);
        }

        .book-card:active {
            transform: scale(0.97);
            border-color: var(--silver-200);
        }

        .book-number {
            font-size: 11px;
            font-weight: 800;
            color: var(--silver-500);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .book-number.last {
            color: var(--silver-300);
        }

        .book-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--silver-200);
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .book-badge {
            background: linear-gradient(135deg, var(--silver-500), var(--silver-300));
            padding: 12px 20px;
            border-radius: 60px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            color: #000000;
            text-align: center;
            margin-top: auto;
            transition: var(--transition-hover);
        }

        .book-badge:active {
            transform: scale(0.95);
        }

        /* ===== READER SCREEN ===== */
        .reader-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 2100;
        }

        .reader-back {
            width: 48px;
            height: 48px;
            border-radius: 48px;
            background: rgba(192, 192, 192, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--silver-300);
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition-hover);
        }

        .reader-back:active {
            background: rgba(192, 192, 192, 0.1);
            border-color: var(--silver-300);
            transform: scale(0.92);
        }

        .reader-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--silver-400);
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .reader-controls {
            display: flex;
            gap: 8px;
        }

        .reader-btn {
            width: 48px;
            height: 48px;
            border-radius: 48px;
            background: rgba(192, 192, 192, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--silver-300);
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition-hover);
        }

        .reader-btn:active {
            background: rgba(192, 192, 192, 0.1);
            border-color: var(--silver-300);
            transform: scale(0.92);
        }

        /* ===== FONT PANEL ===== */
        .font-panel {
            position: fixed;
            top: 90px;
            right: 24px;
            width: 280px;
            background: #0a0a0a;
            border: 1px solid var(--glass-border);
            border-radius: 48px;
            padding: 28px;
            z-index: 2500;
            transform: translateY(-20px);
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-smooth);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9);
        }

        .font-panel.show {
            transform: translateY(0);
            opacity: 1;
            visibility: visible;
        }

        .font-value {
            color: var(--silver-300);
            font-size: 3rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(192, 192, 192, 0.3);
        }

        .font-slider {
            width: 100%;
            height: 60px;
            -webkit-appearance: none;
            background: transparent;
        }

        .font-slider::-webkit-slider-runnable-track {
            width: 100%;
            height: 60px;
            background: 
                repeating-linear-gradient(90deg, 
                    #333 0px, #333 2px, 
                    transparent 2px, transparent 15px
                ),
                repeating-linear-gradient(90deg, 
                    #555 0px, #555 1px, 
                    transparent 1px, transparent 7px
                );
            background-position: center;
            background-repeat: repeat-x;
            background-size: 100% 40px, 100% 20px;
            border-bottom: 1px solid #444;
        }

        .font-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 8px;
            height: 60px;
            background: var(--silver-300);
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 30px var(--silver-300);
        }

        /* ===== READER CONTENT ===== */
        .reader-content {
            position: fixed;
            top: 80px;
            bottom: 120px;
            left: 0;
            right: 0;
            overflow-y: auto;
            padding: 24px 24px 40px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }

        .reader-content::-webkit-scrollbar {
            display: none;
        }

        #readTitle {
            font-size: 2.2rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 48px;
            padding: 0 20px;
            line-height: 1.4;
        }

        #readContent {
            font-size: var(--font-size);
            line-height: 2;
            color: var(--silver-200);
        }

        #readContent p {
            margin-bottom: 32px;
            padding: 20px 28px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.01);
            border-left: 3px solid transparent;
            transition: all 0.5s ease;
            cursor: pointer;
        }

        #readContent p.active {
            background: rgba(192, 192, 192, 0.02);
            border-left: 3px solid var(--silver-300);
            box-shadow: -5px 0 30px rgba(192, 192, 192, 0.1);
            color: var(--silver-100);
            transform: translateX(5px);
        }

        /* ===== AUDIO PLAYER ===== */
        .audio-player {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 520px;
            background: #0a0a0a;
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.9), 0 0 30px rgba(192, 192, 192, 0.1);
            z-index: 2200;
        }

        .audio-progress-text {
            color: var(--silver-300);
            font-weight: 800;
            font-size: 0.9rem;
            min-width: 45px;
            text-align: center;
        }

        .audio-progress-track {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        .audio-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, 
                var(--silver-400), 
                var(--silver-200), 
                var(--silver-300)
            );
            width: 0%;
            border-radius: 8px;
            box-shadow: 0 0 20px var(--silver-300);
            transition: width 0.2s;
        }

        .audio-play-btn {
            width: 56px;
            height: 56px;
            border-radius: 56px;
            background: linear-gradient(135deg, 
                var(--silver-500), 
                var(--silver-300), 
                var(--silver-200)
            );
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition-smooth);
            flex-shrink: 0;
            box-shadow: 0 0 30px rgba(192, 192, 192, 0.3);
        }

        .audio-play-btn:active {
            transform: scale(0.9);
        }

        .audio-play-btn svg {
            width: 24px;
            height: 24px;
            fill: #000000;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #0a0a0a;
            border: 1px solid var(--silver-300);
            border-radius: 60px;
            padding: 14px 28px;
            color: var(--silver-200);
            font-weight: 700;
            font-size: 0.9rem;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s;
            white-space: nowrap;
            box-shadow: 0 0 30px rgba(192, 192, 192, 0.2);
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== UTILITIES ===== */
        .hide {
            display: none !important;
        }

        /* ===== HAPTIC FEEDBACK (mocked) ===== */
        .vibrate {
            animation: vibrate 0.1s;
        }

        @keyframes vibrate {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
        }
    </style>
</head>
