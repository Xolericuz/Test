<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>XOLƎRIƆ</title>

    <style>
        /* --- DYNAMIC STYLES VA RANG ANIMATSIYASI --- */
        :root {
            --bg-color: #030305;
            --glass-bg: rgba(10, 10, 15, 0.35);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #ff003c; 
            --text: #ffffff;
            --text-muted: #888899;
        }

        @keyframes themeShift {
            0%   { --accent: #ff003c; } /* Qizil */
            25%  { --accent: #c0c0c0; } /* Kumush */
            50%  { --accent: #00f0ff; } /* Moviy */
            75%  { --accent: #8a2be2; } /* Binafsha */
            100% { --accent: #ff003c; }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
            animation: themeShift 20s infinite alternate linear;
            background-color: var(--bg-color);
        }

        /* --- 1-QATLAM: ORQA FON RASMI --- */
        #bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.ibb.co/JjJ2mjS4/1775193815209-edit-90965910067883.png'); 
            background-size: cover;
            background-position: center;
            z-index: 1; 
            opacity: 0.4; /* Qorong'i va sirli muhit uchun xiralashtirildi */
            filter: contrast(1.2) brightness(0.7);
        }

        /* --- 2-QATLAM: 3D KANVAS (MICRO KUBLAR) --- */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2; 
            pointer-events: none; 
        }

        /* --- 3-QATLAM: UI ELEMENTLAR --- */
        nav, .hero, .parallax-section, .socials, .chat-btn, .chat-window {
            position: relative;
            z-index: 10; 
        }

        /* --- LOADER --- */
        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #020203;
            z-index: 9999;
            transition: opacity 0.8s ease-out;
        }
        .loader-text {
            color: var(--accent);
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 12px;
            margin-bottom: 25px;
            text-shadow: 0 0 30px var(--accent);
            animation: pulse 1.3s infinite, themeShift 20s infinite alternate linear;
            font-family: monospace;
        }
        .loader-bar {
            width: 350px;
            height: 2px;
            background: rgba(255,255,255,0.05);
            overflow: hidden;
            border-radius: 2px;
        }
        .loader-progress {
            width: 0%;
            height: 100%;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            transition: width 0.3s ease;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }

        /* --- NAVIGATSIYA --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 25px 50px;
            display: flex;
            justify-content: center;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-size: 30px;
            font-weight: 900;
            letter-spacing: 8px;
            color: #fff;
            text-shadow: 0 0 20px var(--accent);
            transition: all 0.5s ease;
        }

        /* --- HERO QISMI --- */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 6rem;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 1.5px var(--accent);
            text-shadow: 0 0 40px rgba(0,0,0,0.9);
            margin-bottom: 15px;
            letter-spacing: 10px;
        }

        .hero p {
            font-size: 1.5rem;
            color: var(--text-muted);
            max-width: 600px;
            font-weight: 300;
            letter-spacing: 3px;
        }

        /* --- SCROLL SECTION --- */
        .parallax-section {
            height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .parallax-content {
            text-align: center;
            padding: 60px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            max-width: 800px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
            opacity: 0;
            transform: scale(0.9);
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .parallax-section.visible .parallax-content {
            opacity: 1;
            transform: scale(1);
        }

        .parallax-content h2 {
            font-size: 4.5rem;
            color: var(--accent);
            text-shadow: 0 0 35px var(--accent);
            margin-bottom: 25px;
        }

        .parallax-content p {
            font-size: 1.4rem;
            line-height: 1.9;
            color: #d0d0d0;
            font-weight: 300;
        }

        /* --- IJTIMOIY TARMOQLAR --- */
        .socials {
            padding: 150px 20px;
            text-align: center;
        }

        .socials h2 {
            font-size: 2.5rem;
            margin-bottom: 60px;
            letter-spacing: 5px;
            font-weight: 800;
            color: #fff;
        }

        .social-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
        }

        .social-links a {
            text-decoration: none;
            color: var(--text);
            font-size: 1.1rem;
            padding: 20px 50px;
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            background: rgba(10, 10, 15, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.4s ease;
            letter-spacing: 2px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .social-links a:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.02);
            transform: translateY(-5px);
        }

        /* --- CHAT VIDJETI --- */
        .chat-btn {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 65px;
            height: 65px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 25px rgba(0,0,0,0.8);
            transition: all 0.4s ease;
        }

        .chat-btn:hover { 
            background: var(--accent);
            color: #000;
            transform: scale(1.05); 
            box-shadow: 0 0 40px var(--accent);
        }

        .chat-window {
            position: fixed;
            bottom: 130px;
            right: 40px;
            width: 400px;
            height: 550px;
            background: rgba(5, 5, 8, 0.65);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            opacity: 0;
            pointer-events: none;
            transform: translateY(40px) scale(0.95);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.95);
        }

        .chat-window.active {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0) scale(1);
        }

        .chat-header {
            padding: 25px;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            font-weight: 800;
            letter-spacing: 3px;
        }

        .chat-header span { cursor: pointer; color: var(--text-muted); font-size: 20px; transition: 0.3s; }
        .chat-header span:hover { color: var(--accent); transform: rotate(90deg); }

        .chat-body { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        
        /* Maxsus Scrollbar */
        .chat-body::-webkit-scrollbar { width: 5px; }
        .chat-body::-webkit-scrollbar-track { background: transparent; }
        .chat-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 5px; }
        .chat-body::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .msg { padding: 15px 20px; border-radius: 18px; max-width: 85%; font-size: 0.95rem; line-height: 1.5; word-wrap: break-word; }
        .msg.user { background: rgba(255,255,255,0.05); color: #fff; align-self: flex-end; border: 1px solid var(--glass-border); border-bottom-right-radius: 4px; }
        .msg.bot { background: rgba(0,0,0,0.5); color: #d0d0d0; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--glass-border); box-shadow: inset 2px 0 0 var(--accent); }
        
        .chat-input { display: flex; padding: 20px; background: rgba(0, 0, 0, 0.5); border-top: 1px solid var(--glass-border); }
        .chat-input input { flex: 1; padding: 15px 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.4); color: #fff; font-size: 1rem; outline: none; transition: 0.3s; }
        .chat-input input:focus { border-color: rgba(255,255,255,0.2); background: rgba(0,0,0,0.6); }
        .chat-input button { background: none; border: none; color: var(--accent); font-size: 24px; padding-left: 20px; cursor: pointer; transition: 0.3s; }
        .chat-input button:hover { transform: translateX(5px); }

        @media (max-width: 768px) {
            .hero h1 { font-size: 3.5rem; }
            .parallax-content h2 { font-size: 3rem; }
            .chat-window { width: calc(100% - 40px); right: 20px; bottom: 120px; height: 70vh; }
        }
    </style>

        <div class="loader-text">XOLƎRIƆ CORE</div>
        <div class="loader-bar"><div class="loader-progress" id="progress-bar"></div></div>
    </div>

    <nav>
        <div class="logo">XOLƎRIƆ</div>

    <section class="hero">
        <h1>XOLƎRIƆ</h1>

    <section class="parallax-section" id="scrollArea">

    <div class="chat-btn" onclick="toggleChat()">💬</div>
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">TERMINAL <span onclick="toggleChat()">✕</span></div>
        <div class="chat-body" id="chat">
            <div class="msg bot">Tizimga xush kelibsiz. Qanday yordam bera olaman?</div>

        <div class="chat-input">

    <script>
        const scrollArea = document.getElementById('scrollArea');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                } else {
                    entry.target.classList.remove('visible'); 
                }
            });
        }, { threshold: 0.3 }); 
        observer.observe(scrollArea);

        function toggleChat(){ document.getElementById('chatWindow').classList.toggle('active'); }

        const GEMINI_API_KEY = "AIzaSyDNZQgoXro59hHLe4uGKuEqrtl-Yat3eQY"; 
        const localDB = {
            "salom": "Assalomu alaykum! XOLƎRIƆ OS ga xush kelibsiz.",
            "qalay": "Rahmat, men sun'iy intellektman, ishlashga doim tayyorman!",
            "xoleric": "Xoleric - bu ushbu tizim muallifi va zamonaviy dasturchi.",
            "loyiha": "Bu XOLƎRIƆ loyihasi bo'lib, o'zida zamonaviy dizayn va kiber uslubni jamlagan."
        };

        async function send(){
            let input = document.getElementById('input');
            let text = input.value.trim();
            let lowerText = text.toLowerCase();
            if(text === "") return;

            appendMessage(text, 'user');
            input.value = "";

            let foundInDB = false;
            for (let key in localDB) {
                if (lowerText.includes(key)) {
                    setTimeout(() => appendMessage(localDB[key], 'bot'), 600);
                    foundInDB = true; break;
                }
            }

            if (!foundInDB) {
                const loadingId = "load-" + Date.now();
                setTimeout(() => appendMessage("Tarmoqqa ulanmoqda...", 'bot', loadingId), 400);

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                    });
                    const data = await response.json();
                    
                    if(data.error) {
                        document.getElementById(loadingId).remove();
                        appendMessage("API Xatosi: " + data.error.message, 'bot');
                        return;
                    }

                    const botReply = data.candidates[0].content.parts[0].text;
                    document.getElementById(loadingId).remove();
                    appendMessage(botReply, 'bot');

                } catch (error) {
                    if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
                    appendMessage("Xatolik. Ulanishni tekshiring.", 'bot');
                }
            }
        }

        function appendMessage(text, sender, id = null) {
            const chat = document.getElementById('chat');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${sender}`;
            if (id) msgDiv.id = id;
            msgDiv.innerText = text; 
            chat.appendChild(msgDiv);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        class MicroCores {
            constructor(){
                this.container = document.getElementById('canvas-container');
                this.width = window.innerWidth;
                this.height = window.innerHeight;
                this.time = 0;
                
                this.colorPalette = [
                    new THREE.Color('#ff003c'), 
                    new THREE.Color('#c0c0c0'), 
                    new THREE.Color('#00f0ff'), 
                    new THREE.Color('#8a2be2')
                ];
                this.currentColor = new THREE.Color('#ff003c');
                this.targetColor = new THREE.Color('#c0c0c0');
                this.colorIndex = 0;
                this.colorLerpFactor = 0;

                this.scrollY = window.scrollY;
                this.cubesData = []; 

                this.initScene();
                this.createMicroCores();
                this.addListeners();
                this.simulateLoading();
                this.animate();
            }

            simulateLoading(){
                let progress = 0;
                const bar = document.getElementById('progress-bar');
                const loader = document.getElementById('loader');
                const interval = setInterval(() => {
                    progress += Math.random() * 15;
                    if(progress >= 100) {
                        progress = 100;
                        clearInterval(interval);
                        setTimeout(() => {
                            loader.style.opacity = '0';
                            setTimeout(() => loader.style.display = 'none', 800);
                        }, 400);
                    }
                    bar.style.width = progress + '%';
                }, 40);
            }

            initScene(){
                this.scene = new THREE.Scene();
                this.renderer = new THREE.WebGLRenderer({antialias: true, alpha: true});
                this.renderer.setClearColor(0x000000, 0); 
                this.renderer.setSize(this.width, this.height);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.container.appendChild(this.renderer.domElement);

                this.camera = new THREE.PerspectiveCamera(50, this.width / this.height, 0.1, 100);
                this.camera.position.z = 15;

                this.ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
                this.scene.add(this.ambientLight);

                this.pointLight = new THREE.PointLight(0xff003c, 25, 60);
                this.pointLight.position.set(0, 0, 5);
                this.scene.add(this.pointLight);
            }

            createCoreGeometry(x, y, scale, scrollYFactor, scrollXFactor) {
                const group = new THREE.Group();
                group.scale.set(scale, scale, scale);

                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 256;
                const texCtx = canvas.getContext('2d');
                const canvasTexture = new THREE.CanvasTexture(canvas);
                
                const coreMaterial = new THREE.MeshStandardMaterial({
                    map: canvasTexture,
                    color: 0x222222,
                    metalness: 0.8,
                    roughness: 0.1,
                    emissive: 0x000000,
                    emissiveIntensity: 0.8
                });
                const coreCube = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), coreMaterial);
                group.add(coreCube);

                const cage = new THREE.Mesh(
                    new THREE.BoxGeometry(2.6, 2.6, 2.6), 
                    new THREE.MeshBasicMaterial({color: 0xffffff, wireframe: true, opacity: 0.25, transparent: true})
                );
                group.add(cage);

                const ringGeo = new THREE.TorusGeometry(3.6, 0.03, 8, 60);
                const ringMat = new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true, opacity: 0.5});
                const ring1 = new THREE.Mesh(ringGeo, ringMat);
                const ring2 = new THREE.Mesh(ringGeo, ringMat);
                ring1.rotation.x = Math.PI / 2;
                ring2.rotation.y = Math.PI / 2;
                group.add(ring1, ring2);

                this.scene.add(group);

                this.cubesData.push({
                    group: group,
                    coreCube: coreCube,
                    cage: cage,
                    ring1: ring1,
                    ring2: ring2,
                    texCtx: texCtx,
                    canvasTexture: canvasTexture,
                    baseX: x,
                    baseY: y,
                    scrollYFactor: scrollYFactor,
                    scrollXFactor: scrollXFactor,
                    pulseOffset: Math.random() * Math.PI * 2,
                    rotSpeedX: (Math.random() - 0.5) * 0.03,
                    rotSpeedY: (Math.random() - 0.5) * 0.03
                });
            }

            createMicroCores() {
                const numCubesPerLine = 6; 
                const spread = 25; 

                // Rasmdagi "X" shakli (Diagonallar bo'ylab yo'nalish)
                for (let i = 0; i < numCubesPerLine * 4; i++) {
                    let scale = 0.15 + Math.random() * 0.2;
                    let x = (Math.random() - 0.5) * spread;
                    let y = (Math.random() - 0.5) * spread;
                    
                    let scrollXF, scrollYF;
                    const speed = 0.015 + Math.random() * 0.01;

                    // Kublarni 4 ta diagonal guruhga bo'lamiz
                    if (i % 4 === 0) {
                        // Tepaga-chapga qarab harakatlanadi (Rasmdagi chap ko'rsatkich)
                        scrollXF = -speed; scrollYF = speed;
                    } else if (i % 4 === 1) {
                        // Tepaga-o'ngga qarab harakatlanadi (Rasmdagi o'ng ko'rsatkich)
                        scrollXF = speed; scrollYF = speed;
                    } else if (i % 4 === 2) {
                        // Pastga-chapga
                        scrollXF = -speed; scrollYF = -speed;
                    } else {
                        // Pastga-o'ngga
                        scrollXF = speed; scrollYF = -speed;
                    }

                    this.createCoreGeometry(x, y, scale, scrollYF, scrollXF);
                }
            }

            updateTexture(cubeData, time){
                const ctx = cubeData.texCtx;
                ctx.fillStyle = 'rgba(3, 3, 5, 1)'; 
                ctx.fillRect(0, 0, 256, 256);
                
                ctx.lineWidth = 10; 
                ctx.strokeStyle = this.currentColor.getStyle();
                ctx.strokeRect(10, 10, 236, 236);
                
                ctx.font = 'bold 38px Courier New'; 
                ctx.textAlign = 'center'; 
                ctx.textBaseline = 'middle';
                
                ctx.shadowColor = this.currentColor.getStyle();
                ctx.shadowBlur = 15;
                ctx.fillStyle = '#ffffff';
                
                ctx.save(); 
                ctx.translate(128, 128); 
                ctx.fillText("XOLƎRIƆ", 0, -20);
                
                ctx.fillStyle = this.currentColor.getStyle();
                ctx.font = '22px Courier New'; 
                ctx.fillText("SYS-CORE", 0, 30); 
                ctx.restore();
                
                cubeData.canvasTexture.needsUpdate = true;
            }

            addListeners(){
                window.addEventListener('resize', () => {
                    this.width = window.innerWidth;
                    this.height = window.innerHeight;
                    this.camera.aspect = this.width / this.height; 
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(this.width, this.height); 
                });

                window.addEventListener('scroll', () => {
                    this.scrollY = window.scrollY;
                });
            }

            animate(){
                requestAnimationFrame(this.animate.bind(this));
                this.time += 0.015;

                this.colorLerpFactor += 0.003;
                if(this.colorLerpFactor >= 1) {
                    this.colorLerpFactor = 0;
                    this.colorIndex = (this.colorIndex + 1) % this.colorPalette.length;
                    this.targetColor = this.colorPalette[(this.colorIndex + 1) % this.colorPalette.length];
                }
                this.currentColor.copy(this.colorPalette[this.colorIndex]).lerp(this.targetColor, this.colorLerpFactor);
                this.pointLight.color.copy(this.currentColor);

                this.cubesData.forEach((data) => {
                    const floatY = Math.sin(this.time + data.pulseOffset) * 0.5;
                    
                    // Rasmdagidek 'X' chiziqlari bo'yicha scroll da harakatlanishi
                    data.group.position.y = data.baseY + floatY + (this.scrollY * data.scrollYFactor);
                    data.group.position.x = data.baseX + (this.scrollY * data.scrollXFactor);

                    data.coreCube.rotation.x += data.rotSpeedX;
                    data.coreCube.rotation.y += data.rotSpeedY;
                    
                    data.cage.material.color.copy(this.currentColor);
                    data.ring1.material.color.copy(this.currentColor);
                    data.ring2.material.color.copy(this.currentColor);
                    data.coreCube.material.emissive.copy(this.currentColor).multiplyScalar(0.5);

                    data.cage.rotation.copy(data.coreCube.rotation); 
                    data.cage.rotation.x *= -1.2;
                    data.ring1.rotation.x += 0.015; 
                    data.ring2.rotation.y -= 0.015; 

                    this.updateTexture(data, this.time);
                });

                this.renderer.render(this.scene, this.camera);
            }
        }

        new MicroCores();
    </script>
</body>
</html>
