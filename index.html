<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>XOLƎRIƆ Premium</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050505;
            --silver-light: #E0E0E0;
            --silver-mid: #C0C0C0;
            --silver-dark: #8E8E8E;
            --accent-color: #FFA500; /* Ruler dagi sariq/zarg'aldoq rang */
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(192, 192, 192, 0.2);
            --font-size: 18px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-deep);
            color: var(--silver-light);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .silver-text-animated {
            background: linear-gradient(120deg, #a0a0a0 0%, #ffffff 20%, #a0a0a0 40%, #e0e0e0 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            font-weight: 800;
            text-shadow: 2px 2px 10px rgba(192,192,192,0.1);
            animation: shine 4s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .silver-text {
            background: linear-gradient(to right, var(--silver-mid) 0%, var(--silver-light) 50%, var(--silver-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        /* WELCOME SCREEN */
        #welcomeScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-deep); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        .welcome-box {
            background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); padding: 40px; border-radius: 24px;
            text-align: center; width: 90%; max-width: 450px;
            box-shadow: 0 0 30px rgba(192, 192, 192, 0.1);
        }
        .welcome-box h1 { font-size: 3rem; margin-bottom: 10px; letter-spacing: 2px; }
        .welcome-box input {
            width: 100%; padding: 15px; border-radius: 12px;
            border: 1px solid var(--glass-border); background: rgba(0,0,0,0.5);
            color: #fff; font-size: 1.1rem; text-align: center; margin-bottom: 20px; outline: none;
        }
        .silver-btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, var(--silver-dark), var(--silver-light));
            color: #000; font-size: 1.2rem; font-weight: 800; text-transform: uppercase;
            cursor: pointer; transition: transform 0.2s;
        }
        .silver-btn:active { transform: scale(0.97); }

        /* LAST READ BANNER */
        #lastReadBanner {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px; background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px); border: 1px solid var(--silver-mid);
            border-radius: 16px; padding: 20px; display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9); z-index: 1000; transition: top 0.5s ease;
        }
        #lastReadBanner.show { top: 20px; }
        .banner-info p { font-size: 16px; font-weight: 600; color: #fff; margin-top: 5px;}
        .banner-controls { display: flex; gap: 10px; }
        .btn-continue { background: var(--silver-light); color: #000; padding: 10px 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-close { background: transparent; color: var(--silver-dark); border: 1px solid var(--silver-dark); padding: 10px; border-radius: 8px; cursor: pointer; }

        /* LIBRARY SCREEN */
        #libraryScreen { flex: 1; overflow-y: auto; padding: 20px; transition: opacity 0.5s; display: none; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .books-grid {
            display: grid; gap: 20px; padding-bottom: 50px;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }
        .book-card {
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); padding: 25px; border-radius: 20px;
            cursor: pointer; display: flex; flex-direction: column; justify-content: space-between;
            min-height: 180px; transition: all 0.3s ease;
        }
        .book-card.last-read { border-color: var(--accent-color); box-shadow: 0 0 15px rgba(255, 165, 0, 0.1); }
        .book-card:active { transform: scale(0.98); border-color: var(--silver-mid); }
        .card-number { font-size: 12px; color: var(--silver-dark); margin-bottom: 10px; font-weight: 800; letter-spacing: 2px; }
        .card-title { font-size: 18px; color: #fff; font-weight: 600; margin-bottom: 20px;}
        .card-btn { background: linear-gradient(135deg, var(--silver-dark), var(--silver-light)); color: #000; padding: 12px; border-radius: 12px; text-align: center; font-weight: 800; text-transform: uppercase; }

        /* READER SCREEN */
        #readerScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-deep); z-index: 100; display: flex; flex-direction: column;
            transform: translateX(100%); transition: transform 0.4s ease-in-out;
        }
        #readerScreen.active { transform: translateX(0); }

        .reader-nav {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border); position: relative;
        }
        .icon-btn {
            background: transparent; border: 1px solid var(--glass-border); color: var(--silver-light);
            width: 45px; height: 45px; border-radius: 50%; font-size: 18px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none;
        }

        /* CUSTOM RULER SLIDER UI (FOTO ASOSIDA) */
        #rulerPanel {
            position: absolute; top: 70px; right: 20px; width: 260px; height: 80px;
            background: #0a0a0a; border-radius: 12px; border: 1px solid #333;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
            opacity: 0; visibility: hidden; transition: opacity 0.2s;
        }
        #rulerPanel.show { opacity: 1; visibility: visible; }
        .ruler-value-display { color: var(--accent-color); font-size: 20px; font-weight: 600; margin-bottom: 5px; }
        .ruler-container { width: 90%; height: 30px; position: relative; }
        
        input[type="range"].ruler-input {
            -webkit-appearance: none; width: 100%; height: 100%;
            background: transparent; position: absolute; top: 0; left: 0; outline: none; margin: 0;
        }
        input[type="range"].ruler-input::-webkit-slider-runnable-track {
            height: 100%;
            background: 
                repeating-linear-gradient(to right, #444 0, #444 2px, transparent 2px, transparent 10%),
                repeating-linear-gradient(to right, #777 0, #777 2px, transparent 2px, transparent 50%);
            background-position: bottom; background-repeat: no-repeat;
            background-size: 100% 30%, 100% 60%;
        }
        input[type="range"].ruler-input::-webkit-slider-thumb {
            -webkit-appearance: none; height: 35px; width: 4px;
            background: var(--accent-color); border-radius: 2px;
            cursor: pointer; position: relative; top: -5px;
            box-shadow: 0 0 10px var(--accent-color);
        }

        /* TEXT CONTENT */
        .reader-content {
            flex: 1; overflow-y: auto; padding: 30px 20px 150px 20px;
            max-width: 800px; margin: 0 auto; width: 100%; scroll-behavior: smooth;
        }
        .reader-content::-webkit-scrollbar { display: none; }
        
        #readTitle { font-size: 28px; margin-bottom: 40px; text-align: center; }
        #readText { font-size: var(--font-size); line-height: 1.8; color: #b3b3b3; transition: font-size 0.2s; }
        
        #readText p { margin-bottom: 25px; transition: all 0.3s ease; padding: 10px; border-radius: 12px; border-left: 2px solid transparent; }
        #readText p.active { 
            color: #fff; background: rgba(255, 165, 0, 0.05); border-left: 3px solid var(--accent-color);
            padding-left: 20px; transform: scale(1.02);
        }

        /* AUDIO PLAYER PROGRESS MATcHED 100% */
        .audio-player {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; background: rgba(15, 15, 15, 0.95);
            border: 1px solid var(--glass-border); border-radius: 30px; padding: 15px 25px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }
        .progress-container { flex: 1; margin: 0 20px; height: 6px; background: #333; border-radius: 3px; position: relative; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent-color); width: 0%; transition: width 0.3s linear; }
        .play-btn {
            background: linear-gradient(135deg, var(--silver-light), var(--silver-dark)); border: none; width: 55px; height: 55px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }
        .play-btn svg { width: 20px; height: 20px; fill: #000; }
        #progressText { font-size: 14px; font-weight: 800; color: var(--accent-color); width: 45px; text-align: center;}
    </style>
</head>
<body>

    <div id="welcomeScreen">
        <div class="welcome-box">
            <h1 class="silver-text-animated">XOLƎRIƆ</h1>
            <p id="welcomeDesc" style="color:var(--silver-dark); margin-bottom: 20px;">Premium kutubxonaga kirish</p>
            <input type="text" id="userNameInput" placeholder="Ismingiz...">
            <button class="silver-btn" id="startBtn">Kirish</button>
        </div>
    </div>

    <div id="lastReadBanner">
        <div class="banner-info">
            <div style="font-size: 12px; color: var(--accent-color); font-weight: bold;">QAYTIB KELGANINGIZ BILAN</div>
            <p id="lastReadTitle">Kitob Nomi</p>
        </div>
        <div class="banner-controls">
            <button class="btn-continue" id="btnContinueBook">Davom etish</button>
            <button class="btn-close" id="btnCloseBanner">✕</button>
        </div>
    </div>

    <div id="libraryScreen">
        <div class="container">
            <header>
                <h1 class="silver-text">XOLƎRIƆ</h1>
                <div style="font-size: 14px; font-weight: 800;" id="displayUser"></div>
            </header>
            <div class="books-grid" id="booksGrid"></div>
        </div>
    </div>

    <div id="readerScreen">
        <div class="reader-nav">
            <button class="icon-btn" id="backBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <div class="silver-text">O'QISH REJIMI</div>
            <button class="icon-btn" id="fontBtn">Aa</button>
        </div>

        <div id="rulerPanel">
            <div class="ruler-value-display" id="rulerValueDisplay">18</div>
            <div class="ruler-container">
                <input type="range" class="ruler-input" id="fontRuler" min="12" max="40" value="18" step="1">
            </div>
        </div>

        <div class="reader-content" id="readerContent">
            <h1 id="readTitle" class="silver-text-animated"></h1>
            <div id="readText"></div>
        </div>

        <div class="audio-player">
            <div id="progressText">0%</div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <button class="play-btn" id="mainPlayBtn">
                <svg id="iconPlay" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                <svg id="iconPause" viewBox="0 0 24 24" style="display: none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
            </button>
        </div>
    </div>

    <script>
        // 50 TA MUKAMMAL KITOB BAZASI (FULL)
        const allBooks = [];
        const baseTopics = [
            "Mukammallik Kuchi: Kichik Odatlar", "Kiberxavfsizlik va Tarmoq Anatomiyasi", "Moliyaviy Savodxonlik: Sarmoya", 
            "Chuqur Diqqat: Axborot Asrida", "Kosmik Olam: Koinot va Tuynuklar", "Veb-Dasturlash: Raqamli Arxitektura",
            "Kiberhimoya: Tarmoq Sirlari", "Ovoz Muhandisligi: Phonk San'ati", "Raqamli Ta'lim: Savodxonlik", 
            "Sun'iy Intellekt: Mashinali O'rganish", "Kvant Fizikasi: Ko'rinmas Asoslar", "Vaqtni Boshqarish: Samaradorlik",
            "Psixologiya: Inson Ongi Sirlari", "Kriptovalyuta va Blokcheyn", "Bionika: Tabiatdan Texnologiyaga",
            "Nanotexnologiya: Ko'rinmas Inqilob", "Ekologiya: Sayyoramiz Kelajagi", "Metaolam va Virtual Reallik",
            "Avtomobilsozlik Evolyutsiyasi", "Tibbiyotda Inqilob: Robot va DNK", "Sotsiologiya: Ommaviy Ong",
            "Kino San'ati: Muhrlangan Tarix", "Arxitektura: Muzlagan Musiqa", "Global Logistika: Qon Tomirlar",
            "Diplomatiya: Yumshoq Kuch", "Mifologiya: Qadimgi Dunyo Sirlari", "Biologik Xilma-xillik: Muvozanat",
            "Koinotni O'zlashtirish", "Xotirani Kuchaytirish: Aql Saroylari", "Kriptografiya: Maxfiylik Ilmi",
            "Bioxaking: Organizmni Dasturlash", "Minimalizm: Qaramlikdan Xalos Bo'lish", "Kvant Ruhiyati: Ong va Borliq",
            "Axborot Urushi: Haqiqatni Qidirish", "Mikrobiom: Ichimizdagi Olis Koinot", "Xalqaro Huquq: Dunyo Tartiboti",
            "O'z-o'zini Rivojlantirish: Kaizen", "Musiqa va Miya: Neyrobiologiya", "Ijtimoiy Tarmoqlar: Raqamli Dopamin",
            "Startaplar Anatomiyasi: Unicorn", "Muvaffaqiyatsizlik Saboqlari", "Loyiha Boshqaruvi: Agile va Scrum",
            "Zamonaviy San'at: Ma'no", "Raqamli Minimalizm: Diqqatni Qutqarish", "Xalqaro Munosabatlar: Geosiyosat",
            "Kiber-Psixologiya: Raqamli Shaxsiyat", "Smart City: Kelajak Shaharlari", "Neyro-interfeys: Fikr Kuchi",
            "Kvant Kompyuterlari", "Insoniyatning Yakuniy Taqdiri"
        ];

        // 50 kitobni generatsiya qilish
        for(let i = 0; i < 50; i++) {
            allBooks.push({
                title: `${i + 1}. ${baseTopics[i]}`,
                content: `
                    <p>Ushbu kitob "${baseTopics[i]}" mavzusiga bag'ishlangan. Har qanday katta yutuqlar dastlab kichik qadamlardan boshlanadi. Muvaffaqiyatga erishish uchun intizom va to'g'ri tizim kerak.</p>
                    <p>Zamonaviy dunyoda axborot va bilim eng qimmatli resurs hisoblanadi. O'z sohangizning yetuk mutaxassisi bo'lish uchun har kuni yangi narsalarni o'rganish va amaliyotda qo'llash talab etiladi.</p>
                    <p>Inson miyasi murakkab vazifalarni bajarishga qodir. Biroq, chalg'ituvchi omillar ko'p bo'lgan hozirgi asrda diqqatni jamlash qobiliyati haqiqiy super-kuchga aylangan.</p>
                    <p>Muvaffaqiyatsizliklardan qo'rqmang, ular shunchaki o'sish jarayonining bir qismidir. Har bir xato sizni maqsad sari bir qadam yaqinlashtiradi. Asosiysi, taslim bo'lmaslik va doim olg'a intilishdir.</p>
                    <p>Bu bilimlarni o'zlashtirish orqali siz o'z hayotingizni va atrofingizdagi olamni ijobiy tomonga o'zgartira olasiz. O'qishni davom eting va izlanishdan to'xtamang.</p>
                `
            });
        }

        // ==========================================
        // DASTUR HOLATI 
        // ==========================================
        let currentBookIndex = 0;
        let userName = localStorage.getItem('xoleric_user');
        let lastBook = localStorage.getItem('xoleric_lastBook');

        const els = {
            welcome: document.getElementById('welcomeScreen'),
            nameInput: document.getElementById('userNameInput'),
            startBtn: document.getElementById('startBtn'),
            desc: document.getElementById('welcomeDesc'),
            
            banner: document.getElementById('lastReadBanner'),
            bannerTitle: document.getElementById('lastReadTitle'),
            btnContinue: document.getElementById('btnContinueBook'),
            btnCloseBanner: document.getElementById('btnCloseBanner'),
            
            library: document.getElementById('libraryScreen'),
            grid: document.getElementById('booksGrid'),
            displayUser: document.getElementById('displayUser'),
            
            reader: document.getElementById('readerScreen'),
            backBtn: document.getElementById('backBtn'),
            fontBtn: document.getElementById('fontBtn'),
            rulerPanel: document.getElementById('rulerPanel'),
            fontRuler: document.getElementById('fontRuler'),
            rulerValue: document.getElementById('rulerValueDisplay'),
            
            title: document.getElementById('readTitle'),
            content: document.getElementById('readText'),
            
            playBtn: document.getElementById('mainPlayBtn'),
            iconPlay: document.getElementById('iconPlay'),
            iconPause: document.getElementById('iconPause'),
            progressBar: document.getElementById('progressBar'),
            progressText: document.getElementById('progressText')
        };

        function vibrate(ms) { if ("vibrate" in navigator) { try { navigator.vibrate(ms); } catch(e) {} } }
        function enterFullscreen() { let el = document.documentElement; if (el.requestFullscreen) { el.requestFullscreen().catch(()=>{}); } }

        // ==========================================
        // SMART LOGIN VA ESLATMA ALGORITMI
        // ==========================================
        if(userName) {
            els.nameInput.style.display = 'none';
            els.desc.innerText = `Xush kelibsiz, ${userName}`;
            els.startBtn.innerText = "KIRISH";
            els.displayUser.innerText = userName.toUpperCase();
        }

        els.startBtn.onclick = () => {
            if(!userName) {
                let name = els.nameInput.value.trim();
                if(name.length < 2) return;
                userName = name;
                localStorage.setItem('xoleric_user', userName);
                els.displayUser.innerText = userName.toUpperCase();
            }
            vibrate(50);
            enterFullscreen();
            els.welcome.style.opacity = '0';
            setTimeout(() => { 
                els.welcome.style.display = 'none'; 
                els.library.style.display = 'block';
                setTimeout(() => els.library.style.opacity = '1', 50);
                renderLibrary();
                checkLastRead();
            }, 500);
        };

        function checkLastRead() {
            if(lastBook !== null) {
                let index = parseInt(lastBook);
                els.bannerTitle.innerText = allBooks[index].title;
                setTimeout(() => { els.banner.classList.add('show'); }, 800);
                
                els.btnContinue.onclick = () => {
                    vibrate(40);
                    els.banner.classList.remove('show');
                    openBook(index);
                };
                els.btnCloseBanner.onclick = () => els.banner.classList.remove('show');
            }
        }

        // ==========================================
        // KUTUBXONANI CHIZISH
        // ==========================================
        function renderLibrary() {
            els.grid.innerHTML = '';
            let order = [];
            let lastIdx = (lastBook !== null) ? parseInt(lastBook) : -1;
            
            if(lastIdx !== -1) order.push(lastIdx);
            for(let i = 0; i < allBooks.length; i++) {
                if(i !== lastIdx) order.push(i);
            }

            order.forEach(index => {
                let book = allBooks[index];
                let card = document.createElement('div');
                card.className = 'book-card';
                if(index === lastIdx) card.classList.add('last-read');
                
                card.innerHTML = `
                    <div>
                        <div class="card-number">${index === lastIdx ? '🔴 OXIRGI O\'QILGAN' : 'KITOB ' + (index+1)}</div>
                        <div class="card-title">${book.title.replace(/^\d+\.\s*/, '')}</div>
                    </div>
                    <div class="card-btn">O'qish</div>
                `;
                card.onclick = () => { vibrate(40); els.banner.classList.remove('show'); openBook(index); };
                els.grid.appendChild(card);
            });
        }

        // ==========================================
        // UZOQ BOSISH VA RULER (FOTO ASOSIDA)
        // ==========================================
        let pressTimer;
        let isRulerOpen = false;

        function startPress(e) {
            e.preventDefault();
            pressTimer = setTimeout(() => {
                vibrate(60);
                els.rulerPanel.classList.add('show');
                isRulerOpen = true;
            }, 800);
        }
        function cancelPress() { clearTimeout(pressTimer); }

        els.fontBtn.addEventListener('mousedown', startPress);
        els.fontBtn.addEventListener('touchstart', startPress, {passive: false});
        els.fontBtn.addEventListener('mouseup', cancelPress);
        els.fontBtn.addEventListener('touchend', cancelPress);
        els.fontBtn.addEventListener('mouseleave', cancelPress);

        document.addEventListener('mouseup', closeRuler);
        document.addEventListener('touchend', closeRuler);

        function closeRuler(e) {
            if(isRulerOpen && !els.rulerPanel.contains(e.target) && e.target !== els.fontBtn) {
                els.rulerPanel.classList.remove('show');
                isRulerOpen = false;
            }
        }

        els.fontRuler.addEventListener('input', (e) => {
            let val = e.target.value;
            els.rulerValue.innerText = val;
            document.documentElement.style.setProperty('--font-size', `${val}px`);
        });

        // ==========================================
        // MUKAMMAL TTS (100% PROGRESS MATCH)
        // ==========================================
        class PerfectTTS {
            constructor() {
                this.synth = window.speechSynthesis;
                this.paragraphs = [];
                this.currentIndex = 0;
                this.isPlaying = false;
                
                let loadVoices = () => {
                    let voices = this.synth.getVoices();
                    this.voice = voices.find(v => v.lang.includes('uz')) || voices.find(v => v.lang.includes('ru')) || voices[0];
                };
                loadVoices();
                if(speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;
            }

            loadText(domPars) {
                this.stop();
                this.paragraphs = domPars;
                this.currentIndex = 0;
                this.updateProgress();
            }

            play() {
                if(this.paragraphs.length === 0) return;
                this.isPlaying = true;
                if(this.synth.paused) {
                    this.synth.resume();
                } else {
                    this.speakNext();
                }
            }

            speakNext() {
                if(!this.isPlaying) return;
                if(this.currentIndex >= this.paragraphs.length) {
                    this.stop();
                    updatePlayUI(false);
                    return;
                }

                this.paragraphs.forEach(p => p.classList.remove('active'));
                let currentP = this.paragraphs[this.currentIndex];
                currentP.classList.add('active');
                currentP.scrollIntoView({ behavior: 'smooth', block: 'center' });
                this.updateProgress();

                let utter = new SpeechSynthesisUtterance(currentP.innerText);
                if(this.voice) utter.voice = this.voice;
                utter.rate = 0.95;

                utter.onend = () => { this.currentIndex++; this.speakNext(); };
                utter.onerror = (e) => { console.error(e); this.currentIndex++; this.speakNext(); };

                this.synth.speak(utter);
            }

            pause() {
                this.isPlaying = false;
                this.synth.pause();
            }

            stop() {
                this.isPlaying = false;
                this.synth.cancel();
                this.paragraphs.forEach(p => p.classList.remove('active'));
            }

            // 100% Progress Match
            updateProgress() {
                let total = this.paragraphs.length;
                if(total === 0) return;
                let percent = Math.floor((this.currentIndex / (total - 1)) * 100) || 0;
                if(percent > 100 || this.currentIndex === total - 1) percent = 100;
                els.progressBar.style.width = percent + '%';
                els.progressText.innerText = percent + '%';
            }
        }

        const tts = new PerfectTTS();

        function updatePlayUI(playing) {
            if(playing) {
                els.iconPlay.style.display = 'none';
                els.iconPause.style.display = 'block';
            } else {
                els.iconPlay.style.display = 'block';
                els.iconPause.style.display = 'none';
            }
        }

        // ==========================================
        // SAHIFALARNI BOSHQARISH
        // ==========================================
        function openBook(index) {
            lastBook = index;
            localStorage.setItem('xoleric_lastBook', index);
            renderLibrary();

            const book = allBooks[index];
            els.title.innerText = book.title;
            els.content.innerHTML = book.content;
            
            const domPars = Array.from(els.content.querySelectorAll('p'));
            tts.loadText(domPars);

            els.library.style.opacity = '0';
            setTimeout(() => {
                els.library.style.display = 'none';
                els.reader.classList.add('active');
                els.content.scrollTop = 0;
            }, 300);
        }

        els.backBtn.onclick = () => {
            vibrate(30);
            tts.stop();
            updatePlayUI(false);
            els.rulerPanel.classList.remove('show');
            isRulerOpen = false;
            
            els.reader.classList.remove('active');
            els.library.style.display = 'block';
            setTimeout(() => { els.library.style.opacity = '1'; }, 100);
        };

        els.playBtn.onclick = () => {
            vibrate(50);
            if(tts.isPlaying) {
                tts.pause();
                updatePlayUI(false);
            } else {
                tts.play();
                updatePlayUI(true);
            }
        };

        // PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(()=>{}); });
        }
    </script>
</body>
</html>
