            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;

        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --accent: #7b2eda;
            --accent-light: #9d4eff;
            --text: #ffffff;
            --text-muted: #b8b8d0;
            --glass: rgba(30, 30, 50, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --font-size: 18px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glass effect */
        .glass {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .user-name {
            color: var(--accent);
            font-weight: 600;
            font-size: 1.1rem;
        }

        .controls {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .icon-btn:active {
            transform: scale(0.9);
            background: var(--accent);
            color: white;
        }

        .icon-btn.active {
            background: var(--accent);
            color: white;
        }

        /* Main content */
        main {
            margin-top: 80px;
            padding: 20px;
            padding-bottom: 120px;

            text-align: center;
        }

        .welcome-box h1 {
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .welcome-box p {
            color: var(--text-muted);
            margin-bottom: 30px;
        }

            width: 100%;

            background: var(--surface);

            text-align: center;

            border: none;
            background: var(--accent);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* Audio player */
        .audio-player {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;

            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            z-index: 200;

        .player-controls {

        .player-btn {

            height: 48px;

            border: none;
            color: white;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .player-btn:active {

        }

        .player-info {
            flex: 1;
        }

            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-bottom: 8px;
        }

        .progress {
            width: 0%;
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.1s;
        }

        .speed-control {

            gap: 5px;
            justify-content: center;

            font-size: 0.9rem;

        .next-overlay.show {

        .next-btn-circle {

            height: 50px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;

        /* Menu modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);

            opacity: 0;
            visibility: hidden;
            transition: 0.3s;

        .modal-content {

            bottom: 0;
            left: 0;
            right: 0;

        /* Toast */

            border-radius: 30px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        // ==========================================
        // XOLERIC AUDIO ENGINE PRO
        // ==========================================
        
        class XolericTTS {
            constructor() {
                this.synth = window.speechSynthesis;
                this.voice = null;
                this.queue = [];
                this.isPlaying = false;
                this.rate = 1.0;
                this.pitch = 1.0;
                this.lang = 'uz-UZ';
                this.currentParagraph = 0;
                this.paragraphs = [];
                this.onParagraphChange = null;
                
                this.initVoices();
            }
            
            initVoices() {
                const loadVoices = () => {
                    const voices = this.synth.getVoices();
                    
                    // O'zbek, rus yoki ingliz ovozini tanlash
                    this.voice = voices.find(v => v.lang.includes('uz')) ||
                                 voices.find(v => v.lang.includes('ru')) ||
                                 voices.find(v => v.lang.includes('en')) ||
                                 voices[0];
                };
                
                loadVoices();
                
                if (this.synth.onvoiceschanged !== undefined) {
                    this.synth.onvoiceschanged = loadVoices;
                }
            }
            
            splitIntoParagraphs(text) {
                // Matnni paragraflarga ajratish
                return text.split('\n').filter(p => p.trim().length > 0);
            }
            
            splitIntoChunks(text) {
                // Har bir paragraphni 200 belgili chunklarga bo'lish
                const chunks = [];
                const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
                
                for (let sentence of sentences) {
                    if (sentence.length > 200) {
                        const words = sentence.split(' ');
                        let chunk = '';
                        
                        for (let word of words) {
                            if ((chunk + ' ' + word).length <= 200) {
                                chunk += (chunk ? ' ' : '') + word;
                            } else {
                                chunks.push(chunk);
                                chunk = word;
                            }
                        }
                        
                        if (chunk) chunks.push(chunk);
                    } else {
                        chunks.push(sentence);
                    }
                }
                
                return chunks;
            }
            
            speak(text, paragraphs = []) {
                if (!text) return;
                
                this.stop();
                this.paragraphs = paragraphs;
                this.currentParagraph = 0;
                
                // Matnni paragraflarga ajratish
                const allParagraphs = this.splitIntoParagraphs(text);
                
                // Barcha chunklarni queue ga solish
                for (let i = 0; i < allParagraphs.length; i++) {
                    const chunks = this.splitIntoChunks(allParagraphs[i]);
                    
                    for (let chunk of chunks) {
                        this.queue.push({
                            text: chunk,
                            paragraphIndex: i
                        });
                    }
                }
                
                this.playNext();
            }
            
            playNext() {
                if (this.queue.length === 0) {
                    this.isPlaying = false;
                    if (this.onParagraphChange) this.onParagraphChange(-1);
                    return;
                }
                
                this.isPlaying = true;
                
                const item = this.queue.shift();
                
                // Paragraph highlight
                if (item.paragraphIndex !== this.currentParagraph) {
                    this.currentParagraph = item.paragraphIndex;
                    if (this.onParagraphChange) {
                        this.onParagraphChange(this.currentParagraph);
                    }
                }
                
                const utterance = new SpeechSynthesisUtterance(item.text);
                utterance.voice = this.voice;
                utterance.rate = this.rate;
                utterance.pitch = this.pitch;
                utterance.lang = this.lang;
                
                utterance.onend = () => this.playNext();
                utterance.onerror = () => this.playNext();
                
                this.synth.speak(utterance);
            }
            
            stop() {
                this.queue = [];
                this.synth.cancel();
                this.isPlaying = false;
                if (this.onParagraphChange) this.onParagraphChange(-1);
            }
            
            pause() {
                this.synth.pause();
            }
            
            resume() {
                this.synth.resume();
            }
            
            setRate(rate) {
                this.rate = rate;
                if (this.isPlaying) {
                    // Tezlik o'zgarganda qayta boshlash
                    const wasPlaying = this.isPlaying;
                    const currentQueue = [...this.queue];
                    
                    this.stop();
                    
                    if (wasPlaying && currentQueue.length > 0) {
                        this.queue = currentQueue;
                        this.playNext();
                    }
                }
            }
        }

            // 11-20
            { title: "11. Kvant Fizikasi", content: "Kvant fizikasi koinotning eng mitti zarrachalari qanday ishlashini o'rganuvchi fan bo'lib, u bizning voqelik haqidagi an'anaviy tasavvurlarimizni butunlay ost-ust qilib yuboradi. Klassik fizikadan farqli o'laroq, kvant olamida jismlar bir vaqtning o'zida ikkita joyda bo'lishi mumkin. Bu hodisa superpozitsiya deb ataladi. Ikki yoriqli tajriba shuni ko'rsatdiki, yorug'lik va elektronlar ham to'lqin, ham zarracha xususiyatiga ega." },
            { title: "12. Vaqtni Boshqarish", content: "Vaqt inson hayotidagi yagona qaytarib bo'lmaydigan va sotib olinmaydigan resursdir. Boy va kambag'al, yosh va qari barchaga bir kunda aynan 24 soat beriladi. Ammo nima uchun ba'zilar bu vaqt ichida ulkan ishlarni amalga oshiradi-yu, boshqalar hatto kundalik yumushlariga ham ulgurmaydi? Buning siri vaqtning o'zida emas, balki diqqatni va ustuvorliklarni to'g'ri taqsimlay olishdadir. Eyzenxauer matritsasi barcha ishlarni 4 toifaga ajratadi." },
            { title: "13. Psixologiya", content: "Inson miyasi koinotdagi eng murakkab va sirli obyektlardan biridir. Uning atigi bir yarim kilogramm keladigan biologik massasi butun boshli sivilizatsiyalarni yaratishga, hissiyotlarni boshdan kechirishga va borliqni anglashga qodir. Psixologiya ana shu ongli va ongsiz jarayonlarni o'rganuvchi fandir. Biz qabul qilayotgan har bir qaror, har bir xatti-harakatimiz ortida o'zimiz ham sezmaydigan chuqur psixologik sabablar yotadi." },
            { title: "14. Kriptovalyuta", content: "Iqtisodiyot tarixiga nazar tashlasak, pul tizimi doimiy ravishda evolyutsiya qilib kelganini ko'ramiz: tovar ayirboshlashdan tortib, oltin tangalarga, so'ngra qog'oz pullarga va elektron raqamlarga. Bugungi kunda esa moliyaviy dunyo navbatdagi katta inqilob markazlashmagan raqamli pullar davriga qadam qo'ydi. Bitcoin yaratilishi bilan markaziy banklarga va hukumatlarga qaram bo'lmagan, erkin va ochiq moliya tizimi g'oyasi haqiqatga aylandi." },
            { title: "15. Bionika", content: "Bionika tabiatdagi biologik mexanizmlarni va ularning ishlash prinsiplarini o'rganib, ularni zamonaviy texnologiyalarga tadbiq etuvchi kelajak fanidir. Tabiat millionlab yillik evolyutsiya davomida mukammal dizayn va yechimlarni yaratgan. Muhandislar va olimlar bugungi kunda bu tayyor xaritalardan foydalanib, insoniyatning eng qiyin muammolariga innovatsion yechimlar topmoqdalar. Velkro yopishtirgich lentasi qariqiz o'simligidan olingan." },
            { title: "16. Nanotexnologiya", content: "Nanotexnologiya moddalarni atom va molekula darajasida boshqarish va yangi xususiyatlarga ega materiallar yaratish fanidir. Bir nanometr soch tolasidan yuz ming marta yupqaroqdir. Bu o'lchamda moddalarning fizik va kimyoviy xususiyatlari butunlay o'zgaradi. Masalan, oddiy sharoitda elektr tokini o'tkazmaydigan materiallar nano-darajada ajoyib o'tkazgichlarga aylanishi mumkin. Grafen po'latdan 200 barobar kuchli." },
            { title: "17. Ekologiya", content: "Yer sayyorasi o'zining to'rt yarim milliard yillik tarixi davomida ko'plab iqlim o'zgarishlarini boshdan kechirgan. Biroq, so'nggi ikki asr ichida yuz berayotgan global isish jarayoni to'g'ridan-to'g'ri inson faoliyati bilan bog'liqdir. Qazib olinuvchi yoqilg'ilarning katta miqdorda yoqilishi atmosferaga milliardlab tonna karbonat angidrid ajratmoqda. Arktika va Antarktidadagi muzliklarning erishi dunyo okeani sathining ko'tarilishiga olib keladi." },
            { title: "18. Metaolam", content: "Internetning evolyutsiyasi endilikda ikki o'lchamli ekranlardan chiqib, bizni to'liq qamrab oluvchi uch o'lchamli fazoga Metaolamga ko'chib o'tmoqda. Virtual reallik va To'ldirilgan reallik texnologiyalari orqali insonlar raqamli olamni xuddi jismoniy dunyodagidek his qilish imkoniyatiga ega bo'lmoqdalar. Agar hozirda biz internetga kompyuter orqali qarasak, kelajakda biz maxsus ko'zoynaklar yordamida internetning ichiga kiramiz." },
            { title: "19. Avtomobilsozlik", content: "Yuz yildan ortiq vaqt davomida insoniyatning asosiy transport vositasi bo'lib kelgan ichki yonuv dvigatellari o'z o'rnini elektromobillarga bo'shatib bermoqda. Bu avtomobilsozlik tarixidagi eng katta va eng tezkor texnologik inqilobdir. Elektromobillarning asosiy ustunligi ularning ekologik tozaligi va tuzilishining soddaligidir. Litiy-ion batareyalar o'rnini tez orada qattiq jismli batareyalar egallashi kutilmoqda." },
            { title: "20. Tibbiyot", content: "Tibbiyot sohasi inson umrini uzaytirish va hayot sifatini yaxshilashda doim eng ilg'or fan bo'lib kelgan, ammo bugungi kundagi texnologik integratsiya uni fantastika darajasiga olib chiqdi. An'anaviy jarrohlik o'rnini asta-sekin robot-jarrohlar egallamoqda. Bu tizim orqali jarroh xonaning narigi chekkasida turib ham joystiklar yordamida amaliyot o'tkazishi mumkin. CRISPR texnologiyasi DNKni tahrirlash imkonini beradi." },
            // 21-30
            { title: "21. Sotsiologiya", content: "Sotsiologiya insonlarning o'zaro munosabatlarini, jamiyat qanday shakllanishini va uning qanday qonuniyatlar asosida rivojlanishini o'rganuvchi fandir. Biz ko'pincha o'z qarorlarimizni mutlaqo mustaqil qabul qilamiz deb o'ylaymiz, ammo sotsiologik tadqiqotlar shuni ko'rsatadiki, bizning didimiz va e'tiqodimiz jamiyat tomonidan shakllantiriladi. Ommaviy ong tushunchasi axborot asrida ayniqsa dolzarb ahamiyat kasb etmoqda." },
            { title: "22. Kino San'ati", content: "Kino insoniyat kashf etgan san'at turlarining eng yoshi, ammo eng ta'sirchanidir. O'n to'qqizinchi asr oxirida aka-uka Lyumyerlar tomonidan namoyish etilgan Poyezdning yetib kelishi nomli qisqa metrajli ovozsiz videodan tortib, bugungi kundagi milliard dollarlik byudjetga ega Gollivud blokbasterlarigacha bo'lgan yo'l texnologiya va inson xayolotining ajoyib evolyutsiyasidir. Kuleshov effekti shuni ko'rsatadiki, kadrlar ketma-ketligi yangi ma'no yaratadi." },
            { title: "23. Arxitektura", content: "Arxitektura shunchaki odamlarni sovuqdan yoki yomg'irdan himoya qiluvchi to'rt devor va tomdan iborat emas. U muhandislik, san'at va psixologiyaning mukammal kesishuv nuqtasidir. Qadimgi faylasuflar arxitekturani muzlagan musiqa deb atashgan, chunki undagi proporsiyalar, ritm va garmoniya inson ruhiyatiga ta'sir qiladi. Qadimgi Misr ehromlari fir'avnlarning ilohiy kuchini namoyish etishga qaratilgan." },
            { title: "24. Global Logistika", content: "Siz ushbu matnni o'qib turgan smartfoningiz qanday yaratilgani haqida hech o'ylab ko'rganmisiz? Uning ekrani Koreyada ishlangan, protsessori Tayvanda yasalgan, akkumulyatoridagi litiy Afrikadan qazib olingan, dizayni AQShda chizilgan va yakunda Xitoyda yig'ilib, sizning qo'lingizga yetib kelgan. Bu murakkab zanjir global logistika va savdo tizimining mo'jizasi hisoblanadi." },
            { title: "25. Diplomatiya", content: "Insoniyat tarixi qonli urushlar bilan to'la bo'lsa-da, bugungi kunda dunyoni ushlab turgan narsa qurol emas, balki so'z va kelishuvlardir. Diplomatiya davlatlar o'rtasidagi manfaatlarni tinch yo'l bilan hal etish, nizo va ziddiyatlarning oldini olish san'ati hisoblanadi. Usta diplomat uchinchi Jahon urushini bitta to'g'ri tashkil etilgan muzokara stoli atrofida to'xtatib qolishga qodir." },
            { title: "26. Mifologiya", content: "Insoniyat o'zining butun tarixi davomida atrof-muhitdagi tushunarsiz hodisalarni anglashga intilgan. Qadimgi dunyo odamlari uchun chaqmoq, zilzila yoki quyosh tutilishi shunchaki tabiat hodisasi emas, balki ilohiy kuchlarning g'azabi yoki ishorasi bo'lib tuyulgan. Mifologiya qadimgi insonlarning koinot haqidagi tasavvurlari majmuasidir. Yunon, Skandinaviya va Misr mifologiyalari bugungi kungacha saqlanib qolgan." },
            { title: "27. Biologik Xilma-xillik", content: "Yer sayyorasi koinotdagi hozircha bizga ma'lum bo'lgan yagona tiriklik maskanidir. Bu tiriklikning eng katta mo'jizasi uning cheksiz xilma-xilligidadir. Biologik xilma-xillik mikroskopik bakteriyalardan tortib, bahaybat ko'k kitlargacha bo'lgan barcha tirik organizmlarning o'zaro murakkab tarmog'idir. Ekotizimlar xuddi jenga o'yiniga o'xshaydi. Asalarilarning qirilib ketishi oziq-ovqat xavfsizligiga tahdid soladi." },
            { title: "28. Koinotni O'zlashtirish", content: "Odamzot qadim zamonlardan beri osmonga boqib, yulduzlar ortida nima borligiga qiziqib kelgan. Yigirmanchi asrning o'rtalariga kelib, texnologik taraqqiyot bu azaliy orzuni haqiqatga aylantirdi. Bir ming to'qqiz yuz ellik yettida Yerning birinchi sun'iy yo'ldoshi uchirildi. Marsni o'zlashtirish va u yerda inson koloniyasini barpo etish zamonaviy kosmonavtikaning eng asosiy maqsadlaridan biridir." },
            { title: "29. Xotirani Kuchaytirish", content: "Inson xotirasi shunchaki ma'lumotlarni saqlovchi passiv arxiv emas, balki uzluksiz ishlaydigan va o'zgarib turadigan o'ta murakkab neyrobiologik jarayondir. Biz ko'pincha mening xotiram yomon deb nolishga odatlanganmiz, ammo zamonaviy neyrobiologiya shuni isbotlaydiki, sog'lom insonning miyasi deyarli cheksiz ma'lumotni saqlay oladi. Mnemonika san'ati quruq raqamlarni yorqin obrazlarga aylantirishga asoslanadi." },
            { title: "30. Kriptografiya", content: "Axborotni yashirish va uni faqat kerakli odam o'qiy olishini ta'minlash ehtiyoji insoniyat yozuvni kashf qilgan ilk davrlardanoq paydo bo'lgan. Kriptografiya maxfiy kodlar va shifrlash san'ati bo'lib, u shohlar, sarkardalar va josuslar o'rtasidagi yozishmalarni himoya qilishda asrlar davomida hal qiluvchi rol o'ynagan. Qadimgi Rimda Yuliy Sezar o'zining harbiy xabarlarini harflarni alifboda uchta o'ringa surish orqali shifrlagan." },
            // 31-40
            { title: "31. Neyromarketing", content: "Neyromarketing iste'molchilarning miya faoliyatini o'rganib, ularning ongsiz ravishda qanday qaror qabul qilishini tahlil qiluvchi fan. Reklama va marketing strategiyalari endilikda oddiy so'rovlar orqali emas, balki miya to'lqinlarini o'lchash orqali ishlab chiqilmoqda. Bu usul iste'molchilarning haqiqiy his-tuyg'ularini aniqlash imkonini beradi." },
            { title: "32. Sun'iy Intellekt va Etika", content: "Sun'iy intellekt tizimlarining rivojlanishi bilan birga, axloqiy masalalar ham kun tartibiga chiqmoqda. Agar avtomobil avariyaga uchrasa, AI kimni himoya qilishi kerak? Yo'lovchini yoki piyodani? Bunday savollarga javob topish muhandislar va faylasuflarning hamkorligini talab qiladi. Axloqiy qoidalar AI rivojlanishining muhim qismidir." },
            { title: "33. Yashil Energiya", content: "Qayta tiklanuvchi energiya manbalari insoniyatning kelajagini belgilaydi. Quyosh, shamol va suv energiyasidan foydalanish nafaqat ekologik, balki iqtisodiy jihatdan ham foydalidir. Yirik davlatlar uglerod chiqindilarini kamaytirish majburiyatini olmoqda. Quyosh panellari va shamol turbinalarining narxi keskin arzonlashib, ularning samaradorligi ortib bormoqda." },
            { title: "34. Robototexnika", content: "Robotlar endilikda faqat zavodlarda emas, balki uylarimizda, shifoxonalarda va hatto kosmosda ham ishlamoqda. Sun'iy intellekt bilan birlashtirilgan robotlar murakkab vazifalarni insonlardan ko'ra tez va aniq bajarishga qodir. Jarrohlik robotlari, tozalovchi robotlar va yetkazib berish dronlari kundalik hayotimizga kirib kelmoqda." },
            { title: "35. 3D Printing", content: "Uch o'lchamli printerlar sanoatni tubdan o'zgartirmoqda. Endilikda oddiy uy printerida o'yinchoq, mebel va hatto uylarni chop etish mumkin. Tibbiyotda esa sun'iy organlar va protezlar chop etilmoqda. Qurilish sohasida 3D printerlar yordamida bir necha soat ichida uylar qurish mumkin." },
            { title: "36. Xalqaro Huquq", content: "Xalqaro huquq mustaqil davlatlar o'rtasidagi munosabatlarni tartibga soluvchi, global tartibsizlik va yadroviy urushlarning oldini olib turuvchi ko'rinmas qoidalar majmuasidir. Birlashgan Millatlar Tashkiloti va Gaagadagi Xalqaro Sud bu tizimning asosiy institutlari hisoblanadi. Jeneva konvensiyalari urush qoidalarini belgilaydi." },
            { title: "37. Kaizen", content: "Yaponlarning Kaizen falsafasi shuni uqtiradiki, inson birdaniga katta o'zgarishlar qilishga urinmasdan, har kuni o'z ustida atigi bir foizlik ijobiy o'zgarish qilsa, yakunda beqiyos natijalarga erishadi. Bu kichik qadamlar nazariyasi hayotning barcha sohalariga tadbiq etilishi mumkin. Uzluksiz takomillashuv falsafasi sanoatda ham keng qo'llaniladi." },
            { title: "38. Musiqa va Miya", content: "Musiqa insoniyatning eng qadimiy va universal tilidir. Neyrobiologlar musiqaning inson miyasiga ta'sirini o'rganganda hayratlanarli xulosaga keldilar: musiqa eshitish miyaning deyarli barcha hududlarini bir vaqtning o'zida faollashtiradi. Dopamin baxt gormoni musiqadan zavqlanish vaqtida ajralib chiqadi. Musiqa terapiyasi tibbiyotda keng qo'llanilmoqda." },
            { title: "39. Ijtimoiy Tarmoqlar", content: "Ijtimoiy tarmoqlar insoniyat aloqa vositalari tarixidagi eng katta inqilob bo'ldi. Dastlab odamlarni bir-biri bilan bog'lash vositasi sifatida yaratilgan bu platformalar bugungi kunda Diqqat iqtisodiyoti deb ataluvchi trillion dollarlik biznesga aylandi. Cheksiz varaqlash va bildirishnomalar miyada dopamin ishlab chiqarishni rag'batlantiradi." },
            { title: "40. Startaplar", content: "Startap bu o'ta yuqori noaniqlik sharoitida innovatsion mahsulot yaratish va qisqa muddat ichida global miqyosda tezkor o'sishga erishish uchun mo'ljallangan tashkilotdir. Oddiy novvoyxona ochish biznes bo'lsa, butun dunyo novvoyxonalarini bitta platformada birlashtiruvchi ilova startapdir. MVP Minimal Ishchi Mahsulot tejamkor startapning asosidir." },
            // 41-50
            { title: "41. Muvaffaqiyatsizlik", content: "Muvaffaqiyat haqidagi kitoblar juda ko'p, ammo muvaffaqiyatsizlikning asl mohiyati va uning shaxs shakllanishidagi o'rni ko'pincha e'tibordan chetda qoladi. Aslida, har bir buyuk g'alaba o'nlab xatolar va mag'lubiyatlar ustiga qurilgan poydevordir. Tomas Edison lampochkani ixtiro qilishdan avval 10,000 marta muvaffaqiyatsizlikka uchragan." },
            { title: "42. Agile va Scrum", content: "Agile shunchaki ish uslubi emas, balki jamoaviy fikrlash tarzi bo'lib, u mijoz ehtiyojlarini birinchi o'ringa qo'yish va mahsulotni kichik qismlar bilan muntazam ravishda topshirishga asoslanadi. Scrumda ishlar sprint deb ataluvchi qisqa muddatli davrlarga bo'linadi. Kundalik yig'ilishlar muammolarni yashirilishini oldini oladi." },
            { title: "43. Zamonaviy San'at", content: "Ko'pchilik odamlar zamonaviy san'at asarlariga qaraganda: Buni men ham chiza olardim-ku degan fikrga borishadi. Biroq zamonaviy san'atda asosiy qadriyat rasmning realistikligida emas, balki uning ortida yotgan g'oyada va u uyg'otadigan hissiyotda yashirin. Marsel Dyushanning oddiy pisuarni ko'rgazma zaliga qo'yishi san'at inqilobi bo'ldi." },
            { title: "44. Raqamli Minimalizm", content: "Raqamli minimalizm texnologiyalardan butunlay voz kechish emas, balki ularni hayotingizga qat'iy va ongli ravishda kiritish falsafasidir. Bu sizning eng qimmatli resursingiz diqqatingizni yirik korporatsiyalar nazoratidan tortib olish demakdir. Bildirishnomalarni o'chirish va raqamli tozalash o'tkazish asab tizimini qayta tiklashga yordam beradi." },
            { title: "45. Yangi Geosiyosat", content: "Dunyo endilikda bitta yoki ikkita super-qudratli davlat atrofida aylanmaydi. Biz Ko'p qutbli dunyo davriga qadam qo'ydik, unda turli mintaqaviy kuchlar va iqtisodiy markazlar o'z so'zini aytishga intilmoqda. Iqtisodiy qurol tushunchasi harbiy kuchdan ko'ra ko'proq ishlatilmoqda. Yarimo'tkazgichlar ishlab chiqarish yangi qudrat belgisidir." },
            { title: "46. Kiber-Psixologiya", content: "Kiber-psixologiya insonning texnologiyalar, internet va virtual olam bilan o'zaro ta'sirini o'rganuvchi zamonaviy fan yo'nalishidir. Biz real hayotda bitta shaxsiyatga ega bo'lsak, raqamli dunyoda mutlaqo boshqacha obrazda namoyon bo'lamiz. Anonimlik internetning eng kuchli va ayni paytda eng xavfli xususiyatidir. Onlayn disinhibitsiya effekti odamlarning o'zini tutishini o'zgartiradi." },
            { title: "47. Smart City", content: "Ikki ming elliginchi yilga kelib dunyo aholisining yetmish foizdan ortig'i shaharlarda yashashi bashorat qilinmoqda. Bu ulkan o'sish an'anaviy shahar infratuzilmalariga juda katta bosim o'tkazadi. Yechim Aqlli shahar konsepsiyasidir. Aqlli shaharlarda transport, energiya va xavfsizlik tizimlari yagona raqamli tarmoqqa bog'langan." },
            { title: "48. Neyro-interfeys", content: "Inson miyasi va kompyuter o'rtasida to'g'ridan-to'g'ri aloqa o'rnatish uzoq vaqt fantastik filmlar mavzusi bo'lib kelgan. Ammo bugun neyro-interfeys texnologiyalari bu chegarani buzib o'tdi. Miya signallarini o'qib, ularni raqamli buyruqlarga aylantirish mumkin. Falaj bo'lib qolgan insonlar neyro-interfeyslar yordamida yana muloqot qilish imkoniga ega bo'lmoqda." },
            { title: "49. Kvant Kompyuterlari", content: "Biz hozirda foydalanayotgan eng kuchli superkompyuterlar ham kvant olamining murakkabliklarini hisoblashda ojizdir. Kvant kompyuterlari kubitlardan foydalanishi orqali hisoblash quvvatini fantastik darajaga ko'taradi. Bu yangi dori vositalarini yaratishda muhim rol o'ynaydi. Kvant chalkashligi hodisasi bir lahzada ma'lumot almashish imkonini beradi." },
            { title: "50. Insoniyatning Taqdiri", content: "Insoniyatning kelajagi nima bo'ladi? Biz qayerga ketyapmiz? Biz hozirda nolinchi tur sivilizatsiyasidan birinchi tur sivilizatsiyasiga o'tish arafasidamiz. Kelajakda bizni ikki xil yo'l kutishi mumkin: yo ekologik halokat, yoki transhumanizm davriga o'tib, biologik chegaralardan chiqish. Koinot milliardlab yillar yashashda davom etadi. Bilim eng katta kuchdir." }
        ];

        // ==========================================
        // ASOSIY KOD
        // ==========================================
        
        // DOM elementlar
        const els = {
            welcome: document.getElementById('welcomeScreen'),
            input: document.getElementById('userNameInput'),
            startBtn: document.getElementById('startBtn'),
            userName: document.getElementById('displayUserName'),
            title: document.getElementById('bookTitle'),
            content: document.getElementById('bookContent'),
            main: document.getElementById('mainContent'),
            nextOverlay: document.getElementById('nextOverlay'),
            nextName: document.getElementById('nextBookName'),
            menu: document.getElementById('menuModal'),
            bookList: document.getElementById('bookList'),
            toast: document.getElementById('exitToast'),
            ttsBtn: document.getElementById('ttsBtn'),
            audioPlayer: document.getElementById('audioPlayer'),
            playPauseBtn: document.getElementById('playPauseBtn'),
            progressBar: document.getElementById('progressBar'),
            speedBtns: document.querySelectorAll('.speed-btn')
        };

        // O'zgaruvchilar
        let currentBookIndex = 0;
        let currentFontSize = 18;
        let exitClicks = 0;
        let exitTimer;
        let lastTapTime = 0;

        // TTS engine
        const tts = new XolericTTS();

        // Paragraph highlight
        tts.onParagraphChange = (index) => {
            document.querySelectorAll('.paragraph').forEach((el, i) => {
                if (i === index) {
                    el.classList.add('active');
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    el.classList.remove('active');
                }
            });
        };

        // Welcome screen
        els.startBtn.addEventListener('click', () => {
            const name = els.input.value.trim() || 'Kitobxon';
            els.userName.innerHTML = `🔊 ${name}`;
            
            els.welcome.style.opacity = '0';
            setTimeout(() => {
                els.welcome.style.visibility = 'hidden';
            }, 300);
            
            initLibrary();
        });

        // Kutubxonani yuklash
        function initLibrary() {
            // Mundarija
            els.bookList.innerHTML = '';
            allBooks.forEach((book, index) => {
                const div = document.createElement('div');
                div.className = 'book-item';
                div.innerText = book.title;
                div.onclick = () => {
                    loadBook(index);
                    els.menu.classList.remove('active');
                };
                els.bookList.appendChild(div);
            });
            
            // Birinchi kitob
            loadBook(0);
        }

        // Kitobni yuklash
        function loadBook(index) {
            if (!allBooks[index]) return;
            
            currentBookIndex = index;
            
            // Sarlavha
            els.title.innerText = allBooks[index].title;
            
            // Matnni paragraflarga ajratish
            const paragraphs = allBooks[index].content.split('. ');
            let html = '';
            paragraphs.forEach((p, i) => {
                if (p.trim()) {
                    html += `<div class="paragraph" data-index="${i}">${p}.</div>`;
                }
            });
            els.content.innerHTML = html;
            
            // Aktiv kitob
            document.querySelectorAll('.book-item').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });
            
            // Ovozni to'xtatish
            tts.stop();
            els.ttsBtn.innerText = '🔊';
            els.audioPlayer.classList.remove('show');
        }

        // TTS tugmasi
        els.ttsBtn.addEventListener('click', () => {
            if (tts.isPlaying) {
                tts.stop();
                els.ttsBtn.innerText = '🔊';
                els.audioPlayer.classList.remove('show');
            } else {
                const text = els.title.innerText + '. ' + els.content.innerText;
                tts.speak(text, Array.from(document.querySelectorAll('.paragraph')));
                els.ttsBtn.innerText = '⏹';
                els.audioPlayer.classList.add('show');
                els.playPauseBtn.innerText = '⏸️';
            }
        });

        // Play/Pause
        els.playPauseBtn.addEventListener('click', () => {
            if (tts.isPlaying) {
                tts.pause();
                els.playPauseBtn.innerText = '▶️';
            } else {
                tts.resume();
                els.playPauseBtn.innerText = '⏸️';
            }
        });

        // Tezlikni sozlash
        els.speedBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const speed = parseFloat(btn.dataset.speed);
                tts.setRate(speed);
                
                els.speedBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        // Shrift o'lchami
        document.getElementById('fontPlus').onclick = () => {
            if (currentFontSize < 30) {
                currentFontSize += 2;
                document.documentElement.style.setProperty('--font-size', `${currentFontSize}px`);
            }
        };
        
        document.getElementById('fontMinus').onclick = () => {
            if (currentFontSize > 14) {
                currentFontSize -= 2;
                document.documentElement.style.setProperty('--font-size', `${currentFontSize}px`);
            }
        };

        // Menyu
        document.getElementById('openMenu').onclick = () => {
            els.menu.classList.add('active');
        };
        
        document.getElementById('closeMenu').onclick = () => {
            els.menu.classList.remove('active');
        };

        // Keyingi kitob
        function showNextOverlay() {
            if (currentBookIndex < allBooks.length - 1) {
                els.nextName.innerText = allBooks[currentBookIndex + 1].title;
                els.nextOverlay.classList.add('show');
                setTimeout(() => {
                    els.nextOverlay.classList.remove('show');
                }, 3000);
            }
        }

        els.main.addEventListener('click', (e) => {
            const now = Date.now();
            if (now - lastTapTime < 300) {
                showNextOverlay();
            }
            lastTapTime = now;
        });

        els.nextOverlay.onclick = () => {
            if (currentBookIndex < allBooks.length - 1) {
                loadBook(currentBookIndex + 1);
                els.nextOverlay.classList.remove('show');
            }
        };

        // Chiqish
        document.body.addEventListener('click', (e) => {
            if (e.target.closest('header') || e.target.closest('.modal-content') || e.target.closest('#welcomeScreen') || e.target.closest('.audio-player')) {
                exitClicks = 0;
                return;
            }

            exitClicks++;
            clearTimeout(exitTimer);

            if (exitClicks >= 2 && exitClicks < 6) {
                els.toast.innerText = `Chiqish uchun yana ${6 - exitClicks} marta bosing`;
                els.toast.classList.add('show');
            }

            if (exitClicks === 6) {
                els.toast.classList.remove('show');
                exitClicks = 0;
                
                tts.stop();
                els.welcome.style.visibility = 'visible';
                els.welcome.style.opacity = '1';
            }

            exitTimer = setTimeout(() => {
                exitClicks = 0;
                els.toast.classList.remove('show');
            }, 500);
        });

        // Progress bar (simulated)
        setInterval(() => {
            if (tts.isPlaying && tts.queue.length > 0) {
                const percent = 100 - (tts.queue.length / 100 * 100);
                els.progressBar.style.width = Math.min(percent, 100) + '%';
            } else if (!tts.isPlaying) {
                els.progressBar.style.width = '0%';
            }
        }, 100);

        // Kontekst menyu
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
