<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>XOLERIC · ULTRA PREMIUM</title>
    <style>
        /* ===== RESET & VARIABLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #14141c;
            --bg-glass: rgba(20, 20, 30, 0.7);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-border-hover: rgba(255, 255, 255, 0.1);
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.4);
            --accent-secondary: #a463f5;
            --text-primary: #ffffff;
            --text-secondary: #b0b0c0;
            --text-muted: #6a6a7a;
            --font-size: 18px;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --shadow-lg: 0 20px 40px -10px rgba(0, 0, 0, 0.6);
            --shadow-glow: 0 0 30px var(--accent-glow);
            --transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* ===== GLOBAL ===== */
        body {
            background-color: var(--bg-primary);
            background-image: radial-gradient(circle at 30% 30%, #1a1a2a 0%, var(--bg-primary) 70%);
            color: var(--text-primary);
            font-family: var(--font-family);
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            user-select: none;
        }

        /* ===== GLASS COMPONENTS ===== */
        .glass {
            background: var(--bg-glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
        }

        .glass-panel {
            background: rgba(18, 18, 24, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
        }

        .glass-card {
            background: rgba(25, 25, 35, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            transition: var(--transition);
        }

        .glass-card:hover,
        .glass-card:active {
            border-color: var(--accent);
            transform: scale(0.98);
        }

        /* ===== TEXT STYLES ===== */
        .text-gradient {
            background: linear-gradient(135deg, #fff 0%, var(--text-secondary) 50%, #fff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .text-accent {
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent-glow);
        }

        /* ===== SCREENS ===== */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.4s ease;
            will-change: transform, opacity;
        }

        #splashScreen {
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-primary);
            opacity: 1;
            transition: opacity 0.6s;
        }

        #splashScreen.hide {
            opacity: 0;
            pointer-events: none;
        }

        #welcomeScreen {
            z-index: 9000;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1e1e2e 0%, #0a0a0f 100%);
            transition: opacity 0.6s, visibility 0.6s;
        }

        #welcomeScreen.hide {
            opacity: 0;
            visibility: hidden;
        }

        #mainScreen {
            transform: translateX(0);
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        #mainScreen.hide {
            transform: translateX(-100%);
        }

        #readerScreen {
            transform: translateX(100%);
            z-index: 2000;
            background: var(--bg-primary);
        }

        #readerScreen.show {
            transform: translateX(0);
        }

        /* ===== SPLASH SCREEN ===== */
        .splash-content {
            text-align: center;
            animation: pulseGlow 2s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .splash-title {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 8px;
            margin-bottom: 20px;
        }

        .splash-sub {
            color: var(--text-muted);
            font-size: 0.9rem;
            letter-spacing: 4px;
        }

        /* ===== WELCOME SCREEN ===== */
        .welcome-container {
            width: 90%;
            max-width: 420px;
            animation: slideUp 0.8s;
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .welcome-box {
            padding: 40px 28px;
            text-align: center;
            border-radius: 40px;
        }

        .welcome-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px var(--accent-glow));
        }

        .welcome-title {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .welcome-sub {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .input-glass {
            width: 100%;
            padding: 18px 24px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            color: white;
            font-size: 1rem;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
            transition: var(--transition);
        }

        .input-glass:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .btn-primary {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:active {
            transform: scale(0.96);
        }

        /* ===== MAIN SCREEN HEADER ===== */
        .main-header {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .user-badge {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        /* ===== SEARCH BAR ===== */
        .search-section {
            padding: 16px 24px 8px;
        }

        .search-container {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 16px 24px;
            background: rgba(20, 20, 28, 0.7);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            outline: none;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--accent);
            background: rgba(30, 30, 40, 0.8);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        /* ===== CATEGORIES ===== */
        .categories-section {
            padding: 16px 24px;
        }

        .categories-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 4px;
        }

        .categories-scroll::-webkit-scrollbar {
            display: none;
        }

        .category-chip {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            white-space: nowrap;
            cursor: pointer;
            transition: var(--transition);
        }

        .category-chip.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .category-chip:active {
            transform: scale(0.94);
        }

        /* ===== BOOKS GRID ===== */
        .books-section {
            flex: 1;
            overflow-y: auto;
            padding: 8px 24px 100px;
            scrollbar-width: none;
        }

        .books-section::-webkit-scrollbar {
            display: none;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
        }

        .book-card {
            background: rgba(25, 25, 35, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px 16px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 180px;
        }

        .book-card:active {
            transform: scale(0.96);
            border-color: var(--accent);
        }

        .book-card.last-read {
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
            background: rgba(108, 92, 231, 0.05);
        }

        .book-number {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .book-title {
            font-size: 1rem;
            font-weight: 700;
            line-height: 1.4;
            color: white;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .book-meta {
            margin-top: auto;
            font-size: 0.7rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ===== READER SCREEN ===== */
        .reader-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 2100;
        }

        .reader-back {
            width: 44px;
            height: 44px;
            border-radius: 44px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: white;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .reader-back:active {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(0.9);
        }

        .reader-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .reader-controls {
            display: flex;
            gap: 8px;
        }

        .reader-btn {
            width: 44px;
            height: 44px;
            border-radius: 44px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: white;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .reader-btn:active {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(0.9);
        }

        /* ===== FONT PANEL ===== */
        .font-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            width: 260px;
            background: rgba(20, 20, 28, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 24px;
            z-index: 2500;
            transform: translateY(-20px);
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            box-shadow: var(--shadow-lg);
        }

        .font-panel.show {
            transform: translateY(0);
            opacity: 1;
            visibility: visible;
        }

        .font-value {
            color: var(--accent);
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 16px;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .font-slider {
            width: 100%;
            height: 60px;
            -webkit-appearance: none;
            background: transparent;
        }

        .font-slider::-webkit-slider-runnable-track {
            width: 100%;
            height: 60px;
            background: 
                repeating-linear-gradient(90deg, 
                    #333 0px, #333 2px, 
                    transparent 2px, transparent 12px
                ),
                repeating-linear-gradient(90deg, 
                    #555 0px, #555 1px, 
                    transparent 1px, transparent 6px
                );
            background-position: center;
            background-repeat: repeat-x;
            background-size: 100% 40px, 100% 20px;
            border-bottom: 1px solid #444;
        }

        .font-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 8px;
            height: 60px;
            background: var(--accent);
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 20px var(--accent);
        }

        /* ===== READER CONTENT ===== */
        .reader-content {
            position: fixed;
            top: 80px;
            bottom: 100px;
            left: 0;
            right: 0;
            overflow-y: auto;
            padding: 24px 24px 40px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }

        .reader-content::-webkit-scrollbar {
            display: none;
        }

        #readTitle {
            font-size: 2rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 40px;
            padding: 0 16px;
        }

        #readContent {
            font-size: var(--font-size);
            line-height: 1.9;
            color: var(--text-secondary);
        }

        #readContent p {
            margin-bottom: 32px;
            padding: 16px 20px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.01);
            border-left: 3px solid transparent;
            transition: all 0.4s;
            cursor: pointer;
        }

        #readContent p.active {
            background: rgba(108, 92, 231, 0.03);
            border-left: 3px solid var(--accent);
            box-shadow: -5px 0 30px var(--accent-glow);
            color: white;
            transform: translateX(5px);
        }

        /* ===== AUDIO PLAYER ===== */
        .audio-player {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            background: rgba(18, 18, 24, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 80px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-lg);
            z-index: 2200;
        }

        .audio-progress-text {
            color: var(--accent);
            font-weight: 800;
            font-size: 0.8rem;
            min-width: 40px;
            text-align: center;
        }

        .audio-progress-track {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        .audio-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
            width: 0%;
            border-radius: 6px;
            box-shadow: 0 0 15px var(--accent);
            transition: width 0.2s;
        }

        .audio-play-btn {
            width: 52px;
            height: 52px;
            border-radius: 52px;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .audio-play-btn:active {
            transform: scale(0.9);
        }

        .audio-play-btn svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--accent);
            border-radius: 40px;
            padding: 12px 24px;
            color: white;
            font-weight: 600;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== UTILITIES ===== */
        .hide {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- SPLASH SCREEN -->
    <div id="splashScreen" class="screen">
        <div class="splash-content">
            <div class="splash-title text-gradient">XOLERIC</div>
            <div class="splash-sub">ULTRA PREMIUM</div>
        </div>
    </div>

    <!-- WELCOME SCREEN -->
    <div id="welcomeScreen" class="screen">
        <div class="welcome-container">
            <div class="welcome-box glass">
                <div class="welcome-icon">📚</div>
                <h1 class="welcome-title">Kutubxona</h1>
                <div class="welcome-sub">50+ KITOB · AUDIO · PREMIUM</div>
                <input type="text" id="userNameInput" class="input-glass" placeholder="Ismingizni kiriting" autocomplete="off">
                <button class="btn-primary" id="startBtn">KIRISH</button>
            </div>
        </div>
    </div>

    <!-- MAIN SCREEN -->
    <div id="mainScreen" class="screen">
        <header class="main-header">
            <div class="logo text-gradient">XOLERIC</div>
            <div class="user-badge" id="displayUserName">MEHMAN</div>
        </header>

        <div class="search-section">
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Kitob qidirish...">
                <span class="search-icon">🔍</span>
            </div>
        </div>

        <div class="categories-section">
            <div class="categories-scroll" id="categoriesContainer">
                <div class="category-chip active" data-category="all">Barchasi</div>
                <div class="category-chip" data-category="1">1-10</div>
                <div class="category-chip" data-category="2">11-20</div>
                <div class="category-chip" data-category="3">21-30</div>
                <div class="category-chip" data-category="4">31-40</div>
                <div class="category-chip" data-category="5">41-50</div>
            </div>
        </div>

        <div class="books-section" id="booksSection">
            <div class="books-grid" id="booksGrid"></div>
        </div>
    </div>

    <!-- READER SCREEN -->
    <div id="readerScreen" class="screen">
        <div class="reader-header">
            <div class="reader-back" id="backBtn">←</div>
            <div class="reader-title" id="readerHeaderTitle">Kitob nomi</div>
            <div class="reader-controls">
                <div class="reader-btn" id="fontBtn">Aa</div>
            </div>
        </div>

        <!-- Font Panel -->
        <div class="font-panel" id="fontPanel">
            <div class="font-value" id="fontValue">18</div>
            <input type="range" class="font-slider" id="fontSlider" min="14" max="36" value="18" step="1">
        </div>

        <!-- Reader Content -->
        <div class="reader-content" id="readerContent">
            <h1 id="readTitle" class="text-gradient"></h1>
            <div id="readContent"></div>
        </div>

        <!-- Audio Player -->
        <div class="audio-player">
            <span class="audio-progress-text" id="progressText">0%</span>
            <div class="audio-progress-track" id="progressTrack">
                <div class="audio-progress-bar" id="progressBar"></div>
            </div>
            <button class="audio-play-btn" id="playBtn">
                <svg id="playIcon" viewBox="0 0 24 24">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                <svg id="pauseIcon" viewBox="0 0 24 24" style="display: none;">
                    <rect x="6" y="4" width="4" height="16"></rect>
                    <rect x="14" y="4" width="4" height="16"></rect>
                </svg>
            </button>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        // ===== KITOBLAR BAZASI =====
        const BOOKS = [
            // 1-10
            { id: 0, title: "1. Mukammallik Kuchi: Kichik Odatlar", category: 1, content: "<p>Hayotimizda yuz beradigan eng katta o'zgarishlar birdaniga bo'lmaydi. Katta yutuqlar har doim ko'zga ko'rinmas, doimiy ravishda takrorlanadigan kichik harakatlarning jamlanmasidir. 'Atomic Habits' konsepsiyasi shuni uqtiradiki, inson o'z ustida har kuni atigi bir foiz (1%) yaxshilanishga erishsa, yil oxiriga kelib u 37 barobar kuchliroq, aqlliroq va tajribaliroq shaxsga aylanadi.</p><p>Aksariyat insonlar motivatsiyaga tayanib ish ko'radilar. Ammo motivatsiya bu vaqtinchalik hissiy holatdir. Haqiqiy va bardavom natijaga erishish uchun insonga motivatsiya emas, balki qat'iy intizom va to'g'ri ishlab chiqilgan tizim kerak. Maqsad belgilash g'oliblar va mag'lublar o'rtasidagi farqni belgilamaydi, chunki ikkalasining ham maqsadi g'alaba qozonishdir. Ularni farqlaydigan narsa – bu maqsad sari eltuvchi kundalik jarayonlar, ya'ni odatlardir.</p><p>Yangi odatni shakllantirish uchun psixologiyada maxsus zanjir mavjud: signal, istak, javob va mukofot. Yaxshi odatlarni shakllantirish uchun ularni ko'zga tashlanadigan, jozibador, bajarishga oson va qoniqarli qilish zarur. Salbiy odatlardan qutulish uchun esa buning aynan teskarisini qilish talab etiladi: ularni ko'zdan uzoqroq, zerikarli, murakkab va foydasiz qilib qo'yish kerak.</p>" },
            { id: 1, title: "2. Kiberxavfsizlik va Tarmoq", category: 1, content: "<p>Zamonaviy raqamli dunyoda eng qimmatli resurs bu — neft yoki oltin emas, balki axborot va ma'lumotlardir. Kiberxavfsizlik butun boshli tarmoq arxitekturasini, serverlar va foydalanuvchilar o'rtasidagi maxfiy ma'lumotlar almashinuvini himoya qilishning murakkab va uzluksiz ilmiy tizimidir. Har bir soniyada dunyo bo'ylab millionlab zararli kodlar va xakerlik hujumlari tarmoqlarni sinovdan o'tkazmoqda.</p><p>Kiberhimoyaning asosi operatsion tizimlarning ichki tuzilishini chuqur tushunishdan boshlanadi. Tizimdagi ochiq portlar, zaif protokollar va kodlardagi kichik mantiqiy xatolar tajribali axloqiy xakerlar (ethical hackers) tomonidan doimiy ravishda penetratsion testlar (pentest) orqali tekshirilib boriladi. Ularning asosiy maqsadi – jinoyatchi xakerlardan (qora shlyapalar) oldin tizimdagi darchalarni topish va ularni yamashdir.</p>" },
            { id: 2, title: "3. Moliyaviy Savodxonlik", category: 1, content: "<p>Boylikning haqiqiy o'lchovi bu sizning qancha ko'p pul topishingiz bilan emas, balki o'sha topilgan pulni qanday boshqarishingiz va uni kelajak uchun saqlab qola olishingiz bilan o'lchanadi. Moliyaviy erkinlik insonning ishlash uchun emas, yashash uchun pul topish tizimini yo'lga qo'ygan holatidir. Buning asosiy siri moliyaviy savodxonlik, ya'ni aktiv va passiv tushunchalarini to'g'ri farqlashda yashirin.</p><p>Kambag'al va o'rta sinf insonlari o'zlariga asosan 'passivlar' sotib olishadi va buni boylik deb o'ylashadi. Masalan, kreditga olingan qimmatbaho avtomobil, eng so'nggi rusumdagi telefon yoki hashamatli uy sizning cho'ntagingizdan har oy pul olib chiqib ketadi. Haqiqiy boylar esa 'aktivlar' yig'adilar. Aktivlar — bu o'z-o'zidan cho'ntagingizga pul keltiruvchi narsalar: biznes, qimmatli qog'ozlar, intellektual mulk yoki ijaraga beriladigan ko'chmas mulkdir.</p>" },
            { id: 3, title: "4. Chuqur Diqqat: Fokus San'ati", category: 1, content: "<p>Hozirgi axborot texnologiyalari asrida chalg'ituvchi omillar shu qadar ko'pki, bitta vazifaga to'liq diqqatni jamlab ishlash noyob va o'ta qimmatbaho qobiliyatga aylanib bormoqda. Kardiologik operatsiya qilayotgan shifokor yoki murakkab tizim kodini yozayotgan dasturchi uchun diqqat – ularning eng asosiy qurolidir. 'Chuqur ish' (Deep Work) tushunchasi insonning o'z aqliy sig'imini maksimal darajada ishlatib, hech qanday chalg'ishlarsiz murakkab qadriyat yaratish holatini anglatadi.</p><p>Aksariyat odamlar kunini elektron pochtalarga javob berish, ijtimoiy tarmoqlardagi tasmasini varaqlash va qisqa videolarni ko'rish bilan, ya'ni 'yuzaki ishlar' (shallow work) bilan o'tkazadilar. Yuzaki ishlar odamga faqat bandlik hissini beradi, ammo iqtisodiy va shaxsiy jihatdan hech qanday katta qiymat yaratmaydi.</p>" },
            { id: 4, title: "5. Kosmik Olam va Koinot", category: 1, content: "<p>Koinot shu qadar ulkan va sirli ki, inson aqli uning o'lchamlarini to'liq tasavvur qilishga ojizdir. Biz tungi osmonga boqib ko'radigan yulduzlarning nuri bizgacha yetib kelishi uchun yillar, hatto millionlab yillar kerak bo'ladi. Bu degani, biz har safar yulduzlarga qaraganimizda aslida o'tmishni, ularning ming yillar oldingi holatini ko'rayotgan bo'lamiz. Koinot tinimsiz kengaymoqda va bu jarayon galaktikalar orasidagi masofani tobora uzoqlashtirmoqda.</p><p>Koinotdagi eng qiziqarli va haligacha to'liq o'rganilmagan obyektlardan biri bu — qora tuynuklardir (Black holes). Ular yulduzlar o'z hayotini yakunlab, ulkan portlashdan (o'ta yangi yulduz portlashi) so'ng o'z ichiga qulab tushishi natijasida hosil bo'ladi. Qora tuynukning tortishish kuchi shu qadar kuchliki, undan hatto eng tezkor narsa — yorug'lik ham qochib qutula olmaydi.</p>" },
            
            // 6-10
            { id: 5, title: "6. Veb-Dasturlash Arxitekturasi", category: 1, content: "<p>Zamonaviy veb-dasturlash shunchaki brauzerda ochiladigan oddiy sahifalar yaratishdan ancha uzoqlashgan. Bugungi kunda u insonlar hayotini osonlashtiruvchi, global miqyosda ishlovchi murakkab raqamli ilovalar qurish san'atidir. Har bir mukammal ishlangan veb-sayt ortida yuzlab soatlik mehnat, mantiqiy yechimlar va foydalanuvchi tajribasini (UX) yaxshilashga qaratilgan tinimsiz izlanishlar yotadi.</p><p>Frontend (foydalanuvchi ko'radigan qism) va Backend (server va mantiq qismi) o'rtasidagi uyg'unlik mukammal dastur ishlashining kafolatidir. Shisha effektlari (Glassmorphism), silliq animatsiyalar va hatto veb-ilovalar ichidagi terminal interfeyslari kabi innovatsion yechimlar foydalanuvchilarni o'ziga jalb qiladi.</p>" },
            { id: 6, title: "7. Kiberhimoya va Tahlil", category: 1, content: "<p>Bugungi kunda har qanday tashkilotning eng muhim boyligi bu uning ma'lumotlar bazasidir. Kiberxavfsizlik ana shu axborotlarni uchinchi shaxslar hujumidan himoya qiluvchi murakkab tizimdir. Tarmoq xavfsizligini ta'minlashda tizimning ichki mexanizmlarini chuqur anglash va zaifliklarni (vulnerabilities) oldindan aniqlash hal qiluvchi ahamiyatga ega.</p><p>Xavfsizlik sohasini o'rganish kishidan yuksak mantiqiy va tahliliy fikrlashni talab qiladi. Dastur kodlarining qanday ishlashini to'liq anglamasdan turib, uni himoya qilish imkonsizdir. Kiberxavfsizlik mutaxassisi nafaqat himoyachi, balki kiber-hujumchining psixologiyasini va texnikalarini tushuna oladigan strateg bo'lishi kerak.</p>" },
            { id: 7, title: "8. Ovoz Muhandisligi: Phonk", category: 1, content: "<p>Musiqa yaratish jarayoni bugungi kunda faqatgina cholg'u asboblarini chalish bilan cheklanmaydi; u to'liq raqamli muhandislik va fizika san'atiga aylangan. Ovoz to'lqinlarini boshqarish, chastotalarni o'zaro moslashtirish va tinglovchiga hissiy ta'sir ko'rsatish zamonaviy musiqaning asosidir. Xususan, elektron musiqa va so'nggi yillarda katta trendga chiqqan Phonk janri o'zining o'zgacha atmosferasi va kuchli basslari (808s) bilan ajralib turadi.</p><p>Bugungi kunda musiqiy prodyuserlar kuchli kompyuterlar va ochiq kodli muhitlarda ham bemalol ijod qila olishmoqda. Eng muhimi — g'oya va tovushlar arxitekturasini his qila olish.</p>" },
            { id: 8, title: "9. Raqamli Savodxonlik", category: 1, content: "<p>Kelajak avlodni tarbiyalashda an'anaviy usullarning o'rni beqiyos, biroq bugungi raqamli asr bolalarning e'tiborini jalb qilish uchun yangicha, interaktiv yondashuvlarni talab qiladi. Bolalarga o'qish va yozishni o'rgatuvchi zamonaviy dasturlar ularning qabul qilish xususiyatlariga to'liq moslashtirilgan bo'lishi kerak. Quruq matnlar va zerikarli qoidalardan voz kechib, jarayonni vizual o'yin darajasiga olib chiqish yuqori samaradorlikni ta'minlaydi.</p>" },
            { id: 9, title: "10. Sun'iy Intellekt Asoslari", category: 1, content: "<p>Sun'iy intellekt (AI) insoniyat tarixidagi eng ulug'vor kashfiyotlardan biriga aylanib ulgurdi. Bir necha o'n yillar oldin u faqatgina fantastika hisoblangan bo'lsa, bugun u kundalik hayotimizning ajralmas mexanizmi. Mashinali o'rganish (Machine Learning) va neyrotarmoqlar kompyuterlarga biz yozib bergan qat'iy qoidalarsiz ham ma'lumotlarni tahlil qilish va qaror qabul qilish imkonini bermoqda.</p><p>Texnologiyaning bu darajada tez rivojlanishi bizga shuni ko'rsatadiki, yaqin kelajakda inson mashinalar bilan raqobatlashmaydi, balki ular bilan hamkorlikda ishlashni o'rganadi.</p>" },
            
            // 11-15 qisqacha
            { id: 10, title: "11. Kvant Fizikasi Mo'jizalari", category: 2, content: "<p>Kvant fizikasi — bu koinotning eng mitti zarrachalari qanday ishlashini o'rganuvchi fan bo'lib, u bizning voqelik haqidagi an'anaviy tasavvurlarimizni butunlay ost-ust qilib yuboradi. Klassik fizikadan farqli o'laroq, kvant olamida jismlar bir vaqtning o'zida ikkita joyda bo'lishi (superpozitsiya) yoki bir-biri bilan koinotning ikki chekkasida turib ham bir zumda aloqa qilishi (kvant chalkashligi) mumkin.</p>" },
            { id: 11, title: "12. Vaqtni Boshqarish San'ati", category: 2, content: "<p>Vaqt — inson hayotidagi yagona qaytarib bo'lmaydigan va sotib olinmaydigan resursdir. Boy va kambag'al, yosh va qari — barchaga bir kunda aynan 24 soat beriladi. Ammo nima uchun ba'zilar bu vaqt ichida ulkan ishlarni amalga oshiradi-yu, boshqalar hatto kundalik yumushlariga ham ulgurmaydi? Buning siri vaqtning o'zida emas, balki diqqatni va ustuvorliklarni (priorities) to'g'ri taqsimlay olishdadir.</p>" },
            { id: 12, title: "13. Psixologiya: Ong Sirlari", category: 2, content: "<p>Inson miyasi koinotdagi eng murakkab va sirli obyektlardan biridir. Uning atigi 1.5 kilogramm keladigan biologik massasi butun boshli sivilizatsiyalarni yaratishga, hissiyotlarni boshdan kechirishga va borliqni anglashga qodir. Psixologiya ana shu ongli va ongsiz jarayonlarni o'rganuvchi fandir.</p>" },
            { id: 13, title: "14. Kriptovalyuta Inqilobi", category: 2, content: "<p>Iqtisodiyot tarixiga nazar tashlasak, pul tizimi doimiy ravishda evolyutsiya qilib kelganini ko'ramiz: tovar ayirboshlashdan tortib, oltin tangalarga, so'ngra qog'oz pullarga va elektron raqamlarga. Bugungi kunda esa moliyaviy dunyo navbatdagi katta inqilob — markazlashmagan raqamli pullar, ya'ni kriptovalyutalar davriga qadam qo'ydi.</p>" },
            { id: 14, title: "15. Bionika: Tabiat Dizayni", category: 2, content: "<p>Bionika (yoki biomimetika) — tabiatdagi biologik mexanizmlarni va ularning ishlash prinsiplarini o'rganib, ularni zamonaviy texnologiyalarga tadbiq etuvchi kelajak fanidir. Tabiat millionlab yillik evolyutsiya davomida mukammal dizayn va yechimlarni yaratgan.</p>" },
            
            // 16-20 qisqacha
            { id: 15, title: "16. Nanotexnologiya", category: 2, content: "<p>Nanotexnologiya — bu moddalarni atom va molekula darajasida (1 dan 100 nanometrgacha bo'lgan o'lchamda) boshqarish va yangi xususiyatlarga ega materiallar yaratish fanidir. Tasavvur qilish uchun, bir nanometr soch tolasidan qariyb 100,000 marta yupqaroqdir.</p>" },
            { id: 16, title: "17. Ekologiya: Sayyora Kelajagi", category: 2, content: "<p>Yer sayyorasi o'zining 4.5 milliard yillik tarixi davomida ko'plab iqlim o'zgarishlarini boshdan kechirgan. Biroq, so'nggi ikki asr ichida, xususan Sanoat inqilobidan keyin yuz berayotgan global isish jarayoni to'g'ridan-to'g'ri inson faoliyati bilan bog'liqdir.</p>" },
            { id: 17, title: "18. Metaolam va Virtual Reallik", category: 2, content: "<p>Internetning evolyutsiyasi endilikda ikki o'lchamli ekranlardan chiqib, bizni to'liq qamrab oluvchi uch o'lchamli fazoga — Metaolamga (Metaverse) ko'chib o'tmoqda. Virtual reallik (VR) va To'ldirilgan reallik (AR) texnologiyalari orqali insonlar raqamli olamni xuddi jismoniy dunyodagidek his qilish imkoniyatiga ega bo'lmoqdalar.</p>" },
            { id: 18, title: "19. Avtomobilsozlik Evolyutsiyasi", category: 2, content: "<p>Yuz yildan ortiq vaqt davomida insoniyatning asosiy transport vositasi bo'lib kelgan ichki yonuv dvigatellari o'z o'rnini elektromobillarga (EV) bo'shatib bermoqda. Bu avtomobilsozlik tarixidagi eng katta va eng tezkor texnologik inqilobdir.</p>" },
            { id: 19, title: "20. Tibbiyotda Gen Tahriri", category: 2, content: "<p>Tibbiyot sohasi inson umrini uzaytirish va hayot sifatini yaxshilashda doim eng ilg'or fan bo'lib kelgan, ammo bugungi kundagi texnologik integratsiya uni fantastika darajasiga olib chiqdi. CRISPR-Cas9 texnologiyasi orqali olimlarga DNK zanjiridagi xato yoki kasallikka sabab bo'luvchi qismni o'zgartirish imkonini beradi.</p>" },
            
            // 21-25
            { id: 20, title: "21. Sotsiologiya va Ommaviy Ong", category: 3, content: "<p>Sotsiologiya insonlarning o'zaro munosabatlarini, jamiyat qanday shakllanishini va uning qanday qonuniyatlar asosida rivojlanishini o'rganuvchi fandir. Biz ko'pincha o'z qarorlarimizni mutlaqo mustaqil qabul qilamiz deb o'ylaymiz, ammo sotsiologik tadqiqotlar shuni ko'rsatadiki, bizning didimiz, e'tiqodimiz va hatto kelajakdagi maqsadlarimiz ham biz yashayotgan jamiyat tomonidan shakllantiriladi.</p>" },
            { id: 21, title: "22. Kino San'ati Tarixi", category: 3, content: "<p>Kino — bu insoniyat kashf etgan san'at turlarining eng yoshi, ammo eng ta'sirchanidir. XIX asr oxirida aka-uka Lyumyerlar tomonidan namoyish etilgan 'Poyezdning yetib kelishi' nomli qisqa metrajli ovozsiz videodan tortib, bugungi kundagi milliard dollarlik byudjetga ega Gollivud blokbasterlarigacha bo'lgan yo'l — texnologiya va inson xayolotining ajoyib evolyutsiyasidir.</p>" },
            { id: 22, title: "23. Arxitektura va Estetika", category: 3, content: "<p>Arxitektura shunchaki odamlarni sovuqdan yoki yomg'irdan himoya qiluvchi to'rt devor va tomdan iborat emas. U muhandislik, san'at va psixologiyaning mukammal kesishuv nuqtasidir. Qadimgi faylasuflar arxitekturani 'muzlagan musiqa' deb atashgan, chunki undagi proporsiyalar, ritm va garmoniya xuddi musiqiy asardek inson ruhiyatiga ta'sir qiladi.</p>" },
            { id: 23, title: "24. Global Logistika", category: 3, content: "<p>Siz ushbu matnni o'qib turgan smartfoningiz qanday yaratilgani haqida hech o'ylab ko'rganmisiz? Uning ekrani Koreyada ishlangan, protsessori Tayvanda yasalgan, akkumulyatoridagi litiy Afrikadan qazib olingan, dizayni AQShda chizilgan va yakunda Xitoyda yig'ilib, sizning qo'lingizga yetib kelgan. Bu murakkab zanjir — global logistika va savdo tizimining mo'jizasi hisoblanadi.</p>" },
            { id: 24, title: "25. Diplomatiya: Yumshoq Kuch", category: 3, content: "<p>Insoniyat tarixi qonli urushlar bilan to'la bo'lsa-da, bugungi kunda dunyoni ushlab turgan narsa qurol emas, balki so'z va kelishuvlardir. Diplomatiya — bu davlatlar o'rtasidagi manfaatlarni tinch yo'l bilan hal etish, nizo va ziddiyatlarning oldini olish san'ati hisoblanadi.</p>" },
            
            // 26-30
            { id: 25, title: "26. Mifologiya: Qadimgi Sirlar", category: 3, content: "<p>Insoniyat o'zining butun tarixi davomida atrof-muhitdagi tushunarsiz hodisalarni anglashga intilgan. Qadimgi dunyo odamlari uchun chaqmoq, zilzila yoki quyosh tutilishi shunchaki tabiat hodisasi emas, balki ilohiy kuchlarning g'azabi yoki ishorasi bo'lib tuyulgan. Mifologiya — qadimgi insonlarning koinot, hayot va o'lim haqidagi ibtidoiy, ammo o'ta murakkab tasavvurlari majmuasidir.</p>" },
            { id: 26, title: "27. Biologik Xilma-xillik", category: 3, content: "<p>Yer sayyorasi koinotdagi hozircha bizga ma'lum bo'lgan yagona tiriklik maskanidir. Bu tiriklikning eng katta mo'jizasi uning cheksiz xilma-xilligidadir. Biologik xilma-xillik (Biodiversitet) — bu mikroskopik bakteriyalardan tortib, bahaybat ko'k kitlargacha bo'lgan barcha tirik organizmlarning va ular yashaydigan ekotizimlarning o'zaro murakkab tarmog'idir.</p>" },
            { id: 27, title: "28. Koinotni O'zlashtirish", category: 3, content: "<p>Odamzot qadim zamonlardan beri osmonga boqib, yulduzlar ortida nima borligiga qiziqib kelgan. XX asrning o'rtalariga kelib, texnologik taraqqiyot bu azaliy orzuni haqiqatga aylantirdi. 1957-yilda Yerning birinchi sun'iy yo'ldoshi uchirilishi va ko'p o'tmay insonning fazoga parvozi insoniyat tarixidagi eng buyuk sakrashlardan biri bo'ldi.</p>" },
            { id: 28, title: "29. Xotirani Kuchaytirish", category: 3, content: "<p>Inson xotirasi shunchaki ma'lumotlarni saqlovchi passiv arxiv emas, balki uzluksiz ishlaydigan va o'zgarib turadigan o'ta murakkab neyrobiologik jarayondir. Biz ko'pincha 'mening xotiram yomon' deb nolishga odatlanganmiz, ammo zamonaviy neyrobiologiya shuni isbotlaydiki, sog'lom insonning miyasi deyarli cheksiz miqdordagi axborotni saqlash salohiyatiga ega.</p>" },
            { id: 29, title: "30. Kriptografiya Ilmi", category: 3, content: "<p>Axborotni yashirish va uni faqat kerakli odam o'qiy olishini ta'minlash ehtiyoji insoniyat yozuvni kashf qilgan ilk davrlardanoq paydo bo'lgan. Kriptografiya — maxfiy kodlar va shifrlash san'ati bo'lib, u shohlar, sarkardalar va josuslar o'rtasidagi yozishmalarni himoya qilishda asrlar davomida hal qiluvchi rol o'ynagan.</p>" },
            
            // 31-35 qisqacha
            { id: 30, title: "31. Bioxaking: Tana Dasturlash", category: 4, content: "<p>Bioxaking (Biohacking) — bu inson tanasining biologik tizimlarini optimallashtirish va ularning ish faoliyatini yaxshilashga qaratilgan ilmiy va amaliy yondashuvdir. Bu uyquni, ovqatlanishni va jismoniy faollikni ilmiy asosda boshqarish orqali miya va tana ishini maksimal darajaga olib chiqishdir.</p>" },
            { id: 31, title: "32. Minimalizm Falsafasi", category: 4, content: "<p>Minimalizm — bu shunchaki kam narsaga ega bo'lish emas, balki hayotdagi eng muhim narsalarga e'tiborni qaratish falsafasidir. U ortiqcha moddiy narsalar va raqamli chalg'itishlardan voz kechib, insonning o'ziga, munosabatlariga va ma'naviy rivojlanishiga ko'proq vaqt ajratishga undaydi.</p>" },
            { id: 32, title: "33. Kvant Ruhiyati", category: 4, content: "<p>Kvant ruhiyati — zamonaviy kvant fizikasi kashfiyotlari bilan qadimgi falsafiy va ruhiy ta'limotlar o'rtasidagi bog'liqlikni o'rganuvchi yo'nalishdir. U kuzatuvchining ongi haqiqatni shakllantirishda qanday rol o'ynashi mumkinligi haqidagi savollarni o'rtaga tashlaydi.</p>" },
            { id: 33, title: "34. Axborot Urushi", category: 4, content: "<p>Axborot urushi — bu zamonaviy dunyoda davlatlar va tashkilotlar o'rtasidagi kurashning eng muhim frontlaridan biridir. U qarama-qarshi tomonning axborot tizimlariga hujum qilish, jamoatchilik fikrini manipulyatsiya qilish va noto'g'ri ma'lumotlar (dezinformatsiya) tarqatish orqali siyosiy va harbiy maqsadlarga erishishni o'z ichiga oladi.</p>" },
            { id: 34, title: "35. Mikrobiom: Ichki Koinot", category: 4, content: "<p>Inson tanasida, ayniqsa ichaklarimizda trillionlab bakteriyalar, viruslar va zamburug'lar yashaydi. Bu mikroorganizmlar yig'indisi mikrobiom deb ataladi va uning umumiy og'irligi 2 kilogrammgacha yetishi mumkin. So'nggi tadqiqotlar shuni ko'rsatadiki, mikrobiom nafaqat ovqat hazm qilishga, balki kayfiyat, immunitet va hatto vaznga ham kuchli ta'sir qiladi.</p>" },
            
            // 36-40
            { id: 35, title: "36. Xalqaro Huquq", category: 4, content: "<p>Xalqaro huquq — bu mustaqil davlatlar o'rtasidagi munosabatlarni tartibga soluvchi, global xaos (tartibsizlik) va yadroviy urushlarning oldini olib turuvchi ko'rinmas qoidalar majmuasidir. Agar milliy huquq bitta davlat ichidagi fuqarolar o'rtasidagi munosabatlarni boshqarsa, xalqaro huquq Yer yuzidagi barcha suveren davlatlarni yagona o'yin qoidalariga bo'ysundirishga harakat qiladi.</p>" },
            { id: 36, title: "37. Kaizen: O'z-o'zini Rivojlantirish", category: 4, content: "<p>Yaponlarning mashhur 'Kaizen' (Uzluksiz takomillashuv) falsafasi shuni uqtiradiki, inson birdaniga katta o'zgarishlar qilishga urinmasdan, har kuni o'z ustida atigi 1 foizlik ijobiy o'zgarish qilsa, yakunda beqiyos natijalarga erishadi.</p>" },
            { id: 37, title: "38. Musiqa Neyrobiologiyasi", category: 4, content: "<p>Musiqa insoniyatning eng qadimiy va universal tilidir. Neyrobiologlar musiqaning inson miyasiga ta'sirini o'rganganda hayratlanarli xulosaga keldilar: musiqa eshitish yoki cholg'u asbobini chalish miyaning faqatgina bitta qismini emas, balki deyarli barcha hududlarini bir vaqtning o'zida faollashtiruvchi yagona mashg'ulotdir.</p>" },
            { id: 38, title: "39. Ijtimoiy Tarmoqlar Qaramligi", category: 4, content: "<p>Ijtimoiy tarmoqlar dizayni tasodifan yaratilmagan; ular inson psixologiyasi va qimor o'yinlari (kazinolar) ishlash prinsiplaridan ilhomlangan holda qurilgan. Cheksiz varaqlash (Infinite scroll), 'layk' bosish va bildirishnomalar (notifications) miyada o'zgaruvchan mukofotlash tizimini ishga tushiradi.</p>" },
            { id: 39, title: "40. Startaplar Anatomiyasi", category: 4, content: "<p>Startap – bu shunchaki yangi ochilgan kichik biznes emas. Startap – bu o'ta yuqori noaniqlik sharoitida innovatsion mahsulot yoki xizmatni yaratish va qisqa muddat ichida global miqyosda tezkor o'sishga (scaling) erishish uchun mo'ljallangan vaqtinchalik tashkilotdir.</p>" },
            
            // 41-45
            { id: 40, title: "41. Muvaffaqiyatsizlik Saboqlari", category: 5, content: "<p>Muvaffaqiyat haqidagi kitoblar juda ko'p, ammo muvaffaqiyatsizlikning asl mohiyati va uning shaxs shakllanishidagi o'rni ko'pincha e'tibordan chetda qoladi. Aslida, har bir buyuk g'alaba – bu o'nlab, ba'zan yuzlab xatolar va mag'lubiyatlar ustiga qurilgan poydevordir.</p>" },
            { id: 41, title: "42. Agile va Scrum", category: 5, content: "<p>Zamonaviy dunyoda ishlar shu qadar tez o'zgaradiki, bir necha yil oldin tuzilgan reja bugun o'z kuchini yo'qotishi mumkin. Agile (Egiluvchan) – bu shunchaki ish uslubi emas, balki jamoaviy fikrlash tarzi bo'lib, u mijoz ehtiyojlarini birinchi o'ringa qo'yish va mahsulotni kichik-kichik qismlar bilan muntazam ravishda topshirishga asoslanadi.</p>" },
            { id: 42, title: "43. Zamonaviy San'at", category: 5, content: "<p>Ko'pchilik odamlar zamonaviy san'at asarlariga qaraganda: 'Buni men ham chiza olardim-ku!' degan fikrga borishadi. Biroq zamonaviy san'atda asosiy qadriyat – bu rasmning qanchalik realistik chizilganida emas, balki uning ortida yotgan g'oyada va u uyg'otadigan hissiyotda yashirin.</p>" },
            { id: 43, title: "44. Raqamli Minimalizm", category: 5, content: "<p>Biz axborot to'lqinlari ichida suzayotgan emas, balki ularning ostida qolib g'arq bo'layotgan avlodmiz. Raqamli minimalizm – bu texnologiyalardan butunlay voz kechish emas, balki ularni hayotingizga qat'iy va ongli ravishda kiritish falsafasidir.</p>" },
            { id: 44, title: "45. Yangi Geosiyosat", category: 5, content: "<p>Dunyo endilikda bitta yoki ikkita super-qudratli davlat atrofida aylanmaydi. Biz 'Ko'p qutbli dunyo' (Multipolar world) davriga qadam qo'ydik, unda turli mintaqaviy kuchlar va iqtisodiy markazlar o'z so'zini aytishga intilmoqda.</p>" },
            
            // 46-50
            { id: 45, title: "46. Kiber-Psixologiya", category: 5, content: "<p>Kiber-psixologiya — bu insonning texnologiyalar, internet va virtual olam bilan o'zaro ta'sirini o'rganuvchi zamonaviy fan yo'nalishidir. Biz real hayotda bitta shaxsiyatga ega bo'lsak, raqamli dunyoda mutlaqo boshqacha obrazda namoyon bo'lamiz.</p>" },
            { id: 46, title: "47. Smart City", category: 5, content: "<p>2050-yilga kelib dunyo aholisining 70 foizdan ortig'i shaharlarda yashashi bashorat qilinmoqda. Bu ulkan o'sish an'anaviy shahar infratuzilmalariga juda katta bosim o'tkazadi. Yechim — 'Aqlli shahar' (Smart City) konsepsiyasidir.</p>" },
            { id: 47, title: "48. Neyro-interfeys", category: 5, content: "<p>Inson miyasi va kompyuter o'rtasida to'g'ridan-to'g'ri aloqa o'rnatish uzoq vaqt fantastik filmlar mavzusi bo'lib kelgan. Ammo bugun BCI (Brain-Computer Interface) texnologiyalari bu chegarani buzib o'tdi.</p>" },
            { id: 48, title: "49. Kvant Kompyuterlari", category: 5, content: "<p>Kvant kompyuterlari bitlar o'rniga kubitlardan (quantum bits) foydalanishi orqali hisoblash quvvatini fantastik darajaga ko'taradi. Bu texnologiya nafaqat yangi dori vositalarini yaratishda, balki koinotning eng qadimiy sirlarini simulyatsiya qilishda yagona yo'ldir.</p>" },
            { id: 49, title: "50. Insoniyatning Yakuniy Taqdiri", category: 5, content: "<p>Biz ushbu 50 ta kitoblik sayohatimizning so'nggi nuqtasiga yetib keldik. Insoniyatning kelajagi nima bo'ladi? Biz qayerga ketyapmiz? Bu savollar har bir ongli mavjudotni o'ylantirishi tabiiy. Biz hozirda 'Kardashev shkalasi' bo'yicha 0-tur sivilizatsiyasidan 1-tur sivilizatsiyasiga o'tish arafasidamiz.</p><p>Koinot milliardlab yillar yashashda davom etadi. Quyoshimiz so'nganidan keyin ham insoniyat (yoki uning raqamli avlodlari) boshqa yulduz tizimlarida hayot kechirishi mumkin. Bu kutubxona sizga dunyoni tushunishda kichik bir chiroq bo'ldi degan umiddamiz. Bilim — bu chegara bilmas kuchdir.</p>" }
        ];

        // ===== STATE =====
        const state = {
            user: localStorage.getItem('xoleric_user') || null,
            lastBook: localStorage.getItem('xoleric_lastBook') ? parseInt(localStorage.getItem('xoleric_lastBook')) : null,
            fontSize: 18,
            currentBook: null,
            currentCategory: 'all',
            searchQuery: '',
            isPlaying: false,
            currentParagraph: 0,
            paragraphs: []
        };

        // ===== DOM ELEMENTS =====
        const dom = {
            splash: document.getElementById('splashScreen'),
            welcome: document.getElementById('welcomeScreen'),
            main: document.getElementById('mainScreen'),
            reader: document.getElementById('readerScreen'),
            userNameInput: document.getElementById('userNameInput'),
            startBtn: document.getElementById('startBtn'),
            displayUserName: document.getElementById('displayUserName'),
            booksGrid: document.getElementById('booksGrid'),
            searchInput: document.getElementById('searchInput'),
            categories: document.querySelectorAll('.category-chip'),
            backBtn: document.getElementById('backBtn'),
            fontBtn: document.getElementById('fontBtn'),
            fontPanel: document.getElementById('fontPanel'),
            fontSlider: document.getElementById('fontSlider'),
            fontValue: document.getElementById('fontValue'),
            readTitle: document.getElementById('readTitle'),
            readContent: document.getElementById('readContent'),
            readerHeaderTitle: document.getElementById('readerHeaderTitle'),
            playBtn: document.getElementById('playBtn'),
            playIcon: document.getElementById('playIcon'),
            pauseIcon: document.getElementById('pauseIcon'),
            progressBar: document.getElementById('progressBar'),
            progressText: document.getElementById('progressText'),
            progressTrack: document.getElementById('progressTrack'),
            readerContent: document.getElementById('readerContent'),
            toast: document.getElementById('toast')
        };

        // ===== UTILITIES =====
        function showToast(msg, duration = 2000) {
            dom.toast.textContent = msg;
            dom.toast.classList.add('show');
            setTimeout(() => dom.toast.classList.remove('show'), duration);
        }

        function vibrate(ms) {
            if (window.navigator && window.navigator.vibrate) {
                try { window.navigator.vibrate(ms); } catch (e) {}
            }
        }

        // ===== SPLASH SCREEN =====
        setTimeout(() => {
            dom.splash.classList.add('hide');
        }, 2000);

        // ===== WELCOME SCREEN =====
        if (state.user) {
            dom.userNameInput.style.display = 'none';
            dom.displayUserName.textContent = state.user.toUpperCase();
            setTimeout(() => {
                dom.welcome.classList.add('hide');
                dom.main.classList.remove('hide');
                renderLibrary();
            }, 2000);
        }

        dom.startBtn.addEventListener('click', () => {
            const name = dom.userNameInput.value.trim();
            if (name.length < 2) {
                showToast('Ismingizni kiriting');
                return;
            }
            
            state.user = name;
            localStorage.setItem('xoleric_user', name);
            dom.displayUserName.textContent = name.toUpperCase();
            
            vibrate(50);
            dom.welcome.classList.add('hide');
            dom.main.classList.remove('hide');
            renderLibrary();
            
            // Fullscreen
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
        });

        // ===== RENDER LIBRARY =====
        function renderLibrary() {
            let filtered = BOOKS;
            
            // Filter by category
            if (state.currentCategory !== 'all') {
                filtered = filtered.filter(b => b.category === parseInt(state.currentCategory));
            }
            
            // Filter by search
            if (state.searchQuery) {
                const query = state.searchQuery.toLowerCase();
                filtered = filtered.filter(b => b.title.toLowerCase().includes(query));
            }
            
            dom.booksGrid.innerHTML = '';
            
            filtered.forEach(book => {
                const isLastRead = state.lastBook === book.id;
                
                const card = document.createElement('div');
                card.className = `book-card ${isLastRead ? 'last-read' : ''}`;
                card.innerHTML = `
                    <div class="book-number">${isLastRead ? '▶ DAVOM' : `KITOB ${book.id + 1}`}</div>
                    <div class="book-title">${book.title.replace(/^\d+\.\s*/, '')}</div>
                    <div class="book-meta">${book.content.length > 100 ? '📖 5 min' : '📖 3 min'}</div>
                `;
                
                card.addEventListener('click', () => {
                    vibrate(30);
                    openBook(book.id);
                });
                
                dom.booksGrid.appendChild(card);
            });
        }

        // ===== CATEGORIES =====
        dom.categories.forEach(cat => {
            cat.addEventListener('click', () => {
                dom.categories.forEach(c => c.classList.remove('active'));
                cat.classList.add('active');
                state.currentCategory = cat.dataset.category;
                renderLibrary();
                vibrate(20);
            });
        });

        // ===== SEARCH =====
        dom.searchInput.addEventListener('input', (e) => {
            state.searchQuery = e.target.value;
            renderLibrary();
        });

        // ===== OPEN BOOK =====
        function openBook(id) {
            const book = BOOKS.find(b => b.id === id);
            if (!book) return;
            
            state.currentBook = book;
            state.lastBook = id;
            localStorage.setItem('xoleric_lastBook', id);
            
            dom.readTitle.textContent = book.title;
            dom.readContent.innerHTML = book.content;
            dom.readerHeaderTitle.textContent = book.title.length > 30 ? book.title.substring(0, 30) + '...' : book.title;
            
            // Parse paragraphs for TTS
            state.paragraphs = Array.from(dom.readContent.querySelectorAll('p'));
            state.currentParagraph = 0;
            
            // Reset player
            resetPlayer();
            
            // Show reader
            dom.main.classList.add('hide');
            dom.reader.classList.add('show');
            
            // Scroll to top
            dom.readerContent.scrollTop = 0;
            
            // Update library to show last read
            renderLibrary();
        }

        // ===== BACK BUTTON =====
        dom.backBtn.addEventListener('click', () => {
            vibrate(20);
            stopTTS();
            dom.reader.classList.remove('show');
            dom.main.classList.remove('hide');
            
            // Hide font panel
            dom.fontPanel.classList.remove('show');
        });

        // ===== FONT CONTROLS =====
        let pressTimer;
        
        dom.fontBtn.addEventListener('mousedown', () => {
            pressTimer = setTimeout(() => {
                vibrate(40);
                dom.fontPanel.classList.add('show');
            }, 600);
        });
        
        dom.fontBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            pressTimer = setTimeout(() => {
                vibrate(40);
                dom.fontPanel.classList.add('show');
            }, 600);
        });
        
        dom.fontBtn.addEventListener('mouseup', () => clearTimeout(pressTimer));
        dom.fontBtn.addEventListener('mouseleave', () => clearTimeout(pressTimer));
        dom.fontBtn.addEventListener('touchend', () => clearTimeout(pressTimer));
        
        dom.fontSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            dom.fontValue.textContent = val;
            document.documentElement.style.setProperty('--font-size', `${val}px`);
            state.fontSize = val;
        });
        
        // Close font panel when clicking outside
        document.addEventListener('click', (e) => {
            if (!dom.fontPanel.contains(e.target) && e.target !== dom.fontBtn) {
                dom.fontPanel.classList.remove('show');
            }
        });

        // ===== TTS ENGINE =====
        const synth = window.speechSynthesis;
        let utterance = null;
        
        function updateProgress() {
            if (!state.paragraphs.length) return;
            const percent = Math.floor((state.currentParagraph / (state.paragraphs.length - 1)) * 100) || 0;
            dom.progressBar.style.width = percent + '%';
            dom.progressText.textContent = percent + '%';
        }
        
        function highlightParagraph(index) {
            state.paragraphs.forEach(p => p.classList.remove('active'));
            if (state.paragraphs[index]) {
                state.paragraphs[index].classList.add('active');
                
                // Scroll to paragraph
                const p = state.paragraphs[index];
                const container = dom.readerContent;
                const offset = p.offsetTop - container.offsetTop - (container.clientHeight / 2) + (p.clientHeight / 2);
                container.scrollTo({ top: Math.max(0, offset), behavior: 'smooth' });
            }
        }
        
        function playNext() {
            if (!state.isPlaying) return;
            
            if (state.currentParagraph >= state.paragraphs.length) {
                stopTTS();
                return;
            }
            
            highlightParagraph(state.currentParagraph);
            
            const text = state.paragraphs[state.currentParagraph].textContent;
            utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.95;
            utterance.lang = 'uz-UZ';
            
            utterance.onend = () => {
                state.currentParagraph++;
                updateProgress();
                playNext();
            };
            
            utterance.onerror = () => {
                state.currentParagraph++;
                playNext();
            };
            
            synth.speak(utterance);
        }
        
        function togglePlay() {
            if (!state.currentBook) return;
            
            if (state.isPlaying) {
                synth.pause();
                state.isPlaying = false;
                dom.playIcon.style.display = 'block';
                dom.pauseIcon.style.display = 'none';
            } else {
                if (synth.paused) {
                    synth.resume();
                } else {
                    playNext();
                }
                state.isPlaying = true;
                dom.playIcon.style.display = 'none';
                dom.pauseIcon.style.display = 'block';
            }
        }
        
        function stopTTS() {
            synth.cancel();
            state.isPlaying = false;
            state.currentParagraph = 0;
            dom.playIcon.style.display = 'block';
            dom.pauseIcon.style.display = 'none';
            dom.progressBar.style.width = '0%';
            dom.progressText.textContent = '0%';
            state.paragraphs.forEach(p => p.classList.remove('active'));
        }
        
        function resetPlayer() {
            stopTTS();
            state.currentParagraph = 0;
            updateProgress();
        }
        
        // ===== PLAY BUTTON =====
        dom.playBtn.addEventListener('click', () => {
            vibrate(30);
            togglePlay();
        });
        
        // ===== PROGRESS TRACK =====
        dom.progressTrack.addEventListener('click', (e) => {
            if (!state.paragraphs.length) return;
            
            const rect = dom.progressTrack.getBoundingClientRect();
            const percent = ((e.clientX - rect.left) / rect.width) * 100;
            const newIndex = Math.floor((percent / 100) * (state.paragraphs.length - 1));
            
            state.currentParagraph = Math.min(newIndex, state.paragraphs.length - 1);
            
            if (state.isPlaying) {
                synth.cancel();
                playNext();
            } else {
                highlightParagraph(state.currentParagraph);
            }
            
            updateProgress();
            vibrate(20);
        });

        // ===== DOUBLE TAP FOR NEXT BOOK =====
        let lastTap = 0;
        
        dom.readerContent.addEventListener('click', (e) => {
            const now = Date.now();
            if (now - lastTap < 300) {
                // Double tap detected
                const nextId = state.currentBook.id + 1;
                if (nextId < BOOKS.length) {
                    stopTTS();
                    openBook(nextId);
                    showToast('Keyingi kitob');
                }
            }
            lastTap = now;
        });

        // ===== PREVENT CONTEXT MENU =====
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        // ===== INITIAL RENDER =====
        renderLibrary();
    </script>
</body>
</html>
