<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d0d12">
    <title>XOLƎRIƆ Kutubxonasi</title>
    <style>
        :root {
            --bg-dark: #0d0d12;
            --text-main: #e2e2e9;
            --text-muted: #9494a0;
            --accent: #6c8aff;
            --highlight: #ffcc00;
            --glass-bg: rgba(25, 25, 35, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --font-size: 18px;
            --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* Mobile Scroll BUG fixed: removed overflow: hidden from body */
        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top, #1a1a2e 0%, var(--bg-dark) 80%);
            color: var(--text-main);
            font-family: var(--font-family);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* --- Welcome Screen --- */
        #welcomeScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        .welcome-box {
            padding: 40px; border-radius: 24px;
            text-align: center; width: 90%; max-width: 400px;
        }
        .welcome-box h1 { font-size: 2.2rem; margin-bottom: 10px; color: #fff; letter-spacing: 2px;}
        .welcome-box p { color: var(--text-muted); margin-bottom: 25px; font-size: 0.95rem; }
        .welcome-box input {
            width: 100%; padding: 15px; border-radius: 12px;
            border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3);
            color: #fff; font-size: 1.1rem; outline: none; text-align: center;
            margin-bottom: 20px; transition: border 0.3s;
        }
        .welcome-box input:focus { border-color: var(--accent); }
        .welcome-box button {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: var(--accent); color: #fff; font-size: 1.1rem; font-weight: 600;
            cursor: pointer; transition: transform 0.2s, background 0.2s;
        }
        .welcome-box button:active { transform: scale(0.97); }

        /* --- Header --- */
        header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border); z-index: 10; position: sticky; top: 0;
        }
        .user-name { font-weight: 600; color: var(--accent); font-size: 1.1rem; }
        .controls { display: flex; gap: 10px; }
        .icon-btn {
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            color: var(--text-main); width: 40px; height: 40px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.2rem; cursor: pointer; transition: all 0.2s;
        }
        .icon-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.1); }

        /* --- Main Content --- */
        main {
            flex: 1; overflow-y: auto; padding: 30px 20px 150px 20px;
            scroll-behavior: smooth;
        }
        main::-webkit-scrollbar { width: 5px; }
        main::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 5px; }
        
        .book-container { max-width: 800px; margin: 0 auto; }
        #bookTitle { font-size: 2.2rem; margin-bottom: 30px; color: #fff; text-align: center; }
        #bookContent { font-size: var(--font-size); line-height: 1.8; text-align: justify; transition: font-size 0.3s ease; }
        #bookContent p { margin-bottom: 20px; transition: color 0.3s, background 0.3s; padding: 5px; border-radius: 8px; }
        
        /* Audio Highlight */
        .reading-active { color: #fff; background: rgba(108, 138, 255, 0.15); border-left: 3px solid var(--accent); padding-left: 15px !important; }

        /* --- TTS Audio Player Bar --- */
        .tts-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 450px; padding: 15px 20px; border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 50; gap: 15px;
        }
        .tts-controls { display: flex; gap: 15px; align-items: center; }
        .tts-btn {
            background: var(--accent); border: none; color: white;
            width: 45px; height: 45px; border-radius: 50%; font-size: 1.2rem;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            box-shadow: 0 4px 15px rgba(108, 138, 255, 0.4); transition: 0.2s;
        }
        .tts-btn.stop { background: #ff4757; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4); }
        .tts-btn:active { transform: scale(0.9); }
        .speed-control { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .speed-control label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; }
        .speed-control input[type=range] { width: 100%; accent-color: var(--accent); }

        /* --- Next Book Overlay --- */
        .next-overlay {
            position: fixed; bottom: -120px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 350px; padding: 20px; border-radius: 20px;
            text-align: center; z-index: 60;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .next-overlay.show { bottom: 90px; }
        .next-btn-circle {
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--accent); color: #fff; font-size: 1.2rem; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            margin: 0 auto 10px auto; box-shadow: 0 4px 15px rgba(108, 138, 255, 0.4);
        }

        /* --- Menu Modal --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: flex-end;
            z-index: 100; opacity: 0; visibility: hidden; transition: all 0.3s;
        }
        .modal.active { opacity: 1; visibility: visible; }
        .modal-content {
            width: 100%; max-width: 600px; height: 80vh;
            border-radius: 24px 24px 0 0; padding: 25px;
            display: flex; flex-direction: column;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal.active .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { background: none; border: none; color: var(--text-muted); font-size: 1.8rem; cursor: pointer; }
        
        .book-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 5px; }
        .book-list::-webkit-scrollbar { width: 4px; }
        .book-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }
        .book-item {
            padding: 15px; border-radius: 12px; border: 1px solid transparent;
            cursor: pointer; transition: 0.2s; color: var(--text-main);
        }
        .book-item:active, .book-item.active { background: rgba(255,255,255,0.05); border-color: var(--accent); }

        /* --- Toast --- */
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 100, 100, 0.15); border: 1px solid #ff6464; color: #ff6464;
            padding: 10px 20px; border-radius: 20px; font-size: 0.9rem;
            opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 1000;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div id="welcomeScreen">
        <div class="welcome-box glass">
            <h1>XOLƎRIƆ</h1>
            <p>Raqamli Kutubxona va Audio-kitoblar</p>
            <input type="text" id="userNameInput" placeholder="Ismingizni kiriting...">
            <button id="startBtn">Kirish</button>
        </div>
    </div>

    <div class="toast glass" id="exitToast"></div>

    <header class="glass">
        <div class="user-name" id="displayUserName">O'quvchi</div>
        <div class="controls">
            <button class="icon-btn" id="fontMinus">-</button>
            <button class="icon-btn" id="fontPlus">+</button>
            <button class="icon-btn" id="openMenu">📚</button>
        </div>
    </header>

    <main id="mainContent">
        <div class="book-container">
            <h1 id="bookTitle">Kutubxona yuklanmoqda...</h1>
            <div id="bookContent"></div>
        </div>
    </main>

    <div class="tts-bar glass">
        <div class="tts-controls">
            <button class="tts-btn" id="ttsPlayBtn">▶️</button>
            <button class="tts-btn stop" id="ttsStopBtn">⏹</button>
        </div>
        <div class="speed-control">
            <label id="speedLabel">Tezlik: 1.0x</label>
            <input type="range" id="ttsRate" min="0.5" max="2" step="0.1" value="1">
        </div>
    </div>

    <div class="next-overlay glass" id="nextOverlay">
        <div class="next-btn-circle">&gt;</div>
        <p>Keyingi: <span id="nextBookName"></span></p>
    </div>

    <div class="modal" id="menuModal">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2>📚 Mundarija</h2>
                <button class="close-btn" id="closeMenu">&times;</button>
            </div>
            <div class="book-list" id="bookList"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // 50 TA KITOB BAZASI (To'liq rekonstruksiya)
        const allBooks = [
            // Part 1
            { title: "1. Mukammallik Kuchi: Kichik Odatlar San'ati", content: `<p>Hayotimizda yuz beradigan eng katta o'zgarishlar birdaniga bo'lmaydi. Katta yutuqlar har doim ko'zga ko'rinmas, doimiy ravishda takrorlanadigan kichik harakatlarning jamlanmasidir. "Atomic Habits" konsepsiyasi shuni uqtiradiki, inson o'z ustida har kuni atigi bir foiz (1%) yaxshilanishga erishsa, yil oxiriga kelib u 37 barobar kuchliroq, aqlliroq va tajribaliroq shaxsga aylanadi.</p><p>Aksariyat insonlar motivatsiyaga tayanib ish ko'radilar. Ammo motivatsiya bu vaqtinchalik hissiy holatdir. Haqiqiy va bardavom natijaga erishish uchun insonga motivatsiya emas, balki qat'iy intizom va to'g'ri ishlab chiqilgan tizim kerak.</p><p>Yangi odatni shakllantirish uchun psixologiyada maxsus zanjir mavjud: signal, istak, javob va mukofot. Yaxshi odatlarni shakllantirish uchun ularni ko'zga tashlanadigan, jozibador, bajarishga oson va qoniqarli qilish zarur.</p><p>Biz o'zimiz istagan odamga aylanishimiz uchun, avvalo e'tiqodimizni va o'zimizga bo'lgan qarashimizni o'zgartirishimiz lozim. Oxir-oqibat, siz nima ishlarni takrorlayotgan bo'lsangiz – siz o'shasiz!</p>` },
            { title: "2. Kiberxavfsizlik va Tarmoq Anatomiyasi", content: `<p>Zamonaviy raqamli dunyoda eng qimmatli resurs bu — neft yoki oltin emas, balki axborot va ma'lumotlardir. Kiberxavfsizlik butun boshli tarmoq arxitekturasini, serverlar va foydalanuvchilar o'rtasidagi maxfiy ma'lumotlar almashinuvini himoya qilishning murakkab va uzluksiz ilmiy tizimidir.</p><p>Kiberhimoyaning asosi operatsion tizimlarning ichki tuzilishini chuqur tushunishdan boshlanadi. Tizimdagi ochiq portlar, zaif protokollar va kodlardagi kichik mantiqiy xatolar tajribali axloqiy xakerlar tomonidan doimiy ravishda penetratsion testlar orqali tekshirilib boriladi.</p><p>Ma'lumotlar bazasiga inyeksiya hujumlari (SQLi), saytlararo skriptlash (XSS) va ijtimoiy muhandislik kabi usullar bugungi kundagi eng keng tarqalgan tahdidlardan hisoblanadi.</p><p>Kriptografiya, ya'ni ma'lumotlarni shifrlash san'ati ushbu sohaning yadrosidir. Kiberxavfsizlik mutaxassisi bo'lish nafaqat yuqori texnik bilimlarni, balki nostandart fikrlash qobiliyatini va katta sabr-toqatni ham talab etadi.</p>` },
            { title: "3. Moliyaviy Savodxonlik: Sarmoya va Erkinlik", content: `<p>Boylikning haqiqiy o'lchovi bu sizning qancha ko'p pul topishingiz bilan emas, balki o'sha topilgan pulni qanday boshqarishingiz bilan o'lchanadi. Moliyaviy erkinlik insonning ishlash uchun emas, yashash uchun pul topish tizimini yo'lga qo'ygan holatidir.</p><p>Kambag'al va o'rta sinf insonlari o'zlariga asosan "passivlar" sotib olishadi va buni boylik deb o'ylashadi. Haqiqiy boylar esa "aktivlar" yig'adilar. Aktivlar — bu o'z-o'zidan cho'ntagingizga pul keltiruvchi narsalar: biznes, qimmatli qog'ozlar, intellektual mulk.</p><p>Murakkab foiz (compound interest) atamasi iqtisodiyotdagi sakkizinchi mo'jiza hisoblanadi. Sarmoya kiritishda asosiysi — pulni vaqt bilan hamkorlikda ishlashiga imkon berishdir.</p><p>Moliyaviy xotirjamlik faqat raqamlarda emas, insonning hayotga munosabatida namoyon bo'ladi. Har bir sarflanayotgan so'm sizning moliyaviy armiyangizning bir askaridir.</p>` },
            { title: "4. Chuqur Diqqat: Axborot Asrida Konsentratsiya", content: `<p>Hozirgi axborot texnologiyalari asrida chalg'ituvchi omillar shu qadar ko'pki, bitta vazifaga to'liq diqqatni jamlab ishlash noyob va o'ta qimmatbaho qobiliyatga aylanib bormoqda. "Chuqur ish" (Deep Work) tushunchasi insonning o'z aqliy sig'imini maksimal darajada ishlatib ishlashini anglatadi.</p><p>Aksariyat odamlar kunini elektron pochtalarga javob berish, ijtimoiy tarmoqlardagi tasmasini varaqlash bilan, ya'ni "yuzaki ishlar" bilan o'tkazadilar.</p><p>Inson miyasi ko'p vazifalilikni (multitasking) yoqtirmaydi. Fokusni bitta nuqtaga qaratish miyadagi neyron aloqalarni mustahkamlaydi va miyelinizatsiya jarayonini tezlashtiradi.</p><p>Telefoningizdagi bildirishnomalarni to'liq o'chirib qo'yish diqqat mushaklarini chiniqtiradi. Eng muhim kashfiyotlar yolg'izlik va chuqur tafakkur mevasidir.</p>` },
            { title: "5. Kosmik Olam: Koinot va Qora Tuynuklar", content: `<p>Koinot shu qadar ulkan va sirliki, inson aqli uning o'lchamlarini to'liq tasavvur qilishga ojizdir. Biz tungi osmonga boqib ko'radigan yulduzlarning nuri bizgacha yetib kelishi uchun yillar kerak bo'ladi.</p><p>Koinotdagi eng qiziqarli obyektlardan biri bu — qora tuynuklardir. Uning tortishish kuchi shu qadar kuchliki, undan hatto yorug'lik ham qochib qutula olmaydi.</p><p>Biz yashayotgan Quyosh tizimi Somon Yo'li galaktikasining faqatgina bitta kichik chekkasida joylashgan. Koinotda yuz milliarddan ortiq galaktikalar mavjud.</p><p>Koinot sirlarini o'rganish nafaqat astrofizika, balki falsafiy ahamiyatga ham ega. Yulduzlar ortidagi cheksizlik insonni tavoze'li bo'lishga o'rgatadi.</p>` },
            // Part 2
            { title: "6. Veb-Dasturlash: Raqamli Arxitektura", content: `<p>Zamonaviy veb-dasturlash shunchaki brauzerda ochiladigan oddiy sahifalar yaratishdan ancha uzoqlashgan. Har bir mukammal ishlangan veb-sayt ortida yuzlab soatlik mehnat, mantiqiy yechimlar va foydalanuvchi tajribasini yaxshilash yotadi.</p><p>Frontend va Backend o'rtasidagi uyg'unlik mukammal dastur ishlashining kafolatidir. Orqa fonda ishlaydigan server qismi esa ma'lumotlarni xavfsiz saqlashi kerak.</p><p>Ilovalar yaratishda interaktivlik eng muhim omillardan biridir. Dastur kodlarini toza, tartibli qilib yozish (Clean Code) chinakam muhandislik madaniyatidir.</p><p>Raqamli arxitekturada interfeys dizayni san'at bilan texnologiyaning birlashgan nuqtasidir.</p>` },
            { title: "7. Kiberhimoya: Tarmoq Sirlari va Tahlil", content: `<p>Bugungi kunda har qanday tashkilotning eng muhim boyligi bu uning ma'lumotlar bazasidir. Tarmoq xavfsizligini ta'minlashda tizimning ichki mexanizmlarini chuqur anglash hal qiluvchi ahamiyatga ega.</p><p>Mutaxassislar ochiq portlarni skanerlash, paketlarni ushlab qolish va veb-ilovalardagi mavjud bo'shliqlarni topish orqali "axloqiy xakerlik" amaliyotini o'taydilar.</p><p>Veb xavfsizlik haqida gap ketganda, SQL inyeksiya va XSS kabi hujum turlari doim birinchi o'ringa chiqadi.</p><p>Kiberxavfsizlik mutaxassisi nafaqat himoyachi, balki kiber-hujumchining psixologiyasini va texnikalarini tushuna oladigan strateg bo'lishi kerak.</p>` },
            { title: "8. Ovoz Muhandisligi: Phonk va Instrumental San'at", content: `<p>Musiqa yaratish jarayoni bugungi kunda to'liq raqamli muhandislik va fizika san'atiga aylangan. Ovoz to'lqinlarini boshqarish va chastotalarni o'zaro moslashtirish zamonaviy musiqaning asosidir.</p><p>Phonk janrining ildizlari nostaljik vokal sempllari, sintezatorlar va o'ta ritmik zarbli partiyalarga tayanadi. Raqamli audio stansiyalarida (DAW) har bir tovush o'zining alohida yo'lagiga ega.</p><p>Instrumental musiqa hech qanday so'zlarsiz ham inson ruhiyatiga kuchli ta'sir qila oladi. Miksing va mastering jarayonlarida kompressorlar trekni chinakam professional darajaga olib chiqadi.</p><p>Ovoz to'lqinlari bilan ishlash matematika va san'atning ajoyib uchrashuv nuqtasidir.</p>` },
            { title: "9. Raqamli Ta'lim: Interaktiv Savodxonlik", content: `<p>Kelajak avlodni tarbiyalashda an'anaviy usullarning o'rni beqiyos, biroq bugungi raqamli asr bolalarning e'tiborini jalb qilish uchun yangicha yondashuvlarni talab qiladi.</p><p>Savodxonlikni oshirishga qaratilgan veb-ilovalar bolalar psixologiyasini inobatga olgan holda yaratiladi. Bolalar qiziqarli virtual sarguzashtda ishtirok etayotgandek his qiladilar.</p><p>Algoritm bola qaysi harflar yoki bo'g'inlarda xato qilayotganini tahlil qiladi va shaxsiy ustoz kabi aynan shu bo'shliqlarni to'ldirishga qaratilgan vazifalarni taqdim etadi.</p><p>Raqamli vositalar orqali ta'lim berish faqatgina maktabgacha ta'lim bilan cheklanib qolmaydi, mustaqil fikrlash ko'nikmalarini ham o'rgatadi.</p>` },
            { title: "10. Sun'iy Intellekt: Mashinali O'rganish Asoslari", content: `<p>Sun'iy intellekt (AI) insoniyat tarixidagi eng ulug'vor kashfiyotlardan biridir. Mashinali o'rganish (Machine Learning) kompyuterlarga ma'lumotlarni tahlil qilish va qaror qabul qilish imkonini bermoqda.</p><p>Neyrotarmoqlar inson miyasidagi milliardlab neyronlarning ishlash prinsipiga asoslanadi. Dasturga millionlab tasvirlar kiritilganda, u o'z-o'zidan qonuniyatlarni qidirib topadi.</p><p>Biroq bu imkoniyatlar katta mas'uliyatni ham talab qiladi. Agar algoritm noto'g'ri ma'lumotlar ustida o'qitilsa, uning qabul qiladigan qarorlari ham xato bo'ladi.</p><p>AI – inson aql-zakovatini almashtiruvchi vosita emas, balki uni ming karra kuchaytiruvchi eng mukammal quroldir.</p>` },
            // Part 3
            { title: "11. Kvant Fizikasi: Borliqning Ko'rinmas Asoslari", content: `<p>Kvant fizikasi — bu koinotning eng mitti zarrachalari qanday ishlashini o'rganuvchi fandir. Kvant olamida jismlar bir vaqtning o'zida ikkita joyda bo'lishi (superpozitsiya) mumkin.</p><p>"Ikki yoriqli tajriba" shuni ko'rsatdiki, yorug'lik va elektronlar ham to'lqin, ham zarracha xususiyatiga ega. Zarrachaning o'zini qanday tutishi uni kuzatuvchi bor-yo'qligiga qarab o'zgaradi.</p><p>Bugungi kunda olimlar kvant kompyuterlarini yaratish ustida qizg'in ish olib bormoqdalar. Ular "kubit"lardan foydalanadi.</p><p>Borliq faqat biz uni kuzatganimizdagina aniq bir holatga keladi. Bu bizni mutlaqo yangi bosqichga olib chiqadi.</p>` },
            { title: "12. Vaqtni Boshqarish: Samaradorlik San'ati", content: `<p>Vaqt — inson hayotidagi yagona qaytarib bo'lmaydigan va sotib olinmaydigan resursdir. Vaqtni boshqarish (Time Management) aslida o'z-o'zini boshqarish demakdir.</p><p>Eyzenxauer matritsasi barcha ishlarni 4 toifaga ajratadi. Biz ko'pincha "muhim emas lekin shoshilinch" ishlarga vaqtimizni sarflaymiz.</p><p>"Pomodoro" texnikasi: 25 daqiqa to'liq diqqat bilan ishlash va 5 daqiqa qat'iy dam olish. Bu miyani charchoqdan asraydi.</p><p>Raqamli minimalizm ham zamonaviy vaqtni boshqarishning muhim qismidir. Vaqtni samarali boshqarish insonga hayotining egasi ekanini his qildiradi.</p>` },
            { title: "13. Psixologiya: Inson Ongi Sirlari", content: `<p>Inson miyasi koinotdagi eng murakkab va sirli obyektlardan biridir. Biz qabul qilayotgan qarorlar ortida chuqur psixologik sabablar yotadi.</p><p>Bizning harakatlarimizning qariyb 95% ongsiz ravishda amalga oshiriladi. Bolalikda olingan tajribalar xulqimizni boshqaradi.</p><p>Kognitiv xatolar miyamizning axborotni tezroq qayta ishlash uchun ishlatadigan qisqa yo'llaridir. Tanqidiy fikrlash bizni manipulyatsiyalardan asraydi.</p><p>Miya neyroplastiklik xususiyatiga ega. Yomon odatlarni tashlash va yangi qobiliyatlarni o'zlashtirish har qanday yoshda ham mumkin.</p>` },
            { title: "14. Kriptovalyuta va Blokcheyn Inqilobi", content: `<p>Bugungi kunda moliyaviy dunyo navbatdagi katta inqilob — markazlashmagan raqamli pullar, ya'ni kriptovalyutalar davriga qadam qo'ydi.</p><p>Kriptovalyutalarning ishlash mexanizmi "Blokcheyn" texnologiyasiga asoslanadi. Ma'lumotlar zanjir ko'rinishida butun dunyodagi minglab kompyuterlarda saqlanadi.</p><p>An'anaviy qog'oz pullar inflatsiya xavfi ostida bo'ladi. Bitcoin kabi kriptovalyutalar esa algoritm orqali qat'iy cheklangan.</p><p>Blokcheyn texnologiyasi logistika, tibbiyot va saylov tizimlarini o'zgartirish potensialiga ega.</p>` },
            { title: "15. Bionika: Tabiatdan Texnologiyaga", content: `<p>Bionika — tabiatdagi biologik mexanizmlarni o'rganib, ularni zamonaviy texnologiyalarga tadbiq etuvchi kelajak fanidir.</p><p>Eng mashhur bionik kashfiyotlardan biri bo'lmish "Velkro" qariqiz o'simligini o'rganish natijasida kashf qilingan.</p><p>Bionikaning eng katta inqilobi tibbiyot sohasida yuz bermoqda. Bionik protezlar to'g'ridan-to'g'ri insonning asab tizimiga ulanadi.</p><p>Olimlar o'rgimchak to'ridan kuchli sintetik tolalar yaratmoqdalar. Bionika bizga insoniyat tabiatning o'quvchisi ekanini isbotlaydi.</p>` },
            // Part 4
            { title: "16. Nanotexnologiya: Ko'rinmas Olamdagi Inqilob", content: `<p>Nanotexnologiya — bu moddalarni atom va molekula darajasida boshqarish va yangi xususiyatlarga ega materiallar yaratish fanidir.</p><p>Grafen po'latdan 200 barobar kuchli, ammo undan bir necha barobar yengil va shaffof bo'lgan bir atom qalinligidagi uglerod qatlamidir.</p><p>Tibbiyot sohasida nanorobotlar faqatgina kasallangan hujayralarni topib, ularga aniq zarba bera oladi.</p><p>Nanotexnologiyalar atrof-muhitni tozalashda ham muhim rol o'ynaydi. Ammo uning o'z-o'zini ko'paytiruvchi xavflari ham mavjud.</p>` },
            { title: "17. Ekologiya va Iqlim Inqirozi: Sayyoramiz Kelajagi", content: `<p>Global isish jarayoni to'g'ridan-to'g'ri inson faoliyati bilan bog'liqdir. Issiqxona gazlari sayyoramizni gigant issiqxonaga aylantirmoqda.</p><p>Arktika va Antarktidadagi muzliklarning erishi dunyo okeani sathining ko'tarilishiga olib keladi.</p><p>Bu inqirozdan chiqishning yagona yo'li qayta tiklanuvchi energiya manbalariga (quyosh, shamol, geotermal) o'tishdir.</p><p>Iqlim o'zgarishi har bir shaxsning kundalik tanlovlariga ham bog'liq. Tabiat bizning muvozanatimizsiz omon qola olmaydi.</p>` },
            { title: "18. Metaolam va Virtual Reallik (VR/AR)", content: `<p>Internetning evolyutsiyasi ikki o'lchamli ekranlardan chiqib, bizni uch o'lchamli fazoga — Metaolamga ko'chib o'tmoqda.</p><p>Virtual reallik (VR) sizni butunlay yangi dunyoga olib kirsa, To'ldirilgan reallik (AR) jismoniy dunyo ustiga raqamli qatlamni tushiradi.</p><p>Odamlar o'zlarining virtual avatariga ega bo'lib, raqamli ofislarda ishlaydilar va virtual konsertlarda qatnashadilar.</p><p>Biroq, insonlarning haqiqiy jismoniy dunyodan uzilib qolishi chuqur depressiyaga olib kelishi mumkin.</p>` },
            { title: "19. Avtomobilsozlik Evolyutsiyasi: EV va Avtopilot", content: `<p>Ichki yonuv dvigatellari o'z o'rnini elektromobillarga (EV) bo'shatib bermoqda. Bu avtomobilsozlik tarixidagi eng katta texnologik inqilobdir.</p><p>Litiy-ion batareyalar o'rnini qattiq jismli batareyalar egallashi kutilmoqda. Ular orqali avtomobillar ming kilometrdan ortiq masofani bosa oladi.</p><p>Avtonom boshqaruv (Self-driving) mashinalar sun'iy intellekt orqali insonlardan ko'ra xavfsizroq qaror qabul qilmoqda.</p><p>Kelajakning transport tizimi shaxsiy mulk sifatida emas, balki xizmat sifatida ko'riladi.</p>` },
            { title: "20. Tibbiyotda Inqilob: Robot-Jarrohlar va DNK", content: `<p>An'anaviy jarrohlik o'rnini asta-sekin robot-jarrohlar egallamoqda. Ular o'ta murakkab mikroxirurgik ishlarni millimetr aniqlikda bajaradi.</p><p>CRISPR-Cas9 texnologiyasi olimlarga DNK zanjiridagi xato qismni o'zgartirish imkonini beradi.</p><p>AI algoritmlari millionlab rentgen suratlarini tahlil qilib, eng kichik o'simtalarni dastlabki bosqichdayoq aniqlab bermoqda.</p><p>Shaxsiylashtirilgan tibbiyot davri boshlanmoqda, bu inson umrini uzaytirish sirlarini ochish ostonasida turibdi.</p>` },
            // Part 5
            { title: "21. Sotsiologiya: Ommaviy Ong va Jamiyat", content: `<p>Sotsiologiya insonlarning o'zaro munosabatlarini o'rganuvchi fandir. Bizning didimiz va e'tiqodimiz jamiyat tomonidan dasturlashtirilgan bo'ladi.</p><p>Ommaviy ong manipulyatsiya qilinganda, odamlarning individual mantiqiy fikrlashi susayib, poda instinkti ishga tushadi.</p><p>Konformizm — ko'pchilikning fikriga ko'r-ko'rona ergashish psixologiyasi jamiyat rivojlanishiga eng katta to'siqdir.</p><p>Ijtimoiy tarmoqlar ommaviy ongni shakllantiruvchi qudratli qurolga aylandi. Haqiqiy erkinlik mustaqil fikr yurita olishdadir.</p>` },
            { title: "22. Kino San'ati: Kadrlarga Muhrlangan Tarix", content: `<p>Kino insoniyat kashf etgan san'at turlarining eng yoshi, ammo eng ta'sirchanidir. U davrning ruhiyatini aks ettiruvchi vizual oynadir.</p><p>Kinematografiyaning sehri montaj jarayonida yashiringan. "Kuleshov effekti" kadrlar ketma-ketligi qanday ma'no uyg'otishini ko'rsatadi.</p><p>Ovoz va musiqaning kinoga kirib kelishi uning ta'sir kuchini o'n barobar oshirdi. Saundtrek to'g'ridan-to'g'ri yuragimizga nishonga uradi.</p><p>Raqamli texnologiyalar kino sarhadlarini cheksizlikkacha kengaytirdi. Kino — g'oyalar bilan bo'lishishning universal tilidir.</p>` },
            { title: "23. Arxitektura: Muzlagan Musiqa va Dizayn", content: `<p>Arxitektura muhandislik, san'at va psixologiyaning mukammal kesishuv nuqtasidir. Qadimgi faylasuflar uni "muzlagan musiqa" deb atashgan.</p><p>Arxitektura tarixi insoniyat sivilizatsiyasining tarixidir. "Shakl funksiyaga ergashadi" tamoyili zamonaviy shaharlar qiyofasini o'zgartirdi.</p><p>Urbanistika — shaharlarni odamlar uchun loyihalash fani. Yashil bog'lar va jamoat joylari shahar aholisining baxt darajasini belgilaydi.</p><p>Kelajak arxitekturasi barqarorlik va ekologiya tamoyillariga asoslanadi. Bino tabiat bilan nafas oluvchi aqlli organizmga aylanmoqda.</p>` },
            { title: "24. Global Logistika: Iqtisodiyot Qon Tomirlari", content: `<p>Logistika jahon iqtisodiyotining ko'rinmas qon tomirlari bo'lib, uning bir soniya to'xtab qolishi butun dunyo bozorlarini falaj qiladi.</p><p>Zamonaviy globallashuvning eng katta qahramoni bu oddiy metall konteynerdir. U yuklarni tashishni yuz barobar tezlashtirdi va arzonlashtirdi.</p><p>Zamonaviy yetkazib berish zanjirlari "Just-in-Time" falsafasiga qurilgan. Zavodlar o'z omborlarida oylik zaxiralarni saqlamaydilar.</p><p>Kelajak logistikasi to'liq avtomatlashtirishga qarab ketmoqda. Kim savdo yo'llarini nazorat qilsa, dunyo o'shaning qoidalari asosida o'ynaydi.</p>` },
            { title: "25. Diplomatiya va Siyosat: Yumshoq Kuch San'ati", content: `<p>Diplomatiya — bu davlatlar o'rtasidagi manfaatlarni tinch yo'l bilan hal etish, nizo va ziddiyatlarning oldini olish san'ati hisoblanadi.</p><p>Zamonaviy dunyoda davlatning qudrati "Yumshoq kuch" (Soft power) orqali, ya'ni madaniyati, ta'limi va texnologiyalari jozibadorligi bilan o'lchanadi.</p><p>BMT va xalqaro institutlar dunyo tartibotini saqlab turuvchi ko'rinmas arqonlardir. Siyosatda O'yinlar Nazariyasi keng qo'llaniladi.</p><p>Axborot asrida diplomatiya "Raqamli diplomatiya" shaklini olmoqda. Siyosatning maqsadi tsivilizatsiyaning barqarorligini ta'minlashdir.</p>` },
            // Part 6
            { title: "26. Mifologiya: Qadimgi Dunyo Sirlari", content: `<p>Mifologiya — qadimgi insonlarning koinot, hayot va o'lim haqidagi ibtidoiy tasavvurlari majmuasidir. U jahon madaniyatining ajralmas qismidir.</p><p>Qadimgi Yunoniston afsonalaridagi xudolar insoniy nuqsonlar va ehtiroslarga ega obrazlardir. Miflar insoniyatning kollektiv ongosti xotirasidir.</p><p>Skandinaviya mifologiyasi qattiq iqlim sharoitida yashovchi vinkinglar madaniyatining aksidir. Ular qismatdan qochib qutulib bo'lmasligiga ishonishgan.</p><p>Mifologik obrazlar kino va adabiyotda faol qo'llanilmoqda. Qadimgi dunyo sirlarini o'rganish zamonaviy inson psixologiyasini tushunishga yordam beradi.</p>` },
            { title: "27. Biologik Xilma-xillik: Tabiat Muvozanati", content: `<p>Biologik xilma-xillik — bu barcha tirik organizmlarning va ular yashaydigan ekotizimlarning o'zaro murakkab tarmog'idir.</p><p>Ekotizimlar xuddi jenga o'yiniga o'xshaydi. Asalarilar qirilib ketishi insoniyatning oziq-ovqat xavfsizligiga bevosita tahdid soladi.</p><p>Afsuski, inson faoliyati natijasida turlarning qirilib ketish sur'ati tabiiy holatdan minglab barobar tezlashgan.</p><p>Biologik xilma-xillikni asrab qolish bizning yashab qolishimiz uchun asosiy shartdir. Tabiat bizning eng katta dorixonamizdir.</p>` },
            { title: "28. Koinotni O'zlashtirish: Yulduzlar Sari", content: `<p>Odamzot qadim zamonlardan beri yulduzlar ortida nima borligiga qiziqib kelgan. Texnologik taraqqiyot bu azaliy orzuni haqiqatga aylantirdi.</p><p>Marsni o'zlashtirish va u yerda inson koloniyasini barpo etish zamonaviy kosmonavtikaning eng asosiy maqsadlaridan biridir.</p><p>Xalqaro Kosmik Stansiya insoniyatning ilm-fan yo'lida birlasha olishining eng go'zal namunasidir.</p><p>Koinotni o'zlashtirishning iqtisodiy ahamiyati beqiyosdir. Koinot sari intilish bizning evolyutsion qismatimizdir.</p>` },
            { title: "29. Xotirani Kuchaytirish: Aql Saroylari", content: `<p>Inson xotirasi passiv arxiv emas, balki uzluksiz ishlaydigan murakkab neyrobiologik jarayondir. Bizning miyamiz ulkan salohiyatga ega.</p><p>"Mnemonika" san'ati axborotni uzoq muddatli xotiraga o'tkazishda samaralidir. "Xotira saroyi" texnikasi bunga yaqqol misoldir.</p><p>"Intervalli takrorlash" axborotni miyadan o'chib ketishni boshlagan vaqtdagina qayta takrorlashni taqozo etadi.</p><p>Diqqatsizlik va uyqusizlik xotiraning eng katta dushmanidir. O'qish bilan bir qatorda sog'lom hayot tarzi xotirani o'tkir saqlaydi.</p>` },
            { title: "30. Kriptografiya va Sirli Kodlar: Maxfiylik Ilmi", content: `<p>Kriptografiya — maxfiy kodlar va shifrlash san'ati bo'lib, axborotni himoya qilishda asrlar davomida hal qiluvchi rol o'ynagan.</p><p>Ikkinchi Jahon urushi davrida Enigma mashinasi kodining sindirilishi urushning muddatini qisqartirgan.</p><p>Kompyuterlarning paydo bo'lishi bilan kriptografiya murakkab matematik funksiyalarga ko'chdi. Asimmetrik shifrlash bunga misoldir.</p><p>Kriptografiya bugungi kunda Blokcheyn kabi inqilobiy tizimlar asosi bo'lib xizmat qilmoqda.</p>` },
            // Part 7 (Newly Added to make exact 50)
            { title: "31. Sun'iy Go'sht va Oziq-ovqat Kelajagi", content: `<p>Insoniyat soni o'sishi bilan an'anaviy chorvachilik ekologiyaga katta zarar yetkazmoqda. Chorvachilik karbonat angidrid ajralishining asosiy sababchilaridandir.</p><p>Olimlar laboratoriya sharoitida, hayvonlarga zarar yetkazmasdan o'stirilgan "Sun'iy go'sht" (Cultured meat) texnologiyasini ishlab chiqdilar.</p><p>Bu texnologiya oziq-ovqat xavfsizligini ta'minlabgina qolmay, suv va yer resurslarini minglab marotaba tejash imkonini beradi.</p><p>Kelajakda bizning dasturxonimizdagi taomlar nafaqat mazali, balki sayyora uchun 100% zararsiz bo'lishi kafolatlanadi.</p>` },
            { title: "32. Qayta Tiklanuvchi Energiya", content: `<p>Qazib olinuvchi yoqilg'ilar (neft, ko'mir) zaxiralari cheklangan va ular iqlim isishining asosiy sababchisidir. Energiya inqilobi aynan shu yerda boshlanadi.</p><p>Quyosh, shamol va geotermal energiya texnologiyalari kundan-kunga arzonlashib, butun dunyoni yashil energiyaga o'tishga undamoqda.</p><p>Akkumulyator texnologiyalarining rivojlanishi energiyani uzoq muddat saqlash muammosini hal qilmoqda.</p><p>Yashil energetika faqatgina tabiatni asrash emas, u kelajak avlodlar uchun xavfsiz va barqaror iqtisodiyotning yagona yo'lidir.</p>` },
            { title: "33. Kvant Biologiyasi", content: `<p>Kvant fizikasi faqatgina jonsiz zarrachalar uchun emas, balki tirik tabiat sirlarini ochishda ham muhim rol o'ynamoqda. Bu Kvant biologiyasi deb ataladi.</p><p>Qushlarning migratsiya vaqtida Yerning magnit maydonini aniq his qilishi aynan kvant chalkashligi (entanglement) orqali sodir bo'lishi isbotlanmoqda.</p><p>O'simliklardagi fotosintez jarayoni ham kvant mexanikasi qonuniyatlari asosida deyarli 100% samaradorlik bilan ishlaydi.</p><p>Bu kashfiyotlar olimlarga tabiatning mukammal muhandisligini o'rganib, o'ta kuchli texnologiyalar va yangi dorilar yaratishga yordam beradi.</p>` },
            { title: "34. Genetik Injiniring va Etika", content: `<p>DNK ni tahrirlash imkoniyati insoniyatga o'zining biologik taqdirini boshqarish qudratini berdi. CRISPR texnologiyasi nasliy kasalliklarga chek qo'yishi mumkin.</p><p>Biroq bu imkoniyat chuqur axloqiy va etik savollarni keltirib chiqaradi. "Dizayner bolalar" yaratish jamiyatda yangi biologik tengsizlikni keltirib chiqarmaydimi?</p><p>Genetik o'zgarishlar faqat bitta insonga emas, uning barcha kelajak avlodlariga ham ta'sir qiladi. Bu ulkan mas'uliyatdir.</p><p>Ilm-fan qanchalik tez rivojlanmasin, uning qonuniy va axloqiy chegaralari insoniylikni saqlab qolish uchun muhimdir.</p>` },
            { title: "35. Kosmik Turizm", content: `<p>Koinot endilikda faqatgina professional astronavtlar uchun yopiq hudud emas. Xususiy kompaniyalar oddiy insonlar uchun ham kosmik turizm eshiklarini ochmoqda.</p><p>Suborbital parvozlar orqali turistlar vaznsizlik holatini his qilish va Yerning sharsimon ko'rinishini o'z ko'zlari bilan ko'rish baxtiga muyassar bo'lmoqdalar.</p><p>Bu sayohatlar hozircha faqat millionerlar uchun ochiq bo'lsa-da, aviatashuvlar tarixi kabi u tez orada ommaviy va arzonlashishi kutilmoqda.</p><p>Kosmik turizm odamlarning ongini o'zgartirib, butun sayyoramiz yagona, himoyasiz bir kema ekanligini chuqurroq anglashlariga xizmat qiladi.</p>` },
            // Part 8
            { title: "36. Xalqaro Huquq: Dunyo Tartiboti Asoslari", content: `<p>Xalqaro huquq — bu mustaqil davlatlar o'rtasidagi munosabatlarni tartibga soluvchi, global xaos va urushlarning oldini olib turuvchi qoidalar majmuasidir.</p><p>Jeneva konvensiyalari urushga ham insoniylik chegaralarini o'rnatgan. Shuningdek, xalqaro huquq global savdo va inson huquqlarini ham qamrab oladi.</p><p>Xalqaro huquqning eng katta muammosi uning ijro etilish mexanizmidagi zaiflikdir. Veto huquqi ko'pincha adolatli qarorlar qabul qilinishiga to'sqinlik qiladi.</p><p>Kelajakda xalqaro huquq oldida mutlaqo yangi chaqiriqlar turibdi. Qonunlarni texnologik va global o'zgarishlarga moslashtirib borish shart.</p>` },
            { title: "37. O'z-o'zini Rivojlantirish: Kaizen Falsafasi", content: `<p>O'z-o'zini rivojlantirish — insonning o'z ongosti to'siqlarini yengib o'tish jarayonidir. "Kaizen" (Uzluksiz takomillashuv) falsafasi kichik ijobiy o'zgarishlarga asoslanadi.</p><p>"O'sish fikrlash tarzi"ga ega insonlar har qanday qobiliyatni mehnat orqali rivojlantirish mumkinligiga ishonadilar.</p><p>Rivojlanish yo'lidagi eng katta dushman — prokrastinatsiyadir. Katta maqsadlarni kichik qismlarga bo'lish uni yengishning zo'r usulidir.</p><p>Shaxsiy rivojlanishda o'z-o'zini tahlil qilish juda muhim. O'zingizni kechagi o'zingiz bilan solishtirishga odatlaning.</p>` },
            { title: "38. Musiqa va Miya: Neyrobiologik Simfoniya", content: `<p>Musiqa insoniyatning eng universal tilidir. Musiqa eshitish miyaning deyarli barcha hududlarini bir vaqtning o'zida faollashtiruvchi mashg'ulotdir.</p><p>Musiqa asari mantiqiy ketma-ketlikni saqlaydi va miya dopamin bilan o'zini mukofotlaydi.</p><p>Professional musiqachilarning miyasi mantiqiy va ijodiy fikrlash o'rtasidagi aloqani favqulodda tezlashtiradi.</p><p>Musiqa terapiyasi tibbiyotda keng qo'llanilmoqda. U to'g'ridan-to'g'ri asab tizimimizga yozilgan shifobaxsh koddir.</p>` },
            { title: "39. Ijtimoiy Tarmoqlar: Raqamli Dopamin", content: `<p>Ijtimoiy tarmoqlar "Diqqat iqtisodiyoti" deb ataluvchi trillion dollarlik ulkan biznesga aylandi. Biz eng qimmat valyuta — o'z vaqtimiz bilan to'lov qilyapmiz.</p><p>Ular inson psixologiyasi va qimor o'yinlari ishlash prinsiplaridan ilhomlangan holda qurilgan va narkotik qaramlikdek ishlaydi.</p><p>Raqamli olamning eng xavfli oqibatlaridan biri solishtirish madaniyatidir. Bu yoshlar o'rtasida depressiyani oshirib yubordi.</p><p>Raqamli minimalizm asab tizimini qayta tiklashga yordam beradi. Texnologiya sizga xizmat qilishi kerak, siz texnologiyaga emas.</p>` },
            { title: "40. Startaplar Anatomiyasi: G'oyadan Unicorngacha", content: `<p>Startap – bu innovatsion mahsulotni yaratish va tezkor o'sishga erishish uchun mo'ljallangan vaqtinchalik tashkilotdir.</p><p>"Tejamkor startap" metodologiyasida MVP yaratiladi va zudlik bilan xaridorlarga taqdim etiladi.</p><p>Moliyalashtirish startap qon tomiridir. Loyiha qiymati 1 milliard dollardan oshsa, u "Unicorn" maqomini oladi.</p><p>Dunyodagi eng zo'r g'oya ham noto'g'ri jamoa qo'lida halokatga uchraydi. Kerak paytda yo'nalishni o'zgartira olish muvaffaqiyat garovidir.</p>` },
            // Part 9
            { title: "41. Muvaffaqiyatsizlik Saboqlari: Mag'lubiyat San'ati", content: `<p>Muvaffaqiyatsizlik haqidagi saboqlar ko'pincha e'tibordan chetda qoladi. Har bir buyuk g'alaba yuzlab xatolar ustiga qurilgan poydevordir.</p><p>"Fail fast, fail often" tamoyili: qanchalik tez xato qilsangiz, to'g'ri yo'lni shunchalik tez topasiz.</p><p>Tomas Edison lampochkani ixtiro qilishdan avval 10,000 marta xato qilgan. Bu yondashuv insonga cheksiz sabr-toqat baxsh etadi.</p><p>O'zingizni xatolaringiz bilan tenglashtirmang. Mag'lubiyatni qabul qilish inson xarakterining quvvatini belgilaydi.</p>` },
            { title: "42. Loyiha Boshqaruvi: Agile va Scrum Falsafasi", content: `<p>Agile (Egiluvchan) – bu jamoaviy fikrlash tarzi bo'lib, mijoz ehtiyojlarini birinchi o'ringa qo'yishga asoslanadi.</p><p>Scrumda ishlar "Sprint" deb ataluvchi qisqa muddatli davrlarga bo'linadi. Jamoaviy mas'uliyat va o'z-o'zini boshqarish tamoyillari ustunlik qiladi.</p><p>Ochiqlik va shaffoflik asosdir. Kundalik 15 daqiqalik yig'ilishlar muammolarni yashirilishini oldini oladi.</p><p>Loyihani boshqarishda "mukammallik" ketidan emas, "foydalilik"ka erishish kerak. Agile o'zgarishlarni imkoniyat sifatida qabul qilishni o'rgatadi.</p>` },
            { title: "43. Zamonaviy San'at: Ma'no va Estetika", content: `<p>Zamonaviy san'atda asosiy qadriyat – bu rasmning realistik chizilganida emas, balki uning ortida yotgan g'oyada yashirin.</p><p>San'at endilikda dunyoni shunchaki nusxalamaydi, balki dunyoga savol beradi. Abstraksionizm san'at qoliplarini parchalab tashladi.</p><p>Raqamli san'at va NFT davri boshlanishi bilan san'atning mulkchilik tushunchalari ham o'zgardi.</p><p>San'atni tushunish uchun chuqur bilim kerak. U bizni kundalik hayotdan yuqoriga ko'taradi.</p>` },
            { title: "44. Raqamli Minimalizm: Diqqatni Qutqarish", content: `<p>Biz axborot to'lqinlari ostida g'arq bo'layotgan avlodmiz. Raqamli minimalizm sizning eng qimmatli resursingiz – diqqatingizni qutqaradi.</p><p>Diqqat – bu cheklangan resurs. Chalg'ishdan so'ng konsentratsiya holatiga qaytish uchun miyaga 23 daqiqa vaqt kerak bo'ladi.</p><p>"Raqamli tozalash" o'tkazib, hayotiy zarur bo'lmagan ilovalardan voz kechib ko'ring.</p><p>Minimalist bo'lish – bu oz narsaga ega bo'lish emas, balki bor narsadan eng yuqori foyda olishdir.</p>` },
            { title: "45. Xalqaro Munosabatlar: Yangi Geosiyosat", content: `<p>Biz "Ko'p qutbli dunyo" davriga qadam qo'ydik. Xalqaro munosabatlar resurslar va texnologiyalar uchun kurash maydonidir.</p><p>Zamonaviy geosiyosatda "Iqtisodiy qurol" harbiy kuchdan ko'ra ko'proq ishlatilmoqda. Chiplar va noyob metallar qudrat belgisiga aylandi.</p><p>Sun'iy intellekt va kiber-qurollar xavfsizlik arxitekturasini o'zgartirib yubordi. Axborot va propaganda vayronagarchilik keltirishi mumkin.</p><p>Bizning kelajagimiz raqobatdan ko'ra, global muammolarni birgalikda hal qilish qobiliyatimizga bog'liq.</p>` },
            // Part 10
            { title: "46. Kiber-Psixologiya: Raqamli Shaxsiyat", content: `<p>Kiber-psixologiya — insonning texnologiyalar va virtual olam bilan o'zaro ta'sirini o'rganuvchi fandir. Raqamli dunyoda biz idealizatsiya qilingan obrazda namoyon bo'lamiz.</p><p>Anonimlik internetning xavfli xususiyatidir. Bu "Onlayn disinhibitsiya effekti" kiber-bullingning kuchayishiga sabab bo'ladi.</p><p>Ijtimoiy tasdiqlashga ehtiyoj dopamin ajralishini rag'batlantiradi. Raqamli dunyodagi muvaffaqiyat insonning o'ziga ishonchiga katta ta'sir qiladi.</p><p>Bizning vazifamiz texnologiyalar ichida yashab, insoniy tabiatimizni va jonli muloqotni yo'qotib qo'ymaslikdir.</p>` },
            { title: "47. Smart City: Kelajak Shaharlari", content: `<p>Aqlli shahar (Smart City) — barcha tizimlari yagona raqamli tarmoqqa bog'langan va real vaqtda boshqariladigan yashash muhitidir.</p><p>Tirbandliklar bo'lmaydi, sun'iy intellekt transport oqimini boshqaradi. Energiya sarfi minimal darajaga tushiriladi.</p><p>Aqlli shaharning markazida "Katta ma'lumotlar" turadi. Shaxsiy ma'lumotlarning maxfiyligi masalasi katta bahslarga sabab bo'lmoqda.</p><p>Kelajak shaharlari ekologik bo'lishi shart. Aqlli shahar — bu texnologiya va tabiatning uyg'unligidir.</p>` },
            { title: "48. Neyro-interfeys: Fikr Kuchi Bilan Boshqarish", content: `<p>Neyro-interfeys (BCI) — neyronlarning elektr signallarini o'qib, ularni raqamli buyruqlarga aylantiruvchi tizimdir. Fikr kuchi bilan qurilmalarni boshqarish mumkin bo'ladi.</p><p>Bu texnologiya tibbiyotda falaj bemorlarga katta yordam bermoqda. Miyaga chiplar o'rnatish orqali yo'qolgan qobiliyatlarni tiklash va'da qilinmoqda.</p><p>BCI ma'lumotni to'g'ridan-to'g'ri miyaga "yuklab olish" imkoniyatini yaratishi mumkin. Inson intellekti sun'iy intellekt bilan birlashadi.</p><p>Biroq, miyaga kirish huquqi eng katta etik savolni tug'diradi. Fikrlar erkinligini saqlab qolish eng murakkab vazifaga aylanadi.</p>` },
            { title: "49. Kvant Kompyuterlari va Koinot Fizikasi", content: `<p>Kvant kompyuterlari kubitlardan foydalanishi orqali hisoblash quvvatini fantastik darajaga ko'taradi. Ular koinot sirlarini simulyatsiya qila oladi.</p><p>Kvant fizikasi va kosmologiya bog'liq. Kvant gravitatsiyasi nazariyasini yaratish zamonaviy ilm-fanning asosiy maqsadidir.</p><p>Kvant chalkashligi orqali kelajakda "Kvant interneti" va axborot teleportatsiyasi amalga oshirilishi mumkin.</p><p>Koinot — ulkan kvant kompyuteridir. Fizika qonunlarini o'rganish orqali biz o'zimizning bu cheksizlikdagi o'rnimizni anglaymiz.</p>` },
            { title: "50. Insoniyatning Yakuniy Taqdiri", content: `<p>Biz Kardashev shkalasi bo'yicha 0-tur sivilizatsiyasidan 1-tur sivilizatsiyasiga o'tish arafasidamiz.</p><p>Kelajakda biz "Transhumanizm" davriga o'tib, biologik chegaralarimizdan chiqib ketamiz. Boshqa yulduzlarga kolonizatsiya qilish shunchaki vaqt masalasidir.</p><p>Bizning eng katta yutug'imiz — intilishimiz va qiziquvchanligimizdir. Insoniyat — koinotning o'zini o'zi anglashga bo'lgan urinishidir.</p><p>Bilim chegara bilmas kuchdir. Insoniyatning haqiqiy buyukligi uning jismoniy kuchida emas, cheksiz tafakkuridadir.</p>` }
        ];

        // ==========================================
        // XOLƎRIƆ AUDIO ENGINE PRO (Professional TTS)
        // ==========================================
        class XolericTTS {
            constructor() {
                this.synth = window.speechSynthesis;
                this.voice = null;
                this.queue = [];
                this.paragraphs = []; // DOM elementlar ro'yxati (Highlight uchun)
                this.currentIndex = -1;
                this.isPlaying = false;
                this.isPaused = false;
                this.rate = 1.0;
                
                this.initVoices();
            }

            initVoices() {
                const load = () => {
                    const voices = this.synth.getVoices();
                    // Ovoz qidirish: Uz -> Ru -> En (Premium ovozlarni prioritet qilish mumkin)
                    this.voice = voices.find(v => v.lang.includes("uz")) || 
                                 voices.find(v => v.lang.includes("ru")) || 
                                 voices.find(v => v.lang.includes("en"));
                };
                load();
                if (speechSynthesis.onvoiceschanged !== undefined) {
                    speechSynthesis.onvoiceschanged = load;
                }
            }

            speak(domParagraphs) {
                if (!domParagraphs || domParagraphs.length === 0) return;
                this.stop();

                this.paragraphs = domParagraphs;
                // DOM elementlaridan matnni ajratib olib navbatga qo'shamiz
                this.queue = Array.from(domParagraphs).map(p => p.innerText.trim()).filter(text => text.length > 0);
                this.currentIndex = 0;

                if(this.queue.length > 0) {
                    this.playNext();
                }
            }

            playNext() {
                if (this.queue.length === 0) {
                    this.stop();
                    return;
                }

                this.isPlaying = true;
                this.isPaused = false;
                document.getElementById('ttsPlayBtn').innerText = '⏸️';

                // Barcha eski highlightlarni tozalash
                this.paragraphs.forEach(p => p.classList.remove('reading-active'));
                
                // Joriy xatboshini belgilash va o'qish
                if (this.paragraphs[this.currentIndex]) {
                    const currentP = this.paragraphs[this.currentIndex];
                    currentP.classList.add('reading-active');
                    // Avtomatik scroll (Paragraph markazga keladi)
                    currentP.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }

                const textChunk = this.queue.shift();
                const utter = new SpeechSynthesisUtterance(textChunk);
                
                utter.voice = this.voice;
                utter.rate = parseFloat(document.getElementById('ttsRate').value) || this.rate;
                utter.pitch = 1.0;

                utter.onend = () => {
                    this.currentIndex++;
                    this.playNext();
                };

                utter.onerror = (e) => {
                    console.error("TTS Error:", e);
                    this.currentIndex++;
                    this.playNext(); // Xato bo'lsa ham keyingisiga o'tadi
                };

                this.synth.speak(utter);
            }

            stop() {
                this.synth.cancel();
                this.queue = [];
                this.isPlaying = false;
                this.isPaused = false;
                if (this.paragraphs) {
                    this.paragraphs.forEach(p => p.classList.remove('reading-active'));
                }
                document.getElementById('ttsPlayBtn').innerText = '▶️';
            }

            togglePause() {
                if (this.isPlaying) {
                    if (this.isPaused) {
                        this.synth.resume();
                        this.isPaused = false;
                        document.getElementById('ttsPlayBtn').innerText = '⏸️';
                    } else {
                        this.synth.pause();
                        this.isPaused = true;
                        document.getElementById('ttsPlayBtn').innerText = '▶️';
                    }
                }
            }
        }

        const ttsEngine = new XolericTTS();

        // ==========================================
        // DASTUR MANTIQI
        // ==========================================
        let currentBookIndex = 0;
        let currentFontSize = 18;
        let exitClicks = 0;
        let exitTimer;
        let lastTapTime = 0;

        const els = {
            welcome: document.getElementById('welcomeScreen'),
            input: document.getElementById('userNameInput'),
            startBtn: document.getElementById('startBtn'),
            userName: document.getElementById('displayUserName'),
            title: document.getElementById('bookTitle'),
            content: document.getElementById('bookContent'),
            main: document.getElementById('mainContent'),
            nextOverlay: document.getElementById('nextOverlay'),
            nextName: document.getElementById('nextBookName'),
            menu: document.getElementById('menuModal'),
            bookList: document.getElementById('bookList'),
            toast: document.getElementById('exitToast'),
            // TTS
            ttsPlay: document.getElementById('ttsPlayBtn'),
            ttsStop: document.getElementById('ttsStopBtn'),
            ttsRate: document.getElementById('ttsRate'),
            speedLabel: document.getElementById('speedLabel')
        };

        els.startBtn.addEventListener('click', () => {
            if(els.input.value.trim().length < 2) return alert('Ismingizni kiriting');
            els.userName.innerHTML = `👤 ${els.input.value.trim()}`;
            
            if(document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(e => console.log("FS bloklandi"));
            }
            els.welcome.style.opacity = '0';
            els.welcome.style.visibility = 'hidden';
            
            initLibrary();
        });

        function initLibrary() {
            els.bookList.innerHTML = '';
            allBooks.forEach((book, index) => {
                let div = document.createElement('div');
                div.className = 'book-item';
                div.innerText = book.title;
                div.onclick = () => { loadBook(index); els.menu.classList.remove('active'); };
                els.bookList.appendChild(div);
            });
            loadBook(0);
        }

        function loadBook(index) {
            ttsEngine.stop(); // Yangi kitob ochilganda audioni to'xtatish
            
            currentBookIndex = index;
            els.title.innerText = allBooks[index].title;
            els.content.innerHTML = allBooks[index].content;
            els.main.scrollTop = 0;
            
            document.querySelectorAll('.book-item').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });
        }

        // Font Control
        document.getElementById('fontPlus').onclick = () => {
            if(currentFontSize < 34) { currentFontSize += 2; document.documentElement.style.setProperty('--font-size', `${currentFontSize}px`); }
        };
        document.getElementById('fontMinus').onclick = () => {
            if(currentFontSize > 14) { currentFontSize -= 2; document.documentElement.style.setProperty('--font-size', `${currentFontSize}px`); }
        };

        // Menu
        document.getElementById('openMenu').onclick = () => els.menu.classList.add('active');
        document.getElementById('closeMenu').onclick = () => els.menu.classList.remove('active');

        // Double Tap (Next Book)
        els.main.addEventListener('click', (e) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTapTime;
            if(tapLength < 300 && tapLength > 0) {
                if(els.menu.classList.contains('active')) return;
                if(currentBookIndex < allBooks.length - 1) {
                    els.nextName.innerText = allBooks[currentBookIndex + 1].title;
                    els.nextOverlay.classList.add('show');
                    setTimeout(() => els.nextOverlay.classList.remove('show'), 4000);
                }
                e.preventDefault();
            }
            lastTapTime = currentTime;
        });

        els.nextOverlay.onclick = () => {
            if(currentBookIndex < allBooks.length - 1) {
                loadBook(currentBookIndex + 1);
                els.nextOverlay.classList.remove('show');
            }
        };

        // TTS UI Events
        els.ttsPlay.onclick = () => {
            if (ttsEngine.isPlaying) {
                ttsEngine.togglePause();
            } else {
                const paragraphs = els.content.querySelectorAll('p');
                ttsEngine.speak(paragraphs);
            }
        };

        els.ttsStop.onclick = () => {
            ttsEngine.stop();
        };

        els.ttsRate.oninput = (e) => {
            const val = parseFloat(e.target.value).toFixed(1);
            els.speedLabel.innerText = `Tezlik: ${val}x`;
            // Agar o'qiyotgan bo'lsa, rate real vaqtda o'zgarishi uchun:
            if(ttsEngine.isPlaying && !ttsEngine.isPaused) {
                ttsEngine.togglePause(); // To'xtatib qayta yurgizish kerak (API talabi)
                setTimeout(() => ttsEngine.togglePause(), 50);
            }
        };

        // Chiqish mantiqi (Bugs fixed: TTS UI ga tegilganda trigger bo'lmaydi)
        document.body.addEventListener('click', (e) => {
            if(e.target.closest('header') || 
               e.target.closest('.modal-content') || 
               e.target.closest('#welcomeScreen') || 
               e.target.closest('.next-overlay') || 
               e.target.closest('.tts-bar')) {
                exitClicks = 0; return;
            }

            exitClicks++;
            clearTimeout(exitTimer);

            if(exitClicks >= 2 && exitClicks < 6) {
                els.toast.innerText = `Chiqish uchun yana ${6 - exitClicks} marta bosing`;
                els.toast.classList.add('show');
            }

            if(exitClicks === 6) {
                els.toast.classList.remove('show');
                exitClicks = 0;
                if(document.fullscreenElement) { document.exitFullscreen().catch(err => console.log(err)); }
            }

            exitTimer = setTimeout(() => {
                exitClicks = 0;
                els.toast.classList.remove('show');
            }, 500);
        });

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
