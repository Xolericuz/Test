<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>XOLƎRIƆ Kutubxonasi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg-deep: #050505;
            --silver-light: #E0E0E0;
            --silver-mid: #C0C0C0;
            --silver-dark: #8E8E8E;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(192, 192, 192, 0.2);
            --neon-silver: rgba(192, 192, 192, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-deep);
            color: var(--silver-light);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        /* --- Header va Logo --- */
        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .silver-text-animated {
            background: linear-gradient(120deg, #8E8E8E 0%, #ffffff 20%, #8E8E8E 40%, #E0E0E0 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 0px 0px 10px rgba(192,192,192,0.2);
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* --- Kitoblar Ro'yxati (Grid) --- */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 30px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            scroll-behavior: smooth;
        }
        main::-webkit-scrollbar { width: 0px; }

        .book-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
            cursor: pointer;
            min-height: 180px;
        }

        .book-card:hover, .book-card:active {
            transform: translateY(-8px);
            box-shadow: 0 10px 30px var(--neon-silver);
            border-color: var(--silver-mid);
        }

        .book-title {
            color: var(--silver-mid);
            font-size: 20px;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 15px;
        }

        .read-btn {
            background: linear-gradient(to right, var(--silver-dark), var(--silver-mid), var(--silver-light));
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: auto;
        }
        .read-btn:active { opacity: 0.8; }

        /* --- O'qish Oynasi (Reader) --- */
        #readerScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-deep);
            z-index: 100;
            display: flex; flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #readerScreen.active { transform: translateY(0); }

        .reader-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(5, 5, 5, 0.9);
        }
        .close-btn {
            background: none; border: none; color: var(--silver-mid);
            font-size: 24px; cursor: pointer;
        }

        .reader-content {
            flex: 1; overflow-y: auto; padding: 30px 20px 120px 20px;
            max-width: 800px; margin: 0 auto;
            font-size: 18px; line-height: 1.8; color: var(--silver-light);
            text-align: justify;
        }
        .reader-content::-webkit-scrollbar { width: 4px; }
        .reader-content::-webkit-scrollbar-thumb { background: var(--silver-dark); border-radius: 4px; }

        .reader-content h2 {
            margin-bottom: 25px; color: #fff; text-align: center; font-weight: 800; font-size: 28px;
        }
        .reader-content p {
            margin-bottom: 20px;
        }

        /* --- TTS Player (Ovozli o'qish paneli) --- */
        .tts-panel {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 15px 30px;
            border-radius: 30px;
            display: flex; gap: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 110;
        }

        .tts-btn {
            background: none; border: none;
            color: var(--silver-mid); font-size: 24px; cursor: pointer;
            transition: color 0.2s, transform 0.1s;
        }
        .tts-btn:active { transform: scale(0.9); color: #fff; }
        .tts-btn.playing { color: #fff; text-shadow: 0 0 15px var(--silver-light); }

    </style>
</head>
<body>

    <header>
        <div class="silver-text-animated">XOLƎRIƆ</div>
    </header>

    <main id="libraryGrid"></main>

    <div id="readerScreen">
        <div class="reader-header">
            <button class="close-btn" onclick="closeBook()">&#10005;</button>
            <div class="silver-text-animated" style="font-size: 18px;">O'QISH REJIMI</div>
            <div style="width: 24px;"></div>
        </div>
        
        <div class="reader-content" id="bookTextContainer"></div>

        <div class="tts-panel">
            <button class="tts-btn" id="btnStop" onclick="stopTTS()">⏹</button>
            <button class="tts-btn" id="btnPlay" onclick="toggleTTS()">▶</button>
        </div>
    </div>

    <script>
        function triggerHaptic() {
            if (navigator.vibrate) navigator.vibrate(50);
        }

        // To'liq 50 ta kitob bazasi
        const allBooks = [
            // 1-5
            { title: "1. Mukammallik Kuchi: Kichik Odatlar San'ati", content: "<p>Hayotimizda yuz beradigan eng katta o'zgarishlar birdaniga bo'lmaydi. Katta yutuqlar har doim ko'zga ko'rinmas, doimiy ravishda takrorlanadigan kichik harakatlarning jamlanmasidir. \"Atomic Habits\" konsepsiyasi shuni uqtiradiki, inson o'z ustida har kuni atigi bir foiz (1%) yaxshilanishga erishsa, yil oxiriga kelib u 37 barobar kuchliroq, aqlliroq va tajribaliroq shaxsga aylanadi.</p><p>Aksariyat insonlar motivatsiyaga tayanib ish ko'radilar. Ammo motivatsiya bu vaqtinchalik hissiy holatdir. Haqiqiy va bardavom natijaga erishish uchun insonga motivatsiya emas, balki qat'iy intizom va to'g'ri ishlab chiqilgan tizim kerak.</p>" },
            { title: "2. Kiberxavfsizlik va Tarmoq Anatomiyasi", content: "<p>Zamonaviy raqamli dunyoda eng qimmatli resurs bu — neft yoki oltin emas, balki axborot va ma'lumotlardir. Kiberxavfsizlik butun boshli tarmoq arxitekturasini, serverlar va foydalanuvchilar o'rtasidagi maxfiy ma'lumotlar almashinuvini himoya qilishning murakkab va uzluksiz ilmiy tizimidir.</p><p>Kiberhimoyaning asosi operatsion tizimlarning ichki tuzilishini chuqur tushunishdan boshlanadi.</p>" },
            { title: "3. Moliyaviy Savodxonlik: Sarmoya va Erkinlik", content: "<p>Boylikning haqiqiy o'lchovi bu sizning qancha ko'p pul topishingiz bilan emas, balki o'sha topilgan pulni qanday boshqarishingiz va uni kelajak uchun saqlab qola olishingiz bilan o'lchanadi. Moliyaviy erkinlik insonning ishlash uchun emas, yashash uchun pul topish tizimini yo'lga qo'ygan holatidir.</p>" },
            { title: "4. Chuqur Diqqat: Axborot Asrida Konsentratsiya", content: "<p>Hozirgi axborot texnologiyalari asrida chalg'ituvchi omillar shu qadar ko'pki, bitta vazifaga to'liq diqqatni jamlab ishlash noyob va o'ta qimmatbaho qobiliyatga aylanib bormoqda. Kardiologik operatsiya qilayotgan shifokor yoki murakkab tizim kodini yozayotgan dasturchi uchun diqqat – ularning eng asosiy qurolidir.</p>" },
            { title: "5. Kosmik Olam: Koinot va Qora Tuynuklar Sirlari", content: "<p>Koinot shu qadar ulkan va sirli ki, inson aqli uning o'lchamlarini to'liq tasavvur qilishga ojizdir. Biz tungi osmonga boqib ko'radigan yulduzlarning nuri bizgacha yetib kelishi uchun yillar, hatto millionlab yillar kerak bo'ladi.</p><p>Koinotdagi eng qiziqarli va haligacha to'liq o'rganilmagan obyektlardan biri bu — qora tuynuklardir.</p>" },
            // 6-10
            { title: "6. Veb-Dasturlash: Raqamli Arxitektura", content: "<p>Zamonaviy veb-dasturlash shunchaki brauzerda ochiladigan oddiy sahifalar yaratishdan ancha uzoqlashgan. Bugungi kunda u insonlar hayotini osonlashtiruvchi, global miqyosda ishlovchi murakkab raqamli ilovalar qurish san'atidir.</p>" },
            { title: "7. Kiberhimoya: Tarmoq Sirlari va Tahlil", content: "<p>Bugungi kunda har qanday tashkilotning eng muhim boyligi bu uning ma'lumotlar bazasidir. Kiberxavfsizlik ana shu axborotlarni uchinchi shaxslar hujumidan himoya qiluvchi murakkab tizimdir.</p>" },
            { title: "8. Ovoz Muhandisligi: Phonk va Instrumental San'at", content: "<p>Musiqa yaratish jarayoni bugungi kunda faqatgina cholg'u asboblarini chalish bilan cheklanmaydi; u to'liq raqamli muhandislik va fizika san'atiga aylangan. Ovoz to'lqinlarini boshqarish, chastotalarni o'zaro moslashtirish zamonaviy musiqaning asosidir.</p>" },
            { title: "9. Raqamli Ta'lim: Interaktiv Savodxonlik", content: "<p>Kelajak avlodni tarbiyalashda an'anaviy usullarning o'rni beqiyos, biroq bugungi raqamli asr bolalarning e'tiborini jalb qilish uchun yangicha, interaktiv yondashuvlarni talab qiladi.</p>" },
            { title: "10. Sun'iy Intellekt: Mashinali O'rganish", content: "<p>Sun'iy intellekt (AI) insoniyat tarixidagi eng ulug'vor kashfiyotlardan biriga aylanib ulgurdi. Neyrotarmoqlar kompyuterlarga biz yozib bergan qat'iy qoidalarsiz ham ma'lumotlarni tahlil qilish imkonini bermoqda.</p>" },
            // 11-15
            { title: "11. Kvant Fizikasi: Borliqning Ko'rinmas Asoslari", content: "<p>Kvant fizikasi — bu koinotning eng mitti zarrachalari qanday ishlashini o'rganuvchi fan bo'lib, u bizning voqelik haqidagi an'anaviy tasavvurlarimizni butunlay ost-ust qilib yuboradi.</p>" },
            { title: "12. Vaqtni Boshqarish: Samaradorlik San'ati", content: "<p>Vaqt — inson hayotidagi yagona qaytarib bo'lmaydigan resursdir. Samaradorlikning eng mashhur usullaridan biri bu Eyzenxauer matritsasidir.</p>" },
            { title: "13. Psixologiya: Inson Ongi Sirlari", content: "<p>Inson miyasi koinotdagi eng murakkab va sirli obyektlardan biridir. Biz qabul qilayotgan har bir qaror ortida o'zimiz ham sezmaydigan chuqur psixologik sabablar yotadi.</p>" },
            { title: "14. Kriptovalyuta va Blokcheyn Inqilobi", content: "<p>Kriptovalyutalarning ishlash mexanizmi Blokcheyn texnologiyasiga asoslanadi. Bu texnologiya har qanday tranzaksiyaning 100% xavfsiz va shaffof bo'lishini ta'minlaydi.</p>" },
            { title: "15. Bionika: Tabiatdan Texnologiyaga", content: "<p>Bionika — tabiatdagi biologik mexanizmlarni o'rganib, ularni zamonaviy texnologiyalarga tadbiq etuvchi kelajak fanidir.</p>" },
            // 16-20
            { title: "16. Nanotexnologiya: Ko'rinmas Olilmdagi Inqilob", content: "<p>Nanotexnologiya — bu moddalarni atom va molekula darajasida boshqarish va yangi xususiyatlarga ega materiallar yaratish fanidir.</p>" },
            { title: "17. Ekologiya va Iqlim Inqirozi", content: "<p>Global isishning oqibatlari nafaqat havo haroratining ko'tarilishida, balki butun ekotizimning buzilishida namoyon bo'lmoqda.</p>" },
            { title: "18. Metaolam va Virtual Reallik", content: "<p>Internetning evolyutsiyasi endilikda ikki o'lchamli ekranlardan chiqib, bizni to'liq qamrab oluvchi uch o'lchamli fazoga ko'chib o'tmoqda.</p>" },
            { title: "19. Avtomobilsozlik Evolyutsiyasi", content: "<p>Ichki yonuv dvigatellari o'z o'rnini elektromobillarga (EV) va avtonom boshqaruv tizimlariga bo'shatib bermoqda.</p>" },
            { title: "20. Tibbiyotda Inqilob: DNK Tahriri", content: "<p>Tibbiyot sohasi inson umrini uzaytirish va hayot sifatini yaxshilashda fantastika darajasiga olib chiqdi, xususan CRISPR texnologiyasi orqali.</p>" },
            // 21-25
            { title: "21. Sotsiologiya: Ommaviy Ong", content: "<p>Sotsiologiya insonlarning o'zaro munosabatlarini, jamiyat qanday shakllanishini o'rganadi. Ommaviy ong axborot asrida dolzarb ahamiyat kasb etmoqda.</p>" },
            { title: "22. Kino San'ati", content: "<p>Kino — bu insoniyat kashf etgan san'at turlarining eng yoshi, ammo eng ta'sirchanidir. U davrning ruhiyatini aks ettiruvchi oynadir.</p>" },
            { title: "23. Arxitektura: Muzlagan Musiqa", content: "<p>Arxitektura shunchaki to'rt devor va tomdan iborat emas. U muhandislik, san'at va psixologiyaning mukammal kesishuv nuqtasidir.</p>" },
            { title: "24. Global Logistika", content: "<p>Logistika jahon iqtisodiyotining ko'rinmas qon tomirlari bo'lib, uning bir soniya to'xtab qolishi butun dunyo bozorlarini falaj qiladi.</p>" },
            { title: "25. Diplomatiya va Siyosat", content: "<p>Diplomatiya — bu davlatlar o'rtasidagi manfaatlarni tinch yo'l bilan hal etish, nizo va ziddiyatlarning oldini olish san'ati hisoblanadi.</p>" },
            // 26-30
            { title: "26. Mifologiya: Qadimgi Dunyo Sirlari", content: "<p>Mifologiya — qadimgi insonlarning koinot, hayot va o'lim haqidagi ibtidoiy, ammo o'ta murakkab tasavvurlari majmuasidir.</p>" },
            { title: "27. Biologik Xilma-xillik", content: "<p>Yer sayyorasi koinotdagi yagona tiriklik maskanidir. Bu tiriklikning eng katta mo'jizasi uning cheksiz xilma-xilligidadir.</p>" },
            { title: "28. Koinotni O'zlashtirish", content: "<p>Odamzot qadim zamonlardan beri osmonga boqib, yulduzlar ortida nima borligiga qiziqib kelgan. Marsni kolonizatsiya qilish asosiy maqsaddir.</p>" },
            { title: "29. Xotirani Kuchaytirish", content: "<p>Inson xotirasi shunchaki ma'lumotlarni saqlovchi passiv arxiv emas, balki uzluksiz ishlaydigan murakkab neyrobiologik jarayondir.</p>" },
            { title: "30. Kriptografiya va Sirli Kodlar", content: "<p>Axborotni yashirish va uni faqat kerakli odam o'qiy olishini ta'minlash ehtiyoji qadimdan mavjud bo'lgan. Kriptografiya aynan shu vazifani bajaradi.</p>" },
            // 31-35
            { title: "31. Bio-xaking: Tana va Ong", content: "<p>Bio-xaking — bu tana va ongni turli xil tibbiy, genetik va texnologik usullar orqali maksimal darajaga chiqarishdir.</p>" },
            { title: "32. Minimalizm Falsafasi", content: "<p>Minimalizm — bu o'zingizni keraksiz narsalardan ixtiyoriy ravishda xalos qilish va haqiqatan muhim bo'lgan narsalar uchun bo'shliq yaratishdir.</p>" },
            { title: "33. Kvant Ruhiyati", content: "<p>Kvant ruhiyati tushunchasi bizning o'ylarimiz voqelikka faol ta'sir o'tkazuvchi kuch ekanligini ilgari suradi.</p>" },
            { title: "34. Axborot Urushi", content: "<p>Axborot urushi — bu qurolsiz urush. Unda o'qlar o'rnini feyk yangiliklar, tanklar o'rnini trollar fabrikasi egallagan.</p>" },
            { title: "35. Mikrobiom: Sizdagi Koinot", content: "<p>Inson tanasidagi o'zimizning hujayralarimiz sonidan ko'ra, biz bilan yashovchi mikroblar soni o'n barobar ko'proqdir.</p>" },
            // 36-40
            { title: "36. Xalqaro Huquq", content: "<p>Xalqaro huquq — bu mustaqil davlatlar o'rtasidagi munosabatlarni tartibga soluvchi ko'rinmas qoidalar majmuasidir.</p>" },
            { title: "37. O'z-o'zini Rivojlantirish", content: "<p>Yaponlarning 'Kaizen' falsafasi insonning o'z ustida muntazam kichik ijobiy o'zgarishlar qilishini uqtiradi.</p>" },
            { title: "38. Musiqa va Miya", content: "<p>Musiqa eshitish miyaning deyarli barcha hududlarini bir vaqtning o'zida faollashtiruvchi yagona mashg'ulotdir.</p>" },
            { title: "39. Ijtimoiy Tarmoqlar: Raqamli Dopamin", content: "<p>Ijtimoiy tarmoqlar odamlarning diqqatini jalb qilish va miyada dopamin ajralishini sun'iy rag'batlantirish uchun qurilgan.</p>" },
            { title: "40. Startaplar Anatomiyasi", content: "<p>Startap – bu yuqori noaniqlik sharoitida innovatsion mahsulot yaratish va tezkor o'sishga erishish maqsadida tuzilgan tashkilotdir.</p>" },
            // 41-45
            { title: "41. Muvaffaqiyatsizlik Saboqlari", content: "<p>Har bir buyuk g'alaba – bu o'nlab, ba'zan yuzlab xatolar va mag'lubiyatlar ustiga qurilgan poydevordir.</p>" },
            { title: "42. Loyiha Boshqaruvi: Agile va Scrum", content: "<p>Agile – bu ish uslubi bo'lib, mijoz ehtiyojlarini birinchi o'ringa qo'yish va moslashuvchanlikka asoslanadi.</p>" },
            { title: "43. Zamonaviy San'at", content: "<p>Zamonaviy san'atda asosiy qadriyat – bu rasmning texnikasida emas, balki uning ortida yotgan g'oyada yashirin.</p>" },
            { title: "44. Raqamli Minimalizm", content: "<p>Raqamli minimalizm – texnologiyalarni hayotingizga qat'iy va ongli ravishda kiritish falsafasidir.</p>" },
            { title: "45. Xalqaro Munosabatlar", content: "<p>Zamonaviy geosiyosatda harbiy kuchdan ko'ra iqtisodiy va texnologik qurollar ko'proq ishlatilmoqda.</p>" },
            // 46-50
            { title: "46. Kiber-Psixologiya", content: "<p>Kiber-psixologiya — insonning texnologiyalar, internet va virtual olam bilan o'zaro ta'sirini o'rganuvchi fandir.</p>" },
            { title: "47. Smart City: Kelajak Shaharlari", content: "<p>Aqlli shahar — barcha tizimlari yagona raqamli tarmoqqa bog'langan va real vaqtda boshqariladigan yashash muhitidir.</p>" },
            { title: "48. Neyro-interfeys: Fikr Kuchi", content: "<p>Neyro-interfeys — miyadagi elektr signallarini o'qib, ularni raqamli buyruqlarga aylantiruvchi tizimdir.</p>" },
            { title: "49. Kvant Kompyuterlari", content: "<p>Kvant kompyuterlari bitlar o'rniga kubitlardan foydalanib, hisoblash quvvatini fantastik darajaga ko'taradi.</p>" },
            { title: "50. Insoniyatning Yakuniy Taqdiri", content: "<p>Koinot milliardlab yillar yashashda davom etadi. Insoniyatning eng katta yutug'i — bu uning cheksiz intilishi va tafakkuridir.</p>" }
        ];

        const libraryGrid = document.getElementById('libraryGrid');
        const readerScreen = document.getElementById('readerScreen');
        const bookTextContainer = document.getElementById('bookTextContainer');
        const btnPlay = document.getElementById('btnPlay');

        // Web Speech API (O'zbek tilida o'qish uchun)
        let synth = window.speechSynthesis;
        let utterance = new SpeechSynthesisUtterance();
        utterance.lang = 'uz-UZ'; // O'zbek tili
        utterance.rate = 0.9; 

        // 50 ta kitobni Grid usulida chiqarish
        function renderBooks() {
            allBooks.forEach((book, index) => {
                const card = document.createElement('div');
                card.className = 'book-card';
                card.onclick = () => openBook(index);
                
                card.innerHTML = `
                    <div class="book-title">${book.title}</div>
                    <button class="read-btn">O'qishni boshlash</button>
                `;
                libraryGrid.appendChild(card);
            });
        }

        // Kitobni ochish (manipulyatsiya - to'liq ekranli o'qish)
        function openBook(index) {
            triggerHaptic();
            const book = allBooks[index];
            bookTextContainer.innerHTML = `<h2>${book.title}</h2>${book.content}`;
            readerScreen.classList.add('active');
            
            // TTS ga faqat toza matnni biriktirish (HTML teglarisiz)
            const tempDiv = document.createElement("div");
            tempDiv.innerHTML = book.content;
            utterance.text = tempDiv.textContent || tempDiv.innerText || "";
            
            stopTTS();
        }

        function closeBook() {
            triggerHaptic();
            readerScreen.classList.remove('active');
            stopTTS();
        }

        // TTS (Ovozli o'qish) boshqaruvi
        function toggleTTS() {
            triggerHaptic();
            if (synth.speaking && !synth.paused) {
                synth.pause();
                btnPlay.innerText = '▶';
                btnPlay.classList.remove('playing');
            } else if (synth.paused) {
                synth.resume();
                btnPlay.innerText = '⏸';
                btnPlay.classList.add('playing');
            } else {
                synth.speak(utterance);
                btnPlay.innerText = '⏸';
                btnPlay.classList.add('playing');
            }
        }

        function stopTTS() {
            triggerHaptic();
            synth.cancel();
            btnPlay.innerText = '▶';
            btnPlay.classList.remove('playing');
        }

        utterance.onend = () => {
            btnPlay.innerText = '▶';
            btnPlay.classList.remove('playing');
        };

        // Dasturni ishga tushirish
        renderBooks();
    </script>
</body>
</html>
