    <script>
        // ===== 50 KITOB - TO'LIQ MAZMUN =====
        const BOOKS = [
            // 1-10
            { id: 0, title: "1. Mukammallik Kuchi: Kichik Odatlar San'ati", category: 1, 
              content: `<p>Hayotimizda yuz beradigan eng katta o'zgarishlar birdaniga bo'lmaydi. Katta yutuqlar har doim ko'zga ko'rinmas, doimiy ravishda takrorlanadigan kichik harakatlarning jamlanmasidir. "Atomic Habits" konsepsiyasi shuni uqtiradiki, inson o'z ustida har kuni atigi bir foiz (1%) yaxshilanishga erishsa, yil oxiriga kelib u 37 barobar kuchliroq, aqlliroq va tajribaliroq shaxsga aylanadi.</p><p>Aksariyat insonlar motivatsiyaga tayanib ish ko'radilar. Ammo motivatsiya bu vaqtinchalik hissiy holatdir. Haqiqiy va bardavom natijaga erishish uchun insonga motivatsiya emas, balki qat'iy intizom va to'g'ri ishlab chiqilgan tizim kerak. Maqsad belgilash g'oliblar va mag'lublar o'rtasidagi farqni belgilamaydi, chunki ikkalasining ham maqsadi g'alaba qozonishdir. Ularni farqlaydigan narsa – bu maqsad sari eltuvchi kundalik jarayonlar, ya'ni odatlardir.</p><p>Yangi odatni shakllantirish uchun psixologiyada maxsus zanjir mavjud: signal, istak, javob va mukofot. Yaxshi odatlarni shakllantirish uchun ularni ko'zga tashlanadigan, jozibador, bajarishga oson va qoniqarli qilish zarur. Salbiy odatlardan qutulish uchun esa buning aynan teskarisini qilish talab etiladi: ularni ko'zdan uzoqroq, zerikarli, murakkab va foydasiz qilib qo'yish kerak. Atrof-muhitingiz sizning xulq-atvoringizni belgilaydigan eng kuchli omildir.</p><p>Biz o'zimiz istagan odamga aylanishimiz uchun, avvalo e'tiqodimizni va o'zimizga bo'lgan qarashimizni o'zgartirishimiz lozim. O'zgarishning eng chuqur qatlami bu "Men kimman?" degan savolga beriladigan javobdir. O'zingizni shunchaki kitob o'qiyotgan odamdek emas, balki "kitobxon" sifatida his qiling. Har bir o'qigan sahifangiz yangi shaxsiyatingiz uchun berilgan ishonchli ovozdir.</p>` },
            
            { id: 1, title: "2. Kiberxavfsizlik va Tarmoq Anatomiyasi", category: 1,
              content: `<p>Zamonaviy raqamli dunyoda eng qimmatli resurs bu — neft yoki oltin emas, balki axborot va ma'lumotlardir. Kiberxavfsizlik butun boshli tarmoq arxitekturasini, serverlar va foydalanuvchilar o'rtasidagi maxfiy ma'lumotlar almashinuvini himoya qilishning murakkab va uzluksiz ilmiy tizimidir. Har bir soniyada dunyo bo'ylab millionlab zararli kodlar va xakerlik hujumlari tarmoqlarni sinovdan o'tkazmoqda.</p><p>Kiberhimoyaning asosi operatsion tizimlarning ichki tuzilishini chuqur tushunishdan boshlanadi. Tizimdagi ochiq portlar, zaif protokollar va kodlardagi kichik mantiqiy xatolar tajribali axloqiy xakerlar (ethical hackers) tomonidan doimiy ravishda penetratsion testlar (pentest) orqali tekshirilib boriladi. Ularning asosiy maqsadi – jinoyatchi xakerlardan (qora shlyapalar) oldin tizimdagi darchalarni topish va ularni yamashdir.</p><p>Ma'lumotlar bazasiga inyeksiya hujumlari (SQLi), saytlararo skriptlash (XSS) va ijtimoiy muhandislik kabi usullar bugungi kundagi eng keng tarqalgan tahdidlardan hisoblanadi. Ijtimoiy muhandislik texnologiyaga emas, to'g'ridan-to'g'ri inson psixologiyasiga hujum qiladi. Ya'ni, insonlarning ishonchuvchanligi, qo'rquvi yoki qiziqishlaridan foydalanib, tizim parollarini o'g'irlash usulidir.</p>` },
            
            { id: 2, title: "3. Moliyaviy Savodxonlik: Sarmoya va Erkinlik", category: 1,
              content: `<p>Boylikning haqiqiy o'lchovi bu sizning qancha ko'p pul topishingiz bilan emas, balki o'sha topilgan pulni qanday boshqarishingiz va uni kelajak uchun saqlab qola olishingiz bilan o'lchanadi. Moliyaviy erkinlik insonning ishlash uchun emas, yashash uchun pul topish tizimini yo'lga qo'ygan holatidir. Buning asosiy siri moliyaviy savodxonlik, ya'ni aktiv va passiv tushunchalarini to'g'ri farqlashda yashirin.</p><p>Kambag'al va o'rta sinf insonlari o'zlariga asosan "passivlar" sotib olishadi va buni boylik deb o'ylashadi. Masalan, kreditga olingan qimmatbaho avtomobil, eng so'nggi rusumdagi telefon yoki hashamatli uy sizning cho'ntagingizdan har oy pul olib chiqib ketadi. Haqiqiy boylar esa "aktivlar" yig'adilar. Aktivlar — bu o'z-o'zidan cho'ntagingizga pul keltiruvchi narsalar: biznes, qimmatli qog'ozlar, intellektual mulk yoki ijaraga beriladigan ko'chmas mulkdir.</p><p>Murakkab foiz (compound interest) atamasi iqtisodiyotdagi sakkizinchi mo'jiza hisoblanadi. Agar siz yoshlikdan boshlab muntazam ravishda kichik summalarni sarmoya qilib borsangiz, yillar o'tib bu sarmoya o'zining foizlari hisobiga eksponensial tarzda o'sishni boshlaydi.</p>` },
            
            { id: 3, title: "4. Chuqur Diqqat: Fokus San'ati", category: 1,
              content: `<p>Hozirgi axborot texnologiyalari asrida chalg'ituvchi omillar shu qadar ko'pki, bitta vazifaga to'liq diqqatni jamlab ishlash noyob va o'ta qimmatbaho qobiliyatga aylanib bormoqda. Kardiologik operatsiya qilayotgan shifokor yoki murakkab tizim kodini yozayotgan dasturchi uchun diqqat – ularning eng asosiy qurolidir. "Chuqur ish" (Deep Work) tushunchasi insonning o'z aqliy sig'imini maksimal darajada ishlatib, hech qanday chalg'ishlarsiz murakkab qadriyat yaratish holatini anglatadi.</p><p>Aksariyat odamlar kunini elektron pochtalarga javob berish, ijtimoiy tarmoqlardagi tasmasini varaqlash va qisqa videolarni ko'rish bilan, ya'ni "yuzaki ishlar" (shallow work) bilan o'tkazadilar. Yuzaki ishlar odamga faqat bandlik hissini beradi, ammo iqtisodiy va shaxsiy jihatdan hech qanday katta qiymat yaratmaydi.</p><p>Inson miyasi ko'p vazifalilikni (multitasking) yoqtirmaydi. Bir vaqtning o'zida ham musiqa eshitish, ham xabar yozish, ham kitob o'qish aslo mumkin emas. Miya shunchaki bir vazifadan ikkinchisiga o'ta tezlik bilan sakraydi va bu jarayonda u juda ko'p energiya yo'qotadi.</p>` },
            
            { id: 4, title: "5. Kosmik Olam va Qora Tuynuklar", category: 1,
              content: `<p>Koinot shu qadar ulkan va sirli ki, inson aqli uning o'lchamlarini to'liq tasavvur qilishga ojizdir. Biz tungi osmonga boqib ko'radigan yulduzlarning nuri bizgacha yetib kelishi uchun yillar, hatto millionlab yillar kerak bo'ladi. Bu degani, biz har safar yulduzlarga qaraganimizda aslida o'tmishni, ularning ming yillar oldingi holatini ko'rayotgan bo'lamiz. Koinot tinimsiz kengaymoqda va bu jarayon galaktikalar orasidagi masofani tobora uzoqlashtirmoqda.</p><p>Koinotdagi eng qiziqarli va haligacha to'liq o'rganilmagan obyektlardan biri bu — qora tuynuklardir (Black holes). Ular yulduzlar o'z hayotini yakunlab, ulkan portlashdan (o'ta yangi yulduz portlashi) so'ng o'z ichiga qulab tushishi natijasida hosil bo'ladi. Qora tuynukning tortishish kuchi shu qadar kuchliki, undan hatto eng tezkor narsa — yorug'lik ham qochib qutula olmaydi.</p>` },
            
            // 6-10
            { id: 5, title: "6. Veb-Dasturlash Arxitekturasi", category: 1,
              content: `<p>Zamonaviy veb-dasturlash shunchaki brauzerda ochiladigan oddiy sahifalar yaratishdan ancha uzoqlashgan. Bugungi kunda u insonlar hayotini osonlashtiruvchi, global miqyosda ishlovchi murakkab raqamli ilovalar qurish san'atidir. Har bir mukammal ishlangan veb-sayt ortida yuzlab soatlik mehnat, mantiqiy yechimlar va foydalanuvchi tajribasini (UX) yaxshilashga qaratilgan tinimsiz izlanishlar yotadi.</p><p>Frontend (foydalanuvchi ko'radigan qism) va Backend (server va mantiq qismi) o'rtasidagi uyg'unlik mukammal dastur ishlashining kafolatidir. Shisha effektlari (Glassmorphism), silliq animatsiyalar va hatto veb-ilovalar ichidagi terminal interfeyslari kabi innovatsion yechimlar foydalanuvchilarni o'ziga jalb qiladi.</p>` },
            
            { id: 6, title: "7. Kiberhimoya va Tahlil", category: 1,
              content: `<p>Bugungi kunda har qanday tashkilotning eng muhim boyligi bu uning ma'lumotlar bazasidir. Kiberxavfsizlik ana shu axborotlarni uchinchi shaxslar hujumidan himoya qiluvchi murakkab tizimdir. Tarmoq xavfsizligini ta'minlashda tizimning ichki mexanizmlarini chuqur anglash va zaifliklarni (vulnerabilities) oldindan aniqlash hal qiluvchi ahamiyatga ega.</p><p>Xavfsizlik sohasini o'rganish kishidan yuksak mantiqiy va tahliliy fikrlashni talab qiladi. Dastur kodlarining qanday ishlashini to'liq anglamasdan turib, uni himoya qilish imkonsizdir.</p>` },
            
            { id: 7, title: "8. Ovoz Muhandisligi: Phonk", category: 1,
              content: `<p>Musiqa yaratish jarayoni bugungi kunda faqatgina cholg'u asboblarini chalish bilan cheklanmaydi; u to'liq raqamli muhandislik va fizika san'atiga aylangan. Ovoz to'lqinlarini boshqarish, chastotalarni o'zaro moslashtirish va tinglovchiga hissiy ta'sir ko'rsatish zamonaviy musiqaning asosidir. Xususan, elektron musiqa va so'nggi yillarda katta trendga chiqqan Phonk janri o'zining o'zgacha atmosferasi va kuchli basslari (808s) bilan ajralib turadi.</p><p>Bugungi kunda musiqiy prodyuserlar kuchli kompyuterlar va ochiq kodli muhitlarda ham bemalol ijod qila olishmoqda. Eng muhimi — g'oya va tovushlar arxitekturasini his qila olish.</p>` },
            
            { id: 8, title: "9. Raqamli Savodxonlik", category: 1,
              content: `<p>Kelajak avlodni tarbiyalashda an'anaviy usullarning o'rni beqiyos, biroq bugungi raqamli asr bolalarning e'tiborini jalb qilish uchun yangicha, interaktiv yondashuvlarni talab qiladi. Bolalarga o'qish va yozishni o'rgatuvchi zamonaviy dasturlar ularning qabul qilish xususiyatlariga to'liq moslashtirilgan bo'lishi kerak. Quruq matnlar va zerikarli qoidalardan voz kechib, jarayonni vizual o'yin darajasiga olib chiqish yuqori samaradorlikni ta'minlaydi.</p>` },
            
            { id: 9, title: "10. Sun'iy Intellekt Asoslari", category: 1,
              content: `<p>Sun'iy intellekt (AI) insoniyat tarixidagi eng ulug'vor kashfiyotlardan biriga aylanib ulgurdi. Bir necha o'n yillar oldin u faqatgina fantastika hisoblangan bo'lsa, bugun u kundalik hayotimizning ajralmas mexanizmi. Mashinali o'rganish (Machine Learning) va neyrotarmoqlar kompyuterlarga biz yozib bergan qat'iy qoidalarsiz ham ma'lumotlarni tahlil qilish va qaror qabul qilish imkonini bermoqda.</p><p>Texnologiyaning bu darajada tez rivojlanishi bizga shuni ko'rsatadiki, yaqin kelajakda inson mashinalar bilan raqobatlashmaydi, balki ular bilan hamkorlikda ishlashni o'rganadi.</p>` },
            
            // 11-15
            { id: 10, title: "11. Kvant Fizikasi Mo'jizalari", category: 2,
              content: `<p>Kvant fizikasi — bu koinotning eng mitti zarrachalari qanday ishlashini o'rganuvchi fan bo'lib, u bizning voqelik haqidagi an'anaviy tasavvurlarimizni butunlay ost-ust qilib yuboradi. Klassik fizikadan farqli o'laroq, kvant olamida jismlar bir vaqtning o'zida ikkita joyda bo'lishi (superpozitsiya) yoki bir-biri bilan koinotning ikki chekkasida turib ham bir zumda aloqa qilishi (kvant chalkashligi) mumkin.</p><p>Kvant olamining eng mashhur tajribalaridan biri "Ikki yoriqli tajriba" (Double-slit experiment) hisoblanadi. Bu tajriba shuni ko'rsatdiki, yorug'lik va elektronlar ham to'lqin, ham zarracha xususiyatiga ega. Eng qizig'i shundaki, zarrachaning o'zini qanday tutishi uni "kuzatuvchi" bor yoki yo'qligiga qarab o'zgaradi.</p>` },
            
            { id: 11, title: "12. Vaqtni Boshqarish San'ati", category: 2,
              content: `<p>Vaqt — inson hayotidagi yagona qaytarib bo'lmaydigan va sotib olinmaydigan resursdir. Boy va kambag'al, yosh va qari — barchaga bir kunda aynan 24 soat beriladi. Ammo nima uchun ba'zilar bu vaqt ichida ulkan ishlarni amalga oshiradi-yu, boshqalar hatto kundalik yumushlariga ham ulgurmaydi? Buning siri vaqtning o'zida emas, balki diqqatni va ustuvorliklarni (priorities) to'g'ri taqsimlay olishdadir.</p><p>Samaradorlikning eng mashhur usullaridan biri bu Eyzenxauer matritsasidir. Bu tizim barcha ishlarni 4 toifaga ajratadi: muhim va shoshilinch, muhim lekin shoshilinch emas, muhim emas lekin shoshilinch, shuningdek, muhim ham, shoshilinch ham bo'lmagan ishlar.</p>` },
            
            { id: 12, title: "13. Psixologiya: Ong Sirlari", category: 2,
              content: `<p>Inson miyasi koinotdagi eng murakkab va sirli obyektlardan biridir. Uning atigi 1.5 kilogramm keladigan biologik massasi butun boshli sivilizatsiyalarni yaratishga, hissiyotlarni boshdan kechirishga va borliqni anglashga qodir. Psixologiya ana shu ongli va ongsiz jarayonlarni o'rganuvchi fandir. Biz qabul qilayotgan har bir qaror, har bir xatti-harakatimiz ortida o'zimiz ham sezmaydigan chuqur psixologik sabablar yotadi.</p><p>Inson ongi ikkita asosiy qismdan iborat: ongli (ratsional) va ongsiz (subconscious) qism. Psixologlarning ta'kidlashicha, bizning kundalik hayotdagi harakatlarimizning qariyb 95% ongsiz ravishda, ya'ni avtopilot rejimida amalga oshiriladi.</p>` },
            
            { id: 13, title: "14. Kriptovalyuta Inqilobi", category: 2,
              content: `<p>Iqtisodiyot tarixiga nazar tashlasak, pul tizimi doimiy ravishda evolyutsiya qilib kelganini ko'ramiz: tovar ayirboshlashdan tortib, oltin tangalarga, so'ngra qog'oz pullarga va elektron raqamlarga. Bugungi kunda esa moliyaviy dunyo navbatdagi katta inqilob — markazlashmagan raqamli pullar, ya'ni kriptovalyutalar davriga qadam qo'ydi. Bitcoin yaratilishi bilan markaziy banklarga va hukumatlarga qaram bo'lmagan, erkin va ochiq moliya tizimi g'oyasi haqiqatga aylandi.</p><p>Kriptovalyutalarning ishlash mexanizmi "Blokcheyn" (Blockchain) texnologiyasiga asoslanadi. Blokcheyn — bu axborotni saqlashning shunday usuliki, unda ma'lumotlar zanjir ko'rinishida, butun dunyodagi minglab kompyuterlarda bir vaqtning o'zida saqlanadi.</p>` },
            
            { id: 14, title: "15. Bionika: Tabiat Dizayni", category: 2,
              content: `<p>Bionika (yoki biomimetika) — tabiatdagi biologik mexanizmlarni va ularning ishlash prinsiplarini o'rganib, ularni zamonaviy texnologiyalarga tadbiq etuvchi kelajak fanidir. Tabiat millionlab yillik evolyutsiya davomida mukammal dizayn va yechimlarni yaratgan. Muhandislar va olimlar bugungi kunda bu tayyor "xaritalar" dan foydalanib, insoniyatning eng qiyin muammolariga innovatsion yechimlar topmoqdalar.</p><p>Eng mashhur bionik kashfiyotlardan biri bo'lmish "Velkro" (yopishtirgich lenta) oddiygina qariqiz o'simligining itlar va kiyimga yopishib qolish xususiyatini o'rganish natijasida kashf qilingan.</p>` },
            
            // 16-20
            { id: 15, title: "16. Nanotexnologiya", category: 2,
              content: `<p>Nanotexnologiya — bu moddalarni atom va molekula darajasida (1 dan 100 nanometrgacha bo'lgan o'lchamda) boshqarish va yangi xususiyatlarga ega materiallar yaratish fanidir. Tasavvur qilish uchun, bir nanometr soch tolasidan qariyb 100,000 marta yupqaroqdir. Bu o'lchamda moddalarning fizik va kimyoviy xususiyatlari butunlay o'zgaradi.</p><p>Nanotexnologiyaning eng katta yutuqlaridan biri uglerod nanotrubkalari va grafenning kashf etilishidir. Grafen po'latdan 200 barobar kuchli, ammo undan bir necha barobar yengil va shaffof bo'lgan bir atom qalinligidagi uglerod qatlamidir.</p>` },
            
            { id: 16, title: "17. Ekologiya: Sayyora Kelajagi", category: 2,
              content: `<p>Yer sayyorasi o'zining 4.5 milliard yillik tarixi davomida ko'plab iqlim o'zgarishlarini boshdan kechirgan. Biroq, so'nggi ikki asr ichida, xususan Sanoat inqilobidan keyin yuz berayotgan global isish jarayoni to'g'ridan-to'g'ri inson faoliyati bilan bog'liqdir. Qazib olinuvchi yoqilg'ilarning (ko'mir, neft, gaz) katta miqdorda yoqilishi oqibatida atmosferaga milliardlab tonna karbonat angidrid (CO2) ajralib chiqmoqda.</p><p>Global isishning oqibatlari nafaqat havo haroratining ko'tarilishida, balki butun ekotizimning buzilishida namoyon bo'lmoqda. Arktika va Antarktidadagi muzliklarning erishi dunyo okeani sathining ko'tarilishiga olib keladi.</p>` },
            
            { id: 17, title: "18. Metaolam va Virtual Reallik", category: 2,
              content: `<p>Internetning evolyutsiyasi endilikda ikki o'lchamli ekranlardan chiqib, bizni to'liq qamrab oluvchi uch o'lchamli fazoga — Metaolamga (Metaverse) ko'chib o'tmoqda. Virtual reallik (VR) va To'ldirilgan reallik (AR) texnologiyalari orqali insonlar raqamli olamni xuddi jismoniy dunyodagidek his qilish imkoniyatiga ega bo'lmoqdalar.</p><p>Virtual reallik (VR) sizni butunlay yangi, yopiq raqamli dunyoga olib kirsa, To'ldirilgan reallik (AR) jismoniy dunyo ustiga raqamli qatlamni tushiradi. Bu texnologiyalar avvaliga faqat video o'yinlar industriyasi uchun qiziqarli ko'ringan bo'lsa, bugungi kunda ular ta'lim, arxitektura, muhandislik va tibbiyot kabi sohalarda inqilob qilmoqda.</p>` },
            
            { id: 18, title: "19. Avtomobilsozlik Evolyutsiyasi", category: 2,
              content: `<p>Yuz yildan ortiq vaqt davomida insoniyatning asosiy transport vositasi bo'lib kelgan ichki yonuv dvigatellari o'z o'rnini elektromobillarga (EV) bo'shatib bermoqda. Bu avtomobilsozlik tarixidagi eng katta va eng tezkor texnologik inqilobdir. Elektromobillarning asosiy ustunligi nafaqat ularning ekologik tozaligi, balki tuzilishining o'ta soddaligidadir.</p><p>Hozirgi kunda bu sohaning eng muhim kurash maydoni akkumulyatorlar texnologiyasidir. Litiy-ion batareyalar o'rnini tez orada qattiq jismli (solid-state) batareyalar egallashi kutilmoqda.</p>` },
            
            { id: 19, title: "20. Tibbiyotda Gen Tahriri", category: 2,
              content: `<p>Tibbiyot sohasi inson umrini uzaytirish va hayot sifatini yaxshilashda doim eng ilg'or fan bo'lib kelgan, ammo bugungi kundagi texnologik integratsiya uni fantastika darajasiga olib chiqdi. An'anaviy jarrohlik o'rnini asta-sekin robot-jarrohlar (masalan, da Vinci jarrohlik tizimi) egallamoqda.</p><p>Tibbiyotdagi eng katta biologik inqilob bu CRISPR-Cas9 — gendagi o'zgarishlarni tahrirlash texnologiyasidir. Bu texnologiya olimlarga DNK zanjiridagi xato yoki kasallikka sabab bo'luvchi qismni xuddi kompyuterdagi "qirqib olib, o'rniga yopishtirish" funksiyasi kabi o'zgartirish imkonini beradi.</p>` },
            
            // 21-25
            { id: 20, title: "21. Sotsiologiya va Ommaviy Ong", category: 3,
              content: `<p>Sotsiologiya insonlarning o'zaro munosabatlarini, jamiyat qanday shakllanishini va uning qanday qonuniyatlar asosida rivojlanishini o'rganuvchi fandir. Biz ko'pincha o'z qarorlarimizni mutlaqo mustaqil qabul qilamiz deb o'ylaymiz, ammo sotsiologik tadqiqotlar shuni ko'rsatadiki, bizning didimiz, e'tiqodimiz va hatto kelajakdagi maqsadlarimiz ham biz yashayotgan jamiyat tomonidan oldindan dasturlashtirilgan bo'ladi.</p><p>Ommaviy ong (Mass consciousness) tushunchasi axborot asrida ayniqsa dolzarb ahamiyat kasb etmoqda. Odamlar guruh bo'lib harakat qilganda, ularning individual mantiqiy fikrlashi susayib, hissiyotlarga asoslangan "stada" instinkti ishga tushadi.</p>` },
            
            { id: 21, title: "22. Kino San'ati Tarixi", category: 3,
              content: `<p>Kino — bu insoniyat kashf etgan san'at turlarining eng yoshi, ammo eng ta'sirchanidir. XIX asr oxirida aka-uka Lyumyerlar tomonidan namoyish etilgan "Poyezdning yetib kelishi" nomli qisqa metrajli ovozsiz videodan tortib, bugungi kundagi milliard dollarlik byudjetga ega Gollivud blokbasterlarigacha bo'lgan yo'l — texnologiya va inson xayolotining ajoyib evolyutsiyasidir.</p><p>Kinematografiyaning haqiqiy sehri montaj jarayonida yashiringan. Mashhur "Kuleshov effekti" shuni ko'rsatadiki, ikkita bir-biriga bog'liq bo'lmagan kadrni ketma-ket qo'yish orqali tomoshabinda mutlaqo uchinchi, yangi ma'no va hissiyot uyg'otish mumkin.</p>` },
            
            { id: 22, title: "23. Arxitektura va Estetika", category: 3,
              content: `<p>Arxitektura shunchaki odamlarni sovuqdan yoki yomg'irdan himoya qiluvchi to'rt devor va tomdan iborat emas. U muhandislik, san'at va psixologiyaning mukammal kesishuv nuqtasidir. Qadimgi faylasuflar arxitekturani "muzlagan musiqa" deb atashgan, chunki undagi proporsiyalar, ritm va garmoniya xuddi musiqiy asardek inson ruhiyatiga sokinlik yoxud jo'shqinlik baxsh eta oladi.</p><p>Arxitektura tarixi insoniyat sivilizatsiyasining tarixidir. Qadimgi Misr ehromlarining ulug'vorligi fir'avnlarning ilohiy kuchini namoyish etishga qaratilgan bo'lsa, Gotika cherkovlarining osmonga sanchilgan uchli gumbazlari insonni Yaratganga yaqinroq bo'lish intilishini aks ettirgan.</p>` },
            
            { id: 23, title: "24. Global Logistika", category: 3,
              content: `<p>Siz ushbu matnni o'qib turgan smartfoningiz qanday yaratilgani haqida hech o'ylab ko'rganmisiz? Uning ekrani Koreyada ishlangan, protsessori Tayvanda yasalgan, akkumulyatoridagi litiy Afrikadan qazib olingan, dizayni AQShda chizilgan va yakunda Xitoyda yig'ilib, sizning qo'lingizga yetib kelgan. Bu murakkab zanjir — global logistika va savdo tizimining mo'jizasi hisoblanadi.</p><p>Zamonaviy yetkazib berish zanjirlari "Just-in-Time" (Ayni vaqtida) falsafasiga qurilgan. Zavodlar o'z omborlarida oylik zaxiralarni saqlamaydilar, ehtiyot qismlar konveyerga aynan kerak bo'lgan daqiqalardagina yetib keladi.</p>` },
            
            { id: 24, title: "25. Diplomatiya: Yumshoq Kuch", category: 3,
              content: `<p>Insoniyat tarixi qonli urushlar bilan to'la bo'lsa-da, bugungi kunda dunyoni ushlab turgan narsa qurol emas, balki so'z va kelishuvlardir. Diplomatiya — bu davlatlar o'rtasidagi manfaatlarni tinch yo'l bilan hal etish, nizo va ziddiyatlarning oldini olish san'ati hisoblanadi. Usta diplomat uchinchi Jahon urushini bitta to'g'ri tashkil etilgan muzokara stoli atrofida to'xtatib qolishga qodir.</p><p>Xalqaro munosabatlarda "Qattiq kuch" (Harbiy va iqtisodiy bosim) va "Yumshoq kuch" (Soft power) tushunchalari mavjud. Zamonaviy dunyoda davlatning qudrati uning tanklari soni bilan emas, balki madaniyati, ta'lim tizimi va qadriyatlari qanchalik jozibador ekanligi bilan o'lchanadi.</p>` },
            
            // 26-30
            { id: 25, title: "26. Mifologiya: Qadimgi Sirlar", category: 3,
              content: `<p>Insoniyat o'zining butun tarixi davomida atrof-muhitdagi tushunarsiz hodisalarni anglashga intilgan. Qadimgi dunyo odamlari uchun chaqmoq, zilzila yoki quyosh tutilishi shunchaki tabiat hodisasi emas, balki ilohiy kuchlarning g'azabi yoki ishorasi bo'lib tuyulgan. Mifologiya — qadimgi insonlarning koinot, hayot va o'lim haqidagi ibtidoiy, ammo o'ta murakkab tasavvurlari majmuasidir.</p><p>Qadimgi Yunoniston afsonalaridagi Zevs, Poseydon va Afina kabi xudolar shunchaki ilohlar emas, balki insoniy nuqsonlar va ehtiroslarga ega bo'lgan obrazlardir. Ular orqali yunonlar adolat, qasos, jasorat va xiyonat kabi axloqiy tushunchalarni tushuntirishgan.</p>` },
            
            { id: 26, title: "27. Biologik Xilma-xillik", category: 3,
              content: `<p>Yer sayyorasi koinotdagi hozircha bizga ma'lum bo'lgan yagona tiriklik maskanidir. Bu tiriklikning eng katta mo'jizasi uning cheksiz xilma-xilligidadir. Biologik xilma-xillik (Biodiversitet) — bu mikroskopik bakteriyalardan tortib, bahaybat ko'k kitlargacha bo'lgan barcha tirik organizmlarning va ular yashaydigan ekotizimlarning o'zaro murakkab tarmog'idir.</p><p>Ekotizimlar xuddi jenga o'yiniga o'xshaydi. Agar siz bitta kichik yog'och bo'lagini sug'urib olsangiz, butun minora qulab tushishi mumkin. Masalan, asalarilar va boshqa changlatuvchi hasharotlarning qirilib ketishi insoniyatning oziq-ovqat xavfsizligiga to'g'ridan-to'g'ri tahdid soladi.</p>` },
            
            { id: 27, title: "28. Koinotni O'zlashtirish", category: 3,
              content: `<p>Odamzot qadim zamonlardan beri osmonga boqib, yulduzlar ortida nima borligiga qiziqib kelgan. XX asrning o'rtalariga kelib, texnologik taraqqiyot bu azaliy orzuni haqiqatga aylantirdi. 1957-yilda Yerning birinchi sun'iy yo'ldoshi uchirilishi va ko'p o'tmay insonning fazoga parvozi insoniyat tarixidagi eng buyuk sakrashlardan biri bo'ldi.</p><p>Marsni o'zlashtirish va u yerda inson koloniyasini barpo etish zamonaviy kosmonavtikaning eng asosiy maqsadlaridan biridir. Qizil sayyora o'zining sharoitlari bilan Yerga eng o'xshash joy bo'lib, kelajakda insoniyat uchun zaxira sayyora vazifasini o'tashi mumkin.</p>` },
            
            { id: 28, title: "29. Xotirani Kuchaytirish", category: 3,
              content: `<p>Inson xotirasi shunchaki ma'lumotlarni saqlovchi passiv arxiv emas, balki uzluksiz ishlaydigan va o'zgarib turadigan o'ta murakkab neyrobiologik jarayondir. Biz ko'pincha "mening xotiram yomon" deb nolishga odatlanganmiz, ammo zamonaviy neyrobiologiya shuni isbotlaydiki, sog'lom insonning miyasi deyarli cheksiz miqdordagi axborotni saqlash salohiyatiga ega.</p><p>Axborotni uzoq muddatli xotiraga o'tkazishning eng samarali usullaridan biri bu "Mnemonika" san'atidir. Mnemonika quruq raqamlar yoki yodlash qiyin bo'lgan so'zlarni yorqin, his-tuyg'ularga boy va hatto kulgili vizual obrazlarga aylantirishga asoslanadi.</p>` },
            
            { id: 29, title: "30. Kriptografiya Ilmi", category: 3,
              content: `<p>Axborotni yashirish va uni faqat kerakli odam o'qiy olishini ta'minlash ehtiyoji insoniyat yozuvni kashf qilgan ilk davrlardanoq paydo bo'lgan. Kriptografiya — maxfiy kodlar va shifrlash san'ati bo'lib, u shohlar, sarkardalar va josuslar o'rtasidagi yozishmalarni himoya qilishda asrlar davomida hal qiluvchi rol o'ynagan.</p><p>Kompyuterlarning paydo bo'lishi bilan kriptografiya murakkab matematik funksiyalarga ko'chdi. Zamonaviy dunyoda, hatto tarmoq ichida ham, biz har kuni internetga kirganimizda, ijtimoiy tarmoqlardan xabar yuborganimizda yoki karta orqali to'lov qilganimizda, o'zimiz sezmagan holda o'ta kuchli shifrlash algoritmlaridan foydalanamiz.</p>` },
            
            // 31-35
            { id: 30, title: "31. Bioxaking: Tana Dasturlash", category: 4,
              content: `<p>Bioxaking (Biohacking) — bu inson tanasining biologik tizimlarini optimallashtirish va ularning ish faoliyatini yaxshilashga qaratilgan ilmiy va amaliy yondashuvdir. Bu uyquni, ovqatlanishni va jismoniy faollikni ilmiy asosda boshqarish orqali miya va tana ishini maksimal darajaga olib chiqishdir.</p><p>Bioxakerlar turli xil texnologiyalar va metodlardan foydalanadilar: doimiy glyukoza monitorlari, nootropik moddalar, sovuq va issiq terapiyasi va vaqt oralab ovqatlanish (intermittent fasting). Maqsad — inson organizmini xuddi kompyuter kodi kabi "optimal sozlash"dir.</p>` },
            
            { id: 31, title: "32. Minimalizm Falsafasi", category: 4,
              content: `<p>Minimalizm — bu shunchaki kam narsaga ega bo'lish emas, balki hayotdagi eng muhim narsalarga e'tiborni qaratish falsafasidir. U ortiqcha moddiy narsalar va raqamli chalg'itishlardan voz kechib, insonning o'ziga, munosabatlariga va ma'naviy rivojlanishiga ko'proq vaqt ajratishga undaydi.</p><p>Minimalizm "ozroq narsa, ko'proq ma'no" tamoyiliga asoslanadi. Bu sizning uyingizda bo'sh devorlar va kam mebel bo'lishi kerak degani emas; bu sizni chalg'itadigan, vaqtingizni va energiyangizni oladigan hamma narsani ongli ravishda chiqarib tashlashdir.</p>` },
            
            { id: 32, title: "33. Kvant Ruhiyati", category: 4,
              content: `<p>Kvant ruhiyati — zamonaviy kvant fizikasi kashfiyotlari bilan qadimgi falsafiy va ruhiy ta'limotlar o'rtasidagi bog'liqlikni o'rganuvchi yo'nalishdir. U kuzatuvchining ongi haqiqatni shakllantirishda qanday rol o'ynashi mumkinligi haqidagi savollarni o'rtaga tashlaydi.</p><p>Kvant fizikasidagi "kuzatuvchi effekti" (observer effect) shuni ko'rsatadiki, zarrachaning o'zini qanday tutishi uning kuzatilayotganligiga bog'liq. Bu falsafada ming yillar davomida muhokama qilinib kelgan "ong haqiqatni yaratadimi?" degan savolga yangi qiziqarli qarashlarni olib keladi.</p>` },
            
            { id: 33, title: "34. Axborot Urushi", category: 4,
              content: `<p>Axborot urushi — bu zamonaviy dunyoda davlatlar va tashkilotlar o'rtasidagi kurashning eng muhim frontlaridan biridir. U qarama-qarshi tomonning axborot tizimlariga hujum qilish, jamoatchilik fikrini manipulyatsiya qilish va noto'g'ri ma'lumotlar (dezinformatsiya) tarqatish orqali siyosiy va harbiy maqsadlarga erishishni o'z ichiga oladi.</p><p>Ijtimoiy tarmoqlar va raqamli platformalar axborot urushining asosiy maydoniga aylandi. Bitta yolg'on xabar millionlab odamlarga bir necha soat ichida yetib borishi mumkin. Bu esa demokratik jamiyatlarning zaif tomonlarini ochib, ularni ichkaridan parchalash xavfini tug'diradi.</p>` },
            
            { id: 34, title: "35. Mikrobiom: Ichki Koinot", category: 4,
              content: `<p>Inson tanasida, ayniqsa ichaklarimizda trillionlab bakteriyalar, viruslar va zamburug'lar yashaydi. Bu mikroorganizmlar yig'indisi mikrobiom deb ataladi va uning umumiy og'irligi 2 kilogrammgacha yetishi mumkin. So'nggi tadqiqotlar shuni ko'rsatadiki, mikrobiom nafaqat ovqat hazm qilishga, balki kayfiyat, immunitet va hatto vaznga ham kuchli ta'sir qiladi.</p><p>Mikrobiomni "ikkinchi miya" deb ham atashadi, chunki u miya bilan to'g'ridan-to'g'ri aloqa qiladi. Stress, noto'g'ri ovqatlanish va antibiotiklar mikrobiom muvozanatini buzishi mumkin, bu esa depressiya va boshqa ruhiy kasalliklarga olib keladi.</p>` },
            
            // 36-40
            { id: 35, title: "36. Xalqaro Huquq", category: 4,
              content: `<p>Xalqaro huquq — bu mustaqil davlatlar o'rtasidagi munosabatlarni tartibga soluvchi, global xaos (tartibsizlik) va yadroviy urushlarning oldini olib turuvchi ko'rinmas qoidalar majmuasidir. Agar milliy huquq bitta davlat ichidagi fuqarolar o'rtasidagi munosabatlarni boshqarsa, xalqaro huquq Yer yuzidagi barcha suveren davlatlarni yagona o'yin qoidalariga bo'ysundirishga harakat qiladi.</p><p>Ushbu tizimning eng muhim yutuqlaridan biri Jeneva konvensiyalaridir. Garchi urush insoniyatning eng shafqatsiz harakati bo'lsa-da, xalqaro huquq unga ham insoniylik chegaralarini o'rnatgan. Tinch aholini nishonga olmaslik, asirlarni qiynamaslik va kimyoviy qurollardan foydalanmaslik kabi qoidalar aynan shu konvensiyalar orqali tasdiqlangan.</p>` },
            
            { id: 36, title: "37. Kaizen: O'z-o'zini Rivojlantirish", category: 4,
              content: `<p>Yaponlarning mashhur "Kaizen" (Uzluksiz takomillashuv) falsafasi shuni uqtiradiki, inson birdaniga katta o'zgarishlar qilishga urinmasdan, har kuni o'z ustida atigi 1 foizlik ijobiy o'zgarish qilsa, yakunda beqiyos natijalarga erishadi. Bu "katta maqsadlarni kichik qadamlarga bo'lish" tamoyili miyani haddan tashqari yuklamasdan, asta-sekin o'zgartirish imkonini beradi.</p><p>Psixolog Kerol Dvekning "O'sish fikrlash tarzi" (Growth Mindset) nazariyasiga ko'ra, insonlar ikki xil fikrlashga ega bo'ladilar. Qotib qolgan fikrlash tarziga ega insonlar iste'dod va aql tug'ma bo'ladi deb hisoblab, qiyinchiliklardan qochadilar. O'sish fikrlash tarziga ega insonlar esa har qanday qobiliyatni mehnat va o'rganish orqali rivojlantirish mumkinligiga ishonadilar.</p>` },
            
            { id: 37, title: "38. Musiqa Neyrobiologiyasi", category: 4,
              content: `<p>Musiqa insoniyatning eng qadimiy va universal tilidir. Neyrobiologlar musiqaning inson miyasiga ta'sirini o'rganganda hayratlanarli xulosaga keldilar: musiqa eshitish yoki cholg'u asbobini chalish miyaning faqatgina bitta qismini emas, balki deyarli barcha hududlarini (xotira, harakat, hissiyot, ko'rish va eshitish markazlarini) bir vaqtning o'zida faollashtiruvchi yagona mashg'ulotdir.</p><p>Sevimli musiqangizni eshitganingizda tanangizda jimirlash (titroq) paydo bo'lishini sezganmisiz? Bu jarayon miyada dopamin — baxt va rohat gormonining kuchli ajralib chiqishi bilan bog'liq. Musiqa to'g'ridan-to'g'ri hissiyotlar markazi bo'lmish amigdalaga ta'sir o'tkaza oladi.</p>` },
            
            { id: 38, title: "39. Ijtimoiy Tarmoqlar Qaramligi", category: 4,
              content: `<p>Ijtimoiy tarmoqlar dizayni tasodifan yaratilmagan; ular inson psixologiyasi va qimor o'yinlari (kazinolar) ishlash prinsiplaridan ilhomlangan holda qurilgan. Cheksiz varaqlash (Infinite scroll), "layk" bosish va bildirishnomalar (notifications) miyada o'zgaruvchan mukofotlash tizimini ishga tushiradi. Siz har safar telefon ekranini yangilaganingizda miyangiz qanday xabar chiqishini kutib qisqa dopamin porsiyasini oladi.</p><p>Raqamli olamning eng xavfli oqibatlaridan biri bu — solishtirish madaniyatidir (Comparison culture). Insonlar ijtimoiy tarmoqlarda o'z hayotlarining faqat eng chiroyli, tahrirlangan (filtrdan o'tgan) va baxtli onlarini joylaydilar. Buni ko'rgan oddiy foydalanuvchi o'zining real, oddiy hayotini o'zgalarning "mukammal" sahifaviy hayoti bilan solishtiradi.</p>` },
            
            { id: 39, title: "40. Startaplar Anatomiyasi", category: 4,
              content: `<p>Startap – bu shunchaki yangi ochilgan kichik biznes emas. Startap – bu o'ta yuqori noaniqlik sharoitida innovatsion mahsulot yoki xizmatni yaratish va qisqa muddat ichida global miqyosda tezkor o'sishga (scaling) erishish uchun mo'ljallangan vaqtinchalik tashkilotdir. Oddiy novvoyxona yoki qahvaxona ochish biznes bo'lsa, butun dunyo novvoyxonalarini bitta platformada birlashtiruvchi va sun'iy intellekt orqali xaridorlarni topib beruvchi ilova yaratish – bu startapdir.</p><p>Startap dunyosida "Tejamkor startap" (Lean Startup) metodologiyasi eng oltin qoida hisoblanadi. Ko'pchilik tadbirkorlar mukammal mahsulot yarataman deb yillab vaqtini va pulini sarflaydi, bozorga chiqqanda esa bu mahsulot hech kimga kerak emasligi ma'lum bo'ladi.</p>` },
            
            // 41-45
            { id: 40, title: "41. Muvaffaqiyatsizlik Saboqlari", category: 5,
              content: `<p>Muvaffaqiyat haqidagi kitoblar juda ko'p, ammo muvaffaqiyatsizlikning asl mohiyati va uning shaxs shakllanishidagi o'rni ko'pincha e'tibordan chetda qoladi. Aslida, har bir buyuk g'alaba – bu o'nlab, ba'zan yuzlab xatolar va mag'lubiyatlar ustiga qurilgan poydevordir. Muvaffaqiyatsizlik bu yo'lning oxiri emas, balki tizimning qayerida xato borligini ko'rsatib beruvchi eng aniq axborot (feedback) manbayidir.</p><p>Tarixdagi eng buyuk ixtirochilar ham bir urinishda muvaffaqiyatga erishmagan. Tomas Edison lampochkani ixtiro qilishdan avval 10,000 marta muvaffaqiyatsizlikka uchragan. U o'z tajribalariga "Men 10,000 marta xato qilmadim, shunchaki ishlamaydigan 10,000 ta yo'lni topdim" deb baho bergan.</p>` },
            
            { id: 41, title: "42. Agile va Scrum", category: 5,
              content: `<p>Zamonaviy dunyoda ishlar shu qadar tez o'zgaradiki, bir necha yil oldin tuzilgan reja bugun o'z kuchini yo'qotishi mumkin. An'anaviy loyiha boshqaruvi (Waterfall) endilikda o'z o'rnini egiluvchan va moslashuvchan metodologiyalarga bo'shatib bermoqda. Agile (Egiluvchan) – bu shunchaki ish uslubi emas, balki jamoaviy fikrlash tarzi bo'lib, u mijoz ehtiyojlarini birinchi o'ringa qo'yish va mahsulotni kichik-kichik qismlar bilan muntazam ravishda topshirishga asoslanadi.</p><p>Agile ichidagi eng mashhur freymvorklardan biri – Scrum hisoblanadi. Scrumda ishlar "Sprint" deb ataluvchi qisqa muddatli (odatda 2 hafta) davrlarga bo'linadi. Har bir sprint yakunida tayyor, ishlaydigan mahsulot bo'lagi namoyish etilishi shart.</p>` },
            
            { id: 42, title: "43. Zamonaviy San'at", category: 5,
              content: `<p>Ko'pchilik odamlar zamonaviy san'at asarlariga qaraganda: "Buni men ham chiza olardim-ku!" degan fikrga borishadi. Biroq zamonaviy san'atda asosiy qadriyat – bu rasmning qanchalik realistik chizilganida (texnikada) emas, balki uning ortida yotgan g'oyada (konseptda) va u uyg'otadigan hissiyotda yashirin. San'at endilikda dunyoni shunchaki nusxalamaydi, balki dunyoga savol beradi va odatiy narsalarga yangicha nazar bilan qarashga undaydi.</p><p>Abstraksionizm, minimalizm va kontseptualizm kabi yo'nalishlar XX asr boshlarida paydo bo'lib, san'at haqidagi barcha qoliplarni parchalab tashladi. Marsel Dyushanning oddiy "Pissuar"ni ko'rgazma zaliga qo'yishi san'at tarixidagi eng katta inqiloblardan biri bo'ldi.</p>` },
            
            { id: 43, title: "44. Raqamli Minimalizm", category: 5,
              content: `<p>Biz axborot to'lqinlari ichida suzayotgan emas, balki ularning ostida qolib g'arq bo'layotgan avlodmiz. Har kuni o'rtacha inson o'z telefonini 2,500 martadan ortiq bosadi va yuzlab bildirishnomalarni qabul qiladi. Raqamli minimalizm – bu texnologiyalardan butunlay voz kechish emas, balki ularni hayotingizga qat'iy va ongli ravishda kiritish falsafasidir.</p><p>Bu jarayonni boshlash uchun "Raqamli tozalash" (Digital Declutter) o'tkazish tavsiya etiladi. Bir oy davomida hayotingiz uchun hayotiy zarur bo'lmagan barcha ilovalar va ko'ngilochar platformalardan voz kechib ko'ring. Shunda siz haqiqatda nima siz uchun qadrli ekanini va nimalar shunchaki vaqtingizni o'g'irlayotganini tushunib yetasiz.</p>` },
            
            { id: 44, title: "45. Yangi Geosiyosat", category: 5,
              content: `<p>Dunyo endilikda bitta yoki ikkita super-qudratli davlat atrofida aylanmaydi. Biz "Ko'p qutbli dunyo" (Multipolar world) davriga qadam qo'ydik, unda turli mintaqaviy kuchlar va iqtisodiy markazlar o'z so'zini aytishga intilmoqda. Xalqaro munosabatlar shunchaki diplomatiya emas, bu – resurslar, texnologiyalar va g'oyalar uchun kurash maydonidir.</p><p>Zamonaviy geosiyosatda "Iqtisodiy qurol" (Economic weapon) tushunchasi harbiy kuchdan ko'ra ko'proq ishlatilmoqda. Sanksiyalar, savdo cheklovlari va energetika resurslari bilan bosim o'tkazish orqali davlatlar bir-birining siyosiy qarorlariga ta'sir o'tkazishga harakat qilmoqdalar.</p>` },
            
            // 46-50
            { id: 45, title: "46. Kiber-Psixologiya", category: 5,
              content: `<p>Kiber-psixologiya — bu insonning texnologiyalar, internet va virtual olam bilan o'zaro ta'sirini o'rganuvchi zamonaviy fan yo'nalishidir. Biz real hayotda bitta shaxsiyatga ega bo'lsak, raqamli dunyoda mutlaqo boshqacha, ko'pincha "idealizatsiya qilingan" obrazda namoyon bo'lamiz. Bu ikki dunyo o'rtasidagi tafovut inson ruhiyatida yangi turdagi ziddiyatlarni va "Raqamli ikkilanish" holatlarini keltirib chiqarmoqda.</p><p>Anonimlik — internetning eng kuchli va ayni paytda eng xavfli xususiyatidir. Inson o'z ismini yashirgan holda, real hayotda hech qachon aytishga jur'at etmaydigan fikrlarini ochiq bayon qiladi. Bu "Onlayn disinhibitsiya effekti" (Online disinhibition effect) deb ataladi.</p>` },
            
            { id: 46, title: "47. Smart City", category: 5,
              content: `<p>2050-yilga kelib dunyo aholisining 70 foizdan ortig'i shaharlarda yashashi bashorat qilinmoqda. Bu ulkan o'sish an'anaviy shahar infratuzilmalariga juda katta bosim o'tkazadi. Yechim — "Aqlli shahar" (Smart City) konsepsiyasidir. Aqlli shahar — bu barcha tizimlari (transport, energiya, suv, chiqindi, xavfsizlik) yagona raqamli tarmoqqa bog'langan va sensorlar yordamida real vaqtda boshqariladigan yashash muhitidir.</p><p>Bunday shaharlarda tirbandliklar deyarli bo'lmaydi, chunki sun'iy intellekt svetoforlarni va avtonom jamoat transportlarini real vaqtda oqimga qarab boshqaradi. Energiya sarfi minimal darajaga tushiriladi: ko'cha chiroqlari faqat odam o'tayotganda yonadi, binolar esa o'zining energiyasini quyosh panellari orqali o'zi ishlab chiqaradi.</p>` },
            
            { id: 47, title: "48. Neyro-interfeys", category: 5,
              content: `<p>Inson miyasi va kompyuter o'rtasida to'g'ridan-to'g'ri aloqa o'rnatish uzoq vaqt fantastik filmlar mavzusi bo'lib kelgan. Ammo bugun BCI (Brain-Computer Interface) texnologiyalari bu chegarani buzib o'tdi. Neyro-interfeys — bu miyadagi neyronlarning elektr signallarini o'qib, ularni raqamli buyruqlarga aylantiruvchi tizimdir. Bu degani, biz yaqin kelajakda kompyuter yoki smartfonni qo'llarimiz bilan emas, balki shunchaki fikr kuchi bilan boshqarishimiz mumkin bo'ladi.</p><p>Ushbu texnologiyaning birinchi navbatdagi maqsadi — tibbiy yordamdir. Falaj bo'lib qolgan yoki nutq qobiliyatini yo'qotgan insonlar neyro-interfeyslar yordamida yana muloqot qilish, virtual klaviaturalarda yozish va hatto robotlashtirilgan oyoq-qo'llarni boshqarish imkoniyatiga ega bo'lmoqdalar.</p>` },
            
            { id: 48, title: "49. Kvant Kompyuterlari", category: 5,
              content: `<p>Kvant kompyuterlari bitlar o'rniga kubitlardan (quantum bits) foydalanishi orqali hisoblash quvvatini fantastik darajaga ko'taradi. Bu texnologiya nafaqat yangi dori vositalarini yaratishda, balki koinotning eng qadimiy sirlarini — Katta portlashdan keyingi ilk soniyalarda nima sodir bo'lganini simulyatsiya qilishda yagona yo'ldir.</p><p>Kvant chalkashligi (Quantum entanglement) hodisasi shuni ko'rsatadiki, ikkita zarracha orasidagi masofa qanchalik uzoq bo'lmasin, ular bir lahzada ma'lumot almasha oladilar. Eynshteyn buni "uzoqdagi g'ayritabiiy harakat" deb atagan edi. Bu hodisadan foydalanib, kelajakda "Kvant interneti" va "Kvant teleportatsiyasi" amalga oshirilishi mumkin.</p>` },
            
            { id: 49, title: "50. Insoniyatning Yakuniy Taqdiri", category: 5,
              content: `<p>Biz ushbu 50 ta kitoblik sayohatimizning so'nggi nuqtasiga yetib keldik. Insoniyatning kelajagi nima bo'ladi? Biz qayerga ketyapmiz? Bu savollar har bir ongli mavjudotni o'ylantirishi tabiiy. Biz hozirda "Kardashev shkalasi" bo'yicha 0-tur sivilizatsiyasidan 1-tur sivilizatsiyasiga o'tish arafasidamiz. Ya'ni, biz o'z sayyoramizning barcha resurslarini to'liq boshqarishni endigina o'rganyapmiz.</p><p>Kelajakda bizni ikki xil yo'l kutishi mumkin: yo biz o'z texnologiyalarimiz qurboniga aylanamiz (ekologik halokat, kiber-urushlar, AI qo'zg'oloni), yoki biz "Transhumanizm" davriga o'tib, o'z biologik chegaralarimizdan chiqib ketamiz. Inson va texnologiyaning birlashishi, ongimizning raqamli shaklga o'tishi va koinotning boshqa nuqtalariga kolonizatsiya qilish — bu shunchaki vaqt masalasidir.</p><p>Koinot milliardlab yillar yashashda davom etadi. Quyoshimiz so'nganidan keyin ham insoniyat (yoki uning raqamli avlodlari) boshqa yulduz tizimlarida hayot kechirishi mumkin. Bu kutubxona sizga dunyoni tushunishda kichik bir chiroq bo'ldi degan umiddamiz. Bilim — bu chegara bilmas kuchdir. Har doim o'rganishda, izlanishda va savol berishda davom eting. Sayohatimiz tugadi, lekin sizning bilimlar olamidagi shaxsiy yo'lingiz endi boshlanmoqda.</p>` }
        ];

        // ===== STATE =====
        const state = {
            user: localStorage.getItem('xoleric_user') || null,
            lastBook: localStorage.getItem('xoleric_lastBook') ? parseInt(localStorage.getItem('xoleric_lastBook')) : null,
            fontSize: 18,
            currentBook: null,
            currentCategory: 'all',
            searchQuery: '',
            isPlaying: false,
            currentParagraph: 0,
            paragraphs: []
        };

        // ===== DOM ELEMENTS =====
        const dom = {
            splash: document.getElementById('splashScreen'),
            welcome: document.getElementById('welcomeScreen'),
            main: document.getElementById('mainScreen'),
            reader: document.getElementById('readerScreen'),
            userNameInput: document.getElementById('userNameInput'),
            startBtn: document.getElementById('startBtn'),
            displayUserName: document.getElementById('displayUserName'),
            booksGrid: document.getElementById('booksGrid'),
            searchInput: document.getElementById('searchInput'),
            categories: document.querySelectorAll('.category-chip'),
            backBtn: document.getElementById('backBtn'),
            fontBtn: document.getElementById('fontBtn'),
            fontPanel: document.getElementById('fontPanel'),
            fontSlider: document.getElementById('fontSlider'),
            fontValue: document.getElementById('fontValue'),
            readTitle: document.getElementById('readTitle'),
            readContent: document.getElementById('readContent'),
            readerHeaderTitle: document.getElementById('readerHeaderTitle'),
            playBtn: document.getElementById('playBtn'),
            playIcon: document.getElementById('playIcon'),
            pauseIcon: document.getElementById('pauseIcon'),
            progressBar: document.getElementById('progressBar'),
            progressText: document.getElementById('progressText'),
            progressTrack: document.getElementById('progressTrack'),
            readerContent: document.getElementById('readerContent'),
            toast: document.getElementById('toast')
        };

        // ===== UTILITIES =====
        function showToast(msg, duration = 2000) {
            dom.toast.textContent = msg;
            dom.toast.classList.add('show');
            setTimeout(() => dom.toast.classList.remove('show'), duration);
        }

        function vibrate(ms) {
            if (window.navigator && window.navigator.vibrate) {
                try { window.navigator.vibrate(ms); } catch (e) {}
            }
            
            // Add visual vibration effect
            document.body.classList.add('vibrate');
            setTimeout(() => document.body.classList.remove('vibrate'), 100);
        }

        // ===== SPLASH SCREEN =====
        setTimeout(() => {
            dom.splash.classList.add('hide');
        }, 2000);

        // ===== WELCOME SCREEN =====
        if (state.user) {
            dom.userNameInput.style.display = 'none';
            dom.displayUserName.textContent = state.user.toUpperCase();
            setTimeout(() => {
                dom.welcome.classList.add('hide');
                dom.main.classList.remove('hide');
                renderLibrary();
            }, 2000);
        }

        dom.startBtn.addEventListener('click', () => {
            const name = dom.userNameInput.value.trim();
            if (name.length < 2) {
                showToast('Ismingizni kiriting');
                vibrate(100);
                return;
            }
            
            state.user = name;
            localStorage.setItem('xoleric_user', name);
            dom.displayUserName.textContent = name.toUpperCase();
            
            vibrate(50);
            dom.welcome.classList.add('hide');
            dom.main.classList.remove('hide');
            renderLibrary();
            
            // Fullscreen
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
        });

        // ===== RENDER LIBRARY =====
        function renderLibrary() {
            let filtered = BOOKS;
            
            // Filter by category
            if (state.currentCategory !== 'all') {
                filtered = filtered.filter(b => b.category === parseInt(state.currentCategory));
            }
            
            // Filter by search
            if (state.searchQuery) {
                const query = state.searchQuery.toLowerCase();
                filtered = filtered.filter(b => b.title.toLowerCase().includes(query));
            }
            
            dom.booksGrid.innerHTML = '';
            
            filtered.forEach(book => {
                const isLastRead = state.lastBook === book.id;
                
                const card = document.createElement('div');
                card.className = `book-card ${isLastRead ? 'last-read' : ''}`;
                card.innerHTML = `
                    <div class="book-number ${isLastRead ? 'last' : ''}">${isLastRead ? '▶ DAVOM ETISH' : `KITOB ${book.id + 1}`}</div>
                    <div class="book-title">${book.title.replace(/^\d+\.\s*/, '')}</div>
                    <div class="book-badge">O'QISH</div>
                `;
                
                card.addEventListener('click', () => {
                    vibrate(30);
                    openBook(book.id);
                });
                
                dom.booksGrid.appendChild(card);
            });
        }

        // ===== CATEGORIES =====
        dom.categories.forEach(cat => {
            cat.addEventListener('click', () => {
                dom.categories.forEach(c => c.classList.remove('active'));
                cat.classList.add('active');
                state.currentCategory = cat.dataset.category;
                renderLibrary();
                vibrate(20);
            });
        });

        // ===== SEARCH =====
        dom.searchInput.addEventListener('input', (e) => {
            state.searchQuery = e.target.value;
            renderLibrary();
        });

        // ===== OPEN BOOK =====
        function openBook(id) {
            const book = BOOKS.find(b => b.id === id);
            if (!book) return;
            
            state.currentBook = book;
            state.lastBook = id;
            localStorage.setItem('xoleric_lastBook', id);
            
            dom.readTitle.textContent = book.title;
            dom.readContent.innerHTML = book.content;
            dom.readerHeaderTitle.textContent = book.title.length > 30 ? book.title.substring(0, 30) + '...' : book.title;
            
            // Parse paragraphs for TTS
            state.paragraphs = Array.from(dom.readContent.querySelectorAll('p'));
            state.currentParagraph = 0;
            
            // Reset player
            resetPlayer();
            
            // Show reader
            dom.main.classList.add('hide');
            dom.reader.classList.add('show');
            
            // Scroll to top
            dom.readerContent.scrollTop = 0;
            
            // Update library to show last read
            renderLibrary();
        }

        // ===== BACK BUTTON =====
        dom.backBtn.addEventListener('click', () => {
            vibrate(20);
            stopTTS();
            dom.reader.classList.remove('show');
            dom.main.classList.remove('hide');
            
            // Hide font panel
            dom.fontPanel.classList.remove('show');
        });

        // ===== FONT CONTROLS =====
        let pressTimer;
        
        dom.fontBtn.addEventListener('mousedown', () => {
            pressTimer = setTimeout(() => {
                vibrate(40);
                dom.fontPanel.classList.add('show');
            }, 600);
        });
        
        dom.fontBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            pressTimer = setTimeout(() => {
                vibrate(40);
                dom.fontPanel.classList.add('show');
            }, 600);
        });
        
        dom.fontBtn.addEventListener('mouseup', () => clearTimeout(pressTimer));
        dom.fontBtn.addEventListener('mouseleave', () => clearTimeout(pressTimer));
        dom.fontBtn.addEventListener('touchend', () => clearTimeout(pressTimer));
        
        dom.fontSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            dom.fontValue.textContent = val;
            document.documentElement.style.setProperty('--font-size', `${val}px`);
            state.fontSize = val;
        });
        
        // Close font panel when clicking outside
        document.addEventListener('click', (e) => {
            if (!dom.fontPanel.contains(e.target) && e.target !== dom.fontBtn) {
                dom.fontPanel.classList.remove('show');
            }
        });

        // ===== TTS ENGINE =====
        const synth = window.speechSynthesis;
        let utterance = null;
        
        function updateProgress() {
            if (!state.paragraphs.length) return;
            const percent = Math.floor((state.currentParagraph / (state.paragraphs.length - 1)) * 100) || 0;
            dom.progressBar.style.width = percent + '%';
            dom.progressText.textContent = percent + '%';
        }
        
        function highlightParagraph(index) {
            state.paragraphs.forEach(p => p.classList.remove('active'));
            if (state.paragraphs[index]) {
                state.paragraphs[index].classList.add('active');
                
                // Scroll to paragraph with smooth animation
                const p = state.paragraphs[index];
                const container = dom.readerContent;
                const offset = p.offsetTop - container.offsetTop - (container.clientHeight / 2) + (p.clientHeight / 2);
                container.scrollTo({ top: Math.max(0, offset), behavior: 'smooth' });
            }
        }
        
        function playNext() {
            if (!state.isPlaying) return;
            
            if (state.currentParagraph >= state.paragraphs.length) {
                stopTTS();
                return;
            }
            
            highlightParagraph(state.currentParagraph);
            
            const text = state.paragraphs[state.currentParagraph].textContent;
            utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.95;
            utterance.lang = 'uz-UZ';
            
            // Try to find Uzbek voice
            const voices = synth.getVoices();
            const uzVoice = voices.find(v => v.lang.includes('uz')) || 
                           voices.find(v => v.lang.includes('ru')) || 
                           voices[0];
            if (uzVoice) utterance.voice = uzVoice;
            
            utterance.onend = () => {
                state.currentParagraph++;
                updateProgress();
                playNext();
            };
            
            utterance.onerror = () => {
                state.currentParagraph++;
                playNext();
            };
            
            synth.speak(utterance);
        }
        
        function togglePlay() {
            if (!state.currentBook) return;
            
            if (state.isPlaying) {
                synth.pause();
                state.isPlaying = false;
                dom.playIcon.style.display = 'block';
                dom.pauseIcon.style.display = 'none';
            } else {
                if (synth.paused) {
                    synth.resume();
                } else {
                    playNext();
                }
                state.isPlaying = true;
                dom.playIcon.style.display = 'none';
                dom.pauseIcon.style.display = 'block';
            }
            vibrate(30);
        }
        
        function stopTTS() {
            synth.cancel();
            state.isPlaying = false;
            state.currentParagraph = 0;
            dom.playIcon.style.display = 'block';
            dom.pauseIcon.style.display = 'none';
            dom.progressBar.style.width = '0%';
            dom.progressText.textContent = '0%';
            state.paragraphs.forEach(p => p.classList.remove('active'));
        }
        
        function resetPlayer() {
            stopTTS();
            state.currentParagraph = 0;
            updateProgress();
        }
        
        // ===== PLAY BUTTON =====
        dom.playBtn.addEventListener('click', () => {
            togglePlay();
        });
        
        // ===== PROGRESS TRACK =====
        dom.progressTrack.addEventListener('click', (e) => {
            if (!state.paragraphs.length) return;
            
            const rect = dom.progressTrack.getBoundingClientRect();
            const percent = ((e.clientX - rect.left) / rect.width) * 100;
            const newIndex = Math.floor((percent / 100) * (state.paragraphs.length - 1));
            
            state.currentParagraph = Math.min(newIndex, state.paragraphs.length - 1);
            
            if (state.isPlaying) {
                synth.cancel();
                playNext();
            } else {
                highlightParagraph(state.currentParagraph);
            }
            
            updateProgress();
            vibrate(20);
        });

        // ===== DOUBLE TAP FOR NEXT BOOK =====
        let lastTap = 0;
        
        dom.readerContent.addEventListener('click', (e) => {
            const now = Date.now();
            if (now - lastTap < 300) {
                // Double tap detected - go to next book
                const nextId = state.currentBook.id + 1;
                if (nextId < BOOKS.length) {
                    stopTTS();
                    openBook(nextId);
                    showToast('Keyingi kitob');
                    vibrate(50);
                }
            }
            lastTap = now;
        });

        // ===== PREVENT CONTEXT MENU =====
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        // ===== INITIAL RENDER =====
        renderLibrary();
        
        // ===== LOAD VOICES =====
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => {
                // Just to load voices
            };
        }
    </script>
</body>
