<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>XOLƎRIƆ Kutubxonasi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg-deep: #050505;
            --silver-light: #E0E0E0;
            --silver-mid: #C0C0C0;
            --silver-dark: #8E8E8E;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(192, 192, 192, 0.2);
            --neon-silver: rgba(192, 192, 192, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-deep);
            color: var(--silver-light);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Header va Logo --- */
        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .silver-text-animated {
            background: linear-gradient(120deg, #8E8E8E 0%, #ffffff 20%, #8E8E8E 40%, #E0E0E0 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 0px 0px 10px rgba(192,192,192,0.2);
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* --- Kitoblar Ro'yxati (Grid) --- */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 30px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        main::-webkit-scrollbar { width: 0px; }

        .book-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
            cursor: pointer;
        }

        .book-card:hover, .book-card:active {
            transform: translateY(-8px);
            box-shadow: 0 10px 30px var(--neon-silver);
            border-color: var(--silver-mid);
        }

        .book-title {
            color: var(--silver-mid);
            font-size: 20px;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 10px;
        }

        .book-author {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            margin-bottom: 25px;
        }

        .read-btn {
            background: linear-gradient(to right, var(--silver-dark), var(--silver-mid), var(--silver-light));
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .read-btn:active { opacity: 0.8; }

        /* --- O'qish Oynasi (Reader) --- */
        #readerScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-deep);
            z-index: 100;
            display: flex; flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #readerScreen.active { transform: translateY(0); }

        .reader-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid var(--glass-border);
        }
        .close-btn {
            background: none; border: none; color: var(--silver-mid);
            font-size: 24px; cursor: pointer;
        }

        .reader-content {
            flex: 1; overflow-y: auto; padding: 30px 20px 100px 20px;
            max-width: 800px; margin: 0 auto;
            font-size: 18px; line-height: 1.8; color: var(--silver-light);
            text-align: justify;
        }
        .reader-content::-webkit-scrollbar { width: 4px; }
        .reader-content::-webkit-scrollbar-thumb { background: var(--silver-dark); border-radius: 4px; }

        .reader-content h2 {
            margin-bottom: 20px; color: #fff; text-align: center; font-weight: 800;
        }

        /* --- TTS Player (Ovozli o'qish paneli) --- */
        .tts-panel {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 15px 25px;
            border-radius: 30px;
            display: flex; gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .tts-btn {
            background: none; border: none;
            color: var(--silver-mid); font-size: 24px; cursor: pointer;
            transition: color 0.2s, transform 0.1s;
        }
        .tts-btn:active { transform: scale(0.9); color: #fff; }
        .tts-btn.playing { color: #fff; text-shadow: 0 0 10px var(--silver-light); }

    </style>
</head>
<body>

    <header>
        <div class="silver-text-animated">XOLƎRIƆ</div>
    </header>

    <main id="libraryGrid">
        </main>

    <div id="readerScreen">
        <div class="reader-header">
            <button class="close-btn" onclick="closeBook()">&#10005;</button>
            <div class="silver-text-animated" style="font-size: 16px;">O'QISH REJIMI</div>
            <div style="width: 24px;"></div> </div>
        
        <div class="reader-content" id="bookTextContainer">
            </div>

        <div class="tts-panel">
            <button class="tts-btn" id="btnStop" onclick="stopTTS()">⏹</button>
            <button class="tts-btn" id="btnPlay" onclick="toggleTTS()">▶</button>
        </div>
    </div>

    <script>
        // Haptic Feedback (Vibratsiya) funksiyasi
        function triggerHaptic() {
            if (navigator.vibrate) {
                navigator.vibrate(50); // 50ms yengil tebranish
            }
        }

        // 50 ta kitob bazasi (Namuna sifatida 5 tasi to'liq yozildi, qolganini shu formatda davom ettirasiz)
        const books = [
            {
                title: "O'tkan Kunlar",
                author: "Abdulla Qodiriy",
                content: "Moziyga qaytib ish ko'rish xayrlik, deydilar. Shunga ko'ra mavzuni moziydan, yaqin o'tkan kunlardan, tariximizning eng kir, qora kunlari bo'lgan keyingi 'xon zamonlari'dan belgiladim..."
            },
            {
                title: "Atomic Habits",
                author: "James Clear",
                content: "Hayotimizda yuz beradigan eng katta o'zgarishlar birdaniga bo'lmaydi. Katta yutuqlar har doim ko'zga ko'rinmas, doimiy ravishda takrorlanadigan kichik harakatlarning jamlanmasidir."
            },
            {
                title: "Raqamli Minimalizm",
                author: "Cal Newport",
                content: "Biz axborot to'lqinlari ichida suzayotgan emas, balki ularning ostida qolib g'arq bo'layotgan avlodmiz. Diqqat – bu cheklangan va eng qimmatli resursdir."
            },
            {
                title: "Kiberxavfsizlik Asoslari",
                author: "XOLƎRIƆ Loyihasi",
                content: "Zamonaviy raqamli dunyoda eng qimmatli resurs bu — neft yoki oltin emas, balki axborot va ma'lumotlardir. Kiberxavfsizlik tarmoq arxitekturasini himoya qilish ilmidir."
            },
            {
                title: "Chuqur Diqqat (Deep Work)",
                author: "Cal Newport",
                content: "Hozirgi axborot texnologiyalari asrida chalg'ituvchi omillar shu qadar ko'pki, bitta vazifaga to'liq diqqatni jamlab ishlash noyob va o'ta qimmatbaho qobiliyatga aylanib bormoqda."
            }
            // Qolgan 45 ta kitobni shu obyekt formatida qo'shib chiqasiz...
        ];

        const libraryGrid = document.getElementById('libraryGrid');
        const readerScreen = document.getElementById('readerScreen');
        const bookTextContainer = document.getElementById('bookTextContainer');
        const btnPlay = document.getElementById('btnPlay');

        // Web Speech API (TTS) sozlamalari
        let synth = window.speechSynthesis;
        let utterance = new SpeechSynthesisUtterance();
        utterance.lang = 'uz-UZ'; // O'zbek tili
        utterance.rate = 0.9; // O'qish tezligi (bir oz sekin, fokusni ushlash uchun)

        // Kitoblarni ekranga chizish
        function renderBooks() {
            books.forEach((book, index) => {
                const card = document.createElement('div');
                card.className = 'book-card';
                card.onclick = () => openBook(index);
                
                card.innerHTML = `
                    <div>
                        <div class="book-title">${book.title}</div>
                        <div class="book-author">${book.author}</div>
                    </div>
                    <button class="read-btn">O'qishni boshlash</button>
                `;
                libraryGrid.appendChild(card);
            });
        }

        function openBook(index) {
            triggerHaptic();
            const book = books[index];
            bookTextContainer.innerHTML = `<h2>${book.title}</h2><p>${book.content}</p>`;
            readerScreen.classList.add('active');
            
            // TTS ga matnni biriktirish
            utterance.text = book.content;
            stopTTS(); // Yangi kitob ochilganda oldingisini to'xtatish
        }

        function closeBook() {
            triggerHaptic();
            readerScreen.classList.remove('active');
            stopTTS();
        }

        // --- TTS Funksiyalari ---
        function toggleTTS() {
            triggerHaptic();
            if (synth.speaking && !synth.paused) {
                synth.pause();
                btnPlay.innerText = '▶';
                btnPlay.classList.remove('playing');
            } else if (synth.paused) {
                synth.resume();
                btnPlay.innerText = '⏸';
                btnPlay.classList.add('playing');
            } else {
                synth.speak(utterance);
                btnPlay.innerText = '⏸';
                btnPlay.classList.add('playing');
            }
        }

        function stopTTS() {
            triggerHaptic();
            synth.cancel();
            btnPlay.innerText = '▶';
            btnPlay.classList.remove('playing');
        }

        // O'qish tugagach pleyerni asl holiga qaytarish
        utterance.onend = () => {
            btnPlay.innerText = '▶';
            btnPlay.classList.remove('playing');
        };

        // Dasturni ishga tushirish
        renderBooks();
    </script>
</body>
</html>
