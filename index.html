<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>XOLƎRIƆ Premium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --bg-deep: #050505;
            --silver-light: #E0E0E0;
            --silver-mid: #C0C0C0;
            --silver-dark: #8E8E8E;
            --accent-color: #FFA500;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(192, 192, 192, 0.2);
            --font-size: 18px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-deep);
            color: var(--silver-light);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        .silver-text-animated {
            background: linear-gradient(120deg, #a0a0a0 0%, #ffffff 20%, #a0a0a0 40%, #e0e0e0 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            font-weight: 800;
            text-shadow: 2px 2px 10px rgba(192,192,192,0.1);
            animation: shine 4s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .silver-text {
            background: linear-gradient(to right, var(--silver-mid) 0%, var(--silver-light) 50%, var(--silver-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        #welcomeScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-deep); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.4s ease, visibility 0.4s;
        }
        .welcome-box {
            background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); padding: 40px; border-radius: 24px;
            text-align: center; width: 90%; max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(192,192,192,0.05);
        }
        .welcome-box h1 { font-size: 3rem; margin-bottom: 10px; letter-spacing: 2px; }
        .welcome-box input {
            width: 100%; padding: 15px; border-radius: 12px;
            border: 1px solid var(--glass-border); background: rgba(0,0,0,0.6);
            color: #fff; font-size: 1.1rem; text-align: center; margin-bottom: 20px; outline: none;
            transition: border-color 0.3s;
        }
        .welcome-box input:focus { border-color: var(--silver-mid); }
        .silver-btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, var(--silver-dark), var(--silver-light));
            color: #000; font-size: 1.1rem; font-weight: 800; text-transform: uppercase;
            cursor: pointer; transition: transform 0.2s, opacity 0.2s;
        }
        .silver-btn:active { transform: scale(0.97); opacity: 0.9; }

        #lastReadBanner {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(15px); border: 1px solid var(--silver-mid);
            border-radius: 16px; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9); z-index: 1000; transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #lastReadBanner.show { top: 20px; }
        .banner-info p { font-size: 15px; font-weight: 600; color: #fff; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;}
        .banner-controls { display: flex; gap: 8px; }
        .btn-continue { background: var(--silver-light); color: #000; padding: 8px 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-close { background: transparent; color: var(--silver-dark); border: 1px solid var(--silver-dark); padding: 8px 12px; border-radius: 8px; cursor: pointer; }

        #libraryScreen { flex: 1; overflow-y: auto; padding: 20px; display: none; opacity: 0; transition: opacity 0.4s; }
        #libraryScreen::-webkit-scrollbar { width: 0; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding: 10px 0;}
        
        .books-grid { display: grid; gap: 20px; padding-bottom: 40px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        .book-card {
            background: var(--glass-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); padding: 20px; border-radius: 18px;
            cursor: pointer; display: flex; flex-direction: column; justify-content: space-between;
            min-height: 160px; transition: transform 0.2s ease, border-color 0.2s ease;
        }
        .book-card.last-read { border-color: var(--accent-color); background: rgba(255, 165, 0, 0.03); box-shadow: 0 0 20px rgba(255, 165, 0, 0.05); }
        .book-card:active { transform: scale(0.97); border-color: var(--silver-light); }
        .card-number { font-size: 11px; color: var(--silver-dark); margin-bottom: 8px; font-weight: 800; letter-spacing: 1.5px; }
        .card-title { font-size: 17px; color: #fff; font-weight: 600; margin-bottom: 15px; line-height: 1.4;}
        .card-btn { background: linear-gradient(135deg, var(--silver-dark), var(--silver-light)); color: #000; padding: 10px; border-radius: 10px; text-align: center; font-weight: 800; font-size: 13px; text-transform: uppercase; }

        #readerScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-deep); z-index: 100; display: flex; flex-direction: column;
            transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        #readerScreen.active { transform: translateX(0); }

        .reader-nav {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); z-index: 10;
        }
        .icon-btn {
            background: transparent; border: 1px solid var(--glass-border); color: var(--silver-light);
            width: 42px; height: 42px; border-radius: 50%; font-size: 16px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative;
        }
        .icon-btn:active { background: rgba(255,255,255,0.05); }

        /* MUKAMMAL RULER UI */
        #rulerPanel {
            position: absolute; top: 70px; right: 20px; width: 280px; height: 90px;
            background: #111; border-radius: 16px; border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,0.95), inset 0 0 10px rgba(255,255,255,0.02);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #rulerPanel.show { opacity: 1; visibility: visible; transform: translateY(0); }
        .ruler-value-display { color: var(--accent-color); font-size: 22px; font-weight: 800; margin-bottom: 5px; text-shadow: 0 0 10px rgba(255,165,0,0.3); }
        .ruler-container { width: 90%; height: 40px; position: relative; }
        
        input[type="range"].ruler-input {
            -webkit-appearance: none; width: 100%; height: 100%;
            background: transparent; position: absolute; top: 0; left: 0; outline: none; margin: 0; z-index: 2;
        }
        input[type="range"].ruler-input::-webkit-slider-runnable-track {
            height: 100%;
            background: 
                repeating-linear-gradient(to right, #555 0, #555 2px, transparent 2px, transparent 10%),
                repeating-linear-gradient(to right, #333 0, #333 1px, transparent 1px, transparent 5%);
            background-position: bottom; background-repeat: no-repeat;
            background-size: 100% 40%, 100% 20%;
            border-bottom: 1px solid #444;
        }
        input[type="range"].ruler-input::-webkit-slider-thumb {
            -webkit-appearance: none; height: 40px; width: 6px;
            background: var(--accent-color); border-radius: 4px;
            cursor: pointer; position: relative; top: -5px;
            box-shadow: 0 0 12px var(--accent-color);
        }

        .reader-content {
            flex: 1; overflow-y: auto; padding: 20px 20px 160px 20px;
            max-width: 800px; margin: 0 auto; width: 100%; scroll-behavior: smooth;
        }
        .reader-content::-webkit-scrollbar { display: none; }
        
        #readTitle { font-size: 26px; margin-bottom: 30px; text-align: center; line-height: 1.3;}
        #readText { font-size: var(--font-size); line-height: 1.8; color: #b3b3b3; transition: font-size 0.1s linear; user-select: text;}
        
        #readText p { margin-bottom: 25px; transition: all 0.3s ease; padding: 12px; border-radius: 12px; border-left: 2px solid transparent; }
        #readText p.active { 
            color: #fff; background: rgba(255, 165, 0, 0.05); border-left: 3px solid var(--accent-color);
            padding-left: 20px; transform: scale(1.01); box-shadow: -5px 0 15px rgba(255,165,0,0.05);
        }

        .audio-player {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; background: rgba(12, 12, 12, 0.95);
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 35px; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 15px 40px rgba(0,0,0,0.95);
        }
        .progress-container { flex: 1; margin: 0 15px; height: 6px; background: #222; border-radius: 3px; position: relative; overflow: hidden; cursor: pointer; }
        .progress-bar { height: 100%; background: var(--accent-color); width: 0%; transition: width 0.2s linear; box-shadow: 0 0 10px rgba(255,165,0,0.5);}
        .play-btn {
            background: linear-gradient(135deg, var(--silver-light), var(--silver-dark)); border: none; width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 0 20px rgba(255,255,255,0.1);
            transition: transform 0.2s; flex-shrink: 0;
        }
        .play-btn:active { transform: scale(0.92); }
        .play-btn svg { width: 22px; height: 22px; fill: #000; margin-left: 3px;}
        .play-btn.playing svg { margin-left: 0; }
        #progressText { font-size: 13px; font-weight: 800; color: var(--accent-color); width: 45px; text-align: center; flex-shrink: 0;}

        @media (min-width: 768px) {
            .reader-content { padding: 40px 40px 160px 40px; }
            #readTitle { font-size: 34px; }
        }
    </style>
</head>
<body>

    <div id="welcomeScreen">
        <div class="welcome-box">
            <h1 class="silver-text-animated">XOLƎRIƆ</h1>
            <p id="welcomeDesc" style="color:var(--silver-dark); margin-bottom: 25px; font-size: 14px;">Premium kutubxonaga kirish</p>
            <input type="text" id="userNameInput" placeholder="Ismingizni kiriting..." autocomplete="off">
            <button class="silver-btn" id="startBtn">KIRISH</button>
        </div>
    </div>

    <div id="lastReadBanner">
        <div class="banner-info">
            <div style="font-size: 11px; color: var(--accent-color); font-weight: 800; letter-spacing: 1px;">QAYTIB KELGANINGIZ BILAN</div>
            <p id="lastReadTitle"></p>
        </div>
        <div class="banner-controls">
            <button class="btn-continue" id="btnContinueBook">Davom etish</button>
            <button class="btn-close" id="btnCloseBanner">✕</button>
        </div>
    </div>

    <div id="libraryScreen">
        <div class="container">
            <header>
                <h1 class="silver-text" style="font-size: 24px; letter-spacing: 2px;">XOLƎRIƆ</h1>
                <div style="font-size: 13px; font-weight: 800; letter-spacing: 1px; color: var(--silver-dark);" id="displayUser"></div>
            </header>
            <div class="books-grid" id="booksGrid"></div>
        </div>
    </div>

    <div id="readerScreen">
        <div class="reader-nav">
            <button class="icon-btn" id="backBtn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <div class="silver-text" style="font-size: 15px; letter-spacing: 1.5px;">O'QISH REJIMI</div>
            <button class="icon-btn" id="fontBtn">Aa</button>
        </div>

        <div id="rulerPanel">
            <div class="ruler-value-display" id="rulerValueDisplay">18</div>
            <div class="ruler-container">
                <input type="range" class="ruler-input" id="fontRuler" min="14" max="36" value="18" step="1">
            </div>
        </div>

        <div class="reader-content" id="readerContent">
            <h1 id="readTitle" class="silver-text-animated"></h1>
            <div id="readText"></div>
        </div>

        <div class="audio-player">
            <div id="progressText">0%</div>
            <div class="progress-container" id="progressTrack">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <button class="play-btn" id="mainPlayBtn">
                <svg id="iconPlay" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                <svg id="iconPause" viewBox="0 0 24 24" style="display: none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
            </button>
        </div>
    </div>

    <script>
        const topics = [
            "Mukammallik Kuchi: Kichik Odatlar", "Kiberxavfsizlik va Tarmoq", "Moliyaviy Savodxonlik", 
            "Chuqur Diqqat: Fokus", "Kosmik Olam va Tuynuklar", "Veb-Dasturlash Arxitekturasi",
            "Kiberhimoya va Tahlil", "Ovoz Muhandisligi: Phonk", "Raqamli Savodxonlik", 
            "Sun'iy Intellekt Asoslari", "Kvant Fizikasi Mo'jizalari", "Vaqtni Boshqarish San'ati",
            "Psixologiya: Ong Sirlari", "Kriptovalyuta Inqilobi", "Bionika: Tabiat Dizayni",
            "Nanotexnologiya: Ko'rinmas Olam", "Ekologiya: Sayyora Kelajagi", "Metaolam va Virtual Reallik",
            "Avtomobilsozlik Evolyutsiyasi", "Tibbiyotda Gen Tahriri", "Sotsiologiya va Ommaviy Ong",
            "Kino San'ati Tarixi", "Arxitektura va Estetika", "Global Logistika",
            "Diplomatiya: Yumshoq Kuch", "Mifologiya: Qadimgi Sirlar", "Biologik Xilma-xillik",
            "Koinotni O'zlashtirish", "Xotirani Kuchaytirish", "Kriptografiya Ilmi",
            "Bioxaking: Tana Dasturlash", "Minimalizm Falsafasi", "Kvant Ruhiyati",
            "Axborot Urushi", "Mikrobiom: Ichki Koinot", "Xalqaro Huquq",
            "Kaizen: O'z-o'zini Rivojlantirish", "Musiqa Neyrobiologiyasi", "Ijtimoiy Tarmoqlar Qaramligi",
            "Startaplar Anatomiyasi", "Muvaffaqiyatsizlik Saboqlari", "Agile va Scrum",
            "Zamonaviy San'at", "Raqamli Minimalizm", "Yangi Geosiyosat",
            "Kiber-Psixologiya", "Smart City Infratuzilmasi", "Neyro-interfeys texnologiyasi",
            "Kvant Kompyuterlari", "Insoniyatning Yakuniy Taqdiri"
        ];

        const allBooks = topics.map((topic, index) => ({
            title: `${index + 1}. ${topic}`,
            content: `
                <p>Miya eng murakkab mexanizmlardan biri bo'lib, insonning barcha harakatlari va qarorlarini boshqaradi. <b>${topic}</b> sohasidagi so'nggi izlanishlar shuni ko'rsatadiki, doimiy o'rganish va yangi bilimlarni qabul qilish neyronlar o'rtasidagi aloqalarni mustahkamlaydi.</p>
                <p>Zamonaviy dunyoda axborot haddan tashqari ko'p. Diqqatni jamlash qobiliyati pasayib bormoqda. Muvaffaqiyatga erishish uchun miyani ortiqcha shovqinlardan tozalab, faqat muhim maqsadlarga yo'naltirish talab etiladi. Buning uchun raqamli minimalizm qoidalariga amal qilish muhimdir.</p>
                <p>Tarix shuni ko'rsatadiki, buyuk kashfiyotlar doimo ko'plab xatolar va muvaffaqiyatsizliklar ustiga qurilgan. Mag'lubiyatni fojia emas, balki qimmatli dars sifatida qabul qilish insonda kuchli iroda va qat'iyatni shakllantiradi.</p>
                <p>Atrof-muhit va biz yashayotgan jamiyat bizning fikrlash tarzimizga bevosita ta'sir o'tkazadi. To'g'ri muhitni tanlash, maqsadga yo'naltirilgan insonlar bilan muloqot qilish va zararli odatlardan voz kechish rivojlanishning asosiy kalitidir.</p>
                <p>Texnologiyalar hayotimizni osonlashtirmoqda, ammo insoniylik qadriyatlarini yo'qotmaslik eng muhim vazifa bo'lib qoladi. Empatiya, hissiy intellekt va o'zaro tushunish har qanday raqamli yutuqdan ustun turishi kerak. Har bir o'qilgan kitob bu yo'lda yorqin mayoq bo'lib xizmat qiladi.</p>
            `
        }));

        let userName = localStorage.getItem('xoleric_user');
        let lastBook = localStorage.getItem('xoleric_lastBook');

        const els = {
            welcome: document.getElementById('welcomeScreen'),
            nameInput: document.getElementById('userNameInput'),
            startBtn: document.getElementById('startBtn'),
            desc: document.getElementById('welcomeDesc'),
            banner: document.getElementById('lastReadBanner'),
            bannerTitle: document.getElementById('lastReadTitle'),
            btnContinue: document.getElementById('btnContinueBook'),
            btnCloseBanner: document.getElementById('btnCloseBanner'),
            library: document.getElementById('libraryScreen'),
            grid: document.getElementById('booksGrid'),
            displayUser: document.getElementById('displayUser'),
            reader: document.getElementById('readerScreen'),
            backBtn: document.getElementById('backBtn'),
            fontBtn: document.getElementById('fontBtn'),
            rulerPanel: document.getElementById('rulerPanel'),
            fontRuler: document.getElementById('fontRuler'),
            rulerValue: document.getElementById('rulerValueDisplay'),
            title: document.getElementById('readTitle'),
            content: document.getElementById('readText'),
            playBtn: document.getElementById('mainPlayBtn'),
            iconPlay: document.getElementById('iconPlay'),
            iconPause: document.getElementById('iconPause'),
            progressBar: document.getElementById('progressBar'),
            progressText: document.getElementById('progressText'),
            progressTrack: document.getElementById('progressTrack')
        };

        function vibrate(ms) { if ("vibrate" in navigator) try { navigator.vibrate(ms); } catch(e){} }
        function requestFS() { 
            let d = document.documentElement; 
            if(d.requestFullscreen) d.requestFullscreen().catch(()=>{}); 
            else if(d.webkitRequestFullscreen) d.webkitRequestFullscreen(); 
        }

        if(userName) {
            els.nameInput.style.display = 'none';
            els.desc.innerText = `Qaytganingizdan xursandmiz, ${userName}`;
            els.displayUser.innerText = userName.toUpperCase();
        }

        els.startBtn.onclick = () => {
            if(!userName) {
                let name = els.nameInput.value.trim();
                if(name.length < 2) return;
                userName = name;
                localStorage.setItem('xoleric_user', userName);
                els.displayUser.innerText = userName.toUpperCase();
            }
            vibrate(50);
            requestFS();
            els.welcome.style.opacity = '0';
            setTimeout(() => { 
                els.welcome.style.display = 'none'; 
                els.library.style.display = 'block';
                setTimeout(() => els.library.style.opacity = '1', 50);
                renderLibrary();
                if(lastBook !== null) {
                    els.bannerTitle.innerText = allBooks[lastBook].title;
                    setTimeout(() => els.banner.classList.add('show'), 600);
                }
            }, 400);
        };

        els.btnContinue.onclick = () => { vibrate(40); els.banner.classList.remove('show'); openBook(parseInt(lastBook)); };
        els.btnCloseBanner.onclick = () => { vibrate(20); els.banner.classList.remove('show'); };

        function renderLibrary() {
            els.grid.innerHTML = '';
            let lIdx = lastBook !== null ? parseInt(lastBook) : -1;
            let order = lIdx !== -1 ? [lIdx, ...Array.from({length: 50}, (_,i)=>i).filter(i=>i!==lIdx)] : Array.from({length: 50}, (_,i)=>i);

            order.forEach(index => {
                let book = allBooks[index];
                let card = document.createElement('div');
                card.className = `book-card ${index === lIdx ? 'last-read' : ''}`;
                card.innerHTML = `
                    <div>
                        <div class="card-number">${index === lIdx ? '🔴 DAVOM ETISH' : 'KITOB ' + (index+1).toString().padStart(2,'0')}</div>
                        <div class="card-title">${book.title.replace(/^\d+\.\s*/, '')}</div>
                    </div>
                    <div class="card-btn">O'qishni boshlash</div>
                `;
                card.onclick = () => { vibrate(40); els.banner.classList.remove('show'); openBook(index); };
                els.grid.appendChild(card);
            });
        }

        let pressTimer, isRulerOpen = false;
        const startPress = (e) => {
            e.preventDefault();
            pressTimer = setTimeout(() => {
                vibrate(60);
                els.rulerPanel.classList.add('show');
                isRulerOpen = true;
            }, 800);
        };
        const cancelPress = () => clearTimeout(pressTimer);
        const closeRuler = (e) => {
            if(isRulerOpen && !els.rulerPanel.contains(e.target) && e.target !== els.fontBtn) {
                els.rulerPanel.classList.remove('show');
                isRulerOpen = false;
            }
        };

        els.fontBtn.addEventListener('mousedown', startPress);
        els.fontBtn.addEventListener('touchstart', startPress, {passive: false});
        els.fontBtn.addEventListener('mouseup', cancelPress);
        els.fontBtn.addEventListener('mouseleave', cancelPress);
        els.fontBtn.addEventListener('touchend', cancelPress);
        document.addEventListener('mouseup', closeRuler);
        document.addEventListener('touchend', closeRuler);

        els.fontRuler.addEventListener('input', (e) => {
            let val = e.target.value;
            els.rulerValue.innerText = val;
            document.documentElement.style.setProperty('--font-size', `${val}px`);
        });

        class AdvancedTTS {
            constructor() {
                this.synth = window.speechSynthesis;
                this.paragraphs = [];
                this.currentIndex = 0;
                this.isPlaying = false;
                this.voice = null;
                
                const loadVoice = () => {
                    let voices = this.synth.getVoices();
                    this.voice = voices.find(v => v.lang.includes('uz')) || voices.find(v => v.lang.includes('ru')) || voices[0];
                };
                loadVoice();
                if(speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoice;
            }

            async fetchAzure(text) {
                try {
                    const res = await fetch("/tts", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ text }) });
                    if(!res.ok) throw new Error();
                    const blob = await res.blob();
                    return URL.createObjectURL(blob);
                } catch (e) { return null; }
            }

            loadText(domPars) {
                this.stop();
                this.paragraphs = domPars;
                this.currentIndex = 0;
                this.updateProgress();
            }

            play() {
                if(!this.paragraphs.length) return;
                this.isPlaying = true;
                if(this.synth.paused) this.synth.resume();
                else this.speakNext();
            }

            speakNext() {
                if(!this.isPlaying) return;
                if(this.currentIndex >= this.paragraphs.length) {
                    this.stop();
                    updatePlayUI(false);
                    return;
                }

                this.paragraphs.forEach(p => p.classList.remove('active'));
                let p = this.paragraphs[this.currentIndex];
                p.classList.add('active');
                
                let container = els.content;
                let offset = p.offsetTop - container.offsetTop - (container.clientHeight / 2) + (p.clientHeight / 2);
                container.scrollTo({top: offset, behavior: 'smooth'});
                
                this.updateProgress();

                let utter = new SpeechSynthesisUtterance(p.innerText);
                if(this.voice) utter.voice = this.voice;
                utter.rate = 0.95;
                utter.onend = () => { this.currentIndex++; this.speakNext(); };
                utter.onerror = () => { this.currentIndex++; this.speakNext(); };
                
                this.synth.speak(utter);
            }

            pause() {
                this.isPlaying = false;
                this.synth.pause();
            }

            stop() {
                this.isPlaying = false;
                this.synth.cancel();
                this.paragraphs.forEach(p => p.classList.remove('active'));
            }

            updateProgress() {
                let total = this.paragraphs.length;
                if(!total) return;
                let percent = total === 1 ? 100 : Math.floor((this.currentIndex / (total - 1)) * 100);
                if(percent > 100) percent = 100;
                els.progressBar.style.width = percent + '%';
                els.progressText.innerText = percent + '%';
            }
            
            seek(percent) {
                if(!this.paragraphs.length) return;
                let newIndex = Math.floor((percent / 100) * (this.paragraphs.length - 1));
                this.currentIndex = newIndex;
                if(this.isPlaying) {
                    this.synth.cancel();
                    this.speakNext();
                } else {
                    this.updateProgress();
                    this.paragraphs.forEach(p => p.classList.remove('active'));
                    this.paragraphs[this.currentIndex].classList.add('active');
                    let p = this.paragraphs[this.currentIndex];
                    let c = els.content;
                    c.scrollTo({top: p.offsetTop - c.offsetTop - (c.clientHeight/2) + (p.clientHeight/2), behavior: 'smooth'});
                }
            }
        }

        const tts = new AdvancedTTS();

        function updatePlayUI(playing) {
            if(playing) {
                els.iconPlay.style.display = 'none';
                els.iconPause.style.display = 'block';
                els.playBtn.classList.add('playing');
            } else {
                els.iconPlay.style.display = 'block';
                els.iconPause.style.display = 'none';
                els.playBtn.classList.remove('playing');
            }
        }

        function openBook(index) {
            lastBook = index;
            localStorage.setItem('xoleric_lastBook', index);
            renderLibrary();

            els.title.innerText = allBooks[index].title;
            els.content.innerHTML = allBooks[index].content;
            
            tts.loadText(Array.from(els.content.querySelectorAll('p')));

            els.library.style.opacity = '0';
            setTimeout(() => {
                els.library.style.display = 'none';
                els.reader.classList.add('active');
                els.content.scrollTop = 0;
            }, 300);
        }

        els.backBtn.onclick = () => {
            vibrate(30);
            tts.stop();
            updatePlayUI(false);
            if(isRulerOpen) { els.rulerPanel.classList.remove('show'); isRulerOpen = false; }
            
            els.reader.classList.remove('active');
            els.library.style.display = 'block';
            setTimeout(() => els.library.style.opacity = '1', 50);
        };

        els.playBtn.onclick = () => {
            vibrate(50);
            if(tts.isPlaying) { tts.pause(); updatePlayUI(false); } 
            else { tts.play(); updatePlayUI(true); }
        };

        els.progressTrack.onclick = (e) => {
            let rect = els.progressTrack.getBoundingClientRect();
            let percent = ((e.clientX - rect.left) / rect.width) * 100;
            percent = Math.max(0, Math.min(100, percent));
            tts.seek(percent);
            vibrate(20);
        };

    </script>
</body>
</html>
